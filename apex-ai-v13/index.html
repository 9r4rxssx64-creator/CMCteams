  <!-- v13.4.7-fix3 anti-zoom reset iOS Safari : toggle viewport meta sur visibilitychange
       pour forcer reset de zoom résiduel après pinch (sinon Kevin voit "écran zoomé"). -->
  <script nonce="e1d9559bd022bcddd691f27315e69054">
    (function(){
      try {
        var vp = document.querySelector('meta[name="viewport"]');
        if (!vp) return;
        var initial = vp.getAttribute('content');
        function resetZoom(){
          try {
            if (!window.visualViewport) return;
            if (window.visualViewport.scale > 1.005) {
              vp.setAttribute('content', initial + ',maximum-scale=1.0');
              setTimeout(function(){ vp.setAttribute('content', initial); }, 60);
            }
          } catch(_) {}
        }
        document.addEventListener('visibilitychange', function(){
          if (!document.hidden) setTimeout(resetZoom, 100);
        });
        window.addEventListener('pageshow', function(){ setTimeout(resetZoom, 100); });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', resetZoom);
        }
        /* Reset au boot après 1s (laisse le bundle initialiser ses propres handlers) */
        setTimeout(resetZoom, 1000);
      } catch(_) {}
    })();
  </script>
