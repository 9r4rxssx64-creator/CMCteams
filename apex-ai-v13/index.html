  <!-- v13.4.225 (Kevin "intègre le système MAJ auto forcé de CMCteams qui marche") :

  <script nonce="73362036d21b9d68ef1cdf9c0c228f5a">
    (function(){
      var APX_VER = document.documentElement.getAttribute('data-app-ver') || 'v0';
      var inProgress = false;
      async function autoForceUpdate(){
        if(inProgress || !navigator.onLine) return;
        var lastAuto = parseInt(localStorage.getItem('apex_v13_inline_maj_last') || '0', 10);
        if(Date.now() - lastAuto < 10000) return; /* throttle 10s */
        var active = document.activeElement;
        var tag = active && active.tagName && active.tagName.toLowerCase();
        if(tag === 'textarea' || tag === 'input' ||
           (active && active.getAttribute && active.getAttribute('contenteditable') === 'true')) return;
        /* skip si modal ouvert */
        if(document.querySelector('.ax-modal[style*="display:flex"],[role="dialog"]:not([hidden])')) return;
        /* skip si streaming IA actif (flag posé par chat) */
        if(window.__apexActiveStream === true) return;
        inProgress = true;
        try {
          var res = await fetch('./index.html?_v=' + Date.now(), {
            cache: 'reload',
            headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' },
          });
          if(!res.ok){ inProgress = false; return; }
          var html = await res.text();
          var m = html.match(/data-app-ver="([^"]+)"/);
          var remoteVer = m && m[1] ? m[1] : null;
          if(!remoteVer || remoteVer === APX_VER){ inProgress = false; return; }
          console.info('[Apex v13.4.225 inline auto-maj]', APX_VER, '→', remoteVer);
          localStorage.setItem('apex_v13_inline_maj_last', String(Date.now()));
          /* NUCLEAR : unregister SW + clear caches + reload */
          if('serviceWorker' in navigator){
            try {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r){ return r.unregister().catch(function(){}); }));
            } catch(_){}
          }
          if(typeof caches !== 'undefined'){
            try {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k){ return caches.delete(k).catch(function(){}); }));
            } catch(_){}
          }
          setTimeout(function(){
            location.replace(location.pathname + '?_force_upd_' + Date.now());
          }, 300);
        } catch(e){
          console.warn('[Apex inline auto-maj]', e && e.message);
          inProgress = false;
        }
      }
      /* Boot 2s delay + recurrent 60s + focus/visibility */
      setTimeout(autoForceUpdate, 2000);
      setInterval(autoForceUpdate, 60000);
      document.addEventListener('visibilitychange', function(){
        if(document.visibilityState === 'visible') autoForceUpdate();
      });
      window.addEventListener('focus', autoForceUpdate);
    })();
  </script>
