# SonarQube Cloud — bilan de santé détaillé, app par app (qualité, sécurité, dette,
# duplications). INDÉPENDANT (analyse statique déterministe, pas Claude). Gratuit pour
# ce dépôt public. Kevin 2026-07-08.
#
# Mise en route (Analyse Automatique = 0 token, 0 workflow) :
#   1. Se connecter sur https://sonarcloud.io avec GitHub
#   2. « Analyze new project » → choisir 9r4rxssx64-creator/CMCteams
#   3. Choisir « Automatic Analysis » (recommandé) → SonarCloud analyse à chaque push
# (org/clé ci-dessous = valeurs standard ; SonarCloud les confirme à l'import.)
sonar.organization=9r4rxssx64-creator
sonar.projectKey=9r4rxssx64-creator_cmcteams
sonar.projectName=kd-mc.com (domaine + toutes les apps)

# On analyse le VRAI code source, pas les artefacts générés / vendored / couverture,
# ni les gros fichiers de données (sinon bruit + faux « dette »).
sonar.sources=.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  apex-ai-v13/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.map,\
  backups/**,\
  **/tests/fixtures/**,\
  **/*.pdf,\
  tools/shared/planning-seed.js,\
  **/vendor/**,\
  .uptime/**
# Les tests ne comptent pas comme « code de prod » à corriger.
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/tests/**
