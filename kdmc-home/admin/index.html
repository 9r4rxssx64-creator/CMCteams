<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
<title>KDMC APEX — Admin domaine</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0b1409" />
<link rel="stylesheet" href="/design-system.css" />
<style>
  .wrap{max-width:920px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 14px}
  .logo{font-weight:800;font-size:22px;letter-spacing:1px;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo b{font-weight:600;font-size:11px;color:var(--admin);-webkit-text-fill-color:var(--admin);letter-spacing:2px;margin-left:6px}
  a.home{color:var(--mut);text-decoration:none;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;min-height:40px;display:inline-flex;align-items:center}
  .cat{margin:22px 0 10px;color:var(--gold);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:10px}
  .cat::after{content:"";flex:1;height:1px;background:var(--line)}
  .stat{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--mut)}
  .pill b{color:var(--gold2);font-size:18px;display:block;line-height:1.2}
  .search{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--field);color:var(--txt);font-size:16px;margin:8px 0 12px}
  .search:focus{outline:none;border-color:var(--line2)}
  .fiche{padding:14px 16px;margin-bottom:10px}
  .fhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .fiche h3{margin:0 0 2px;font-size:16px}
  .fiche .uid{color:var(--subtle);font-size:12px;font-family:var(--mono)}
  .when{color:var(--mut);font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:12px;font-size:13px}
  @media(max-width:520px){.kv{grid-template-columns:1fr}}
  .kv span{color:var(--subtle);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .grid{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  .cardrow{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;padding:14px;min-height:64px}
  .cardrow .i{font-size:24px;width:42px;height:42px;flex:0 0 42px;display:grid;place-items:center;background:var(--gold-glow);border-radius:11px}
  .cardrow .ct{display:flex;flex-direction:column;min-width:0}
  .cardrow .n{font-weight:700;font-size:15px}
  .cardrow .d{color:var(--mut);font-size:12px;margin-top:2px}
  .cardrow .arr{margin-left:auto;color:var(--gold);font-size:20px;opacity:.65}
  .msg{text-align:center;padding:40px 16px;color:var(--mut);line-height:1.6}
  .note{font-size:12.5px;color:var(--mut);background:rgba(106,138,255,.08);border:1px solid rgba(106,138,255,.25);border-radius:12px;padding:11px 14px;margin:8px 0;line-height:1.5}
  .onrow{margin-bottom:8px}
  .don{width:9px;height:9px;border-radius:50%;background:#22c55e;display:inline-block;vertical-align:middle;margin-right:5px;box-shadow:0 0 0 3px rgba(34,197,94,.18);animation:pulse 2.4s ease-in-out infinite}
  .don.rec{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.18);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .fiche:target{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,184,48,.35);scroll-margin-top:14px}
  .refresh{margin-left:auto;color:var(--mut);font-size:12px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:transparent;cursor:pointer;min-height:34px;text-transform:none;letter-spacing:0;font-weight:500}
  .refresh:active{transform:scale(.97)}
  @media(prefers-reduced-motion:reduce){.don{animation:none}}
  .histrow{padding:0;margin-bottom:8px;overflow:hidden}
  .histrow>summary{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;list-style:none;min-height:60px}
  .histrow>summary::-webkit-details-marker{display:none}
  .histrow>summary::after{content:"▸";margin-left:6px;color:var(--gold);opacity:.6;transition:transform .15s}
  .histrow[open]>summary::after{transform:rotate(90deg)}
  .histrow .when{margin-left:auto}
  .histrow[open]>summary{border-bottom:1px solid var(--line)}
  .timeline{padding:8px 14px 12px}
  .tlrow{font-size:12.5px;color:var(--mut);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .tlrow:last-child{border-bottom:none}
  .tlrow b{color:var(--txt);font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">KDMC<b>ADMIN</b></div>
      <a class="home" href="/">← Accueil</a>
    </div>
    <div id="app"><div class="msg">Vérification de l'accès…</div></div>
  </div>
  <script src="/kdmc-sso.js"></script>
  <script src="admin.js"></script>
</body>
</html>
