<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cloneur de sites — KDMC</title>
<style>
:root{--bg:#070a12;--card:#0e1524;--line:#1e2a44;--dim:#8aa0c6;--txt:#e7eefc;--gold:#e8b830;--blue:#5aa9ff}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#0d1830,#070a12);color:var(--txt);min-height:100vh;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.wrap{max-width:820px;margin:0 auto}
h1{font-size:20px;margin:6px 0 2px;display:flex;align-items:center;gap:8px}
.sub{color:var(--dim);font-size:13px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
input[type=url]{width:100%;background:#0a1220;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:12px 14px;font-size:16px}
.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
button{min-height:44px;padding:0 14px;border-radius:10px;border:1px solid var(--line);background:#12203a;color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
button:hover{border-color:var(--blue)}
button.go{background:linear-gradient(135deg,#2a4d8f,#1b2f57);border-color:#3a5fa0}
.k{font-size:12px;color:var(--dim)}
.out{margin-top:12px}
textarea{width:100%;height:300px;background:#0a1220;border:1px solid var(--line);border-radius:10px;color:#cfe0ff;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;white-space:pre;overflow:auto}
.meta div{padding:6px 0;border-bottom:1px solid var(--line);font-size:14px;display:flex;gap:8px}
.meta b{color:var(--dim);min-width:96px;flex-shrink:0}
.tags span{display:inline-block;background:#12203a;border:1px solid var(--line);border-radius:999px;padding:2px 10px;margin:2px 4px 2px 0;font-size:12px}
a{color:var(--blue);word-break:break-all}
.empty{color:var(--dim);text-align:center;padding:24px;font-size:14px}
.err{color:#ff8a8a;background:#2a1114;border:1px solid #5a2a2a;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px}
.row2{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.ver{position:fixed;left:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);font-size:10px;color:#6b7fa6;background:#0a1220cc;border:1px solid var(--line);border-radius:8px;padding:3px 7px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧬 Cloneur de sites</h1>
  <p class="sub">Lire, extraire ou cloner n'importe quelle page publique. Moteur côté serveur (aucun blocage), rien n'est stocké.</p>

  <div class="card">
    <input id="url" type="url" inputmode="url" placeholder="https://exemple.com" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="btns">
      <button class="go" data-m="read">📖 Lire</button>
      <button data-m="meta">🏷️ Infos &amp; liens</button>
      <button data-m="html">🔤 HTML brut</button>
      <button data-m="clone">📦 Clone portable</button>
    </div>
    <div class="k" id="state" style="margin-top:8px">Colle une URL puis choisis une action.</div>
    <div id="err"></div>
    <div class="out" id="out"></div>
  </div>
</div>
<span class="ver" id="ver" title="Forcer la mise à jour">Cloneur v1.0</span>
<script>
var WORKER="https://kdmc-clone.9r4rxssx64.workers.dev";
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function setErr(m){$("err").innerHTML=m?'<div class="err">⚠️ '+esc(m)+'</div>':"";}
function dl(name,text){var b=new Blob([text],{type:"text/plain"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},2000);}
function host(u){try{return new URL(u).hostname;}catch(e){return "site";}}

async function run(mode){
  var u=$("url").value.trim();
  if(!/^https?:\/\//i.test(u)){ if(u && !/^\w+:\/\//.test(u)){u="https://"+u;$("url").value=u;} else {setErr("Entre une URL http(s) valide.");return;} }
  setErr("");$("out").innerHTML="";$("state").textContent="⏳ Récupération de "+host(u)+"…";
  try{
    var r=await fetch(WORKER+"/"+mode+"?url="+encodeURIComponent(u),{cache:"no-store"});
    var ct=r.headers.get("content-type")||"";
    if(ct.indexOf("application/json")>=0){
      var d=await r.json();
      if(d.error){setErr((d.detail||d.error)+(d.status?" (HTTP "+d.status+")":""));$("state").textContent="Échec.";return;}
      if(mode==="read")return renderRead(d);
      if(mode==="meta")return renderMeta(d);
    }else{
      var txt=await r.text();
      if(!r.ok){setErr("HTTP "+r.status+" : "+txt.slice(0,160));$("state").textContent="Échec.";return;}
      return renderCode(mode,u,txt);
    }
  }catch(e){setErr("Réseau : "+(e&&e.message||e)+" — réessaie.");$("state").textContent="Échec.";}
}
function renderRead(d){
  $("state").textContent="✅ "+(d.words||0)+" mots · "+host(d.url);
  $("out").innerHTML='<div style="font-size:16px;font-weight:700;margin:4px 0 8px">'+esc(d.title||"(sans titre)")+'</div>'
    +'<div class="row2"><button id="cpT">📋 Copier le texte</button><button id="cpM">📋 Copier en Markdown</button><button id="dlM">⬇️ Télécharger .md</button></div>'
    +'<textarea readonly>'+esc(d.text||"")+'</textarea>';
  $("cpT").onclick=function(){navigator.clipboard.writeText(d.text||"");this.textContent="✓ Copié";};
  $("cpM").onclick=function(){navigator.clipboard.writeText(d.markdown||"");this.textContent="✓ Copié";};
  $("dlM").onclick=function(){dl(host(d.url)+".md",d.markdown||d.text||"");};
}
function renderCode(mode,u,txt){
  $("state").textContent="✅ "+(txt.length>>10)+" Ko · "+host(u);
  var fn=host(u)+(mode==="clone"?"-clone.html":".html");
  $("out").innerHTML='<div class="row2"><button id="cp">📋 Copier</button><button id="dl">⬇️ Télécharger '+esc(fn)+'</button></div>'
    +(mode==="clone"?'<div class="k" style="margin:6px 0">Fichier autonome : liens/images absolutisés, s\'ouvre seul dans un navigateur.</div>':'')
    +'<textarea readonly>'+esc(txt)+'</textarea>';
  $("cp").onclick=function(){navigator.clipboard.writeText(txt);this.textContent="✓ Copié";};
  $("dl").onclick=function(){dl(fn,txt);};
}
function renderMeta(d){
  $("state").textContent="✅ "+host(d.url)+" · "+(d.linkCount||0)+" liens";
  var rows='<div class="meta">';
  rows+='<div><b>Titre</b><span>'+esc(d.title||"—")+'</span></div>';
  rows+='<div><b>Description</b><span>'+esc(d.description||"—")+'</span></div>';
  if(d.techno&&d.techno.length)rows+='<div><b>Technos</b><span class="tags">'+d.techno.map(function(t){return '<span>'+esc(t)+'</span>';}).join("")+'</span></div>';
  if(d.ogImage)rows+='<div><b>Image</b><span><a href="'+esc(d.ogImage)+'" target="_blank" rel="noopener noreferrer">'+esc(d.ogImage)+'</a></span></div>';
  rows+='</div>';
  var links=(d.internalLinks&&d.internalLinks.length?d.internalLinks:d.links)||[];
  if(links.length)rows+='<div class="k" style="margin:12px 0 4px">Liens ('+links.length+')</div>'+links.slice(0,40).map(function(l){return '<div style="padding:4px 0;font-size:13px"><a href="'+esc(l)+'" target="_blank" rel="noopener noreferrer">'+esc(l)+'</a></div>';}).join("");
  $("out").innerHTML=rows;
}
document.querySelector(".btns").addEventListener("click",function(e){var b=e.target.closest("button[data-m]");if(b)run(b.dataset.m);});
$("url").addEventListener("keydown",function(e){if(e.key==="Enter")run("read");});
/* MAJ auto force (leçon #102) : badge cliquable = échappatoire garantie */
$("ver").onclick=function(){if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations)navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});if(window.caches&&caches.keys)caches.keys().then(function(k){k.forEach(function(n){caches.delete(n);});});location.replace(location.pathname+"?_force_upd_"+Date.now());};
</script>
</body>
</html>
