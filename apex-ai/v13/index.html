<!doctype html>
<html lang="fr" data-theme="dark" data-app-ver="v13.3.46">
<head>

  <meta name="theme-color" content="#08080f">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- CSP Jet 2 : nonce dynamique (regen à chaque build via vite-csp-nonce-plugin) -->
  <!-- 'strict-dynamic' permet aux scripts trustés (avec nonce) d'en charger d'autres -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' 'nonce-APEX_BOOT_NONCE' 'strict-dynamic' https:;
             style-src 'self' 'nonce-APEX_BOOT_NONCE' 'unsafe-inline';
             style-src-attr 'unsafe-inline';
             img-src 'self' data: blob: https:;
             font-src 'self' data:;
             connect-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://api.anthropic.com https://api.openai.com https://api.groq.com https://generativelanguage.googleapis.com https://openrouter.ai https://api.cohere.com https://api.mistral.ai https://api.deepseek.com https://api.perplexity.ai https://api.x.ai https://*.workers.dev https://api.elevenlabs.io https://*.ingest.sentry.io https://api.github.com https://api.cloudflare.com https://api.stripe.com https://api.brevo.com https://api.resend.com https://api.replicate.com https://api.telegram.org https://discord.com https://discordapp.com https://api.notion.com https://api.airtable.com https://hooks.slack.com https://slack.com https://api.openai.azure.com https://*.openai.azure.com https://api.together.xyz https://api.fireworks.ai https://api.deepl.com https://api-free.deepl.com https://www.googleapis.com https://api.scaleway.ai https://api.huggingface.co https://api-inference.huggingface.co https://api.runpod.io https://api.cloudflare.com/client/v4 https://*.r2.cloudflarestorage.com https://api.cohere.ai https://web.archive.org https://r.jina.ai https://api.duckduckgo.com https://api.brave.com https://api.search.brave.com https://api.tavily.com https://api.pinecone.io https://api.qdrant.io https://api.weaviate.io;
             worker-src 'self' blob:;
             frame-src 'self' https:;
             object-src 'none';
             base-uri 'self';
             form-action 'self';
             upgrade-insecure-requests;">

  <title>APEX AI v13</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/apex-logo.svg">
  <link rel="apple-touch-icon" href="./assets/icons/apex-logo-192.png">

  <link rel="preload" href="./assets/css/tokens.css" as="style">
  <link rel="preload" href="./assets/css/base.css" as="style">
  <link rel="preload" href="./assets/css/components.css" as="style">
  <link rel="preload" href="./assets/css/animations.css" as="style">
  <link rel="stylesheet" href="./assets/css/tokens.css">
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/animations.css">
  <link rel="stylesheet" href="./assets/css/rescue.css">
  <link rel="stylesheet" href="./assets/css/financial-bilan.css">
  <link rel="stylesheet" href="./assets/css/laurence.css">
  <link rel="stylesheet" href="./assets/css/ux-premium.css">

  <!-- Preconnect critical providers -->
  <link rel="preconnect" href="https://api.anthropic.com" crossorigin>
  <link rel="preconnect" href="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
</head>
<body>
  <!-- Splash minimal (visible <1s avant boot bundle) -->
  <div id="apex-splash" aria-hidden="true">
    <div class="apex-splash-logo">◆</div>
    <div class="apex-splash-name">APEX</div>
    <div class="apex-splash-bar"><div class="apex-splash-bar-fill"></div></div>
  </div>

  <!-- Root mount point -->
  <div id="apex-root" role="main" aria-label="APEX AI"></div>

  <!-- Fallback statique si bundle JS crash (ne JAMAIS reproduire l'erreur "écran blanc") -->
  <noscript>
    <div class="apex-noscript-fallback">
      <h1>APEX AI</h1>
      <p>JavaScript est requis pour utiliser APEX. Active-le dans ton navigateur.</p>
    </div>
  </noscript>

  <!-- Bouton SOS rescue permanent (HTML pur, indépendant framework) -->
  <!-- Préservé v12.771-779 — règle Kevin : "qu'au minimum 1 bouton fonctionne TOUJOURS" -->
  <!-- v13.0.13 : onclick + style externalisés vers rescue.js + rescue.css (CSP strict) -->
  <button id="apex-rescue-btn" type="button"
    title="Reset Apex (preserve donnees)" aria-label="Reset Apex">SOS</button>

  <!-- Boot loader minimal — charge le bundle ES module Vite -->
  <script type="module" nonce="APEX_BOOT_NONCE" src="./core/bootstrap.js"></script>

  <!-- Rescue handler + fail-safe (externalisé pour CSP strict zéro unsafe-inline) -->
  <script nonce="APEX_BOOT_NONCE" src="./assets/js/rescue.js"></script>
</body>
</html>
