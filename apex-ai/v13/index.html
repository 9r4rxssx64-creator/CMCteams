  <!-- v13.4.98 Anti-zoom INLINE Safari iOS — agit AVANT le bundle JS, indépendant.
       Kevin "X zoom tjs UX" : le rescue.js peut arriver tard si le SW transition.
       Cet inline garantit l'anti-zoom dès le 1er paint. -->
  <script nonce="APEX_BOOT_NONCE">
    (function(){
      try {
        ['gesturestart','gesturechange','gestureend'].forEach(function(evt){
          document.addEventListener(evt, function(e){ e.preventDefault(); }, { passive:false });
        });
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e){
          var now = Date.now();
          if (now - lastTouchEnd <= 300) e.preventDefault();
          lastTouchEnd = now;
        }, { passive:false });
      } catch(_) {}
    })();
  </script>
