// === MODULE: Geolocalisation ===
function axGetLocation(){return new Promise(function(resolve){if(!navigator.geolocation){resolve({error:"Geolocalisation non disponible"});return;}navigator.geolocation.getCurrentPosition(function(pos){resolve({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,altitude:pos.coords.altitude,speed:pos.coords.speed,heading:pos.coords.heading});},function(err){resolve({error:err.message});},{enableHighAccuracy:true,timeout:10000});});}
function axGetAddress(lat,lng){return fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&accept-language=fr").then(function(r){return r.json();}).then(function(d){return d.display_name||"Adresse inconnue";}).catch(function(){return"Erreur geocoding";});}
function axDistanceTo(lat1,lng1,lat2,lng2){var R=6371;var dLat=(lat2-lat1)*Math.PI/180;var dLng=(lng2-lng1)*Math.PI/180;var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);return(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(2)+" km";}

function axScreenshot(){if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){toast("Capture ecran non disponible","warn");return Promise.reject();}return navigator.mediaDevices.getDisplayMedia({video:true}).then(function(stream){var video=document.createElement("video");video.srcObject=stream;return video.play().then(function(){var canvas=document.createElement("canvas");canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext("2d").drawImage(video,0,0);stream.getTracks().forEach(function(t){t.stop();});var dataUrl=canvas.toDataURL("image/png");var a=document.createElement("a");a.href=dataUrl;a.download="kdmc-screenshot-"+Date.now()+".png";a.click();toast("Screenshot sauvegarde","ok");return dataUrl;});}).catch(function(e){toast("Capture annulee","warn");return null;});}

function _crewReview(userQuery,aiResponse){if(!_crewEnabled||!aiResponse||aiResponse.length<100)return null;var reviews=[];if(AI_CREW.verifier.active){var issues=[];if(aiResponse.indexOf("je pense")>=0||aiResponse.indexOf("peut-etre")>=0)issues.push("Langage incertain detecte");if(aiResponse.length>3000&&!/##|###|\n-/.test(aiResponse))issues.push("Reponse longue sans structure");if(/\d{4,}/.test(aiResponse)&&!/source|selon|d'apres/i.test(aiResponse))issues.push("Chiffres sans source");if(issues.length)reviews.push({agent:"Verificateur",issues:issues});}if(AI_CREW.factchecker.active){var claims=aiResponse.match(/\d+[\s]*(EUR|USD|%|millions?|milliards?|ans?|mois|jours?|heures?|km|kg)/gi);if(claims&&claims.length>3)reviews.push({agent:"Fact-checker",note:claims.length+" chiffres detectes — verification recommandee"});}if(AI_CREW.optimizer.active){if(aiResponse.length>2000){var ratio=aiResponse.split(/[.!?]/).length;reviews.push({agent:"Optimiseur",note:"Reponse "+aiResponse.length+" chars / "+ratio+" phrases. Ratio: "+Math.round(aiResponse.length/ratio)+" chars/phrase"});}}return reviews.length?reviews:null;}

tItem("ax_proxy_url")&&sessionStorage.getItem("ax_api_key"))issues.push("API key sans proxy");if(!lg("ax_pin",null))issues.push("Pas de PIN");if(lg("ax_err_log",[]).length>20)issues.push(lg("ax_err_log",[]).length+" erreurs");result=issues.length?issues.join(", "):"Securite OK";if(issues.length>1)toast("Securite: "+issues[0],"warn");break;case"monitor_quality":var convCount=K.conversations.length;var kbCount=K.kb.facts.length;var feedback=lg("ax_feedback_log",[]);var positive=feedback.filter(function(f){return f.reaction==="\uD83D\uDC4D";}).length;var negative=feedback.filter(function(f){return f.reaction==="\uD83D\uDC4E";}).length;var ratio=positive+negative>0?Math.round(positive/(positive+negative)*100):100;result="Convs:"+convCount+" KB:"+kbCount+" Satisfaction:"+ratio+"%";break;case"auto_learn":var learnCount=Object.keys(lg("ax_learned_devices",{})).length;var kbGrowth=K.kb.facts.length;result="Appareils appris:"+learnCount+" KB:"+kbGrowth+" faits";break;case"monitor_network":result="Online:"+navigator.onLine;if(navigator.connection)result+=" "+navigator.connection.effectiveType+" "+navigator.connection.downlink+"Mbps";if(!navigator.onLine)toast("Connexion perdue","err");break;default:result="Tache inconnue: "+worker.task;}worker.results.push({ts:now(),result:result});if(worker.results.length>20)worker.results=worker.results.slice(-20);worker.lastRun=now();setTimeout(run,worker.interval);}setTimeout(run,5000);return"Worker "+name+" cree (check toutes les "+Math.round(intervalMs/1000)+"s)";}

// === MODULE: Monte Carlo Decision Engine ===
function axMonteCarlo(scenario,variables,iterations){iterations=iterations||1000;var results=[];for(var i=0;i<iterations;i++){var outcome=0;variables.forEach(function(v){var val=v.min+Math.random()*(v.max-v.min);outcome+=val*( v.weight||1);});results.push(outcome);}results.sort(function(a,b){return a-b;});var p10=results[Math.floor(iterations*0.1)];var p50=results[Math.floor(iterations*0.5)];var p90=results[Math.floor(iterations*0.9)];var avg=results.reduce(function(a,b){return a+b;},0)/iterations;return{scenario:scenario,iterations:iterations,pessimiste:p10.toFixed(2),median:p50.toFixed(2),optimiste:p90.toFixed(2),moyenne:avg.toFixed(2),ecartType:Math.sqrt(results.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/iterations).toFixed(2)};}

function axCrackPassGenerate(length,opts){length=length||20;opts=opts||{upper:true,lower:true,digits:true,symbols:true,exclude:""};var pool="";if(opts.upper)pool+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";if(opts.lower)pool+="abcdefghijklmnopqrstuvwxyz";if(opts.digits)pool+="0123456789";if(opts.symbols)pool+="!@#$%^&*()_+-=[]{}|;:,.<>?";if(opts.exclude)pool=pool.split("").filter(function(c){return opts.exclude.indexOf(c)<0;}).join("");if(!pool)pool="abcdefghijklmnopqrstuvwxyz0123456789";var arr=new Uint8Array(length);try{crypto.getRandomValues(arr);}catch(e){for(var i=0;i<length;i++)arr[i]=Math.floor(Math.random()*256);}return Array.from(arr).map(function(b){return pool[b%pool.length];}).join("");}
function axCrackPassStrength(pwd){if(!pwd)return{score:0,label:"Vide",details:[]};var score=0;var details=[];if(pwd.length>=8){score+=1;details.push("\u2705 8+ caracteres");}else details.push("\u274C Moins de 8 caracteres");if(pwd.length>=12){score+=1;details.push("\u2705 12+ caracteres");}if(pwd.length>=16){score+=1;details.push("\u2705 16+ caracteres");}if(/[A-Z]/.test(pwd)){score+=1;details.push("\u2705 Majuscules");}else details.push("\u274C Pas de majuscules");if(/[a-z]/.test(pwd)){score+=1;details.push("\u2705 Minuscules");}else details.push("\u274C Pas de minuscules");if(/[0-9]/.test(pwd)){score+=1;details.push("\u2705 Chiffres");}else details.push("\u274C Pas de chiffres");if(/[^A-Za-z0-9]/.test(pwd)){score+=2;details.push("\u2705 Symboles");}else details.push("\u274C Pas de symboles");if(/(.)\\1{2,}/.test(pwd)){score-=1;details.push("\u26A0\uFE0F Repetitions detectees");}var common=["password","123456","qwerty","admin","letmein","welcome","monkey","dragon"];if(common.indexOf(pwd.toLowerCase())>=0){score=0;details.push("\uD83D\uDEA8 Mot de passe trop commun!");}var labels=["Tres faible","Faible","Moyen","Bon","Fort","Tres fort","Excellent","Inviolable"];var label=labels[Math.min(Math.max(score,0),labels.length-1)];var entropy=Math.round(pwd.length*Math.log2(pool_size(pwd)));return{score:score,max:8,label:label,entropy:entropy+"bits",details:details,crackTime:_estimateCrackTime(entropy)};}
function pool_size(pwd){var s=0;if(/[a-z]/.test(pwd))s+=26;if(/[A-Z]/.test(pwd))s+=26;if(/[0-9]/.test(pwd))s+=10;if(/[^A-Za-z0-9]/.test(pwd))s+=32;return s||26;}
function _estimateCrackTime(entropy){var guessesPerSec=1e10;var seconds=Math.pow(2,entropy)/guessesPerSec;if(seconds<1)return"Instantane";if(seconds<60)return Math.round(seconds)+"s";if(seconds<3600)return Math.round(seconds/60)+"min";if(seconds<86400)return Math.round(seconds/3600)+"h";if(seconds<31536000)return Math.round(seconds/86400)+"jours";if(seconds<31536000000)return Math.round(seconds/31536000)+"ans";return"Des milliards d'annees";}
function axCrackPassBatch(count,length){count=count||5;length=length||16;var results=[];for(var i=0;i<count;i++){var pwd=axCrackPassGenerate(length);var strength=axCrackPassStrength(pwd);results.push({password:pwd,strength:strength.label,entropy:strength.entropy});}return results;}

eur streaming: "+e.message,ts:now()});_saveMsgs();dc();});}read();}

function _autoExtractFacts(text){if(!text||text.length<50)return;var patterns=[/(?:retiens|souviens|note|memorise|n'oublie pas)[^.!?\n]{10,80}[.!?]/gi,/(?:mon |ma |mes |je suis |j'ai |je travaille )[^.!?\n]{10,60}[.!?]/gi];patterns.forEach(function(rx){var matches=text.match(rx);if(matches){matches.forEach(function(m){var clean=m.trim();if(clean.length>15&&clean.length<200){var exists=K.kb.facts.some(function(f){return f.text===clean;});if(!exists){kbAdd(clean,"auto-extract","fact");}}});}});}

function _kbAddFromInput(){var el=document.getElementById("ax-kb-input");if(!el||!el.value.trim())return;kbAdd(el.value.trim(),"manual","fact");el.value="";}
function kbAdd(text,source,type){if(!type)type="fact";var item={id:uid(),text:text,source:source||"chat",ts:now()};if(type==="instruction")K.kb.instructions.push(item);else K.kb.facts.push(item);ls("ax_kb",K.kb);dc();toast("Memorise","ok");}
function kbRemove(type,idx){if(type==="instruction")K.kb.instructions.splice(idx,1);else K.kb.facts.splice(idx,1);ls("ax_kb",K.kb);dc();}
function kbSearch(query,topN){if(!topN)topN=5;if(!query||!K.kb.facts.length)return[];var scores=tfidf(query,K.kb.facts.map(function(f){return f.text;}));var results=K.kb.facts.map(function(f,i){return{fact:f,score:scores[i]};}).filter(function(r){return r.score>0;}).sort(function(a,b){return b.score-a.score;});return results.slice(0,topN).map(function(r){return r.fact;});}
function tokenize(text){return text.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(function(w){return w.length>2;});}
function tfidf(query,docs){var qTokens=tokenize(query);var scores=[];docs.forEach(function(doc){var dTokens=tokenize(doc);var score=0;qTokens.forEach(function(qt){var tf=dTokens.filter(function(t){return t===qt;}).length/Math.max(dTokens.length,1);var df=docs.filter(function(d){return d.toLowerCase().indexOf(qt)>=0;}).length;var idfVal=Math.log((docs.length+1)/(df+1));score+=tf*idfVal;});scores.push(score);});return scores;}
function kbDistill(){if(K.kb.facts.length<20){toast("Pas assez de faits pour distiller","warn");return;}var old=K.kb.facts.splice(0,Math.floor(K.kb.facts.length/2));var summary=old.map(function(f){return f.text;}).join("; ");K.kb.facts.push({id:uid(),text:"[Resume] "+summary.slice(0,500),source:"distillation",ts:now()});ls("ax_kb",K.kb);dc();toast("Distillation terminee","ok");}

function _safeCalc(expr){try{var tokens=expr.match(/[\d.]+|[+\-*/%()]/g);if(!tokens)return"Expression invalide";var safe=tokens.join("");if(/[^0-9+\-*/%().\s]/.test(safe))return"Caracteres non autorises";var result=Function('"use strict";return ('+safe+")")();if(typeof result!=="number"||!isFinite(result))return"Resultat invalide";return String(result);}catch(e){return"Erreur calcul: "+e.message;}}

// === MODULE: Finance ===
function finCompound(p,r,n,t){if(!n||n<=0)n=1;return p*Math.pow(1+r/n,n*t);}
function finROI(gain,cost){if(!cost||cost===0)return"N/A (cout=0)";return((gain-cost)/cost*100).toFixed(2)+"%";}
function finNPV(rate,cashflows){var npv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+rate,i);});return npv;}
function finIRR(cashflows){var guess=0.1;for(var iter=0;iter<100;iter++){var npv=0,dnpv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+guess,i);dnpv+=-i*cf/Math.pow(1+guess,i+1);});if(Math.abs(npv)<0.0001)return(guess*100).toFixed(2)+"%";if(Math.abs(dnpv)<0.00001)break;guess-=npv/dnpv;if(!isFinite(guess))break;}return"Non convergent";}
function finLoan(p,annualRate,months){if(!months||months<=0)months=1;var mr=annualRate/12;var pmt=p*mr*Math.pow(1+mr,months)/(Math.pow(1+mr,months)-1);return{monthly:pmt.toFixed(2),total:(pmt*months).toFixed(2),interest:(pmt*months-p).toFixed(2)};}
function finAddPosition(sym,qty,price,cur){K.fin.portfolios.push({id:uid(),symbol:sym.toUpperCase(),qty:qty,avgPrice:price,currency:cur||"EUR",ts:now()});ls("ax_fin",K.fin);dc();}
function finRemovePosition(id){K.fin.portfolios=K.fin.portfolios.filter(function(p){return p.id!==id;});ls("ax_fin",K.fin);dc();}
function finAmortization(p,annualRate,months){var mr=annualRate/12;var pmt=p*mr*Math.pow(1+mr,months)/(Math.pow(1+mr,months)-1);var table=[];var balance=p;for(var i=1;i<=months;i++){var interest=balance*mr;var principal=pmt-interest;balance-=principal;table.push({month:i,payment:pmt.toFixed(2),principal:principal.toFixed(2),interest:interest.toFixed(2),balance:Math.max(0,balance).toFixed(2)});}return table;}
function finPortfolioSVG(){if(!K.fin.portfolios.length)return'<p style="color:var(--ax-text-dim);font-size:13px">Ajoutez des positions pour voir le graphe.</p>';var w=300,h=120,pad=30;var vals=K.fin.portfolios.map(function(p){return p.qty*p.avgPrice;});var total=vals.reduce(function(a,b){return a+b;},0);if(total===0)return'<p style="color:var(--ax-text-dim)">Valeur portefeuille = 0</p>';var colors=["#c9a227","#4a9aff","#4caf50","#ef5350","#ff9800","#9c27b0","#00bcd4","#e91e63"];var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-width:320px;margin:8px auto;display:block">';var x=0;K.fin.portfolios.forEach(function(p,i){var pct=vals[i]/total;var bw=Math.max((w-pad*2)*pct,2);svg+='<rect x="'+(pad+x)+'" y="20" width="'+bw+'" height="60" fill="'+colors[i%colors.length]+'" rx="4"/>';svg+='<text x="'+(pad+x+bw/2)+'" y="100" text-anchor="middle" fill="'+colors[i%colors.length]+'" font-size="9">'+esc(p.symbol)+'</text>';x+=bw;});svg+='<text x="'+pad+'" y="14" fill="var(--ax-text-dim)" font-size="10">Total: '+total.toFixed(0)+' EUR</text>';svg+="</svg>";return svg;}
function _finCalcTool(type,params){switch(type){case"compound":return"Montant final: "+finCompound(params.principal||1000,params.rate||0.05,params.n||12,params.years||10).toFixed(2)+" "+( params.currency||"EUR");case"roi":return"ROI: "+finROI(params.gain||0,params.cost||1);case"npv":return"VAN: "+finNPV(params.rate||0.1,params.cashflows||[]).toFixed(2);case"irr":return"TRI: "+finIRR(params.cashflows||[]);case"loan":var l=finLoan(params.principal||100000,params.rate||0.03,params.months||240);var amort=finAmortization(params.principal||100000,params.rate||0.03,params.months||240);var last3=amort.slice(-3).map(function(r){return"Mois "+r.month+": capital="+r.principal+" int="+r.interest+" solde="+r.balance;}).join("\n");return"Mensualite: "+l.monthly+"EUR, Total: "+l.total+"EUR, Interets: "+l.interest+"EUR\n\nDernieres echeances:\n"+last3;default:return"Type de calcul inconnu.";}}
function _finPortfolioTool(input){switch(input.action){case"add":finAddPosition(input.symbol||"???",input.qty||1,input.price||0);return"Position ajoutee: "+input.symbol;case"remove":var pos=K.fin.portfolios.find(function(p){return p.symbol===input.symbol;});if(pos){finRemovePosition(pos.id);return"Position supprimee: "+input.symbol;}return"Position non trouvee.";case"list":return JSON.stringify(K.fin.portfolios);default:return"Action inconnue.";}}

function finExportCSV(){if(!K.fin.portfolios.length){toast("Portefeuille vide","warn");return;}var csv="Symbol,Quantite,Prix Moyen,Devise,Date\n";K.fin.portfolios.forEach(function(p){csv+=p.symbol+","+p.qty+","+p.avgPrice+","+(p.currency||"EUR")+","+new Date(p.ts).toLocaleDateString("fr-FR")+"\n";});var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kdmc-portfolio.csv";a.click();toast("CSV telecharge","ok");}
function finSMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var sum=0;for(var i=prices.length-period;i<prices.length;i++)sum+=prices[i];return(sum/period).toFixed(2);}
function finEMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var k=2/(period+1);var ema=prices[0];for(var i=1;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);return ema.toFixed(2);}

function vFinance(){if(!K.user)return vLogin();var h='<div style="padding:16px"><h2 style="color:var(--ax-gold);margin-bottom:16px">\uD83D\uDCB0 Finance Expert</h2>';h+='<div class="ax-card"><h3>\uD83D\uDCBC Portefeuille</h3>';if(!K.fin.portfolios.length){h+='<p style="color:var(--ax-text-dim);font-size:13px">Aucune position. Dites "ajoute 10 actions AAPL a 180$" dans le chat.</p>';}K.fin.portfolios.forEach(function(p){h+='<div class="ax-fin-card" style="margin:6px 0"><div><strong>'+esc(p.symbol)+'</strong> x'+p.qty+'<div style="font-size:12px;color:var(--ax-text-dim)">Prix moyen: '+p.avgPrice+" "+esc(p.currency)+'</div></div><button class="ax-btn-icon" onclick="finRemovePosition(\''+p.id+'\')" style="width:32px;height:32px">\u2715</button></div>';});h+="</div>";h+='<div class="ax-card"><h3>\uD83D\uDCC8 Repartition portefeuille</h3>'+finPortfolioSVG()+'</div>';h+='<div class="ax-card"><h3>\uD83E\uDDEE Calculatrice Financiere</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="ax-btn ax-btn-outline" onclick="_finCalcUI(\'compound\')">Interets composes</button><button class="ax-btn ax-btn-outline" onclick="_finCalcUI(\'loan\')">Simulation pret</button><button class="ax-btn ax-btn-outline" onclick="_finCalcUI(\'roi\')">ROI</button><button class="ax-btn ax-btn-outline" onclick="_finCalcUI(\'npv\')">VAN/TRI</button></div><div style="margin-top:8px"><button class="ax-btn ax-btn-outline" onclick="finExportCSV()" style="width:100%">\uD83D\uDCE5 Exporter portefeuille CSV</button></div><div id="ax-fin-result" style="margin-top:12px"></div></div>';h+='<div class="ax-card"><h3>\uD83D\uDCC8 Watchlist</h3>';if(!K.fin.watchlist.length){h+='<p style="color:var(--ax-text-dim);font-size:13px">Dites "surveille le cours de AAPL" dans le chat.</p>';}K.fin.watchlist.forEach(function(w){h+='<div class="ax-setting-row"><span>'+esc(w.symbol)+'</span><button class="ax-btn-icon" onclick="finRemoveWatch(\''+esc(w.symbol)+'\')" style="width:32px;height:32px">\u2715</button></div>';});h+="</div></div>";return h;}

// === MODULE: IndexedDB pour scalabilite ===
var _idb=null;
function idbOpen(){return new Promise(function(resolve,reject){var req=indexedDB.open("kdmc_ai",2);req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains("conversations"))db.createObjectStore("conversations",{keyPath:"id"});if(!db.objectStoreNames.contains("messages"))db.createObjectStore("messages",{keyPath:"convId"});if(!db.objectStoreNames.contains("files"))db.createObjectStore("files",{keyPath:"id"});if(!db.objectStoreNames.contains("cache"))db.createObjectStore("cache",{keyPath:"key"});};req.onsuccess=function(e){_idb=e.target.result;resolve(_idb);};req.onerror=function(){reject();};});}
function idbPut(store,data){if(!_idb)return;try{var tx=_idb.transaction(store,"readwrite");tx.objectStore(store).put(data);}catch(e){}}
function idbGet(store,key){if(!_idb)return Promise.resolve(null);return new Promise(function(resolve){try{var tx=_idb.transaction(store,"readonly");var req=tx.objectStore(store).get(key);req.onsuccess=function(){resolve(req.result||null);};req.onerror=function(){resolve(null);};}catch(e){resolve(null);}});}

function _estimateCost(tokens){var costs={"claude-sonnet-4-6":{input:3,output:15},"claude-opus-4-6":{input:15,output:75},"claude-haiku-4-5-20251001":{input:0.25,output:1.25}};var model=K.settings.model||"claude-sonnet-4-6";var c=costs[model]||costs["claude-sonnet-4-6"];var inputTokens=Math.round(tokens*0.3);var outputTokens=Math.round(tokens*0.7);var cost=(inputTokens*c.input+outputTokens*c.output)/1000000;return cost.toFixed(4);}

function _getTopWords(words,n){var freq={};var stopwords=["le","la","les","de","du","des","un","une","et","en","a","au","aux","je","tu","il","nous","vous","ils","que","qui","est","sont","pour","dans","sur","par","avec","ce","cette","pas","ne","se"];words.forEach(function(w){var lw=w.toLowerCase().replace(/[^a-zA-ZÀ-ÿ]/g,"");if(lw.length>2&&stopwords.indexOf(lw)<0)freq[lw]=(freq[lw]||0)+1;});return Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,n).map(function(e){return{word:e[0],count:e[1]};});}

function cmcRead(key){return fetch(CMC_FB_URL+"/cmcteams/"+encodeURIComponent(key)+".json").then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).catch(function(e){toast("Erreur CMC: "+e.message,"err");return null;});}
function cmcWrite(key,value){if(!axIsAdmin()){toast("Admin requis","err");return Promise.reject("not admin");}return fetch(CMC_FB_URL+"/cmcteams/"+encodeURIComponent(key)+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(value)}).then(function(r){if(r.ok){_audit("cmc_write",K.user.id,key,"via KDMC");toast("CMCteams mis a jour: "+key,"ok");}return r;});}
function cmcGetEmployees(){return cmcRead("cmc_e");}
function cmcGetOverrides(){return cmcRead("cmc_ov");}
function cmcGetChat(){return cmcRead("cmc_chat");}
function cmcSetMotd(text){return cmcWrite("cmc_motd",{text:text,ts:Date.now(),author:"KDMC (admin)"});}
function cmcSendChat(msg){return cmcRead("cmc_chat").then(function(msgs){msgs=msgs||[];msgs.push({text:msg,uid:"U11804",name:"DESARZENS K (KDMC)",team:"admin",ts:Date.now()});if(msgs.length>500)msgs=msgs.slice(-500);return cmcWrite("cmc_chat",msgs);});}
