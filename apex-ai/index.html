:root{
--ax-bg:#08080f;--ax-bg2:#12121c;--ax-bg-card:rgba(18,18,28,.7);

--ax-gold-soft:rgba(201,162,39,.12);--ax-text:#f0f0f0;--ax-text-dim:#a8a8b8;

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:var(--ax-bg);color:var(--ax-text);font-family:var(--ax-font);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}

#app{display:flex;flex-direction:column;height:100%;position:relative}
#topbar{height:48px;min-height:48px;padding-top:var(--ax-safe-t);display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;background:var(--ax-glass);backdrop-filter:blur(var(--ax-blur));-webkit-backdrop-filter:blur(var(--ax-blur));border-bottom:1px solid var(--ax-border);z-index:100;position:relative}
#topbar .ax-logo{font-size:18px;font-weight:800;color:var(--ax-gold);letter-spacing:2px}

#topbar .ax-status{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--ax-text-dim)}

.ax-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;min-width:56px;cursor:pointer;color:var(--ax-text-dim);transition:color var(--ax-t) var(--ax-ease);text-decoration:none;-webkit-tap-highlight-color:transparent}
.ax-tab.active{color:var(--ax-gold)}
.ax-tab .ic{font-size:22px}

.ax-card{background:var(--ax-bg-card);border:1px solid var(--ax-border);border-radius:var(--ax-r);padding:16px;margin:8px 0;transition:all .25s var(--ax-ease)}

.ax-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:var(--ax-r-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--ax-t) var(--ax-ease);min-height:44px;min-width:44px;font-family:var(--ax-font)}
.ax-btn-primary{background:linear-gradient(135deg,var(--ax-gold),var(--ax-gold-bright));color:#08080f;box-shadow:0 4px 12px rgba(201,162,39,.25);position:relative;overflow:hidden}
.ax-btn-primary::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .5s}
.ax-btn-primary:hover{box-shadow:0 8px 20px rgba(201,162,39,.35);transform:translateY(-2px)}
.ax-btn-primary:hover::before{left:100%}
.ax-btn-primary:active{transform:translateY(0);box-shadow:0 2px 6px rgba(201,162,39,.2)}
.ax-btn-outline{background:transparent;border:1px solid var(--ax-gold);color:var(--ax-gold)}
.ax-btn-danger{background:var(--ax-red);color:#fff}
.ax-btn-ghost{background:transparent;color:var(--ax-text-dim)}

.ax-input{width:100%;padding:12px 14px;background:var(--ax-bg-input);border:1px solid var(--ax-border);border-radius:var(--ax-r-sm);color:var(--ax-text);font-size:15px;font-family:var(--ax-font);outline:none;transition:border-color var(--ax-t)}
.ax-input:focus{border-color:var(--ax-gold)}
.ax-input::placeholder{color:var(--ax-text-dim)}

.ax-toggle{position:relative;display:inline-block;width:48px;height:28px}

.ax-msg{padding:10px 14px;border-radius:var(--ax-r);margin:4px 12px;max-width:85%;word-wrap:break-word;overflow-wrap:break-word;line-height:1.55;font-size:14px}

.ax-code .ax-copy{position:absolute;top:6px;right:6px;padding:4px 10px;background:rgba(255,255,255,.08);border:none;border-radius:4px;color:var(--ax-text-dim);font-size:11px;cursor:pointer}

.ax-toast-ok{background:var(--ax-green);color:#fff}

.ax-toast-warn{background:#ff9800;color:#fff}
.ax-toast-info{background:var(--ax-blue);color:#fff}
.ax-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.ax-modal{background:var(--ax-bg2);border:1px solid var(--ax-border);border-radius:var(--ax-r);padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
.ax-modal h2{color:var(--ax-gold);font-size:18px;margin-bottom:12px}
.ax-modal .ax-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ax-text-dim);font-size:20px;cursor:pointer}
.ax-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.ax-empty .ax-empty-icon{font-size:48px;margin-bottom:12px}
.ax-empty .ax-empty-text{color:var(--ax-text-dim);font-size:14px;margin-bottom:16px}
.ax-loading{display:flex;gap:4px;align-items:center;justify-content:center;padding:20px}
.ax-loading span{width:8px;height:8px;border-radius:50%;background:var(--ax-gold);animation:axPulse 1.2s infinite}
.ax-loading span:nth-child(2){animation-delay:.2s}
.ax-loading span:nth-child(3){animation-delay:.4s}
.ax-chatbar{position:sticky;bottom:0;display:flex;align-items:flex-end;gap:6px;padding:8px 12px;padding-bottom:calc(8px + var(--ax-safe-b));background:var(--ax-glass);backdrop-filter:blur(var(--ax-blur));-webkit-backdrop-filter:blur(var(--ax-blur));border-top:1px solid var(--ax-border)}
.ax-chatbar textarea{flex:1;max-height:120px;min-height:44px;resize:none}
.ax-canvas{position:fixed;top:0;right:0;bottom:0;width:45%;max-width:500px;background:var(--ax-bg2);border-left:1px solid var(--ax-border);z-index:200;transform:translateX(100%);transition:transform .3s var(--ax-ease);display:flex;flex-direction:column;overflow:hidden}
.ax-canvas.open{transform:translateX(0)}
.ax-canvas-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--ax-border);min-height:48px}
.ax-canvas-body{flex:1;overflow:auto;padding:0}
.ax-canvas-body textarea{width:100%;height:100%;background:var(--ax-bg);color:var(--ax-text);border:none;padding:16px;font-family:var(--ax-mono);font-size:13px;line-height:1.6;resize:none;outline:none}
.ax-canvas-body iframe{width:100%;height:100%;border:none;background:#fff}
@media(max-width:767px){.ax-canvas{width:100%;max-width:100%}}
.ax-sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--ax-bg2);border-right:1px solid var(--ax-border);z-index:200;transform:translateX(-100%);transition:transform .3s var(--ax-ease);overflow-y:auto;padding-top:calc(48px + var(--ax-safe-t))}
.ax-sidebar.open{transform:translateX(0)}
.ax-sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none}
.ax-sidebar.open~.ax-sidebar-overlay{display:block}
.ax-conv-item{display:flex;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--ax-border);transition:background var(--ax-t)}
.ax-conv-item:hover,.ax-conv-item.active{background:var(--ax-gold-soft)}
.ax-conv-item .ax-conv-title{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ax-conv-item .ax-conv-time{font-size:10px;color:var(--ax-text-dim)}
.ax-setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ax-setting-row .ax-label{font-size:14px;display:flex;align-items:center;gap:8px}
.ax-setting-row .ax-desc{font-size:11px;color:var(--ax-text-dim)}
.ax-fin-card{background:var(--ax-bg-card);border:1px solid var(--ax-border);border-radius:var(--ax-r);padding:16px;display:flex;align-items:center;justify-content:space-between}
.ax-fin-up{color:var(--ax-green)}
.ax-fin-down{color:var(--ax-red)}
.ax-landing-hero{text-align:center;padding:80px 20px 60px;background:linear-gradient(135deg,#08080f 0%,#12121c 50%,#08080f 100%),radial-gradient(circle at 20% 50%,rgba(201,162,39,.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(74,154,255,.08) 0%,transparent 40%)}
.ax-landing-hero h1{font-size:48px;font-weight:800;background:linear-gradient(135deg,#c9a227 0%,#e8c840 50%,#c9a227 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:-1px}
.ax-landing-hero h1 span{color:var(--ax-blue)}
.ax-landing-hero p{color:var(--ax-text-dim);font-size:16px;max-width:500px;margin:0 auto 24px}
.ax-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;padding:0 16px}
.ax-pricing{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;padding:20px 16px}
.ax-price-card{text-align:center;padding:24px;border-radius:var(--ax-r);background:var(--ax-bg-card);border:1px solid var(--ax-border)}
.ax-price-card.featured{border:2px solid var(--ax-gold);box-shadow:0 8px 32px rgba(201,162,39,.2);position:relative}
.ax-price-card.featured::after{content:"BEST VALUE";position:absolute;top:-12px;right:20px;background:linear-gradient(135deg,#c9a227,#e8c840);color:#08080f;padding:4px 12px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:1px}
.ax-price-card .ax-amount{font-size:36px;font-weight:800;color:var(--ax-gold);margin:12px 0}

.ax-price-card ul{list-style:none;text-align:left;margin:16px 0}
.ax-price-card li{padding:6px 0;font-size:13px;color:var(--ax-text-dim)}
.ax-price-card li::before{content:"\2713 ";color:var(--ax-green);font-weight:700}
.ax-md h1,.ax-md h2,.ax-md h3{color:var(--ax-gold);margin:12px 0 6px}
.ax-md h1{font-size:20px}.ax-md h2{font-size:17px}.ax-md h3{font-size:15px}
.ax-md p{margin:6px 0}
.ax-md ul,.ax-md ol{padding-left:20px;margin:6px 0}
.ax-md li{margin:3px 0}
.ax-md a{color:var(--ax-blue);text-decoration:underline}
.ax-md strong{color:var(--ax-gold-bright)}
.ax-md code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-family:var(--ax-mono);font-size:13px}
.ax-md table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.ax-md th{background:rgba(201,162,39,.1);color:var(--ax-gold);padding:6px 10px;text-align:left;border:1px solid var(--ax-border)}
.ax-md td{padding:6px 10px;border:1px solid var(--ax-border)}
.ax-md blockquote{border-left:3px solid var(--ax-gold);padding-left:12px;color:var(--ax-text-dim);margin:8px 0}
@keyframes axSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@keyframes axFadeIn{from{opacity:0}to{opacity:1}}
@keyframes axShimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
@keyframes axBounce{0%,100%{transform:scale(1)}50%{transform:scale(.92)}}
@keyframes axTyping{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
.ax-skeleton{background:linear-gradient(90deg,var(--ax-bg-input) 25%,rgba(255,255,255,.06) 50%,var(--ax-bg-input) 75%);background-size:400px 100%;animation:axShimmer 1.5s infinite linear;border-radius:var(--ax-r-sm);height:16px;margin:6px 0}

.ax-btn:active{animation:axBounce .15s var(--ax-ease)}
.ax-typing{display:flex;gap:3px;padding:8px 14px}.ax-typing span{width:6px;height:6px;border-radius:50%;background:var(--ax-gold);animation:axTyping 1.2s infinite}

.ax-success-flash{animation:axSuccessFlash .5s ease}.ax-error-shake{animation:axErrorShake .4s ease}

<script>
"use strict";
// ========================================================

var FB_DEFAULT="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app";
var FB_URL="",FB_PATH="/apex";
var FB_FIX=["ax_convs","ax_kb","ax_fin","ax_settings","ax_devices","ax_audit","ax_usage","ax_user","ax_cmds","ax_clipboard"];
var FB_PRE=["ax_msgs_"];
var FB_LOCAL=["ax_uid","ax_pin","ax_lastact","ax_proxy_url","ax_stripe_pub","ax_sync_queue","ax_pin_fails","ax_theme","ax_tts_enabled","ax_device_id","ax_toggles"];
var SESSION_TTL=24*60*60*1000;
var _toastQ=[],_toastBusy=false,_viewHistory=[];

var _hljsLoaded=false,_pdfjsLoaded=false,_stripeLoaded=false,_purifyLoaded=false;
var _sttRecog=null,_ttsUtter=null;
var _rateLimiter={calls:[],maxPerMinute:20,check:function(){var oneMinAgo=now()-60000;this.calls=this.calls.filter(function(t){return t>oneMinAgo;});if(this.calls.length>=this.maxPerMinute){toast("Trop de requetes. Attendez 1 minute.","warn");return false;}this.calls.push(now());return true;}};

// --- Etat global ---

// --- Utilitaires ---
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}
function lg(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){if(e&&e.name==="QuotaExceededError"){_emergencyCleanup();try{localStorage.setItem(k,JSON.stringify(v));}catch(e2){toast("Stockage plein","err");}}}fbWrite(k,v);}
function _emergencyCleanup(){var keys=Object.keys(localStorage).filter(function(k){return k.startsWith("ax_msgs_");});var convs=lg("ax_convs",[]).sort(function(a,b){return(a.ts||0)-(b.ts||0);});var removed=0;while(convs.length>3&&removed<10){var old=convs.shift();localStorage.removeItem("ax_msgs_"+old.id);removed++;}if(!removed){keys.sort();while(keys.length>3){localStorage.removeItem(keys.shift());}}}
function now(){return Date.now();}

// --- Toast ---
function toast(msg,type){if(!type)type="ok";if(type==="ok")axHapticSuccess();if(type==="err")axHapticError();_toastQ.push({msg:msg,type:type});if(!_toastBusy)_toastNext();}
function _toastNext(){if(!_toastQ.length){_toastBusy=false;return;}_toastBusy=true;var item=_toastQ.shift();var el=document.createElement("div");el.className="ax-toast ax-toast-"+item.type;el.textContent=item.msg;el.setAttribute("role","alert");el.setAttribute("aria-live","polite");var c=document.getElementById("toast-container");if(c)c.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);_toastNext();},2500);}

// --- Firebase ---
function fbShouldSync(k){if(FB_LOCAL.indexOf(k)>=0)return false;for(var i=0;i<FB_FIX.length;i++)if(k===FB_FIX[i])return true;for(var i=0;i<FB_PRE.length;i++)if(k.indexOf(FB_PRE[i])===0)return true;return false;}
function fbSanitizeKey(k){return k.replace(/\./g,"_dot_");}
function fbInit(){FB_URL=(localStorage.getItem("ax_fb_url")||FB_DEFAULT).trim().replace(/\/$/,"");if(!FB_URL)return;fbLoadAll();fbStartListening();}
function fbWrite(k,v,_retry){if(!FB_URL||!fbShouldSync(k))return;if(!_retry)_retry=0;var url=FB_URL+FB_PATH+"/"+encodeURIComponent(fbSanitizeKey(k))+".json";fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).then(function(r){if(!r.ok)throw new Error(r.status);}).catch(function(e){if(_retry<3){setTimeout(function(){fbWrite(k,v,_retry+1);},1000*Math.pow(2,_retry));}else{_axSyncQueue[k]={v:v,ts:now()};ls("ax_sync_queue",_axSyncQueue);}});}
function fbLoadAll(){if(!FB_URL)return;fetch(FB_URL+FB_PATH+".json").then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(data){if(!data)return;Object.keys(data).forEach(function(k){var rk=k.replace(/_dot_/g,".");try{localStorage.setItem(rk,JSON.stringify(data[k]));}catch(e){}});_loadState();dc();}).catch(function(e){console.warn("fbLoadAll error:",e);});}
function fbStartListening(){if(!FB_URL||_fbEs)return;var url=FB_URL+FB_PATH+".json";_fbEs=new EventSource(url);_fbEs.onmessage=function(e){try{var d=JSON.parse(e.data);if(d&&d.path&&d.data!==undefined){var k=d.path.replace(/^\//,"").replace(/_dot_/g,".");if(k&&!FB_LOCAL.includes(k)){try{localStorage.setItem(k,JSON.stringify(d.data));}catch(ex){}_loadState();dc();}}}catch(ex){}};var _fbRetries=0;_fbEs.onerror=function(){if(_fbEs){_fbEs.close();_fbEs=null;}_fbRetries++;if(_fbRetries>10){console.warn("Firebase: abandon apres 10 tentatives");return;}setTimeout(fbStartListening,Math.min(5000*_fbRetries,60000));};}
function flushSyncQueue(){_axSyncQueue=lg("ax_sync_queue",{});var keys=Object.keys(_axSyncQueue);if(!keys.length)return;keys.forEach(function(k){fbWrite(k,_axSyncQueue[k].v);delete _axSyncQueue[k];});ls("ax_sync_queue",_axSyncQueue);toast("Sync terminee","info");}

// --- Securite ---
function axIsAdmin(){return K.user&&K.user.id===ADMIN_ID;}
function axHashPin(pin){var salt="APEX2026:"+navigator.userAgent.slice(0,20)+":";var s=salt+pin;var h1=0,h2=2166136261,h3=0;for(var r=0;r<50000;r++){for(var i=0;i<s.length;i++){h1=((h1<<5)-h1)+s.charCodeAt(i)|0;h2=(h2^s.charCodeAt(i))*16777619>>>0;h3=((h3<<7)^s.charCodeAt(i))*2654435761>>>0;}}return h1.toString(36)+"$"+h2.toString(36)+"$"+h3.toString(36);}
function axCheckPin(pin){var stored=lg("ax_pin",null);if(!stored)return true;return axHashPin(pin)===stored;}
function axSetPin(pin){var h=axHashPin(pin);localStorage.setItem("ax_pin",JSON.stringify(h));toast("PIN enregistre","ok");}
function _audit(type,who,what,detail){var log=lg("ax_audit",[]);log.unshift({type:type,who:who,what:what,detail:detail||"",ts:now()});if(log.length>500)log=log.slice(0,500);ls("ax_audit",log);}
function axCanUse(feat){var toggles=lg("ax_toggles",{});if(toggles[feat]===false)return false;return true;}
function axToggle(feat,state){if(!axIsAdmin())return;var toggles=lg("ax_toggles",{});toggles[feat]=state;ls("ax_toggles",toggles);_audit("toggle",K.user.id,feat,state?"ON":"OFF");dc();}
function axKillSwitch(){if(!axIsAdmin())return;if(!confirm("KILL SWITCH : tout desactiver ?"))return;var toggles=lg("ax_toggles",{});Object.keys(toggles).forEach(function(k){toggles[k]=false;});ls("ax_toggles",toggles);_audit("kill_switch",K.user.id,"all","OFF");K.user=null;ls("ax_uid",null);toast("Tout desactive","err");sv("login");}

// --- Auth ---
function axLogin(name,pin){if(!axCheckPin(pin)){var fails=lg("ax_pin_fails",{count:0,until:0});fails.count++;var delays=[0,0,0,0,0,30000,120000,600000,3600000,86400000];var d=delays[Math.min(fails.count,delays.length-1)];if(d)fails.until=now()+d;ls("ax_pin_fails",fails);toast("PIN incorrect","err");return false;}ls("ax_pin_fails",{count:0,until:0});K.user={name:name,id:name==="Kevin DESARZENS"?ADMIN_ID:"user_"+uid(),lang:"fr",plan:"free"};ls("ax_uid",K.user.id);ls("ax_user",K.user);touchSession();_audit("login",K.user.id,K.user.name,"");if(!K.activeConvId)newConversation();sv("dashboard");toast("Bienvenue "+esc(name)+" !","ok");if(!lg("ax_first_login",false)){axConfetti(40);ls("ax_first_login",true);}return true;}
function axLogout(){if(K.user)_audit("logout",K.user.id,K.user.name,"");K.user=null;K.isStreaming=false;ls("ax_uid",null);if(_fbEs){_fbEs.close();_fbEs=null;}if(_pomodoroInterval){clearInterval(_pomodoroInterval);_pomodoroInterval=null;}if(_stopwatchInterval){clearInterval(_stopwatchInterval);_stopwatchInterval=null;}if(_meditationTimer){clearInterval(_meditationTimer);_meditationTimer=null;}axSttStop();axTtsStop();axWakeLockRelease();sv("login");}

// --- Navigation ---
function sv(v){_viewHistory.push(K.view);K.view=v;render();var c=document.getElementById("content");if(c)c.scrollTop=0;}

function vTopbar(){var online=navigator.onLine;var statusDot=online?'<span style="color:var(--ax-green)" title="En ligne">&#9679;</span>':'<span style="color:var(--ax-red)" title="Hors ligne">&#9679;</span>';var menuBtn=K.user?'<span onclick="toggleSidebar()" style="cursor:pointer;font-size:20px" title="Historique">&#9776;</span>':"";var pomodoroBtn=_pomodoroDisplay();var canvasBtn=K.user?'<span onclick="axOpenCanvas(\'\',\'code\',\'javascript\')" style="cursor:pointer;font-size:14px" title="Canvas / Editeur">\uD83D\uDCDD</span> ':"";var shareBtn=K.user&&K.view==="chat"?'<span onclick="axShareConversation()" style="cursor:pointer;font-size:14px" title="Partager la conversation">\uD83D\uDCE4</span> ':"";var logoutBtn=K.user?'<span onclick="axLogout()" style="cursor:pointer;font-size:14px" title="Deconnexion">&#10005;</span>':"";return'<div id="topbar">'+menuBtn+' <div class="ax-logo">APEX <span>AI</span></div><div class="ax-status">'+pomodoroBtn+" "+statusDot+" "+canvasBtn+shareBtn+logoutBtn+"</div></div>";}

function vNav(){if(!K.user||K.view==="login"||K.view==="landing")return"";var coreTabs=[{id:"dashboard",ic:"\u2726",lb:"Accueil"},{id:"chat",ic:"\uD83D\uDCAC",lb:"Chat"},{id:"kb",ic:"\uD83E\uDDE0",lb:"Memoire"},{id:"finance",ic:"\uD83D\uDCB0",lb:"Finance"},{id:"settings",ic:"\u2699\uFE0F",lb:"Reglages"}];var extraTabs=[{id:"notes",ic:"\uD83D\uDCDD",lb:"Notes"},{id:"tasks",ic:"\u2705",lb:"Taches"},{id:"calendar",ic:"\uD83D\uDCC5",lb:"Agenda"},{id:"contacts",ic:"\uD83D\uDC65",lb:"Contacts"},{id:"expenses",ic:"\uD83D\uDCB8",lb:"Depenses"},{id:"habits",ic:"\uD83C\uDFAF",lb:"Habitudes"},{id:"news",ic:"\uD83D\uDCF0",lb:"Actus"},{id:"bookmarks",ic:"\uD83D\uDD17",lb:"Liens"},{id:"diary",ic:"\uD83D\uDCD3",lb:"Journal"}];var tabs=coreTabs.slice(0,-1);tabs.push({id:"_more",ic:"\u2795",lb:"Plus"});if(axIsAdmin()){tabs.push({id:"cmcadmin",ic:"\uD83C\uDFB0",lb:"CMC"});tabs.push({id:"appadmin",ic:"\uD83D\uDEE0\uFE0F",lb:"App"});}tabs.push({id:"settings",ic:"\u2699\uFE0F",lb:"Reglages"});var h='<nav id="navbar" role="tablist" aria-label="Navigation principale">';for(var i=0;i<tabs.length;i++){var t=tabs[i];if(t.id==="_more"){h+='<div class="ax-tab" role="tab" tabindex="0" onclick="_showMoreMenu()" aria-label="Plus de modules" title="Plus"><span class="ic" aria-hidden="true">'+t.ic+'</span><span class="lb">'+t.lb+'</span></div>';continue;}var sel=K.view===t.id;var cls=sel?" active":"";h+='<div class="ax-tab'+cls+'" role="tab" aria-selected="'+(sel?"true":"false")+'" tabindex="0" onclick="sv(\''+t.id+'\')" onkeydown="if(event.key===\'Enter\')sv(\''+t.id+'\')" aria-label="'+t.lb+'" title="'+t.lb+'"><span class="ic" aria-hidden="true">'+t.ic+'</span><span class="lb">'+t.lb+'</span></div>';}return h+"</nav>";}

function vMainContent(){var side=K.user?vSidebar():"";var canvas=K.user?vCanvas():"";return side+'<div id="content">'+vMain()+"</div>"+canvas;}

function vMain(){switch(K.view){case"login":return vLogin();case"landing":return vLanding();case"dashboard":return vDashboard();case"chat":return vChat();case"kb":return vKB();case"finance":return vFinance();case"devices":return vDevices();case"notes":return vNotes();case"tasks":return vTasks();case"calendar":return vCalendar();case"contacts":return vContacts();case"expenses":return vExpenses();case"habits":return vHabits();case"news":return vNews();case"bookmarks":return vBookmarks();case"diary":return vDiary();case"cmcadmin":return vCMCAdmin();case"appadmin":return vAppAdmin();case"settings":return vSettings();default:if(typeof window["v_custom_"+K.view]==="function")return window["v_custom_"+K.view]();return vChat();}}

// --- Sidebar ---
function vSidebar(){var cls=_sidebarOpen?" open":"";var h='<div class="ax-sidebar'+cls+'">';h+='<div style="padding:12px 16px;border-bottom:1px solid var(--ax-border)"><button class="ax-btn ax-btn-primary" onclick="newConversation();toggleSidebar()" style="width:100%">\u2795 Nouvelle conversation</button><input class="ax-input" placeholder="\uD83D\uDD0D Rechercher..." style="margin-top:8px;font-size:13px" oninput="_sidebarSearch=this.value.toLowerCase();dc()"></div>';for(var i=0;i<K.conversations.length;i++){var c=K.conversations[i];if(_sidebarSearch&&(c.title||"").toLowerCase().indexOf(_sidebarSearch)<0)continue;var act=c.id===K.activeConvId?" active":"";var pinIc=c.pinned?"\uD83D\uDCCC ":"";h+='<div class="ax-conv-item'+act+'" onclick="loadConversation(\''+esc(c.id)+'\');toggleSidebar()"><div class="ax-conv-title">'+pinIc+esc(c.title||"Sans titre")+'</div><div class="ax-conv-time">'+_timeAgo(c.ts)+' <span style="cursor:pointer;font-size:12px" onclick="event.stopPropagation();axPinConversation(\''+esc(c.id)+'\')" title="Epingler">\uD83D\uDCCC</span> <span style="cursor:pointer;font-size:12px" onclick="event.stopPropagation();deleteConversation(\''+esc(c.id)+'\')" title="Supprimer">\u2715</span></div></div>';}h+="</div>";if(_sidebarOpen)h+='<div class="ax-sidebar-overlay" onclick="toggleSidebar()"></div>';return h;}

function _timeAgo(ts){if(!ts)return"";var d=now()-ts;if(d<60000)return"maintenant";if(d<3600000)return Math.floor(d/60000)+"min";if(d<86400000)return Math.floor(d/3600000)+"h";return Math.floor(d/86400000)+"j";}

// --- Login ---
function vLogin(){return'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 20px"><div style="font-size:60px;margin-bottom:16px">\u2726</div><h1 style="color:var(--ax-gold);font-size:28px;font-weight:800;letter-spacing:3px;margin-bottom:4px">APEX AI</h1><p style="color:var(--ax-text-dim);font-size:14px;margin-bottom:32px">Intelligence Artificielle Ultime</p><div style="width:100%;max-width:320px"><input id="ax-login-name" class="ax-input" placeholder="Votre nom" value="Kevin DESARZENS" style="margin-bottom:12px"><input id="ax-login-pin" class="ax-input" type="password" placeholder="PIN (optionnel)" style="margin-bottom:16px"><button class="ax-btn ax-btn-primary" onclick="_doLogin()" style="width:100%">\uD83D\uDD13 Connexion</button><p style="text-align:center;margin-top:16px"><a href="#" onclick="sv(\'landing\');return false" style="color:var(--ax-blue);font-size:13px">Decouvrir APEX AI</a></p></div></div>';}

// --- Conversations ---

function loadConversation(id){K.activeConvId=id;K.messages=lg("ax_msgs_"+id,[]);if(_idb&&!K.messages.length){idbGet("messages",id).then(function(data){if(data&&data.msgs&&data.msgs.length){K.messages=data.msgs;dc();}}).catch(function(){});}dc();}
function deleteConversation(id){K.conversations=K.conversations.filter(function(c){return c.id!==id;});localStorage.removeItem("ax_msgs_"+id);if(K.activeConvId===id){if(K.conversations.length)loadConversation(K.conversations[0].id);else newConversation();}_saveConvs();}
function _saveConvs(){ls("ax_convs",K.conversations);K.conversations.forEach(function(c){if(_idb)idbPut("conversations",c);});}
function _saveMsgs(){ls("ax_msgs_"+K.activeConvId,K.messages);if(_idb)idbPut("messages",{convId:K.activeConvId,msgs:K.messages,ts:now()});}

function exportConversation(id,format){var msgs=lg("ax_msgs_"+id,[]);var conv=K.conversations.find(function(c){return c.id===id;});var title=conv?conv.title:"export";var content;if(format==="json"){content=JSON.stringify(msgs,null,2);}else{content="# "+title+"\n\n";msgs.forEach(function(m){content+="## "+(m.role==="user"?"Vous":"APEX AI")+"\n\n"+m.content+"\n\n";});}var blob=new Blob([content],{type:"text/"+(format==="json"?"json":"markdown")});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=title.replace(/[^a-zA-Z0-9]/g,"_")+"."+format;a.click();toast("Export "+format+" telecharge","ok");}

// --- PLACEHOLDER SUITES (seront ajoutes par Edit) ---

function _processStream(body,depth,msgs,sysPrompt){var reader=body.getReader();var decoder=new TextDecoder();var fullText="";var toolUseBlocks=[];var currentToolUse=null;var buffer="";function read(){reader.read().then(function(result){if(result.done){_onStreamDone(fullText,toolUseBlocks,depth,msgs,sysPrompt);return;}buffer+=decoder.decode(result.value,{stream:true});var lines=buffer.split("\n");buffer=lines.pop()||"";for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line.startsWith("data: "))continue;var json=line.slice(6);if(json==="[DONE]")continue;try{var ev=JSON.parse(json);if(ev.type==="content_block_start"&&ev.content_block){if(ev.content_block.type==="tool_use"){currentToolUse={id:ev.content_block.id,name:ev.content_block.name,input_json:""};}if(ev.content_block.type==="thinking"){_updateStreamBubble('<div style="color:var(--ax-text-dim);font-size:12px;font-style:italic;border-left:2px solid var(--ax-gold);padding-left:8px;margin:4px 0">\uD83E\uDDE0 Reflexion...</div>'+renderMd(fullText));}}if(ev.type==="content_block_delta"&&ev.delta){if(ev.delta.type==="text_delta"&&ev.delta.text){fullText+=ev.delta.text;_updateStreamBubble(renderMd(fullText));}if(ev.delta.type==="thinking_delta"&&ev.delta.thinking){_updateStreamBubble('<div style="color:var(--ax-text-dim);font-size:12px;font-style:italic;border-left:2px solid var(--ax-gold);padding-left:8px;margin:4px 0">\uD83E\uDDE0 '+esc(ev.delta.thinking.slice(-150))+'</div>'+renderMd(fullText));}if(ev.delta.type==="input_json_delta"&&ev.delta.partial_json&&currentToolUse){currentToolUse.input_json+=ev.delta.partial_json;}}if(ev.type==="content_block_stop"&&currentToolUse){try{currentToolUse.input=JSON.parse(currentToolUse.input_json);}catch(pe){currentToolUse.input={};}toolUseBlocks.push(currentToolUse);currentToolUse=null;}}catch(pe){}}read();}).catch(function(e){K.isStreaming=false;if(fullText)K.messages.push({role:"assistant",content:fullText,ts:now()});else K.messages.push({role:"assistant",content:"Erreur streaming: "+e.message,ts:now()});_saveMsgs();dc();});}read();}

function _autoExtractFacts(text){if(!text||text.length<50)return;var patterns=[/(?:retiens|souviens|note|memorise|n'oublie pas)[^.!?\n]{10,80}[.!?]/gi,/(?:mon |ma |mes |je suis |j'ai |je travaille )[^.!?\n]{10,60}[.!?]/gi];patterns.forEach(function(rx){var matches=text.match(rx);if(matches){matches.forEach(function(m){var clean=m.trim();if(clean.length>15&&clean.length<200){var exists=K.kb.facts.some(function(f){return f.text===clean;});if(!exists){kbAdd(clean,"auto-extract","fact");}}});}});}
function axShareConversation(){if(!K.activeConvId||!K.messages.length){toast("Rien a partager","warn");return;}var conv=K.conversations.find(function(c){return c.id===K.activeConvId;});var text="# "+(conv?conv.title:"Conversation APEX AI")+"\n\n";K.messages.forEach(function(m){var content=typeof m.content==="string"?m.content:JSON.stringify(m.content);text+="**"+(m.role==="user"?"Vous":"APEX AI")+"** :\n"+content+"\n\n";});if(navigator.share){navigator.share({title:conv?conv.title:"APEX AI",text:text.slice(0,2000)}).catch(function(){});}else{navigator.clipboard.writeText(text).then(function(){toast("Conversation copiee dans le presse-papiers","ok");}).catch(function(){toast("Erreur copie","err");});}}
function axCopyMsg(idx){var msg=K.messages[idx];if(!msg)return;var text=typeof msg.content==="string"?msg.content:JSON.stringify(msg.content);navigator.clipboard.writeText(text).then(function(){toast("Message copie","ok");}).catch(function(){toast("Erreur copie","err");});}

function _sanitize(html){if(typeof DOMPurify!=="undefined")return DOMPurify.sanitize(html,{ALLOWED_TAGS:["strong","em","code","pre","h1","h2","h3","ul","ol","li","a","br","div","span","table","th","td","tr","blockquote","button"],ALLOWED_ATTR:["href","target","class","id","style","onclick","aria-label","title"]});return html;}
function renderMd(text){if(!text)return"";var h=esc(text);h=h.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){var id="cb"+Math.random().toString(36).slice(2,7);var langCls=lang?' class="language-'+lang+'"':"";return'<div class="ax-code"><button class="ax-copy" onclick="axCopyCode(\''+id+'\')">\uD83D\uDCCB Copier</button><pre><code id="'+id+'"'+langCls+">"+code+"</code></pre></div>";});if(!_hljsLoaded){axHljsLoad().then(function(){document.querySelectorAll(".ax-code code[class]").forEach(function(el){if(window.hljs)window.hljs.highlightElement(el);});});}else if(window.hljs){setTimeout(function(){document.querySelectorAll(".ax-code code[class]").forEach(function(el){if(!el.classList.contains("hljs"))window.hljs.highlightElement(el);});},50);}h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0" loading="lazy">');h=h.replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;font-family:var(--ax-mono);font-size:13px">$1</code>');h=h.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");h=h.replace(/\*([^*]+)\*/g,"<em>$1</em>");h=h.replace(/^### (.+)$/gm,"<h3>$1</h3>");h=h.replace(/^## (.+)$/gm,"<h2>$1</h2>");h=h.replace(/^# (.+)$/gm,"<h1>$1</h1>");h=h.replace(/^\- (.+)$/gm,"<li>$1</li>");h=h.replace(/(<li>.*<\/li>)/gs,"<ul>$1</ul>");h=h.replace(/\n/g,"<br>");return _sanitize(h);}

function _kbAddFromInput(){var el=document.getElementById("ax-kb-input");if(!el||!el.value.trim())return;kbAdd(el.value.trim(),"manual","fact");el.value="";}
function kbAdd(text,source,type){if(!type)type="fact";var item={id:uid(),text:text,source:source||"chat",ts:now()};if(type==="instruction")K.kb.instructions.push(item);else K.kb.facts.push(item);ls("ax_kb",K.kb);dc();toast("Memorise","ok");}
function kbRemove(type,idx){if(type==="instruction")K.kb.instructions.splice(idx,1);else K.kb.facts.splice(idx,1);ls("ax_kb",K.kb);dc();}
function kbSearch(query,topN){if(!topN)topN=5;if(!query||!K.kb.facts.length)return[];var scores=tfidf(query,K.kb.facts.map(function(f){return f.text;}));var results=K.kb.facts.map(function(f,i){return{fact:f,score:scores[i]};}).filter(function(r){return r.score>0;}).sort(function(a,b){return b.score-a.score;});return results.slice(0,topN).map(function(r){return r.fact;});}
function tokenize(text){return text.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(function(w){return w.length>2;});}
function tfidf(query,docs){var qTokens=tokenize(query);var scores=[];docs.forEach(function(doc){var dTokens=tokenize(doc);var score=0;qTokens.forEach(function(qt){var tf=dTokens.filter(function(t){return t===qt;}).length/Math.max(dTokens.length,1);var df=docs.filter(function(d){return d.toLowerCase().indexOf(qt)>=0;}).length;var idfVal=Math.log((docs.length+1)/(df+1));score+=tf*idfVal;});scores.push(score);});return scores;}
function kbDistill(){if(K.kb.facts.length<20){toast("Pas assez de faits pour distiller","warn");return;}var old=K.kb.facts.splice(0,Math.floor(K.kb.facts.length/2));var summary=old.map(function(f){return f.text;}).join("; ");K.kb.facts.push({id:uid(),text:"[Resume] "+summary.slice(0,500),source:"distillation",ts:now()});ls("ax_kb",K.kb);dc();toast("Distillation terminee","ok");}
function kbExport(){var blob=new Blob([JSON.stringify(K.kb,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="apex-ai-kb.json";a.click();toast("KB exportee","ok");}
function kbImport(jsonStr){try{var data=JSON.parse(jsonStr);if(data.facts)K.kb.facts=K.kb.facts.concat(data.facts);if(data.instructions)K.kb.instructions=K.kb.instructions.concat(data.instructions);ls("ax_kb",K.kb);dc();toast("KB importee ("+K.kb.facts.length+" faits)","ok");}catch(e){toast("Erreur import: JSON invalide","err");}}
function _kbImportFile(input){if(!input.files||!input.files[0])return;var reader=new FileReader();reader.onload=function(e){kbImport(e.target.result);};reader.readAsText(input.files[0]);}

function _safeCalc(expr){try{var tokens=expr.match(/[\d.]+|[+\-*/%()]/g);if(!tokens)return"Expression invalide";var safe=tokens.join("");if(/[^0-9+\-*/%().\s]/.test(safe))return"Caracteres non autorises";var result=Function('"use strict";return ('+safe+")")();if(typeof result!=="number"||!isFinite(result))return"Resultat invalide";return String(result);}catch(e){return"Erreur calcul: "+e.message;}}

// === MODULE: Finance ===
function finCompound(p,r,n,t){if(!n||n<=0)n=1;return p*Math.pow(1+r/n,n*t);}
function finROI(gain,cost){if(!cost||cost===0)return"N/A (cout=0)";return((gain-cost)/cost*100).toFixed(2)+"%";}
function finNPV(rate,cashflows){var npv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+rate,i);});return npv;}
function finIRR(cashflows){var guess=0.1;for(var iter=0;iter<100;iter++){var npv=0,dnpv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+guess,i);dnpv+=-i*cf/Math.pow(1+guess,i+1);});if(Math.abs(npv)<0.0001)return(guess*100).toFixed(2)+"%";if(Math.abs(dnpv)<0.00001)break;guess-=npv/dnpv;if(!isFinite(guess))break;}return"Non convergent";}
function finLoan(p,annualRate,months){if(!months||months<=0)months=1;var mr=annualRate/12;var pmt=p*mr*Math.pow(1+mr,months)/(Math.pow(1+mr,months)-1);return{monthly:pmt.toFixed(2),total:(pmt*months).toFixed(2),interest:(pmt*months-p).toFixed(2)};}
function finAddPosition(sym,qty,price,cur){K.fin.portfolios.push({id:uid(),symbol:sym.toUpperCase(),qty:qty,avgPrice:price,currency:cur||"EUR",ts:now()});ls("ax_fin",K.fin);dc();}
function finRemovePosition(id){K.fin.portfolios=K.fin.portfolios.filter(function(p){return p.id!==id;});ls("ax_fin",K.fin);dc();}
function finAmortization(p,annualRate,months){var mr=annualRate/12;var pmt=p*mr*Math.pow(1+mr,months)/(Math.pow(1+mr,months)-1);var table=[];var balance=p;for(var i=1;i<=months;i++){var interest=balance*mr;var principal=pmt-interest;balance-=principal;table.push({month:i,payment:pmt.toFixed(2),principal:principal.toFixed(2),interest:interest.toFixed(2),balance:Math.max(0,balance).toFixed(2)});}return table;}
function finPortfolioSVG(){if(!K.fin.portfolios.length)return'<p style="color:var(--ax-text-dim);font-size:13px">Ajoutez des positions pour voir le graphe.</p>';var w=300,h=120,pad=30;var vals=K.fin.portfolios.map(function(p){return p.qty*p.avgPrice;});var total=vals.reduce(function(a,b){return a+b;},0);if(total===0)return'<p style="color:var(--ax-text-dim)">Valeur portefeuille = 0</p>';var colors=["#c9a227","#4a9aff","#4caf50","#ef5350","#ff9800","#9c27b0","#00bcd4","#e91e63"];var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-width:320px;margin:8px auto;display:block">';var x=0;K.fin.portfolios.forEach(function(p,i){var pct=vals[i]/total;var bw=Math.max((w-pad*2)*pct,2);svg+='<rect x="'+(pad+x)+'" y="20" width="'+bw+'" height="60" fill="'+colors[i%colors.length]+'" rx="4"/>';svg+='<text x="'+(pad+x+bw/2)+'" y="100" text-anchor="middle" fill="'+colors[i%colors.length]+'" font-size="9">'+esc(p.symbol)+'</text>';x+=bw;});svg+='<text x="'+pad+'" y="14" fill="var(--ax-text-dim)" font-size="10">Total: '+total.toFixed(0)+' EUR</text>';svg+="</svg>";return svg;}
function _finCalcTool(type,params){switch(type){case"compound":return"Montant final: "+finCompound(params.principal||1000,params.rate||0.05,params.n||12,params.years||10).toFixed(2)+" "+( params.currency||"EUR");case"roi":return"ROI: "+finROI(params.gain||0,params.cost||1);case"npv":return"VAN: "+finNPV(params.rate||0.1,params.cashflows||[]).toFixed(2);case"irr":return"TRI: "+finIRR(params.cashflows||[]);case"loan":var l=finLoan(params.principal||100000,params.rate||0.03,params.months||240);var amort=finAmortization(params.principal||100000,params.rate||0.03,params.months||240);var last3=amort.slice(-3).map(function(r){return"Mois "+r.month+": capital="+r.principal+" int="+r.interest+" solde="+r.balance;}).join("\n");return"Mensualite: "+l.monthly+"EUR, Total: "+l.total+"EUR, Interets: "+l.interest+"EUR\n\nDernieres echeances:\n"+last3;default:return"Type de calcul inconnu.";}}
function _finPortfolioTool(input){switch(input.action){case"add":finAddPosition(input.symbol||"???",input.qty||1,input.price||0);return"Position ajoutee: "+input.symbol;case"remove":var pos=K.fin.portfolios.find(function(p){return p.symbol===input.symbol;});if(pos){finRemovePosition(pos.id);return"Position supprimee: "+input.symbol;}return"Position non trouvee.";case"list":return JSON.stringify(K.fin.portfolios);default:return"Action inconnue.";}}

function finExportCSV(){if(!K.fin.portfolios.length){toast("Portefeuille vide","warn");return;}var csv="Symbol,Quantite,Prix Moyen,Devise,Date\n";K.fin.portfolios.forEach(function(p){csv+=p.symbol+","+p.qty+","+p.avgPrice+","+(p.currency||"EUR")+","+new Date(p.ts).toLocaleDateString("fr-FR")+"\n";});var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="apex-ai-portfolio.csv";a.click();toast("CSV telecharge","ok");}
function finSMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var sum=0;for(var i=prices.length-period;i<prices.length;i++)sum+=prices[i];return(sum/period).toFixed(2);}
function finEMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var k=2/(period+1);var ema=prices[0];for(var i=1;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);return ema.toFixed(2);}

function _doParsePdf(file){var reader=new FileReader();reader.onload=function(e){var arr=new Uint8Array(e.target.result);window.pdfjsLib.getDocument(arr).promise.then(function(pdf){var text="";var pages=[];for(var i=1;i<=pdf.numPages;i++)pages.push(i);return pages.reduce(function(p,pg){return p.then(function(){return pdf.getPage(pg).then(function(page){return page.getTextContent().then(function(tc){text+=tc.items.map(function(it){return it.str;}).join(" ")+"\n";});});});},Promise.resolve()).then(function(){sendMessage("Contenu du PDF ("+file.name+") :\n\n"+text.slice(0,3000));});}).catch(function(e){toast("Erreur PDF: "+e.message,"err");});};reader.readAsArrayBuffer(file);}

// === MODULE: Chiffrement AES-256 ===
function axEncrypt(plaintext,passphrase){var enc=new TextEncoder();var data=enc.encode(plaintext);var keyData=enc.encode(passphrase.padEnd(32,"\0").slice(0,32));return crypto.subtle.importKey("raw",keyData,{name:"AES-GCM"},false,["encrypt"]).then(function(key){var iv=crypto.getRandomValues(new Uint8Array(12));return crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,data).then(function(encrypted){var buf=new Uint8Array(encrypted);var combined=new Uint8Array(iv.length+buf.length);combined.set(iv);combined.set(buf,iv.length);return btoa(String.fromCharCode.apply(null,combined));});});}
function axDecrypt(ciphertext,passphrase){var enc=new TextEncoder();var raw=atob(ciphertext);var bytes=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);var iv=bytes.slice(0,12);var data=bytes.slice(12);var keyData=enc.encode(passphrase.padEnd(32,"\0").slice(0,32));return crypto.subtle.importKey("raw",keyData,{name:"AES-GCM"},false,["decrypt"]).then(function(key){return crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,data).then(function(decrypted){return new TextDecoder().decode(decrypted);});});}

function _settingsApiKey(){var key=prompt("Cle API Claude (sk-ant-...):\n\nNote: la cle reste en memoire jusqu'a fermeture du navigateur.\nPour plus de securite, utilisez le proxy Cloudflare.");if(key!==null){_setApiKey(key);toast("Cle API enregistree (session)","ok");}}

function _settingsEmailJS(){var serviceId=prompt("EmailJS Service ID :");if(serviceId===null)return;var templateId=prompt("EmailJS Template ID :");if(templateId===null)return;var userId=prompt("EmailJS User ID (Public Key) :");if(userId===null)return;ls("ax_emailjs_config",{serviceId:serviceId,templateId:templateId,userId:userId});toast("EmailJS configure","ok");}

function _showAuditLog(){var log=lg("ax_audit",[]);var h='<h2>Journal d\'audit</h2><div style="max-height:60vh;overflow-y:auto">';log.slice(0,50).forEach(function(entry){h+='<div style="padding:8px 0;border-bottom:1px solid var(--ax-border);font-size:12px"><strong>'+esc(entry.type)+'</strong> — '+esc(entry.who)+' — '+esc(entry.what)+'<br><span style="color:var(--ax-text-dim)">'+new Date(entry.ts).toLocaleString("fr-FR")+"</span></div>";});h+="</div>";_showModal(h);}
function _adminUsageChart(){var usage=lg("ax_usage",{today:0,month:0,total:0,history:[]});var hist=usage.history||[];if(!hist.length)return'<div style="text-align:center;padding:12px;color:var(--ax-text-dim);font-size:13px">Pas encore de donnees d\'usage</div>';var w=280,h=100,pad=30;var max=Math.max.apply(null,hist.map(function(d){return d.tokens;}))||1;var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-width:320px;margin:8px auto;display:block">';svg+='<text x="'+pad+'" y="12" fill="var(--ax-text-dim)" font-size="9">Tokens / jour (7 derniers jours)</text>';var barW=Math.max((w-pad*2)/hist.length-2,8);hist.slice(-7).forEach(function(d,i){var bh=Math.max((d.tokens/max)*(h-pad-20),2);var x=pad+i*(barW+2);var y=h-pad-bh;svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" fill="var(--ax-gold)" rx="2"/>';svg+='<text x="'+(x+barW/2)+'" y="'+(h-pad+10)+'" text-anchor="middle" fill="var(--ax-text-dim)" font-size="7">'+d.date.slice(5)+'</text>';});svg+="</svg>";return svg;}
function axBackupAll(){var backup={version:APP_VER,date:new Date().toISOString(),data:{}};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith("ax_"))backup.data[k]=lg(k,null);}var blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="apex-ai-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();_audit("backup",K.user?K.user.id:"?","full",Object.keys(backup.data).length+" cles");toast("Backup telecharge ("+Object.keys(backup.data).length+" cles)","ok");}
function _restoreFromFile(input){if(!input.files||!input.files[0])return;if(!confirm("Restaurer ecrasera les donnees actuelles. Continuer ?"))return;var reader=new FileReader();reader.onload=function(e){try{var backup=JSON.parse(e.target.result);if(!backup.data){toast("Fichier invalide","err");return;}var count=0;Object.keys(backup.data).forEach(function(k){try{localStorage.setItem(k,JSON.stringify(backup.data[k]));count++;}catch(ex){}});_audit("restore",K.user?K.user.id:"?","full",count+" cles");toast("Restauration OK ("+count+" cles) — rechargement...","ok");setTimeout(function(){location.reload();},1500);}catch(ex){toast("Erreur restauration: JSON invalide","err");}};reader.readAsText(input.files[0]);}
function _showErrorLog(){var log=lg("ax_err_log",[]);var h='<h2>\uD83D\uDC1B Erreurs capturees ('+log.length+')</h2><div style="max-height:60vh;overflow-y:auto">';if(!log.length)h+='<p style="color:var(--ax-text-dim)">Aucune erreur. Tout va bien !</p>';log.slice(0,50).forEach(function(entry){h+='<div style="padding:8px 0;border-bottom:1px solid var(--ax-border);font-size:12px"><span style="color:var(--ax-red)">'+esc(entry.msg)+'</span>';if(entry.src)h+='<br><span style="color:var(--ax-text-dim)">'+esc(entry.src)+':'+entry.line+'</span>';h+='<br><span style="color:var(--ax-text-dim)">'+new Date(entry.ts).toLocaleString("fr-FR")+"</span></div>";});h+="</div>";if(log.length)h+='<div style="margin-top:12px"><button class="ax-btn ax-btn-danger" onclick="ls(\'ax_err_log\',[]);document.getElementById(\'modal-container\').innerHTML=\'\';dc()">\uD83D\uDDD1 Vider le journal</button></div>';_showModal(h);}
function _showModal(content){var c=document.getElementById("modal-container");if(!c){c=document.createElement("div");c.id="modal-container";document.body.appendChild(c);}c.innerHTML='<div class="ax-modal-overlay" onclick="this.parentNode.innerHTML=\'\'"><div class="ax-modal" onclick="event.stopPropagation()">'+content+'<div style="text-align:right;margin-top:16px"><button class="ax-btn ax-btn-outline" onclick="document.getElementById(\'modal-container\').innerHTML=\'\'">Fermer</button></div></div></div>';}

function _fireReminder(id){var rems=lg("ax_reminders",[]);var rem=rems.find(function(r){return r.id===id;});if(!rem||rem.done)return;rem.done=true;ls("ax_reminders",rems);toast("Rappel: "+rem.text,"info");if(typeof Notification!=="undefined"&&Notification.permission==="granted")new Notification("APEX AI - Rappel",{body:rem.text});}
function _restoreReminders(){var rems=lg("ax_reminders",[]);var changed=false;rems.forEach(function(r){if(r.done)return;var delay=r.triggerAt-now();if(delay<=0){r.done=true;changed=true;toast("Rappel manque: "+r.text,"warn");}else{setTimeout(function(){_fireReminder(r.id);},delay);}});if(changed)ls("ax_reminders",rems);}

// === MODULE: IndexedDB pour scalabilite ===
var _idb=null;
function idbOpen(){return new Promise(function(resolve,reject){var req=indexedDB.open("apex_ai",1);req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains("conversations"))db.createObjectStore("conversations",{keyPath:"id"});if(!db.objectStoreNames.contains("messages"))db.createObjectStore("messages",{keyPath:"convId"});};req.onsuccess=function(e){_idb=e.target.result;resolve(_idb);};req.onerror=function(){reject();};});}
function idbPut(store,data){if(!_idb)return;try{var tx=_idb.transaction(store,"readwrite");tx.objectStore(store).put(data);}catch(e){}}
function idbGet(store,key){if(!_idb)return Promise.resolve(null);return new Promise(function(resolve){try{var tx=_idb.transaction(store,"readonly");var req=tx.objectStore(store).get(key);req.onsuccess=function(){resolve(req.result||null);};req.onerror=function(){resolve(null);};}catch(e){resolve(null);}});}

function _showCommandPalette(){var h='<h2>\u2318 Commandes rapides</h2><div style="margin:12px 0"><input id="ax-cmd-search" class="ax-input" placeholder="Rechercher une commande..." oninput="_filterCmds(this.value)" autofocus></div><div id="ax-cmd-list">';var cmds=[{ic:"\uD83D\uDCAC",lb:"Nouvelle conversation",fn:"newConversation();dc()"},{ic:"\uD83E\uDDE0",lb:"Base de connaissances",fn:"sv('kb')"},{ic:"\uD83D\uDCB0",lb:"Finance",fn:"sv('finance')"},{ic:"\uD83D\uDCF1",lb:"Appareils",fn:"sv('devices')"},{ic:"\u2699\uFE0F",lb:"Reglages",fn:"sv('settings')"},{ic:"\uD83C\uDF13",lb:"Changer theme",fn:"axSetTheme(K.settings.theme==='dark'?'light':'dark')"},{ic:"\uD83D\uDD0A",lb:"Toggle TTS",fn:"K.settings.ttsEnabled=!K.settings.ttsEnabled;ls('ax_settings',K.settings);toast('TTS '+(K.settings.ttsEnabled?'active':'desactive'),'ok')"},{ic:"\uD83D\uDCE4",lb:"Exporter conversation",fn:"exportConversation(K.activeConvId,'md')"},{ic:"\uD83D\uDD12",lb:"Deconnexion",fn:"axLogout()"}];cmds.forEach(function(c,i){h+='<div class="ax-setting-row" style="cursor:pointer" onclick="'+c.fn+';document.getElementById(\'modal-container\').innerHTML=\'\'" data-cmd="'+esc(c.lb.toLowerCase())+'"><span style="font-size:18px">'+c.ic+'</span> <span>'+esc(c.lb)+'</span></div>';});h+="</div>";_showModal(h);setTimeout(function(){var el=document.getElementById("ax-cmd-search");if(el)el.focus();},100);}
function _showMoreMenu(){var h='<h2>\u2795 Tous les modules</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0">';extraTabs.forEach(function(t){var isActive=K.view===t.id;h+='<div class="ax-card" style="text-align:center;padding:16px;cursor:pointer;'+(isActive?"border-color:var(--ax-gold)":"")+'" onclick="document.getElementById(\'modal-container\').innerHTML=\'\';sv(\''+t.id+'\')"><div style="font-size:28px">'+t.ic+'</div><div style="font-size:12px;margin-top:4px;font-weight:600">'+t.lb+'</div></div>';});h+="</div>";_showModal(h);}
function _showShortcutsHelp(){var shortcuts=[{key:"/",desc:"Focus sur le champ de saisie"},{key:"Ctrl+K",desc:"Palette de commandes"},{key:"Ctrl+N",desc:"Nouvelle conversation"},{key:"Ctrl+B",desc:"Ouvrir/fermer sidebar"},{key:"?",desc:"Afficher cette aide"},{key:"Escape",desc:"Fermer modal/sidebar"},{key:"Enter",desc:"Envoyer le message"},{key:"Shift+Enter",desc:"Nouvelle ligne"}];var h='<h2>\u2328\uFE0F Raccourcis clavier</h2><div style="margin:12px 0">';shortcuts.forEach(function(s){h+='<div class="ax-setting-row"><span style="font-size:13px">'+esc(s.desc)+'</span><span class="ax-badge ax-badge-gold" style="font-family:var(--ax-mono)">'+esc(s.key)+'</span></div>';});h+="</div>";_showModal(h);}
function _filterCmds(q){var items=document.querySelectorAll("#ax-cmd-list .ax-setting-row");items.forEach(function(el){var cmd=el.getAttribute("data-cmd")||"";el.style.display=cmd.indexOf(q.toLowerCase())>=0?"":"none";});}
var _sidebarSearch="";
function _bindEvents(){_applyTheme();var content=document.getElementById("content");if(content){content.addEventListener("dragover",function(e){e.preventDefault();e.stopPropagation();content.style.outline="2px dashed var(--ax-gold)";});content.addEventListener("dragleave",function(){content.style.outline="";});content.addEventListener("drop",function(e){e.preventDefault();e.stopPropagation();content.style.outline="";if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length){for(var i=0;i<e.dataTransfer.files.length;i++){_handleFileUpload({files:[e.dataTransfer.files[i]]});}toast(e.dataTransfer.files.length+" fichier(s) recu(s)","ok");}});}var input=document.getElementById("ax-chat-input");if(input){input.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});}}

function axInit(){_loadState();if(K.user){K.view="chat";touchSession();axRegisterDevice();}else{K.view="login";}render();fbInit();if(navigator.onLine)flushSyncQueue();window.addEventListener("online",function(){toast("Connexion retablie","ok");flushSyncQueue();dc();});window.addEventListener("offline",function(){toast("Mode hors ligne","warn");dc();});if("Notification" in window&&Notification.permission==="default"){setTimeout(function(){Notification.requestPermission();},5000);}if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(e){console.warn("SW:",e);});}document.addEventListener("visibilitychange",function(){if(!document.hidden&&K.user)touchSession();});}

window.onerror=function(msg,src,line,col,err){var log=lg("ax_err_log",[]);log.unshift({msg:String(msg).replace(/</g,"&lt;"),src:String(src||"").slice(-50),line:line,ts:now()});if(log.length>50)log=log.slice(0,50);try{localStorage.setItem("ax_err_log",JSON.stringify(log));}catch(e){}if(window.Sentry&&err)window.Sentry.captureException(err);return false;};
window.addEventListener("unhandledrejection",function(e){var log=lg("ax_err_log",[]);log.unshift({msg:"Promise: "+String(e.reason||"").slice(0,200).replace(/</g,"&lt;"),ts:now()});if(log.length>50)log=log.slice(0,50);try{localStorage.setItem("ax_err_log",JSON.stringify(log));}catch(ex){}if(window.Sentry)window.Sentry.captureException(e.reason);});
var _perfMarks={};
function perfStart(label){_perfMarks[label]=performance.now();}
function perfEnd(label){if(!_perfMarks[label])return 0;var d=performance.now()-_perfMarks[label];delete _perfMarks[label];return Math.round(d);}
window.addEventListener("DOMContentLoaded",function(){perfStart("init");axInit();_loadPurify();_restoreReminders();finFetchRates();idbOpen().catch(function(){});setInterval(function(){finUpdatePrices();},300000);setInterval(function(){finFetchRates();},3600000);console.log("APEX AI "+APP_VER+" init en "+perfEnd("init")+"ms");})
</script>
