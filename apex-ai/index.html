// v12.83 — Enforcement strict (Kevin : aucun acces avant validation admin + choix forfait)
function axIsAuthorizedUser(){
  if(!K.user)return false;
  if(axIsAdmin())return true;
  /* Cherche la demande d'inscription du user courant */
  var reqs=lg("ax_subscription_requests",{});
  var myReq=null;
  Object.keys(reqs).forEach(function(k){
    var r=reqs[k];
    if(r.email&&K.user.email&&r.email.toLowerCase()===K.user.email.toLowerCase())myReq=r;
    else if(r.phone&&K.user.phone&&r.phone.replace(/\D/g,"")===K.user.phone.replace(/\D/g,""))myReq=r;
  });
  if(!myReq)return false;
  return myReq.status==="approved"&&!!myReq.plan;
}
function axGetUserPlan(){
  if(axIsAdmin())return PLANS.enterprise||PLANS.business||{};
  var reqs=lg("ax_subscription_requests",{});
  if(!K.user)return null;
  var myReq=null;
  Object.keys(reqs).forEach(function(k){
    var r=reqs[k];if(r.status!=="approved")return;
    if(r.email&&K.user.email&&r.email.toLowerCase()===K.user.email.toLowerCase())myReq=r;
  });

}

function axGetLocation(){return new Promise(function(resolve){if(!_cguAsk("geolocation","Geolocalisation","APEX AI utilise votre position GPS pour adapter le contexte (casino/domicile), meteo, trafic.")){toast("Geolocalisation refusee par CGU","warn");return resolve({error:"CGU refuse"});}if(!navigator.geolocation){toast("Geolocalisation non supportee","warn");resolve({error:"non supportee"});return;}toast("Recherche GPS...","info");var _gotIt=false;var _tryLow=function(){if(_gotIt)return;navigator.geolocation.getCurrentPosition(function(pos){_gotIt=true;toast("Position trouvee","ok");resolve({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy});},function(err){_gotIt=true;var msg=err.code===1?"Permission refusee. Android: parametres site > Localisation > Autoriser. iOS: Reglages > Safari > Localisation.":err.code===2?"GPS indisponible (interieur ?)":err.code===3?"Timeout, reessaye en exterieur":"Erreur GPS: "+(err.message||err.code);toast(msg,"err");resolve({error:msg,code:err.code});},{enableHighAccuracy:false,timeout:15000,maximumAge:60000});};navigator.geolocation.getCurrentPosition(function(pos){_gotIt=true;toast("Position GPS trouvee","ok");resolve({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,altitude:pos.coords.altitude,speed:pos.coords.speed,heading:pos.coords.heading});},function(err){if(_gotIt)return;if(err.code===1){_gotIt=true;var msg="Permission refusee. Android: parametres site > Localisation. iOS: Reglages > Safari > Localisation.";toast(msg,"err");resolve({error:msg,code:1});return;}_tryLow();},{enableHighAccuracy:true,timeout:15000,maximumAge:60000});});}

function axDispatchAgent(query){
  if(!query||typeof query!=="string")return "general";
  var q=query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var scores={};
  Object.keys(AX_CREW).forEach(function(aid){
    if(aid==="general")return;
    var ag=AX_CREW[aid];var score=0;
    ag.keywords.forEach(function(kw){if(q.indexOf(kw)>=0)score+=1;});
    if(score>0)scores[aid]=score;
  });
  var best="general",bestScore=0;
  Object.keys(scores).forEach(function(k){if(scores[k]>bestScore){bestScore=scores[k];best=k;}});
  return bestScore>=1?best:"general";
}

function _userKey(key){if(!K.user||K.user.id===ADMIN_ID)return key;return key+"_"+K.user.id;}

function exportConversation(id,format){var msgs=lg("ax_msgs_"+id,[]);var conv=K.conversations.find(function(c){return c.id===id;});var title=conv?conv.title:"export";var content;if(format==="json"){content=JSON.stringify(msgs,null,2);}else{content="# "+title+"\n\n";msgs.forEach(function(m){content+="## "+(m.role==="user"?"Vous":"APEX")+"\n\n"+m.content+"\n\n";});}var blob=new Blob([content],{type:"text/"+(format==="json"?"json":"markdown")});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=title.replace(/[^a-zA-Z0-9]/g,"_")+"."+format;a.click();toast("Export "+format+" telecharge","ok");}

function _autoExtractFacts(text){if(!text||text.length<50)return;var patterns=[/(?:retiens|souviens|note|memorise|n'oublie pas)[^.!?\n]{10,80}[.!?]/gi,/(?:mon |ma |mes |je suis |j'ai |je travaille )[^.!?\n]{10,60}[.!?]/gi,/(?:kevin |laurence |monaco |casino |SBM )[^.!?\n]{10,100}[.!?]/gi];var added=0;patterns.forEach(function(rx){var matches=text.match(rx);if(matches){matches.forEach(function(m){var clean=m.trim();if(clean.length>15&&clean.length<200){var exists=K.kb.facts.some(function(f){return f.text===clean||_factSimilar(f.text,clean);});if(!exists){kbAdd(clean,"auto-extract","fact");added++;try{axMemoryAdd&&axMemoryAdd("auto",clean);}catch(_){}}}});}});if(added)toast("Memoire enrichie: "+added+" faits","info",{force:false});}

function _readBackendUrl(){var v=localStorage.getItem("ax_backend_url");if(!v)return"";try{var p=JSON.parse(v);return(typeof p==="string"?p:v).replace(/^"|"$/g,"").replace(/\/$/,"");}catch(e){return String(v).replace(/^"|"$/g,"").replace(/\/$/,"");}}
function axBackendCall(path,options){
  /* Synchronous XHR pour tool_use compatibility */
  var backendUrl=_readBackendUrl();
  if(!backendUrl)return{error:"backend non configure",skip:true};
  options=options||{};
  var method=options.method||"GET";
  var fullUrl=backendUrl+path;
  if(options.query){var qp=Object.keys(options.query).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(options.query[k]);}).join("&");fullUrl+=(path.indexOf("?")>=0?"&":"?")+qp;}
  try{
    var xhr=new XMLHttpRequest();
    xhr.open(method,fullUrl,false);
    xhr.setRequestHeader("Content-Type","application/json");
    if(options.token)xhr.setRequestHeader("Authorization","Bearer "+options.token);
    xhr.send(options.body?JSON.stringify(options.body):null);
    if(xhr.status>=200&&xhr.status<300){
      try{return JSON.parse(xhr.responseText);}catch(e){return{text:xhr.responseText};}
    }
    return{error:"backend "+xhr.status,detail:xhr.responseText.slice(0,200)};
  }catch(e){return{error:"backend unreachable",detail:String(e)};}
}

function finCompound(p,r,n,t){if(!n||n<=0)n=1;return p*Math.pow(1+r/n,n*t);}
function finROI(gain,cost){if(!cost||cost===0)return"N/A (cout=0)";return((gain-cost)/cost*100).toFixed(2)+"%";}
function finNPV(rate,cashflows){var npv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+rate,i);});return npv;}
function finIRR(cashflows){var guess=0.1;for(var iter=0;iter<100;iter++){var npv=0,dnpv=0;cashflows.forEach(function(cf,i){npv+=cf/Math.pow(1+guess,i);dnpv+=-i*cf/Math.pow(1+guess,i+1);});if(Math.abs(npv)<0.0001)return(guess*100).toFixed(2)+"%";if(Math.abs(dnpv)<0.00001)break;guess-=npv/dnpv;if(!isFinite(guess))break;}return"Non convergent";}
function finLoan(p,annualRate,months){if(!months||months<=0)months=1;var mr=annualRate/12;var pmt=p*mr*Math.pow(1+mr,months)/(Math.pow(1+mr,months)-1);return{monthly:pmt.toFixed(2),total:(pmt*months).toFixed(2),interest:(pmt*months-p).toFixed(2)};}

function finAmortization(p,annualRate,months){if(!p||!months||months<1)return[];var mr=(annualRate||0)/12;var denom=Math.pow(1+mr,months)-1;var pmt=denom===0?p/months:(p*mr*Math.pow(1+mr,months)/denom);if(!isFinite(pmt))pmt=p/months;var table=[];var balance=p;for(var i=1;i<=months;i++){var interest=balance*mr;var principal=pmt-interest;balance-=principal;if(!isFinite(balance))balance=0;table.push({month:i,payment:pmt.toFixed(2),principal:principal.toFixed(2),interest:interest.toFixed(2),balance:Math.max(0,balance).toFixed(2)});}return table;}

function finSMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var sum=0;for(var i=prices.length-period;i<prices.length;i++)sum+=prices[i];return(sum/period).toFixed(2);}
function finEMA(prices,period){if(!period||period<=0||!prices||prices.length<period)return null;var k=2/(period+1);var ema=prices[0];for(var i=1;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);return ema.toFixed(2);}

function axDecrypt(ciphertext,passphrase){var enc=new TextEncoder();var raw=atob(ciphertext);var bytes=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);var iv=bytes.slice(0,12);var data=bytes.slice(12);var keyData=enc.encode(passphrase.padEnd(32,"\0").slice(0,32));return crypto.subtle.importKey("raw",keyData,{name:"AES-GCM"},false,["decrypt"]).then(function(key){return crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,data).then(function(decrypted){return new TextDecoder().decode(decrypted);});});}

function idbPut(store,data){if(!_idb)return;try{var tx=_idb.transaction(store,"readwrite");tx.objectStore(store).put(data);}catch(e){}}
function idbGet(store,key){if(!_idb)return Promise.resolve(null);return new Promise(function(resolve){try{var tx=_idb.transaction(store,"readonly");var req=tx.objectStore(store).get(key);req.onsuccess=function(){resolve(req.result||null);};req.onerror=function(){resolve(null);};}catch(e){resolve(null);}});}

function axAnalyzeText(text){if(!text)return{};var words=text.split(/\s+/);var sentences=text.split(/[.!?]+/).filter(function(s){return s.trim();});var paragraphs=text.split(/\n\n+/).filter(function(p){return p.trim();});var unique=new Set(words.map(function(w){return w.toLowerCase();}));var emotion=axDetectEmotion(text);var lang=axDetectLanguage(text);return{chars:text.length,words:words.length,sentences:sentences.length,paragraphs:paragraphs.length,uniqueWords:unique.size,avgWordLength:Math.round(words.reduce(function(a,w){return a+w.length;},0)/words.length*10)/10,avgSentenceLength:Math.round(words.length/Math.max(sentences.length,1)),readingTime:Math.ceil(words.length/200)+"min",speakingTime:Math.ceil(words.length/130)+"min",complexity:words.length>500?"eleve":words.length>100?"moyen":"simple",emotion:emotion,language:lang,topWords:_getTopWords(words,5)};}
function _getTopWords(words,n){var freq={};var stopwords=["le","la","les","de","du","des","un","une","et","en","a","au","aux","je","tu","il","nous","vous","ils","que","qui","est","sont","pour","dans","sur","par","avec","ce","cette","pas","ne","se"];words.forEach(function(w){var lw=w.toLowerCase().replace(/[^a-zA-ZÀ-ÿ]/g,"");if(lw.length>2&&stopwords.indexOf(lw)<0)freq[lw]=(freq[lw]||0)+1;});return Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,n).map(function(e){return{word:e[0],count:e[1]};});}
