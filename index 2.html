<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>CMC Teams</title>
<style>


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,button,textarea{font-family:inherit}

/* === FOND FEUTRINE CASINO === */
body{
  font-family:system-ui,-apple-system,sans-serif;
  font-size:14px;color:#b8c8a8;
  min-height:100vh;
  background:#1a2e1c;
}
/* Texture feutrine losanges */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 24px,rgba(201,162,39,.022) 24px,rgba(201,162,39,.022) 26px),
    repeating-linear-gradient(-45deg,transparent,transparent 24px,rgba(201,162,39,.022) 24px,rgba(201,162,39,.022) 26px),
    radial-gradient(ellipse at 50% 0%,#223d24 0%,#1a2e1c 60%);
}
/* Symboles cartes en fond décoratif */
body::after{
  content:"♠  ♣  ♥  ♦  ♠  ♣  ♥  ♦  ♠  ♣  ♥  ♦";
  position:fixed;bottom:90px;left:0;right:0;
  font-size:18px;letter-spacing:8px;
  color:rgba(201,162,39,.04);
  text-align:center;pointer-events:none;z-index:0;
  white-space:nowrap;overflow:hidden;
}
#app,#toast,#pk,#ov{position:relative;z-index:1}

/* === TOPBAR === */
#topbar{
  background:linear-gradient(90deg,#18301a,#1e381e,#18301a);
  border-bottom:1px solid rgba(201,162,39,.25);
  box-shadow:0 2px 20px rgba(0,0,0,.75),inset 0 -1px 0 rgba(201,162,39,.1);
  padding:0 14px;height:54px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}

/* === NAV BAS === */
#bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#142418,#1a2e1c);
  border-top:1px solid rgba(201,162,39,.2);
  box-shadow:0 -4px 20px rgba(0,0,0,.65);
  display:flex;z-index:99;
}
.nt{
  flex:1;padding:9px 4px 8px;border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:8px;color:#243020;border-top:2px solid transparent;
  cursor:pointer;position:relative;text-transform:uppercase;letter-spacing:.5px;
}
.nt.on{color:#c9a227;border-top-color:#c9a227;font-weight:700}
.nt em{font-size:17px;font-style:normal}
.nbadge{position:absolute;top:3px;right:calc(50% - 16px);background:#5a0010;color:#fca0a0;border-radius:8px;font-size:7px;font-weight:700;padding:0 4px;min-width:14px;text-align:center;display:none}
#content{padding-bottom:74px}

/* === BOUTONS === */
.btn{border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.gold{background:linear-gradient(135deg,#c9a227,#8a6c0c);color:#040c04;box-shadow:0 2px 12px rgba(201,162,39,.28)}
.ghost{background:transparent;border:1px solid #182818;color:#3a5038}
.danger{background:transparent;border:1px solid #381010;color:#a06060;padding:5px 8px;font-size:11px;border-radius:7px;cursor:pointer}

/* === INPUTS === */
.inp{background:#162818;border:1px solid #2a4030;border-radius:8px;padding:10px 14px;color:#b8c8a8;outline:none;width:100%}
.inp:focus{border-color:rgba(201,162,39,.55);box-shadow:0 0 0 2px rgba(201,162,39,.07)}
select.inp{-webkit-appearance:none}

/* === CARDS === */
.card{background:rgba(20,34,22,.97);border:1px solid #2a4830;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.45)}
.page{padding:14px 14px 10px}
.sec-title{font-size:17px;font-weight:800;color:#d8cc9a;margin-bottom:3px}
.sec-sub{font-size:11px;color:#243020}

/* === GRILLE === */
#planGrid{overflow:scroll;-webkit-overflow-scrolling:touch}
.sth{padding:7px 10px;background:#16281a;color:#243020;font-size:9px;text-transform:uppercase;letter-spacing:1px;position:sticky;left:0;top:0;z-index:20;min-width:108px;max-width:160px;text-align:left;border-right:1px solid #182818;border-bottom:2px solid rgba(201,162,39,.18);white-space:nowrap}
.dth{padding:3px 1px;min-width:27px;background:#16281a;font-size:9px;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.18)}
.stth{padding:3px 4px;background:#16281a;min-width:18px;font-size:8px;color:#182818;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.18)}
.ntd{padding:5px 10px;background:#162818;position:sticky;left:0;z-index:4;border-right:1px solid #182818;font-size:10px;text-align:left;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctd{min-width:27px;height:27px;font-size:9px;font-weight:700;text-align:center;cursor:pointer}
.steptd{background:#162818;padding:5px 10px;font-size:10px;font-weight:700;text-align:left;border-top:2px solid #020502}
.stattd{padding:3px;font-size:9px;color:#253020;background:#162818;text-align:center}

/* === PICKER === */
#pk{display:none;position:fixed;background:#182e1c;border:1px solid rgba(201,162,39,.32);border-radius:12px;padding:10px;flex-wrap:wrap;gap:5px;z-index:999;box-shadow:0 16px 48px rgba(0,0,0,.97);width:168px}
.pb{padding:7px 0;border-radius:7px;border:1px solid #2a4030;background:#162818;text-align:center;font-size:10px;font-weight:700;cursor:pointer;flex:0 0 calc(33% - 4px)}
.pb.cur{background:rgba(201,162,39,.14);border-color:#c9a227}
.pclr{flex:0 0 100%;padding:6px;border-radius:7px;border:1px solid #1e2e1e;background:#06110a;text-align:center;font-size:9px;color:#243020;cursor:pointer}
#ov{display:none;position:fixed;inset:0;z-index:998}

/* === TOAST === */
#toast{display:none;position:fixed;bottom:84px;left:50%;transform:translateX(-50%);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;color:#e8d8a0;z-index:9999;pointer-events:none;white-space:nowrap}

/* === CHAT === */
.chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.msg-me{align-self:flex-end;background:rgba(100,80,10,.26);border:1px solid rgba(201,162,39,.18);border-radius:12px 12px 2px 12px;padding:7px 11px;max-width:80%}
.msg-ot{align-self:flex-start;background:#182e1c;border:1px solid #2a4030;border-radius:12px 12px 12px 2px;padding:7px 11px;max-width:80%}
.msg-name{font-size:9px;font-weight:700;margin-bottom:2px}
.msg-text{font-size:12px;color:#90a880;line-height:1.4;word-break:break-word}
.msg-ts{font-size:8px;color:#1e2e1e;margin-top:2px;text-align:right}
.chat-bar{padding:9px 14px;border-top:1px solid #182818;display:flex;gap:8px;background:#16281a;flex-shrink:0}

/* === PRÉSENCE DOT === */
.odot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.odot.on{background:#3a8a40}.odot.off{background:#1e2e1e}
.emp-row{display:flex;align-items:center;gap:9px;padding:10px 14px}
.chef-badge{background:rgba(201,162,39,.1);color:#c9a227;border:1px solid rgba(201,162,39,.22);border-radius:3px;padding:1px 5px;font-size:8px;font-weight:700}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#c9a227;color:#040c04;font-size:10px;font-weight:800;margin-right:6px}

/* === ÉCRAN LOGIN === */
.login-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 24px,rgba(201,162,39,.025) 24px,rgba(201,162,39,.025) 26px),
    repeating-linear-gradient(-45deg,transparent,transparent 24px,rgba(201,162,39,.025) 24px,rgba(201,162,39,.025) 26px),
    radial-gradient(ellipse at 50% 20%,#223d24 0%,#1a2e1c 55%,#162818 100%);
}
.login-card{
  background:linear-gradient(170deg,#203822,#1a2e1c);
  border:1px solid rgba(201,162,39,.28);
  border-radius:22px;padding:40px 28px;
  width:100%;max-width:340px;
  box-shadow:0 0 80px rgba(0,0,0,.85),0 0 0 1px rgba(201,162,39,.06),inset 0 1px 0 rgba(201,162,39,.08);
  position:relative;overflow:hidden;
}
/* Coins de carte */
.login-card::before{content:"♦";position:absolute;top:12px;left:16px;font-size:14px;color:rgba(201,162,39,.22)}
.login-card::after{content:"♦";position:absolute;bottom:12px;right:16px;font-size:14px;color:rgba(201,162,39,.22);transform:rotate(180deg)}
/* Bande déco haut */
.login-banner{
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.08),transparent);
  border-top:1px solid rgba(201,162,39,.2);
  border-bottom:1px solid rgba(201,162,39,.2);
  text-align:center;font-size:10px;letter-spacing:4px;
  color:rgba(201,162,39,.35);padding:5px 0;margin-bottom:24px;
}


</style>
</head>
<body>
<div id="app" style="min-height:100vh;background:#1a2e1c"></div>
<div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#1e3820;border:1px solid rgba(201,162,39,.4);border-radius:10px;font-size:13px;color:#c9a227;z-index:999;display:none;pointer-events:none;white-space:nowrap"></div>
<div id="pk" style="display:none"></div>
<div id="ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500"></div>
<script>
window.onerror=function(msg,src,line,col,err){
  var s='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0a1a0c;padding:20px;color:#c9a227;font-family:monospace;font-size:12px;z-index:9999">'
    +'<b>ERR JS</b><br>'+msg+'<br>L'+line+' C'+col+'</div>';
  if(document.body)document.body.innerHTML=s;
  return false;
};
</script>
<script src="app.js"></script>
</body>
</html>
