<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd76a"/>
      <stop offset="60%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9b7e22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <g fill="url(#gold)">
    <!-- 3 sliders verticaux -->
    <rect x="128" y="120" width="16" height="220" rx="8"/>
    <rect x="248" y="120" width="16" height="220" rx="8"/>
    <rect x="368" y="120" width="16" height="220" rx="8"/>
    <!-- Curseurs (positions différentes) -->
    <circle cx="136" cy="180" r="28"/>
    <circle cx="256" cy="270" r="28"/>
    <circle cx="376" cy="220" r="28"/>
    <!-- Base "telecommande" -->
    <rect x="96" y="360" width="320" height="56" rx="28"/>
    <circle cx="160" cy="388" r="14" fill="#1a1408"/>
    <circle cx="256" cy="388" r="14" fill="#1a1408"/>
    <circle cx="352" cy="388" r="14" fill="#1a1408"/>
  </g>
  <text x="256" y="478" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,sans-serif" font-size="32" font-weight="700" fill="url(#gold)" letter-spacing="2">iRemote</text>
</svg>
