<style>


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,button,textarea{font-family:inherit}

/* === FOND TAPIS CASINO MONTE-CARLO === */
body{
  font-family:system-ui,-apple-system,sans-serif;
  font-size:14px;color:#b8c8a8;
  min-height:100vh;
  background:#0d1f0f;
}
/* Feutrine avec texture double trame */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 11px,rgba(0,0,0,.08) 11px,rgba(0,0,0,.08) 12px),
    repeating-linear-gradient(90deg,transparent,transparent 11px,rgba(0,0,0,.08) 11px,rgba(0,0,0,.08) 12px),
    repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(201,162,39,.028) 18px,rgba(201,162,39,.028) 20px),
    repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(201,162,39,.028) 18px,rgba(201,162,39,.028) 20px),
    radial-gradient(ellipse at 50% 0%,#1a3a1c 0%,#0d1f0f 70%);
}
/* Frise dorée haut + bas */
body::after{
  content:"";position:fixed;left:0;right:0;top:0;height:3px;z-index:200;pointer-events:none;
  background:linear-gradient(90deg,transparent,#c9a227 20%,#f0d060 50%,#c9a227 80%,transparent);
  box-shadow:0 0 12px rgba(201,162,39,.5);
}
#app,#toast,#pk,#ov{position:relative;z-index:1}

/* === TOPBAR === */
#topbar{
  background:linear-gradient(90deg,#18301a,#1e381e,#18301a);
  border-bottom:1px solid rgba(201,162,39,.25);
  box-shadow:0 2px 20px rgba(0,0,0,.75),inset 0 -1px 0 rgba(201,162,39,.1);
  padding:0 14px;height:54px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}

/* === NAV BAS === */
#bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#142418,#1a2e1c);
  border-top:1px solid rgba(201,162,39,.2);
  box-shadow:0 -4px 20px rgba(0,0,0,.65);
  display:flex;z-index:99;
}
.nt{
  flex:1;padding:9px 4px 8px;border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:8px;color:#243020;border-top:2px solid transparent;
  cursor:pointer;position:relative;text-transform:uppercase;letter-spacing:.5px;
}
.nt.on{color:#c9a227;border-top-color:#c9a227;font-weight:700}
.nt em{font-size:17px;font-style:normal}
.nbadge{position:absolute;top:3px;right:calc(50% - 16px);background:#5a0010;color:#fca0a0;border-radius:8px;font-size:7px;font-weight:700;padding:0 4px;min-width:14px;text-align:center;display:none}
#content{padding-bottom:74px}

/* === BOUTONS === */
.btn{border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.gold{background:linear-gradient(135deg,#c9a227,#8a6c0c);color:#040c04;box-shadow:0 2px 12px rgba(201,162,39,.28)}
.ghost{background:transparent;border:1px solid #182818;color:#3a5038}
.danger{background:transparent;border:1px solid #381010;color:#a06060;padding:5px 8px;font-size:11px;border-radius:7px;cursor:pointer}

/* === INPUTS === */
.inp{background:#162818;border:1px solid #2a4030;border-radius:8px;padding:10px 14px;color:#b8c8a8;outline:none;width:100%}
.inp:focus{border-color:rgba(201,162,39,.55);box-shadow:0 0 0 2px rgba(201,162,39,.07)}
select.inp{-webkit-appearance:none}

/* === CARDS === */
.card{background:rgba(20,34,22,.97);border:1px solid #2a4830;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.45)}
.page{padding:14px 14px 10px}
.sec-title{font-size:17px;font-weight:800;color:#d8cc9a;margin-bottom:3px}
.sec-sub{font-size:11px;color:#243020}

/* === GRILLE === */
#planGrid{overflow:scroll;-webkit-overflow-scrolling:touch}
.sth{padding:7px 10px;background:#16281a;color:#243020;font-size:9px;text-transform:uppercase;letter-spacing:1px;position:sticky;left:0;top:0;z-index:20;min-width:108px;max-width:160px;text-align:left;border-right:1px solid #182818;border-bottom:2px solid rgba(201,162,39,.18);white-space:nowrap}
.dth{padding:3px 1px;min-width:27px;background:#16281a;font-size:9px;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.18)}
.stth{padding:3px 4px;background:#16281a;min-width:18px;font-size:8px;color:#182818;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.18)}
.ntd{padding:5px 10px;background:#162818;position:sticky;left:0;z-index:4;border-right:1px solid #182818;font-size:10px;text-align:left;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctd{min-width:27px;height:27px;font-size:9px;font-weight:700;text-align:center;cursor:pointer}
.steptd{background:#162818;padding:5px 10px;font-size:10px;font-weight:700;text-align:left;border-top:2px solid #020502}
.stattd{padding:3px;font-size:9px;color:#253020;background:#162818;text-align:center}

/* === PICKER === */
#pk{display:none;position:fixed;background:#182e1c;border:1px solid rgba(201,162,39,.32);border-radius:12px;padding:10px;flex-wrap:wrap;gap:5px;z-index:999;box-shadow:0 16px 48px rgba(0,0,0,.97);width:168px}
.pb{padding:7px 0;border-radius:7px;border:1px solid #2a4030;background:#162818;text-align:center;font-size:10px;font-weight:700;cursor:pointer;flex:0 0 calc(33% - 4px)}
.pb.cur{background:rgba(201,162,39,.14);border-color:#c9a227}
.pclr{flex:0 0 100%;padding:6px;border-radius:7px;border:1px solid #1e2e1e;background:#06110a;text-align:center;font-size:9px;color:#243020;cursor:pointer}
#ov{display:none;position:fixed;inset:0;z-index:998}

/* === TOAST === */
#toast{display:none;position:fixed;bottom:84px;left:50%;transform:translateX(-50%);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;color:#e8d8a0;z-index:9999;pointer-events:none;white-space:nowrap}

/* === CHAT === */
.chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.msg-me{align-self:flex-end;background:rgba(100,80,10,.26);border:1px solid rgba(201,162,39,.18);border-radius:12px 12px 2px 12px;padding:7px 11px;max-width:80%}
.msg-ot{align-self:flex-start;background:#182e1c;border:1px solid #2a4030;border-radius:12px 12px 12px 2px;padding:7px 11px;max-width:80%}
.msg-name{font-size:9px;font-weight:700;margin-bottom:2px}
.msg-text{font-size:12px;color:#90a880;line-height:1.4;word-break:break-word}
.msg-ts{font-size:8px;color:#1e2e1e;margin-top:2px;text-align:right}
.chat-bar{padding:9px 14px;border-top:1px solid #182818;display:flex;gap:8px;background:#16281a;flex-shrink:0}

/* === PRÉSENCE DOT === */
.odot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.odot.on{background:#3a8a40}.odot.off{background:#1e2e1e}
.emp-row{display:flex;align-items:center;gap:9px;padding:10px 14px}
.chef-badge{background:rgba(201,162,39,.1);color:#c9a227;border:1px solid rgba(201,162,39,.22);border-radius:3px;padding:1px 5px;font-size:8px;font-weight:700}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#c9a227;color:#040c04;font-size:10px;font-weight:800;margin-right:6px}

/* === ÉCRAN LOGIN - TABLE DE JEU === */
.login-bg{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 11px,rgba(0,0,0,.1) 11px,rgba(0,0,0,.1) 12px),
    repeating-linear-gradient(90deg,transparent,transparent 11px,rgba(0,0,0,.1) 11px,rgba(0,0,0,.1) 12px),
    repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(201,162,39,.035) 18px,rgba(201,162,39,.035) 20px),
    repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(201,162,39,.035) 18px,rgba(201,162,39,.035) 20px),
    radial-gradient(ellipse at 50% 35%,#1e4020 0%,#0d1f0f 65%);
}
/* SVG table de jeu au-dessus de la carte login */
.login-table-svg{
  width:100%;max-width:340px;margin-bottom:0px;border-radius:16px 16px 0 0;
  overflow:hidden;border:1px solid rgba(201,162,39,.3);border-bottom:none;
  box-shadow:0 -6px 30px rgba(0,0,0,.5);
}
.login-card{
  background:linear-gradient(170deg,#1c3420,#142818);
  border:1px solid rgba(201,162,39,.35);
  border-radius:0 0 20px 20px;padding:28px 28px 32px;
  width:100%;max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.9),0 0 0 1px rgba(201,162,39,.06),inset 0 1px 0 rgba(201,162,39,.1);
  position:relative;overflow:hidden;
}
.login-card::before{content:"\u2666";position:absolute;top:10px;left:14px;font-size:12px;color:rgba(201,162,39,.2)}
.login-card::after{content:"\u2666";position:absolute;bottom:10px;right:14px;font-size:12px;color:rgba(201,162,39,.2);transform:rotate(180deg)}
.login-banner{
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.1),transparent);
  border-top:1px solid rgba(201,162,39,.22);
  border-bottom:1px solid rgba(201,162,39,.22);
  text-align:center;font-size:9px;letter-spacing:4px;
  color:rgba(201,162,39,.4);padding:5px 0;margin-bottom:20px;
}


</style>

// Retourne vrai si l'employé est actif pour le mois y/m.
// emp.fromMo : premier moOff actif (null = depuis toujours)
// emp.toMo   : premier moOff INACTIF (null = pour toujours)
function isEmpActive(emp,y,m){
  var mo=moOff(y,m);
  if(emp.fromMo!==undefined&&emp.fromMo!==null&&mo<emp.fromMo) return false;
  if(emp.toMo!==undefined&&emp.toMo!==null&&mo>=emp.toMo) return false;
  return true;
}

function moToLabel(mo){

  return MFR[m2]+" "+y2;
}

function moSelOpts(val,blank){

    var mo=moOff(yy,mm);

  }}

}

// Hachage mot de passe simple (pas crypto mais suffisant pour usage interne)
function hashPw(pw){
  var h=0;
  for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}
  return String(h>>>0);
}

// Cumulative work days before month mo (mo=0 = March 2026) for a given team pattern.
// Each 30-day cp cycle has 20 work days, but 31-day months add 1 extra work day
// for teams whose repos pattern does NOT include cp=1 (teams 1,2,4,5).
// Team 3 (pattern C includes cp=1) always has exactly 20 work days per calendar month.
function cumWorkDays(teamId,mo){
  if(mo<=0) return 0;
  var pat=REPOS[teamId]||[],total=0;
  for(var m=0;m<mo;m++){
    var mIdx=m+2; // mo=0 is March (month index 2)
    var y2=2026+Math.floor(mIdx/12);
    var mMonth=mIdx%12;
    var days2=getDays(y2,mMonth);
    for(var d=1;d<=days2;d++){
      var ad=m*30+(d-1),cp=((ad%30)+30)%30+1;
      if(pat.indexOf(cp)<0) total++;
    }
  }
  return total;
}

    var si0=(((prof.i||0)+cumWorkDays(emp.team,mo))%sl+sl)%sl;
    p[emp.id]={};var wc=0;
    for(var d=1;d<=days;d++){
      var ad=(mo*30)+(d-1),cp=((ad%30)+30)%30+1;
      var isR=pat.indexOf(cp)>=0;
      if(isR){
        var rb=0;
        for(var dd=1;dd<d;dd++){var a2=(mo*30)+(dd-1),c2=((a2%30)+30)%30+1;if(pat.indexOf(c2)>=0)rb++;}
        p[emp.id][d]=(rb%2===0)?"RH":"R";

// ── Calcul position de départ pour un chef un jour donné ──
function calcDepPos(empName,tid,day){
  var CI=gCI(A.year,A.month);
  var chefNames=CHEFS_T[tid]||[];
  var sl=chefNames.length; if(!sl) return null;
  var SEQ=getSeqForSize(sl);
  var mo2=moOff(A.year,A.month);
  var teamPat=REPOS[tid]||[];
  var days=getDays(A.year,A.month);
  var da=[]; for(var i=1;i<=days;i++) da.push(i);
  var workDays=da.filter(function(d){var ad=mo2*30+(d-1);var cp=((ad%30)+30)%30+1;return teamPat.indexOf(cp)<0;});
  var wi=workDays.indexOf(day); if(wi<0) return null;
  var base=CI[empName]!==undefined?CI[empName]:0;
  var rotIdx=(wi%4+Math.floor(wi/4)+base)%sl;
  return SEQ[rotIdx];
}

function syncChefsT(){
  if(!A.user||A.user.id!==AID) return {added:[],removed:[],moved:[]};
  var changes={added:[],removed:[],moved:[]};
  var pl=gpl();
  A.teams.forEach(function(t){
    if(!CHEFS_T[t.id]) CHEFS_T[t.id]=[];
    var teamChefs=A.employees.filter(function(e){return e.team===t.id&&e.chef&&isEmpActive(e,A.year,A.month);});
    // Ajouter les chefs manquants
    teamChefs.forEach(function(e){
      if(CHEFS_T[t.id].indexOf(e.name)<0){
        CHEFS_T[t.id].push(e.name);
        changes.added.push(e.name+' ('+t.name+')');
      }
    });
    // Retirer les chefs qui ne sont plus dans cette equipe
    var toRemove=CHEFS_T[t.id].filter(function(n){
      var emp=A.employees.find(function(e){return e.name===n;});
      return !emp||emp.team!==t.id||!emp.chef;
    });
    toRemove.forEach(function(n){
      CHEFS_T[t.id]=CHEFS_T[t.id].filter(function(x){return x!==n;});
      var emp=A.employees.find(function(e){return e.name===n;});
      if(emp&&emp.chef){
        // Chef est dans une autre equipe — deja gere par leur equipe
        changes.moved.push(n+' retiré de '+t.name);
      } else {
        changes.removed.push(n+' retiré de '+t.name);
      }
    });
  });
  saveChefsT();
  return changes;
}

function showCI(tid){

function setCI(name,idx){
  if(!A.user||A.user.id!==AID)return;
  var CI=gCI(A.year,A.month);
  var tid=null;
  A.teams.forEach(function(t){var names=CHEFS_T[t.id]||[];if(names.indexOf(name)>=0)tid=t.id;});
  var teamNames=tid?(CHEFS_T[tid]||[]):[];
  var sl=teamNames.length||1;
  // Initialiser les chefs non encore définis avec leur position par défaut
  teamNames.forEach(function(n,ei){if(CI[n]===undefined)CI[n]=ei%sl;});
  // SWAP : l'autre chef qui avait idx prend l'ancienne position de name
  var oldIdx=CI[name]!==undefined?CI[name]:0;
  var other=null;
  teamNames.forEach(function(n){if(n!==name&&CI[n]===idx)other=n;});
  if(other!==null) CI[other]=oldIdx;
  CI[name]=idx;
  sCI(A.year,A.month,CI);
  dc();
}

function cleanImportedEmps(){
  var defIds=DEF_EMP.map(function(e){return e.id;});
  var before=A.employees.length;
  // Supprimer les employes non-DEF_EMP (importes depuis PDF ou CSV)
  A.employees=A.employees.filter(function(e){return defIds.indexOf(e.id)>=0;});
  var removed=before-A.employees.length;
  // Restaurer family/chef/team des employes DEF_EMP si modifies par un import errone
  var fixed=0;
  DEF_EMP.forEach(function(def){
    var e=A.employees.find(function(x){return x.id===def.id;});
    if(!e) return;
    ["family","chef","team","post"].forEach(function(f){
      if(def[f]!==undefined&&JSON.stringify(e[f])!==JSON.stringify(def[f])){e[f]=def[f];fixed++;}
    });
  });
  ls("cmc_e",A.employees);
  // Nettoyer aussi les overrides qui referencent ces IDs
  var changed=false;
  Object.keys(A.overrides).forEach(function(key){
    Object.keys(A.overrides[key]).forEach(function(eid){
      if(defIds.indexOf(eid)<0){delete A.overrides[key][eid];changed=true;}
    });
  });
  if(changed) ls("cmc_ov",A.overrides);
  var msg=(removed===0&&fixed===0)?"Aucun employe importe a supprimer":"\u2705 "+removed+" supprime(s)"+(fixed?" \u2014 "+fixed+" profil(s) restaure(s)":"");
  toast(msg);
  dc();
}

function addChef(tid){

// \u2500\u2500 Parser planning CMC (items avec coordonn\u00e9es X,Y) \u2500\u2500\u2500\u2500\u2500
function parseCMCPlanningFromItems(allItems, year, month){
  var days=getDays(year,month);
  var validCodesArr=Object.keys(CODES);

  // \u2500\u2500 1. Grouper les items par ligne Y (tol\u00e9rance \u00b15px) \u2500\u2500
  var sorted=allItems.slice().sort(function(a,b){return a.y-b.y||a.x-b.x;});
  var rows=[];
  var curY=null;
  sorted.forEach(function(item){
    if(curY===null||Math.abs(item.y-curY)>5){
      rows.push([]);curY=item.y;
    }
    rows[rows.length-1].push(item);
  });

  // \u2500\u2500 2. Trouver la ligne des jours (1-31) \u2500\u2500
  var dayRow=null;
  rows.forEach(function(row){
    var nums=row.filter(function(i){var n=parseInt(i.txt);return !isNaN(n)&&n>=1&&n<=31&&i.txt===String(n);});
    if(nums.length>=20) dayRow=nums; // au moins 20 jours trouv\u00e9s sur une ligne
  });
  // Fallback: prendre la ligne avec le plus de chiffres 1-31
  if(!dayRow){
    var best=0;
    rows.forEach(function(row){
      var nums=row.filter(function(i){var n=parseInt(i.txt);return !isNaN(n)&&n>=1&&n<=31&&i.txt===String(n);});
      if(nums.length>best){best=nums.length;dayRow=nums;}
    });
  }
  if(!dayRow||dayRow.length<5) return buildDebugCSV(allItems,"Ligne jours non trouv\u00e9e");

  // Position X de chaque jour
  var dayPos={};
  dayRow.forEach(function(i){dayPos[parseInt(i.txt)]=i.x;});

  // Tol\u00e9rance X = moiti\u00e9 espacement entre jours cons\u00e9cutifs
  var dNums=Object.keys(dayPos).map(Number).sort(function(a,b){return a-b;});
  var xTol=15;
  if(dNums.length>=2){
    var gaps=[];
    for(var i=1;i<Math.min(dNums.length,8);i++){
      var g=dayPos[dNums[i]]-dayPos[dNums[i-1]];
      if(g>2&&g<80) gaps.push(g);
    }
    if(gaps.length) xTol=Math.round(gaps.reduce(function(a,b){return a+b;})/gaps.length*0.55);
  }

  function xToDay(x){
    var best=null,bestDist=xTol*1.8;
    dNums.forEach(function(d){
      var dist=Math.abs(dayPos[d]-x);
      if(dist<bestDist){bestDist=dist;best=d;}
    });
    return best;
  }

  // \u2500\u2500 3. Trouver les lignes d'employ\u00e9s \u2500\u2500
  // Chaque employ\u00e9 appara\u00eet comme NOM + PRENOM sur une ligne
  var empLines=[]; // {empName, y, rowIdx}
  rows.forEach(function(row,ri){
    var rawLineText=row.map(function(i){return i.txt;}).join(" ").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    // Detecter l'etoile rouge juste apres le nom (chef roulette) : ★ ⭐
    var lineHasStar=/[\u2605\u2606\u2b50]/.test(rawLineText);
    var lineText=rawLineText.replace(/[\u2605\u2606\u2b50]/g," ");
    A.employees.forEach(function(emp){
      var eName=emp.name.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      var parts=eName.split(" ");
      // Match si le NOM de famille appara\u00eet dans cette ligne
      var nomMatch=parts[0]&&lineText.includes(parts[0]);
      var prenomMatch=parts.length>1&&parts[1]&&lineText.includes(parts[1][0]);
      if(nomMatch&&(parts.length===1||prenomMatch)){
        var existing=empLines.find(function(e){return e.empName===emp.name&&Math.abs(e.y-(row[0]||{y:0}).y)<20;});
        if(!existing) empLines.push({empName:emp.name,y:(row[0]||{y:0}).y,rowIdx:ri});
        // Etoile sur la ligne = chef roulette
        if(lineHasStar&&(emp.family!=="roulettes"||!emp.chef)){
          emp.family="roulettes";emp.chef=true;ls("cmc_e",A.employees);
        }
      }
    });
  });

  if(empLines.length===0) return buildDebugCSV(allItems,"Aucun employ\u00e9 trouv\u00e9. Noms dans le PDF: "+allItems.slice(0,20).map(function(i){return i.txt;}).join(","));

  // \u2500\u2500 4. D\u00e9tecter le s\u00e9parateur (trait noir = grand \u00e9cart vertical entre groupes d'employ\u00e9s) \u2500\u2500
  var empYsSorted=empLines.map(function(e){return e.y;}).sort(function(a,b){return a-b;});
  // Detecter TOUS les separateurs significatifs (traits rouges/noirs entre equipes et equipes miroirs)
  var separators=[];
  if(empYsSorted.length>2){
    var avgGap=(empYsSorted[empYsSorted.length-1]-empYsSorted[0])/(empYsSorted.length-1);
    for(var gi=1;gi<empYsSorted.length;gi++){
      var gap=empYsSorted[gi]-empYsSorted[gi-1];
      if(gap>avgGap*1.8) separators.push((empYsSorted[gi]+empYsSorted[gi-1])/2);
    }
  }
  // Retourne le numero de segment pour une position Y
  function getSegment(y){
    var seg=0;
    for(var si=0;si<separators.length;si++){if(y>separators[si])seg=si+1;}
    return seg;
  }

  // Planning vide par employe
  var planning={};
  empLines.forEach(function(e){if(!planning[e.empName])planning[e.empName]={};});

  // Index CDP : items contenant "CDP" ou "*" pour les rep\u00e9rer par position
  var cdpItems=[];
  allItems.forEach(function(item){
    var t=item.txt.trim().toUpperCase();
    if(t==="CDP"||t==="*"||t==="C.D.P") cdpItems.push({x:item.x,y:item.y});
  });

  allItems.forEach(function(item){
    var raw=item.txt.trim().toUpperCase().replace(/['']/g,"'");
    // Normaliser tiret\u2192slash pour codes horaires : "16-3"\u2192"16/3"
    var code=raw.replace(/^(\d{1,2})-(\d{1,2})(\*?)$/,'$1/$2$3');
    code=code.replace(/\s*\/\s*/,'/');
    code=code.replace(/CDP$/,'*');
    if(CDP_MAP[code]){
      var hasCdpNear=false;
      cdpItems.forEach(function(ci){if(Math.abs(ci.x-item.x)<20&&Math.abs(ci.y-item.y)<12)hasCdpNear=true;});
      if(hasCdpNear) code=CDP_MAP[code];
    }
    if(validCodesArr.indexOf(code)<0) return;

    var day=xToDay(item.x);
    if(!day||day<1||day>days) return;

    // Trouver l'employ\u00e9 le plus proche — DANS LE M\u00caMME GROUPE (m\u00eame c\u00f4t\u00e9 du trait noir)
    var bestEmp=null,bestDist=30;
    empLines.forEach(function(el){
      // Rester dans le meme segment (entre deux separateurs)
      if(getSegment(item.y)!==getSegment(el.y)) return;
      var d=Math.abs(el.y-item.y);
      if(d<bestDist){bestDist=d;bestEmp=el.empName;}
    });
    if(bestEmp){
      var empObj=A.employees.find(function(e){return e.name===bestEmp;});
      // Auto-upgrade CDP selon profil employe
      if(empObj&&!code.endsWith("*")&&CDP_MAP[code]&&empObj.cdpShifts&&empObj.cdpShifts.indexOf(code)>=0){
        code=CDP_MAP[code];
      }
      planning[bestEmp][day]=code;
    }
  });

  // \u2500\u2500 5. Construire CSV \u2500\u2500
  var found=Object.keys(planning).filter(function(n){return Object.keys(planning[n]).length>0;});
  if(!found.length) return buildDebugCSV(allItems,"Codes trouv\u00e9s mais pas associ\u00e9s. DayPos: "+JSON.stringify(dayPos).slice(0,100));

  var daysArr=(function(n){var a=[];for(var i=0;i<n;i++)a.push(i+1);return a;})(days);
  var header="NOM,"+daysArr.join(",");
  var csvLines=[header];
  found.forEach(function(name){
    var row=[name];
    for(var di=1;di<=days;di++){row.push(planning[name][di]||"");}
    csvLines.push(row.join(","));
  });
  return csvLines.join("\n");
}

function detectMonthFromName(fname){
  var s=fname.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var MOIS={"janvier":0,"fevrier":1,"mars":2,"avril":3,"mai":4,"juin":5,"juillet":6,"aout":7,"septembre":8,"octobre":9,"novembre":10,"decembre":11};
  var month=-1,year=-1;
  Object.keys(MOIS).forEach(function(m){if(s.indexOf(m)>=0)month=MOIS[m];});
  var ym=s.match(/20(2[0-9]|3[0-9])/);
  if(ym)year=parseInt(ym[0]);
  return {month:month,year:year};
}

// Detecte l'equipe d'un employe depuis ses codes de planning (par correspondance avec REPOS)
function detectTeamFromRow(parts,year,month,fromDay){
  fromDay=fromDay||1;
  var days=getDays(year,month);
  var mo=moOff(year,month);
  // Trouver les jours de repos (R ou RH) dans les donnees importees
  var reposDays=[];
  for(var di=0;di<parts.length;di++){
    var dayNum=fromDay+di;
    if(dayNum<1||dayNum>days) break;
    var c=(parts[di]||"").trim().toUpperCase();
    if(c==="R"||c==="RH"){reposDays.push(dayNum);}
  }
  if(reposDays.length<3) return null;
  // Convertir les jours repos du mois en position cyclique (1-30)
  var repoCycles=reposDays.map(function(d){
    var ad=(mo*30)+(d-1),cp=((ad%30)+30)%30+1;return cp;
  });
  // Comparer avec chaque pattern REPOS
  var bestTeam=null,bestScore=0;
  Object.keys(REPOS).forEach(function(tid){
    var pat=REPOS[tid];
    var matches=repoCycles.filter(function(cp){return pat.indexOf(cp)>=0;}).length;
    var score=matches/Math.max(repoCycles.length,1);
    if(score>bestScore){bestScore=score;bestTeam=tid;}
  });
  return (bestScore>0.5)?bestTeam:null;
}

      if(r)r.innerHTML+='<div style="color:#c04040;padding:10px"><b>Erreur:</b> '+e.message+'</div>';

  };
  r.onerror=function(){
    if(info) info.innerHTML='<span style="color:#c04040">\u274c Erreur lecture \u2014 ce format nest pas support\u00e9 directement</span>';
  };
  r.readAsText(file,"UTF-8");
}

      var _cpFd1=-1;
      for(var _cpi=0;_cpi<Math.min(_cpToks.length,14);_cpi++){
        if(/^\d{1,2}$/.test(_cpToks[_cpi])&&parseInt(_cpToks[_cpi])>=1&&parseInt(_cpToks[_cpi])<=31){_cpFd1=_cpi;break;}
      }
      if(_cpFd1>=1){
        var _cpAllNames=_cpToks.slice(0,_cpFd1).map(function(t){return t.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");});
        var _cpNames=_splitNames(_cpAllNames);
        if(_cpNames.length>=2){
          var _cpName1=_cpNames[0],_cpName2=_cpNames[1];
          var _cpRest=_cpToks.slice(_cpFd1);
          if(_cpRest.length>=2&&/^\d{1,2}$/.test(_cpRest[0])&&/^\d{1,2}$/.test(_cpRest[1])){
            var _cpFrom1=parseInt(_cpRest[0]);
            // Chercher second fromDay/toDay dans les codes
            var _cpFd2=-1;
            for(var _cp2=2;_cp2<Math.min(_cpRest.length,8);_cp2++){
              if(/^\d{1,2}$/.test(_cpRest[_cp2])&&/^\d{1,2}$/.test(_cpRest[_cp2+1]||"")){_cpFd2=_cp2;break;}
            }
            if(_cpFd2>2){
              // Interleaved : deux paires fromDay/toDay → split moitié
              var _cpFrom2=parseInt(_cpRest[_cpFd2]);
              var _cpCodes1=_cpRest.slice(2,_cpFd2);
              var _cpInterl=_cpRest.slice(_cpFd2+2);
              var _cpH=Math.floor(_cpInterl.length/2);
              var _cpCodes2=_cpInterl.slice(_cpH);
              _cpCodes1=_cpCodes1.concat(_cpInterl.slice(0,_cpH));
              var _cpE1=_findOrCreateEmp(_cpName1,_ltoks[0],importFamily,false,_cpCodes1,_cpFrom1);
              var _cpE2=_findOrCreateEmp(_cpName2,_ltoks[1],importFamily,false,_cpCodes2,_cpFrom2);
              if(_cpE1)_applyCodeArr(_cpE1,_cpCodes1,_cpFrom1);
              if(_cpE2)_applyCodeArr(_cpE2,_cpCodes2,_cpFrom2);
            } else {
              // Positionnelle : emp1 inline, emp2 prochaine ligne
              var _cpCodes1b=_cpRest.slice(2);
              var _cpE1b=_findOrCreateEmp(_cpName1,_ltoks[0],importFamily,false,_cpCodes1b,_cpFrom1);
              if(_cpE1b)_applyCodeArr(_cpE1b,_cpCodes1b,_cpFrom1);
              _pendingEmp={name:_cpName2,post:_ltoks[1],isChef:false};
            }
          }
        }
      }
      continue;
    }
    // Hors mode entête : réinitialiser si la ligne n'est pas positionnelle
    if(!_isPosDR)_pendingEmp=null;
    var parts=rawLine.split(sep);
    // Format espace (PDF collé sans tab/virgule) : reconstruire parts[]
    if(sep===","&&parts.length<4){
      var sp=rawLine.trim().split(/\s+/);
      var fromIdx=-1;
      for(var _fi=2;_fi<Math.min(sp.length,10);_fi++){
        if(/^\d{1,2}$/.test(sp[_fi])&&parseInt(sp[_fi])>=1&&parseInt(sp[_fi])<=31){fromIdx=_fi;break;}
      }
      if(fromIdx>=2&&fromIdx+1<sp.length&&/^\d{1,2}$/.test(sp[fromIdx+1])){
        // Detecter si sp[0] est un code poste (contient +, /, chiffre, ou commence par point)
        var _isPost=/[+\/\d]/.test(sp[0])||/^\./.test(sp[0]);
        if(_isPost){
          parts=[sp[0],sp.slice(1,fromIdx).join(" "),sp[fromIdx],sp[fromIdx+1]].concat(sp.slice(fromIdx+2));
        } else {
          // Pas de code poste : colonne vide pour uniformiser le format 4-colonnes
          parts=["",sp.slice(0,fromIdx).join(" "),sp[fromIdx],sp[fromIdx+1]].concat(sp.slice(fromIdx+2));
        }
      }
    }
    var p0raw=parts[0].trim();
    var p0=_norm(p0raw);
    var p1=_norm(parts[1]||"");
    // Ignorer lignes calendrier : "dim 1 lun 2 ..." ou "mars 2026"
    if(/^(DIM|LUN|MAR|MER|JEU|VEN|SAM)\s*\d/.test(p0)) continue;
    if(/^(JANVIER|FEVRIER|MARS|AVRIL|MAI|JUIN|JUILLET|AOUT|SEPTEMBRE|OCTOBRE|NOVEMBRE|DECEMBRE)\s+\d{4}$/.test(p0)) continue;
    // En-tete de colonne type "Colonne4" ou "Co" → extraire section de parts[1]
    if(/^CO(LONNE)?\d*$/.test(p0)){
      var _c3=_norm(parts[2]||"");
      var _ch=[p1,_c3].join(" ");
      if(/ROULETT/.test(_ch)) importFamily="roulettes";
      else if(/(BLACKJACK|BLACK.JACK|CHEF.*JACK|JEUX.*AM|CHEF.*AM|CARTES.AM|AMERICAN|AMERIC)/.test(_ch)) importFamily="bj";
      else if(/(CARTES.CMC|EMPLOYE.*CMC|CROUPIER.*CMC)/.test(_ch)) importFamily="cmc";
      continue;
    }
    // Detecter entetes de section dans les premiers champs
    var _hdr=[p0,p1].join(" ");
    if(/ROULETT/.test(_hdr)&&parts.filter(function(p){return p.trim();}).length<=4){importFamily="roulettes";continue;}
    if(/(BLACKJACK|BLACK.JACK|CHEF.*JACK|JEUX.*AM|CHEF.*AM|CARTES.AM|AMERICAN|AMERIC|RESPONSABLE.DE.TABLE|AMENAGEMENT|AMENAG)/.test(_hdr)&&parts.filter(function(p){return p.trim();}).length<=6){importFamily="bj";continue;}
    if(/(CARTES.CMC|EMPLOYE.*CMC|CROUPIER.*CMC)/.test(_hdr)&&parts.filter(function(p){return p.trim();}).length<=6){importFamily="cmc";continue;}
    // Detecter format planning : code poste col 0 (ex BRTP+E.), nom col 1, du/au col 2/3
    var nameIdx=0,codesStart=1;
    if((!p0raw||(_postPat.test(p0)&&!/ /.test(p0raw)))&&
       parts[1]&&/ /.test(parts[1].trim())&&/^[A-Z\u2605\u2606\u2b50*]/.test(parts[1].trim())&&
       parts[2]&&/^\*?\d{1,2}$/.test(parts[2].trim())){
      nameIdx=1; codesStart=4; // sauter post, nom, du, au
    }
    // Jour de debut de periode (from-day) pour calculer le bon numero de jour
    var fromDay=1;
    if(codesStart===4){
      var _fd=parseInt((parts[2]||"").trim());
      if(_fd>=1&&_fd<=31) fromDay=_fd;
    }
    var rawName=parts[nameIdx].trim().toUpperCase();
    // Chef roulette : etoile/star UNIQUEMENT dans la section roulettes
    var isRouletteChef=importFamily==="roulettes"&&(
      /[\u2605\u2606\u2b50*]/.test(rawName)||
      (nameIdx===1&&/^\*/.test((parts[2]||"").trim()))
    );
    var name=rawName.replace(/^[\u2605\u2606\u2b50*]+/,"").replace(/[\u2605\u2606\u2b50*.]+$/,"").trim();
    // Validation stricte : NOM(s) INITIALE(S) — initiale 1-2 lettres max (ex: B, JE, PH), rejette acronymes CMC/RH
    if(!name||!/^[A-Z][A-Z\- ]+\s[A-Z]{1,2}$/.test(name)) continue;
    var emp=A.employees.find(function(e){return e.name===name;});
    var _newEmpCount=A.employees.filter(function(e){return e._imported;}).length;
    if(!emp){
      if(_newEmpCount>=60){err++;errLines.push("Limite employes atteinte — verifier le format");continue;}
      var detectedTeam=detectTeamFromRow(parts.slice(codesStart),iy,im,fromDay);
      var newId="U"+String(Date.now()+Math.floor(Math.random()*1000)).slice(-5);
      var newFamily=isRouletteChef?"roulettes":importFamily;
      emp={id:newId,name:name,team:detectedTeam||"1",post:nameIdx===1?p0raw:"",chef:isRouletteChef,family:newFamily,cdpShifts:[],_imported:true};
      A.employees.push(emp);
      ls("cmc_e",A.employees);
      errLines.push("Nouveau: "+name+(isRouletteChef?" ★":"")+", eq."+emp.team);
    } else {
      // Pour les employes importes (non-DEF_EMP) uniquement : mettre a jour famille/chef
      var _isDefEmp=DEF_EMP.some(function(d){return d.id===emp.id;});
      if(!_isDefEmp){
        var _changed=false;
        var targetFam=isRouletteChef?"roulettes":importFamily;
        if(isRouletteChef&&!emp.chef){emp.chef=true;_changed=true;}
        if(emp.family!==targetFam&&(targetFam!=="bj"||!emp.family)){emp.family=targetFam;_changed=true;}
        if(_changed) ls("cmc_e",A.employees);
      }
      // Les employes DEF_EMP gardent leur family/team/chef du code (migration)
    }
    refData.rows[emp.id]={};
    for(var di=codesStart;di<parts.length;di++){
      var code=parts[di].trim().toUpperCase();
      if(!code||code==="0"||code==="-") continue;
      // Ignorer champs numeriques seuls (du/au) et en-tetes colonne residuels
      if(/^\d{1,2}$/.test(code)||/^CO(LONNE)?\d*$/.test(code)) continue;
      // Normaliser tiret→slash : "16-3"→"16/3"
      code=code.replace(/^(\d{1,2})-(\d{1,2})(\*?)$/,"$1/$2$3");
      code=code.replace(/CDP$/,"*");
      // Normaliser codes CMC : "' → ' (conserve marqueur convention), puis strip C/quotes
      if(!CODES[code]){
        var c2=code.replace(/"'/g,"'");
        if(c2!==code&&CODES[c2]){code=c2;}
        else{c2=(c2!==code?c2:code).replace(/[C"']+$/,"");if(c2&&CODES[c2])code=c2;}
      }
      // Auto-upgrade CDP
      if(!code.endsWith("*")&&CDP_MAP[code]&&emp.cdpShifts&&emp.cdpShifts.indexOf(code)>=0){
        code=CDP_MAP[code];
      }
      var dayNum=fromDay+(di-codesStart); // offset depuis le jour de debut de la periode
      if(code&&!CODES[code]){err++;errLines.push(name+" j"+dayNum+":code inconnu '"+code+"'");continue;}
      if(dayNum<1||dayNum>days) continue;
      if(!A.overrides[key][emp.id])A.overrides[key][emp.id]={};
      A.overrides[key][emp.id][dayNum]=code;
      refData.rows[emp.id][dayNum]=code;
      ok++;
    }
  }
  ls("cmc_ov",A.overrides);
  // Mettre à jour le mois courant avant vérification (gpl() utilise A.year/A.month)
  A.year=iy;A.month=im;
  // Sauver la r\u00e9f\u00e9rence d'import pour v\u00e9rification
  ls("cmc_ref_"+key,refData);
  A.lastImportKey=key;
  // Lancer la v\u00e9rification automatique
  var verif=runVerification(iy,im,refData);
  A.lastVerif=verif;
  ls("cmc_verif_"+key,verif);
  var r=document.getElementById("impRes");
  var verifTxt=verif.errors.length>0
    ?" \u26a0\ufe0f "+verif.errors.length+" ERREUR(S) D\u00c9TECT\u00c9E(S) \u2014 voir onglet Aide"
    :" \u2705 V\u00e9rification OK \u2014 tous les horaires correspondent";
  var errPart=err?" \u00b7 <span style='color:#c9a227'>"+err+" ignor\u00e9e(s)</span>":"";
  var verifCol=verif.errors.length?"#c9a227":"#3a8a50";
  var errMsgs=verif.errors.length?verif.errors.slice(0,3).map(function(e){return e.msg;}).join(" \u00b7 "):"";
  var plusMore=verif.errors.length>3?" (+"+(verif.errors.length-3)+" autres)":"";
  var errDiv=verif.errors.length?'<div style="margin-top:4px;font-size:9px;color:#c9a227">Erreurs: '+errMsgs+plusMore+'</div>':"";
  if(r)r.innerHTML='<div style="color:#c0cca8">'+ok+' cellules import\u00e9es'+errPart+' \u2192 '+MFR[im]+' '+iy+'</div>'+
    '<div style="margin-top:6px;font-weight:700;color:'+verifCol+'">'+verifTxt+'</div>'+errDiv;
  // Resynchroniser les equipes apres import
  var syncRes=syncChefsT();
  var syncAll=[].concat(syncRes.added,syncRes.removed,syncRes.moved);
  if(syncAll.length>0&&r){
    r.innerHTML+='<div style="margin-top:6px;font-size:9px;color:#4a72a8;font-weight:600">\u21bb '+syncAll.length+' changement(s) d\u2019\u00e9quipe : '+syncAll.slice(0,3).join(' \u00b7 ')+(syncAll.length>3?' (+' +(syncAll.length-3)+' autres)':'')+'</div>';
  }
  dc();
  toast(verif.errors.length?'\u26a0\ufe0f '+verif.errors.length+' erreur(s)':'\u2705 Import OK \u2014 '+ok+' cellules \u2014 '+MFR[im]+' '+iy);
  }catch(e){
    var r=document.getElementById("impRes");if(r)r.innerHTML='<div style="color:#c04040"><b>Erreur import:</b> '+e.message+'</div>';
  }
  if(errLines.length>0) errLines.forEach(function(e){console.warn("Import:",e);});
}

// \u2500\u2500 MOTEUR DE V\u00c9RIFICATION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function runVerification(year,month,refData){
  var pl=gpl(); // planning tel qu'affich\u00e9 dans l'app
  var ref=refData||lg("cmc_ref_"+year+"-"+month,null);
  var result={year:year,month:month,errors:[],warnings:[],ok:[],checkedAt:Date.now()};
  if(!ref||!ref.rows){result.warnings.push({msg:"Aucune r\u00e9f\u00e9rence d'import pour ce mois"});return result;}
  var days=getDays(year,month);
  // Pour chaque employ\u00e9 dans la r\u00e9f\u00e9rence
  Object.keys(ref.rows).forEach(function(empId){
    var emp=A.employees.find(function(e){return e.id===empId;});
    if(!emp){result.warnings.push({msg:"Employ\u00e9 "+empId+" introuvable dans la liste"});return;}
    var refRow=ref.rows[empId];
    var plRow=pl[empId]||{};
    Object.keys(refRow).forEach(function(d){
      var refCode=refRow[d];
      var plCode=plRow[parseInt(d)]||"";
      if(refCode!==plCode){
        result.errors.push({
          empId:empId,empName:emp.name,day:parseInt(d),
          refCode:refCode,plCode:plCode,
          msg:emp.name+" j"+d+": planning=\""+(plCode||"vide")+"\" \u2260 r\u00e9f\u00e9rence=\""+refCode+"\""
        });
      } else {
        result.ok.push({empId:empId,day:d,code:refCode});
      }
    });
    // V\u00e9rifier les jours du planning non couverts par la r\u00e9f\u00e9rence
    Object.keys(plRow).forEach(function(d){
      if(!refRow[d]&&plRow[d]&&plRow[d]!=="RH"&&plRow[d]!=="R"){
        // Jour travaill\u00e9 dans le planning mais absent de la r\u00e9f\u00e9rence
        // C'est normal si la r\u00e9f\u00e9rence ne couvre pas tous les jours
      }
    });
  });
  result.summary={
    total:result.ok.length+result.errors.length,
    correct:result.ok.length,
    errors:result.errors.length,
    coverage:Math.round(result.ok.length/(result.ok.length+result.errors.length+.001)*100)
  };
  return result;
}

function verifyCurrentMonth(){
  var key=A.year+"-"+A.month;
  var ref=lg("cmc_ref_"+key,null);
  if(!ref){return null;}
  var v=runVerification(A.year,A.month,ref);
  A.lastVerif=v;
  ls("cmc_verif_"+key,v);
  return v;
}

    <button class="btn gold" onclick="iaSend()" style="flex-shrink:0;padding:9px 14px;font-size:14px">\u2192</button>
  </div></div>`;
  return h;
}

function iaCheckNow(){
  var v=verifyCurrentMonth();
  if(!v){
    iaHistory.push({role:"user",text:"V\u00e9rifier le planning "+MFR[A.month]+" "+A.year});
    iaHistory.push({role:"bot",html:`<span style="color:#c9a227">\u26a0\ufe0f Aucun planning import\u00e9 pour ${MFR[A.month]} ${A.year}.</span><br>Utilisez <strong>Admin \u2192 Import planning</strong> pour importer un planning CSV, puis je le v\u00e9rifierai automatiquement.`});

function formatVerifReport(v){
  if(!v) return "Aucune v\u00e9rification disponible.";
  var pct=v.summary?v.summary.coverage:0;
  var barColor=pct>=95?"#3a8a50":pct>=80?"#c9a227":"#c04040";
  var h=`<div style="margin-bottom:8px">
    <div style="font-size:11px;font-weight:700;color:#c9a227;margin-bottom:6px">\ud83d\udd0d V\u00e9rification planning \u2014 ${MFR[v.month]} ${v.year}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="flex:1;height:6px;background:#0c1e0e;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width .3s"></div>
      </div>
      <span style="font-size:10px;font-weight:700;color:${barColor}">${pct}%</span>
    </div>
    <div style="font-size:10px;color:#6a8a68">
      \u2705 ${v.summary?v.summary.correct:0} cellules correctes &nbsp;\u00b7&nbsp;
      ${v.errors.length>0?'<span style="color:#c9a227">\u26a0\ufe0f '+v.errors.length+' erreur(s)</span>':'<span style="color:#3a8a50">\u2705 0 erreur</span>'}
    </div>
  </div>`;
  if(v.errors.length===0){
    h+=`<div style="padding:8px;background:#061c0a;border:1px solid #1a4020;border-radius:7px;font-size:11px;color:#3a8a50;font-weight:700">
      \u2705 Parfait \u2014 tous les horaires correspondent au planning import\u00e9.
    </div>`;
  } else {
    h+=`<div style="font-size:10px;font-weight:700;color:#c9a227;margin-bottom:6px">\u26a0\ufe0f Erreurs d\u00e9tect\u00e9es :</div>`;
    // Grouper par employ\u00e9
    var byEmp={};
    v.errors.forEach(function(e){if(!byEmp[e.empName])byEmp[e.empName]=[];byEmp[e.empName].push(e);});
    Object.keys(byEmp).forEach(function(name){
      var errs=byEmp[name];
      h+=`<div style="padding:7px 10px;background:#0e1c0e;border:1px solid #c9a22730;border-radius:7px;margin-bottom:5px">
        <div style="font-size:10px;font-weight:700;color:#d0cca0;margin-bottom:4px">\ud83d\udc64 ${esc(name)} \u2014 ${errs.length} erreur(s)</div>`;
      errs.slice(0,5).forEach(function(e){
        var ciRef=CODES[e.refCode]||{c:"#c9a227"};
        var ciPl=CODES[e.plCode]||{c:"#6a8a68"};
        h+=`<div style="font-size:9px;color:#6a8a68;margin-bottom:2px">
          Jour ${e.day} : planning=<span style="color:${ciPl.c};font-weight:700">${e.plCode||"vide"}</span>
          \u2192 devrait \u00eatre <span style="color:${ciRef.c};font-weight:700">${e.refCode}</span>
        </div>`;
      });
      if(errs.length>5) h+=`<div style="font-size:9px;color:#3a5030">...et ${errs.length-5} autre(s)</div>`;
      h+=`</div>`;
    });
    h+=`<div style="margin-top:8px;padding:7px;background:#0c1810;border-radius:7px;font-size:9px;color:#3a5030">
      \ud83d\udca1 Pour corriger : allez dans Planning et modifiez les cellules incorrectes, ou r\u00e9-importez le bon fichier.
    </div>`;
  }
  if(v.errors.length>0){
    h+=`<div style="margin-top:10px;display:flex;gap:6px">
      <button onclick="iaAskCorrect()" style="flex:1;padding:9px;background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.4);border-radius:8px;font-size:11px;color:#c9a227;font-weight:700;cursor:pointer">\ud83d\udd27 Corriger les erreurs</button>
    </div>`;
  }
  var d=new Date(v.checkedAt);
  h+=`<div style="margin-top:6px;font-size:8px;color:#2a4028">V\u00e9rifi\u00e9 le ${d.toLocaleDateString("fr-FR")} \u00e0 ${String(d.getHours()).padStart(2,"0")}h${String(d.getMinutes()).padStart(2,"0")}</div>`;
  return h;
}

// \u2500\u2500 \u00c9tat de confirmation de correction \u2500\u2500
var pendingFix=null;

function iaAskCorrect(){
  if(!A.lastVerif||!A.lastVerif.errors.length) return;
  pendingFix=A.lastVerif;
  var n=pendingFix.errors.length;
  // R\u00e9sum\u00e9 des corrections \u00e0 faire
  var byEmp={};
  pendingFix.errors.forEach(function(e){if(!byEmp[e.empName])byEmp[e.empName]=0;byEmp[e.empName]++;});
  var summary=Object.keys(byEmp).slice(0,5).map(function(n){return n+" ("+byEmp[n]+"j)";}).join(", ");
  var h=`<div style="padding:10px;background:#0e1c10;border:1px solid rgba(201,162,39,.3);border-radius:8px">
    <div style="font-size:11px;font-weight:700;color:#c9a227;margin-bottom:8px">\ud83d\udd27 Corriger ${n} erreur(s) ?</div>
    <div style="font-size:10px;color:#6a8a68;margin-bottom:10px">
      Je vais remplacer les codes incorrects dans le planning par ceux du fichier import\u00e9 :<br>
      <strong style="color:#c0cca8">${summary}${Object.keys(byEmp).length>5?" ...":""}</strong>
    </div>
    <div style="display:flex;gap:6px">
      <button onclick="iaConfirmCorrect()" style="flex:1;padding:9px;background:#1a3a1e;border:1px solid #2a6030;border-radius:8px;font-size:11px;color:#3a8a50;font-weight:700;cursor:pointer">\u2705 Oui, corriger</button>
      <button onclick="iaCancelFix()" style="flex:1;padding:9px;background:transparent;border:1px solid #1e3020;border-radius:8px;font-size:11px;color:#3a5030;cursor:pointer">\u2715 Annuler</button>
    </div>
  </div>`;
  iaHistory.push({role:"user",text:"Corriger les erreurs du planning"});
  iaHistory.push({role:"bot",html:h});
  dc();
  setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},60);
}

function iaCancelFix(){
  pendingFix=null;
  iaHistory.push({role:"bot",html:"<span style='color:#3a5030'>Correction annul\u00e9e \u2014 aucune modification effectu\u00e9e.</span>"});
  dc();
  setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},60);
}

function iaConfirmCorrect(){
  if(!A.user||A.user.id!==AID){toast("Action r\u00e9serv\u00e9e \u00e0 l'admin","err");return;}
  if(!pendingFix||!pendingFix.errors.length){
    iaHistory.push({role:"bot",html:"Aucune erreur \u00e0 corriger."});
    dc();return;
  }
  var errors=pendingFix.errors;
  var fixed=0,skipped=0;
  var details=[];
  errors.forEach(function(e){
    if(!e.refCode||!CODES[e.refCode]){skipped++;return;}
    saveOv(e.empId,e.day,e.refCode);
    fixed++;
    details.push({name:e.empName,day:e.day,old:e.plCode,new:e.refCode});
  });
  // Re-v\u00e9rifier apr\u00e8s correction
  var key=pendingFix.year+"-"+pendingFix.month;
  var ref=lg("cmc_ref_"+key,null);
  var recheck=ref?runVerification(pendingFix.year,pendingFix.month,ref):null;
  A.lastVerif=recheck;
  pendingFix=null;
  // R\u00e9sum\u00e9
  var h=`<div>
    <div style="font-size:11px;font-weight:700;color:#3a8a50;margin-bottom:8px">\u2705 ${fixed} correction(s) appliqu\u00e9e(s)</div>`;
  if(details.length>0){
    h+=`<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:8px">`;
    details.slice(0,8).forEach(function(d){
      var ciO=CODES[d.old]||{c:"#c04040"};
      var ciN=CODES[d.new]||{c:"#3a8a50"};
      h+=`<div style="font-size:9px;color:#6a8a68">
        ${esc(d.name)} j${d.day} :
        <span style="color:${ciO.c};text-decoration:line-through">${d.old||"vide"}</span>
        \u2192 <span style="color:${ciN.c};font-weight:700">${d.new}</span>
      </div>`;
    });
    if(details.length>8) h+=`<div style="font-size:9px;color:#2a4028">...et ${details.length-8} autre(s)</div>`;
    h+=`</div>`;
  }
  if(skipped>0) h+=`<div style="font-size:9px;color:#c9a227;margin-bottom:6px">\u26a0\ufe0f ${skipped} cellule(s) non corrig\u00e9e(s) \u2014 code invalide</div>`;
  if(recheck){
    h+=recheck.errors.length===0
      ?"<div style=\"padding:6px 10px;background:#061c0a;border:1px solid #1a4020;border-radius:6px;font-size:10px;color:#3a8a50;font-weight:700\">\u2705 V\u00e9rification apr\u00e8s correction : aucune erreur restante !</div>"
      :`<div style="padding:6px 10px;background:#0e1808;border:1px solid rgba(201,162,39,.3);border-radius:6px;font-size:10px;color:#c9a227">\u26a0\ufe0f ${recheck.errors.length} erreur(s) encore pr\u00e9sente(s) \u2014 relancez la v\u00e9rification pour les voir.</div>`;
  }
  h+=`</div>`;
  iaHistory.push({role:"bot",html:h});
  dc();
  setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},60);
  toast("\u2705 "+fixed+" correction(s) appliqu\u00e9e(s)");
}

function iaSend(preset){
  var inp=document.getElementById("iaIn");
  var text=preset||(inp?inp.value.trim():"");
  if(!text)return;
  if(inp)inp.value="";
  iaHistory.push({role:"user",text:text});
  var reply=iaRespond(text);
  if(reply!==null) iaHistory.push({role:"bot",html:reply});
  dc();
  setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},60);
}

function iaClearHistory(){iaHistory=[];dc();}

function iaRespond(q){
  var ql=q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var pl=gpl();
  var isAdm=A.user&&A.user.id===AID;

  // \u2500\u2500 Planning d'un employ\u00e9 \u2500\u2500
  var empMatch=A.employees.find(function(e){return ql.includes(e.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""));});
  if(empMatch&&(ql.includes("planning")||ql.includes("horaire")||ql.includes("mois")||ql.includes("travail"))){
    var p=pl[empMatch.id]||{};
    var days=getDays(A.year,A.month);
    var rows="";
    for(var d=1;d<=days;d++){
      var code=p[d]||"\u2014";
      var ci=CODES[code];
      if(ci)rows+=`<span style="display:inline-block;background:${ci.bg};color:${ci.c};border:1px solid ${ci.b};border-radius:4px;padding:1px 5px;font-size:10px;margin:1px">${d}: ${code}</span> `;
    }
    var trav=Object.values(p).filter(function(v){return v&&v!=="RH"&&v!=="R";}).length;
    var team=gt(empMatch.team);
    return `<strong style="color:#c9a227">${esc(empMatch.name)}</strong> \u2014 ${esc(team?team.name:"")} \u2014 ${trav}j travaill\u00e9s en ${MFR[A.month]}<br><br>${rows||"Aucun planning trouv\u00e9"}`;
  }

  // \u2500\u2500 Qui travaille ce soir / aujourd'hui \u2500\u2500
  if(ql.includes("travaille")||ql.includes("travail")||ql.includes("service")||ql.includes("soir")||ql.includes("nuit")||ql.includes("aujourd")){
    var today=new Date().getDate();
    var tYear=new Date().getFullYear(),tMonth=new Date().getMonth();
    if(tYear===A.year&&tMonth===A.month){
      var workers=A.employees.filter(function(e){
        var code=(pl[e.id]||{})[today]||"";
        return isWork(code);
      });
      if(!workers.length) return `Personne n'est en service le ${today} ${MFR[A.month]} selon le planning.`;
      var byTeam={};
      workers.forEach(function(e){if(!byTeam[e.team])byTeam[e.team]=[];byTeam[e.team].push(e);});
      var r=`<strong>${workers.length} employ\u00e9(s) en service le ${today} ${MFR[A.month]} :</strong><br><br>`;
      Object.keys(byTeam).forEach(function(tid){
        var tcc=tc(tid),team=gt(tid);
        r+=`<span style="color:${tcc};font-weight:700">${esc(team?team.name:"\u00c9q."+tid)}</span> : `;
        r+=byTeam[tid].map(function(e){
          var code=(pl[e.id]||{})[today]||"";
          var ci=CODES[code]||{c:"#888"};
          return `${esc(e.name)} <span style="color:${ci.c};font-size:10px">(${code})</span>`;
        }).join(", ")+"<br>";
      });
      return r;
    }
  }

  // \u2500\u2500 Effectif d'une \u00e9quipe \u2500\u2500
  var teamMatch=A.teams.find(function(t){return ql.includes(t.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""))||ql.includes("equipe "+t.id)||ql.includes("\u00e9quipe "+t.id)||ql.includes("team "+t.id);});
  if(teamMatch){
    var emps=A.employees.filter(function(e){return e.team===teamMatch.id;});
    var chefs=emps.filter(function(e){return e.chef;});
    var mir=gm(teamMatch.id);
    var r=`<strong style="color:${teamMatch.color||"#c9a227"}">${esc(teamMatch.name)}</strong> \u2014 ${emps.length} employ\u00e9(s)<br>`;
    if(chefs.length) r+="<br>\ud83d\udc51 Chefs : "+chefs.map(function(e){return esc(e.name);}).join(", ")+"<br>";
    if(mir) r+=`\u21cc Miroir : ${esc(mir.name)}<br>`;
    r+="<br>Membres :<br>"+emps.map(function(e){return "\u2022 "+esc(e.name)+(e.chef?" \ud83d\udc51":"")+" <span style=\"font-size:10px;color:#3a5030\">"+esc(e.post||"")+"</span>";}).join("<br>");
    return r;
  }

  // \u2500\u2500 Code horaire \u2500\u2500
  var codeMatch=CK.find(function(c){return ql.includes(c.toLowerCase())||ql.replace(/[^a-z0-9\/*']/g,"").includes(c.toLowerCase().replace(/[^a-z0-9\/*']/g,""));});
  if(codeMatch&&(ql.includes("horaire")||ql.includes("heure")||ql.includes("signifie")||ql.includes("veut dire")||ql.includes("quoi")||ql.includes("c'est")||ql.includes("code"))){
    var ci=CODES[codeMatch];
    return `Code <strong style="color:${ci.c}">${codeMatch}</strong> = <strong>${ci.l}</strong>${ci.cdp?" (inclut Caf\u00e9 de Paris)":""}`;
  }

  // \u2500\u2500 Tous les codes \u2500\u2500
  if(ql.includes("codes")||ql.includes("liste des horaires")||ql.includes("tous les horaires")){
    var r="<strong>Codes horaires CMC :</strong><br><br>";
    CK.forEach(function(c){
      var ci=CODES[c];
      r+=`<span style="display:inline-block;background:${ci.bg};color:${ci.c};border:1px solid ${ci.b};border-radius:4px;padding:2px 6px;font-size:10px;margin:2px">${c}</span> ${ci.l}${ci.cdp?" \u2605":""}<br>`;
    });
    return r;
  }

  // \u2500\u2500 Chefs d'une \u00e9quipe \u2500\u2500
  if(ql.includes("chef")){
    if(teamMatch){
      var chef=CHEF_EQ[teamMatch.id]||"Non d\u00e9fini";
      return `Chef de la <strong style="color:${teamMatch.color}">${esc(teamMatch.name)}</strong> : <strong style="color:#c9a227">${esc(chef)}</strong>`;
    }
    var r="<strong>Chefs d'\u00e9quipe :</strong><br><br>";
    A.teams.forEach(function(t){
      var chef=CHEF_EQ[t.id]||"\u2014";
      r+=`<span style="color:${t.color};font-weight:700">${esc(t.name)}</span> : <strong style="color:#c9a227">${esc(chef)}</strong><br>`;
    });
    return r;
  }

  // \u2500\u2500 Absents / repos \u2500\u2500
  if(ql.includes("absent")||ql.includes("repos")||ql.includes("conge")||ql.includes("rh")){
    var today=new Date().getDate();
    if(new Date().getFullYear()===A.year&&new Date().getMonth()===A.month){
      var absents=A.employees.filter(function(e){var c=(pl[e.id]||{})[today]||"";return c==="RH"||c==="R"||c==="CP"||c==="M"||c==="AF";});
      if(!absents.length) return `Personne en repos/absent le ${today} ${MFR[A.month]}.`;
      return `<strong>${absents.length} employ\u00e9(s) absent(s) le ${today} ${MFR[A.month]} :</strong><br><br>${absents.map(function(e){var c=(pl[e.id]||{})[today]||"";var ci=CODES[c]||{c:"#888"};return `\u2022 ${esc(e.name)} \u2014 <span style="color:${ci.c}">${c}</span>`;}).join("<br>")}`;
    }
  }

  // \u2500\u2500 CDP ce mois \u2500\u2500
  if(ql.includes("cdp")||ql.includes("cafe de paris")||ql.includes("caf\u00e9 de paris")){
    var days=getDays(A.year,A.month);
    var cdpEmps=A.employees.filter(function(e){
      for(var d=1;d<=days;d++){var c=(pl[e.id]||{})[d]||"";if(CODES[c]&&CODES[c].cdp)return true;}
      return false;
    });
    if(!cdpEmps.length) return `Aucun employ\u00e9 avec shifts CDP en ${MFR[A.month]}.`;
    return "<strong>"+cdpEmps.length+" employ\u00e9(s) avec shifts CDP en "+MFR[A.month]+" :</strong><br><br>"+cdpEmps.map(function(e){return esc(e.name);}).join("<br>");
  }

  // \u2500\u2500 Stats globales \u2500\u2500
  if(ql.includes("stat")||ql.includes("combien")||ql.includes("effectif")||ql.includes("total")){
    var r=`<strong>Effectif CMC Black Jack :</strong><br><br>`;
    r+=`\ud83d\udc65 Total : <strong>${A.employees.length}</strong> employ\u00e9s<br>`;
    A.teams.forEach(function(t){
      var n=A.employees.filter(function(e){return e.team===t.id;}).length;
      r+=`<span style="color:${t.color}">\u25cf</span> ${esc(t.name)} : ${n} personnes<br>`;
    });
    return r;
  }

  // \u2500\u2500 Aide / que sais-tu \u2500\u2500
  if(ql.includes("aide")||ql.includes("help")||ql.includes("peux-tu")||ql.includes("peux tu")||ql.includes("sais-tu")||ql.includes("sais tu")||ql.includes("quoi faire")){
    return `Je peux vous aider avec :<br><br>
\ud83d\udcc5 <strong>Planning</strong> \u2014 "Planning de DESSI F", "Qui travaille aujourd'hui ?"<br>
\ud83d\udc65 <strong>\u00c9quipes</strong> \u2014 "Combien dans l'\u00e9quipe 3 ?", "Chefs de l'\u00e9quipe 2"<br>
\u23f0 <strong>Horaires</strong> \u2014 "Que signifie 22/6 ?", "Liste des codes"<br>
\ud83d\udcca <strong>Stats</strong> \u2014 "Combien d'employ\u00e9s total ?", "Qui a CDP ce mois ?"<br>
\ud83d\udd0d <strong>Absences</strong> \u2014 "Qui est absent aujourd'hui ?"<br><br>
Posez votre question librement !`;
  }

  // \u2500\u2500 V\u00e9rification planning \u2500\u2500
  if(ql.includes("verif")||ql.includes("erreur")||ql.includes("correct")||ql.includes("check")||ql.includes("bon horaire")||ql.includes("correspond")||ql.includes("juste")){
    if(!isAdm) return "La v\u00e9rification du planning est r\u00e9serv\u00e9e \u00e0 l'administrateur.";
    var key=A.year+"-"+A.month;
    var ref=lg("cmc_ref_"+key,null);
    if(!ref) return `<span style="color:#c9a227">Aucun planning import\u00e9 pour ${MFR[A.month]} ${A.year}.</span><br>Importez un planning CSV via <strong>Admin \u2192 Import planning</strong>, je le v\u00e9rifierai automatiquement.`;
    var v=runVerification(A.year,A.month,ref);
    A.lastVerif=v;
    return formatVerifReport(v);
  }

  // \u2500\u2500 Rapport derni\u00e8re v\u00e9rification \u2500\u2500
  if(ql.includes("rapport")||ql.includes("dernier")||ql.includes("r\u00e9sultat")){
    if(A.lastVerif) return formatVerifReport(A.lastVerif);
    return "Aucune v\u00e9rification effectu\u00e9e. Importez un planning ou cliquez sur \ud83d\udd0d V\u00e9rifier.";
  }

  // \u2500\u2500 Erreurs d'un employ\u00e9 sp\u00e9cifique \u2500\u2500
  if(empMatch&&(ql.includes("erreur")||ql.includes("verif")||ql.includes("correct")||ql.includes("horaire"))){
    var key=A.year+"-"+A.month;
    var ref=lg("cmc_ref_"+key,null);
    if(!ref) return `Pas de r\u00e9f\u00e9rence d'import pour ${MFR[A.month]} ${A.year}.`;
    var v=runVerification(A.year,A.month,ref);
    var empErrs=v.errors.filter(function(e){return e.empId===empMatch.id;});
    if(!empErrs.length) return `\u2705 <strong>${esc(empMatch.name)}</strong> \u2014 aucune erreur d\u00e9tect\u00e9e, tous les horaires correspondent.`;
    var r=`\u26a0\ufe0f <strong>${esc(empMatch.name)}</strong> \u2014 ${empErrs.length} erreur(s) :<br><br>`;
    empErrs.forEach(function(e){
      var ciR=CODES[e.refCode]||{c:"#c9a227"};
      var ciP=CODES[e.plCode]||{c:"#6a8a68"};
      r+=`Jour ${e.day} : planning=<span style="color:${ciP.c};font-weight:700">${e.plCode||"vide"}</span> \u2192 devrait \u00eatre <span style="color:${ciR.c};font-weight:700">${e.refCode}</span><br>`;
    });
    return r;
  }

  // \u2500\u2500 Corriger les erreurs \u2500\u2500
  if(ql.includes("corrig")||ql.includes("fix")||ql.includes("r\u00e9pare")||ql.includes("modifie")||ql.includes("appliqu")){
    if(!isAdm) return "La correction du planning est r\u00e9serv\u00e9e \u00e0 l'administrateur.";
    if(!A.lastVerif||!A.lastVerif.errors.length){
      var v=verifyCurrentMonth();
      if(!v) return "Aucune r\u00e9f\u00e9rence d'import disponible. Importez d'abord un planning.";
      if(!v.errors.length) return "\u2705 Aucune erreur \u00e0 corriger \u2014 le planning est correct !";
    }
    iaAskCorrect();
    return null; // iaAskCorrect g\u00e8re l'affichage
  }

  // \u2500\u2500 R\u00e9ponse par d\u00e9faut \u2500\u2500
  return `Je n'ai pas compris votre question. Essayez par exemple :<br><br>
\u2022 "Planning de [NOM]"<br>
\u2022 "Qui travaille aujourd'hui ?"<br>
\u2022 "Combien dans l'\u00e9quipe 3 ?"<br>
\u2022 "Que signifie le code 22/6 ?"<br>
\u2022 "Qui est chef de l'\u00e9quipe 1 ?"`;
}


// ── ONGLET ABSENCES ──────────────────────────────────────────────────────────
function vAbsences(){
  var pl=gpl(),days=getDays(A.year,A.month);
  var daysArr=(function(n){var a=[];for(var i=0;i<n;i++)a.push(i+1);return a;})(days);
  var isAdm=A.user&&A.user.id===AID;
  var myTeam=A.user?A.user.team:null;
  // Codes d'absence a afficher
  var ABS_CODES={"CP":"#684060","M":"#783840","AF":"#206038","RRT":"#205060","HC":"#506818"};
  var ABS_LBL={"CP":"Cong\u00e9","M":"Maladie","AF":"Formation","RRT":"R\u00e9cup","HC":"H.Comp."};

  var h='<div class="page">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
   +'<button class="btn ghost" onclick="prevM()" style="padding:7px 13px;font-size:20px">\u2039</button>'
   +'<div style="flex:1;text-align:center">'
   +'<div style="font-size:17px;font-weight:800;color:#d8cc9a">'+MFR[A.month]+' \u2014 Absences</div>'
   +'<div style="font-size:9px;color:#243020">Cong\u00e9s \u00b7 Maladie \u00b7 Formation \u00b7 R\u00e9cup</div></div>'
   +'<button class="btn ghost" onclick="nextM()" style="padding:7px 13px;font-size:20px">\u203a</button>'
   +'</div>';

  // Legende
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  Object.keys(ABS_CODES).forEach(function(k){
    h+='<span style="background:'+ABS_CODES[k]+'22;border:1px solid '+ABS_CODES[k]+'55;border-radius:5px;padding:2px 8px;font-size:9px;color:'+ABS_CODES[k]+'">'+ABS_LBL[k]+'</span>';
  });
  h+='</div>';

  // Par equipe
  var teamsToShow=isAdm?A.teams:A.teams.filter(function(t){return t.id===myTeam;});
  var absFamPrev=null;
  teamsToShow.forEach(function(team){
    var tcc=team.color||TC[team.id]||"#888";
    var famEmp=A.employees.find(function(e){return e.team===team.id&&e.family;});
    var teamFam=famEmp?famEmp.family:"bj";
    if(teamFam!==absFamPrev){
      absFamPrev=teamFam;
      h+='<div style="font-size:9px;font-weight:800;color:'+getFamColor(teamFam)+';text-transform:uppercase;letter-spacing:2px;margin:12px 0 4px;padding:4px 0;border-bottom:1px solid '+getFamColor(teamFam)+'30">'+esc(getFamLabel(teamFam))+'</div>';
    }
    var emps=A.employees.filter(function(e){return e.team===team.id&&isEmpActive(e,A.year,A.month);});
    // Filtrer: employés ayant au moins une absence ce mois
    var absentEmps=emps.filter(function(e){
      var row=pl[e.id]||{};
      return Object.values(row).some(function(c){return ABS_CODES[c];});
    });
    if(!absentEmps.length) return;

    h+='<div style="margin-bottom:14px">'
     +'<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:'+tcc+'0c;border:1px solid '+tcc+'22;border-radius:6px 6px 0 0">'
     +'<div style="width:6px;height:6px;border-radius:50%;background:'+tcc+'"></div>'
     +'<span style="font-size:11px;font-weight:700;color:'+tcc+'">'+esc(team.name)+'</span>'
     +'<span style="font-size:9px;color:#243020">'+absentEmps.length+' employ\u00e9(s) absent(s)</span>'
     +'</div>'
     +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;background:#060f08;border:1px solid '+tcc+'18;border-top:none;border-radius:0 0 6px 6px">'
     +'<table style="border-collapse:collapse;width:100%"><thead><tr>'
     +'<th style="padding:4px 8px;background:#060e07;color:#243020;font-size:9px;text-align:left;position:sticky;left:0;min-width:80px;border-right:1px solid #182818;z-index:5">Nom</th>';
    daysArr.forEach(function(d){
      var dow=getDow(A.year,A.month,d),we=dow===0||dow===6;
      h+='<th style="padding:2px 1px;min-width:24px;background:#060e07;text-align:center">'
       +'<div style="font-size:8px;font-weight:700;color:'+(we?"#4a6888":"#3a4a38")+'">'+d+'</div>'
       +'</th>';
    });
    h+='</tr></thead><tbody>';
    absentEmps.forEach(function(emp,ei){
      var isMe=A.user&&emp.id===A.user.id;
      var row=pl[emp.id]||{};
      h+='<tr style="'+(ei>0?"border-top:1px solid #0c160a":"")+(isMe?";background:rgba(201,162,39,.04)":"")+'"><td style="padding:4px 8px;background:'+(isMe?"rgba(201,162,39,.05)":"#162818")+';position:sticky;left:0;border-right:1px solid #182818;font-size:9px;font-weight:'+(isMe?700:400)+';color:'+(isMe?"#c9a227":"#7a8a68")+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;z-index:3">'+(isMe?"\u25b6 ":"")+esc(empLabel(emp))+'</td>';
      daysArr.forEach(function(d){
        var c=row[d]||"";
        var col=ABS_CODES[c];
        if(col){
          h+='<td style="text-align:center;padding:1px;background:'+col+'15">'
           +'<span style="display:inline-block;background:'+col+'30;border:1px solid '+col+'60;border-radius:3px;padding:1px 2px;font-size:7px;font-weight:700;color:'+col+'">'+c+'</span>'
           +'</td>';
        } else {
          h+='<td style="text-align:center;padding:1px;background:#060e07"><span style="font-size:7px;color:#1e2e1e">\u00b7</span></td>';
        }
      });
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  });

  // Si aucune absence ce mois
  h+='<div id="abs-empty" style="display:none;text-align:center;padding:30px;color:#243020;font-size:11px">Aucune absence enregistr\u00e9e pour ce mois \u2014 tout le monde est pr\u00e9sent !</div>';
  h+='</div>';
  return h;
}

render();

</script>
