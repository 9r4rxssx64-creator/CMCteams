<style>


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,button,textarea{font-family:inherit}

/* === FOND TAPIS CASINO MONTE-CARLO === */
body{
  font-family:system-ui,-apple-system,sans-serif;
  font-size:16px;color:#e0f0d8;
  min-height:100vh;
  background:#1a3020;
}
/* Feutrine avec texture double trame */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 11px,rgba(0,0,0,.05) 11px,rgba(0,0,0,.05) 12px),
    repeating-linear-gradient(90deg,transparent,transparent 11px,rgba(0,0,0,.05) 11px,rgba(0,0,0,.05) 12px),
    repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(201,162,39,.04) 18px,rgba(201,162,39,.04) 20px),
    repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(201,162,39,.04) 18px,rgba(201,162,39,.04) 20px),
    radial-gradient(ellipse at 50% 0%,#2a4a2c 0%,#1a3020 70%);
}
/* Frise dorée haut + bas */
body::after{
  content:"";position:fixed;left:0;right:0;top:0;height:3px;z-index:200;pointer-events:none;
  background:linear-gradient(90deg,transparent,#c9a227 20%,#f0d060 50%,#c9a227 80%,transparent);
  box-shadow:0 0 14px rgba(201,162,39,.6);
}
#app,#toast,#pk,#ov{position:relative;z-index:1}

/* === TOPBAR === */
#topbar{
  background:linear-gradient(90deg,#243e28,#2e5034,#243e28);
  border-bottom:1px solid rgba(201,162,39,.35);
  box-shadow:0 2px 20px rgba(0,0,0,.5),inset 0 -1px 0 rgba(201,162,39,.15);
  padding:0 14px;height:56px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}

/* === NAV BAS === */
#bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#1e3a24,#283e2c);
  border-top:1px solid rgba(201,162,39,.3);
  box-shadow:0 -4px 24px rgba(0,0,0,.5);
  display:flex;z-index:99;
}
.nt{
  flex:1;padding:10px 4px 9px;border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:12px;color:#90c090;border-top:2px solid transparent;
  cursor:pointer;position:relative;text-transform:uppercase;letter-spacing:.5px;
}
.nt.on{color:#c9a227;border-top-color:#c9a227;font-weight:700}
.nt em{font-size:22px;font-style:normal}
.nbadge{position:absolute;top:4px;right:calc(50% - 16px);background:#7a0020;color:#ffb0b0;border-radius:8px;font-size:10px;font-weight:700;padding:0 4px;min-width:14px;text-align:center;display:none}
#content{padding-bottom:78px}

/* === BOUTONS === */
.btn{border:none;border-radius:8px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.gold{background:linear-gradient(135deg,#d4aa2a,#9a7810);color:#040c04;box-shadow:0 2px 14px rgba(201,162,39,.4)}
.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);color:#b8d8b0}
.danger{background:transparent;border:1px solid #682020;color:#d08080;padding:6px 10px;font-size:14px;border-radius:7px;cursor:pointer}

/* === INPUTS === */
.inp{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:11px 14px;color:#e8f8e0;outline:none;width:100%}
.inp:focus{border-color:rgba(201,162,39,.7);box-shadow:0 0 0 2px rgba(201,162,39,.12)}
select.inp{-webkit-appearance:none}

/* === CARDS === */
.card{background:rgba(40,70,44,.96);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.35)}
.page{padding:14px 14px 10px}
.sec-title{font-size:20px;font-weight:800;color:#f0e0a0;margin-bottom:3px}
.sec-sub{font-size:14px;color:#9abf90}

/* === GRILLE === */
#planGrid{overflow:scroll;-webkit-overflow-scrolling:touch}
.sth{padding:7px 10px;background:#223a26;color:#b0d8a8;font-size:13px;text-transform:uppercase;letter-spacing:1px;position:sticky;left:0;top:0;z-index:20;min-width:120px;max-width:170px;text-align:left;border-right:1px solid #2a4830;border-bottom:2px solid rgba(201,162,39,.3);white-space:nowrap}
.dth{padding:3px 1px;min-width:30px;background:#223a26;font-size:13px;font-weight:700;color:#c0d8b8;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.3)}
.stth{padding:3px 4px;background:#223a26;min-width:22px;font-size:12px;color:#90b888;text-align:center;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(201,162,39,.3)}
.ntd{padding:5px 10px;background:#1e3422;position:sticky;left:0;z-index:4;border-right:1px solid #2a4830;font-size:15px;text-align:left;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctd{min-width:30px;height:30px;font-size:13px;font-weight:700;text-align:center;cursor:pointer}
.steptd{background:#1e3422;padding:6px 10px;font-size:15px;font-weight:700;text-align:left;border-top:2px solid #0a1508;color:#d0e8c0}
.stattd{padding:3px;font-size:13px;color:#90b888;background:#1e3422;text-align:center}

/* === PICKER === */
#pk{display:none;position:fixed;background:#243c28;border:1px solid rgba(201,162,39,.5);border-radius:12px;padding:10px;flex-wrap:wrap;gap:5px;z-index:999;box-shadow:0 16px 48px rgba(0,0,0,.8);width:175px}
.pb{padding:8px 0;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);text-align:center;font-size:13px;font-weight:700;cursor:pointer;flex:0 0 calc(33% - 4px);color:#c8e0c0}
.pb.cur{background:rgba(201,162,39,.2);border-color:#c9a227;color:#f0d060}
.pclr{flex:0 0 100%;padding:7px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);text-align:center;font-size:12px;color:#a0b898;cursor:pointer}
#ov{display:none;position:fixed;inset:0;z-index:998}

/* === TOAST === */
#toast{display:none;position:fixed;bottom:88px;left:50%;transform:translateX(-50%);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;color:#f8f0c8;z-index:9999;pointer-events:none;white-space:nowrap}

/* === CHAT === */
.chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.msg-me{align-self:flex-end;background:rgba(120,90,10,.3);border:1px solid rgba(201,162,39,.28);border-radius:12px 12px 2px 12px;padding:8px 12px;max-width:80%}
.msg-ot{align-self:flex-start;background:rgba(40,70,44,.9);border:1px solid rgba(255,255,255,.1);border-radius:12px 12px 12px 2px;padding:8px 12px;max-width:80%}
.msg-name{font-size:12px;font-weight:700;margin-bottom:2px}
.msg-text{font-size:14px;color:#d0e8c8;line-height:1.5;word-break:break-word}
.msg-ts{font-size:11px;color:#608060;margin-top:2px;text-align:right}
.chat-bar{padding:10px 14px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:8px;background:#1e3422;flex-shrink:0}
.msg-dm{border-color:rgba(160,90,255,.35)!important;background:rgba(70,40,120,.3)!important}
.msg-dm-badge{font-size:10px;background:rgba(160,90,255,.18);color:#a060ff;border-radius:3px;padding:0 4px;margin-left:4px;vertical-align:middle}
.msg-reply-q{background:rgba(255,255,255,.06);border-left:2px solid rgba(201,162,39,.4);border-radius:3px;padding:2px 6px;margin-bottom:4px;font-size:12px;color:#8aaa80;display:block}
.chat-status-bar{padding:5px 14px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-datesep{text-align:center;font-size:10px;color:#3a5830;margin:4px 0;user-select:none;pointer-events:none}
.chat-act-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#4a6840;padding:0 3px;line-height:1}
.nbadge-dm{background:#4a2880!important;color:#c090ff!important}

/* === PRÉSENCE DOT === */
.odot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.odot.on{background:#50c060}.odot.off{background:#304030}
.emp-row{display:flex;align-items:center;gap:9px;padding:12px 14px}
.chef-badge{background:rgba(201,162,39,.15);color:#d4b840;border:1px solid rgba(201,162,39,.35);border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#c9a227;color:#040c04;font-size:13px;font-weight:800;margin-right:6px}

/* === ÉCRAN LOGIN - TABLE DE JEU === */
.login-bg{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 11px,rgba(0,0,0,.06) 11px,rgba(0,0,0,.06) 12px),
    repeating-linear-gradient(90deg,transparent,transparent 11px,rgba(0,0,0,.06) 11px,rgba(0,0,0,.06) 12px),
    repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(201,162,39,.04) 18px,rgba(201,162,39,.04) 20px),
    repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(201,162,39,.04) 18px,rgba(201,162,39,.04) 20px),
    radial-gradient(ellipse at 50% 35%,#2a5030 0%,#1a3020 65%);
}
/* SVG table de jeu au-dessus de la carte login */
.login-table-svg{
  width:100%;max-width:340px;margin-bottom:0px;border-radius:16px 16px 0 0;
  overflow:hidden;border:1px solid rgba(201,162,39,.4);border-bottom:none;
  box-shadow:0 -6px 30px rgba(0,0,0,.4);
}
.login-card{
  background:linear-gradient(170deg,#2a4830,#1e3828);
  border:1px solid rgba(201,162,39,.45);
  border-radius:0 0 20px 20px;padding:28px 28px 32px;
  width:100%;max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(201,162,39,.08),inset 0 1px 0 rgba(201,162,39,.15);
  position:relative;overflow:hidden;
}
.login-card::before{content:"\u2666";position:absolute;top:10px;left:14px;font-size:15px;color:rgba(201,162,39,.35)}
.login-card::after{content:"\u2666";position:absolute;bottom:10px;right:14px;font-size:15px;color:rgba(201,162,39,.35);transform:rotate(180deg)}
.login-banner{
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.15),transparent);
  border-top:1px solid rgba(201,162,39,.3);
  border-bottom:1px solid rgba(201,162,39,.3);
  text-align:center;font-size:12px;letter-spacing:4px;
  color:rgba(201,162,39,.7);padding:5px 0;margin-bottom:20px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .18s ease-out}
.online-dot{width:8px;height:8px;border-radius:50%;background:#3a8a50;display:inline-block;animation:pulse 2s infinite;margin-right:4px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:rgba(201,162,39,.3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,162,39,.5)}
</style>
</head>

var FB_PRE=["cmc_ref_","cmc_ci_","cmc_comments_","cmc_verif_"];
// Clés qui restent strictement locales (session, PIN, paramètres IA)
var FB_LOCAL=["cmc_uid","cmc_lastact","cmc_lastread","cmc_lastread_dm","cmc_pin_fails","cmc_admin_sessions","cmc_ia_enabled","cmc_ia_websearch","cmc_ia_key","cmc_fb_url"];

function fbShouldSync(k){
  if(FB_LOCAL.indexOf(k)>=0)return false;
  if(FB_FIX.indexOf(k)>=0)return true;
  for(var i=0;i<FB_PRE.length;i++){if(k.indexOf(FB_PRE[i])===0)return true;}
  return false;
}

function fbSanitizeKey(k){return k.replace(/\./g,"\uff0e");}
function fbRestoreKey(k){return k.replace(/\uff0e/g,".");}

function fbWrite(k,v){
  if(!FB_URL||!fbShouldSync(k))return;
  fetch(FB_URL+FB_PATH+"/"+encodeURIComponent(fbSanitizeKey(k))+".json",{
    method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)
  }).catch(function(e){console.warn("Firebase write error ("+k+"):",e.message);});
}

function fbApplyData(k,v){
  k=fbRestoreKey(k);
  if(!fbShouldSync(k)||v===null||v===undefined)return;
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  // Mettre à jour l'état A directement (sans passer par ls pour éviter la boucle)
  if(k==="cmc_ov"){A.overrides=v;}
  else if(k==="cmc_e"){A.employees=Array.isArray(v)?v:Object.values(v);}
  else if(k==="cmc_t"){A.teams=Array.isArray(v)?v:Object.values(v);}
  else if(k==="cmc_pw"){A.passwords=v;}
  else if(k==="cmc_reg"){A.reg=v;}
  else if(k==="cmc_chat"){A.chatMsgs=Array.isArray(v)?v:[];}
  // Pour les clés dynamiques (cmc_ref_*, etc.) : juste localStorage suffit
  if(A.user)dc();
}

function fbStartListening(){
  if(!FB_URL||_fbEs)return;
  var url=FB_URL+FB_PATH+".json";
  try{
    _fbEs=new EventSource(url);
    _fbEs.addEventListener("put",function(e){
      try{
        var msg=JSON.parse(e.data);
        var path=msg.path,data=msg.data;
        if(path==="/"){
          // Snapshot initial : toutes les clés
          _fbConnected=true;
          if(data&&typeof data==="object"){
            Object.keys(data).forEach(function(k){fbApplyData(k,data[k]);});
          }
          if(A.user)dc();
        } else {
          // Mise à jour d'une clé spécifique
          var key=path.slice(1); // enlever le "/" initial
          fbApplyData(key,data);
        }
      }catch(ex){console.warn("Firebase SSE parse error:",ex);}
    });
    _fbEs.addEventListener("patch",function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.data&&typeof msg.data==="object"){
          Object.keys(msg.data).forEach(function(k){fbApplyData(k,msg.data[k]);});
        }
      }catch(ex){}
    });
    _fbEs.addEventListener("cancel",function(){
      _fbConnected=false;fbStop();
      toast("\u26a0\ufe0f Firebase : accès refusé — vérifiez les règles de sécurité","err");
    });
    _fbEs.onerror=function(){
      _fbConnected=false;
      if(_fbEs){_fbEs.close();_fbEs=null;}
      setTimeout(fbStartListening,8000); // reconnexion auto après 8s
    };
  }catch(ex){console.warn("Firebase EventSource error:",ex);}
}

function fbStop(){if(_fbEs){_fbEs.close();_fbEs=null;}_fbConnected=false;}

function fbLoadAll(){
  // Chargement initial de toutes les clés depuis Firebase
  if(!FB_URL)return;
  fetch(FB_URL+FB_PATH+".json")
    .then(function(r){return r.json();})
    .then(function(data){
      if(data&&typeof data==="object"){
        Object.keys(data).forEach(function(k){fbApplyData(k,data[k]);});
      }
    })
    .catch(function(e){console.warn("Firebase initial load error:",e.message);});
}

function fbPushAll(){
  // Pousser toutes les données locales vers Firebase (premier setup)
  if(!FB_URL){toast("Configurez d'abord l'URL Firebase","err");return;}
  var all={};
  FB_FIX.forEach(function(k){
    var v=localStorage.getItem(k);if(v)try{all[fbSanitizeKey(k)]=JSON.parse(v);}catch(e){}
  });
  // Clés dynamiques
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    for(var p=0;p<FB_PRE.length;p++){
      if(k&&k.indexOf(FB_PRE[p])===0){
        var v2=localStorage.getItem(k);if(v2)try{all[fbSanitizeKey(k)]=JSON.parse(v2);}catch(e){}
      }
    }
  }
  fetch(FB_URL+FB_PATH+".json",{
    method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(all)
  }).then(function(r){
    if(r.ok){toast("\u2705 Données envoyées vers Firebase — tous les appareils vont se mettre à jour");fbStartListening();}
    else{toast("\u274c Erreur Firebase : "+r.status+" — vérifiez l'URL et les règles","err");}
  }).catch(function(e){toast("\u274c Erreur réseau Firebase : "+e.message,"err");});
}

var FB_DEFAULT="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app";
function fbInit(){
  FB_URL=(localStorage.getItem("cmc_fb_url")||FB_DEFAULT).trim().replace(/\/$/,"");
  if(!FB_URL)return;
  fbLoadAll();
  fbStartListening();
}

function fbSaveUrl(){
  var inp=document.getElementById("fbUrlIn");if(!inp)return;
  var url=inp.value.trim().replace(/\/$/,"");
  localStorage.setItem("cmc_fb_url",url);
  FB_URL=url;
  fbStop();
  if(url){fbInit();toast("\u2705 Firebase configuré — connexion en cours...");}
  else{toast("Firebase déconnecté");}
  dc();
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}
function hexA(h,a){return "rgba("+parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16)+","+a+")";}
function now(){return Date.now();}
function fmtTs(ms){var d=new Date(ms),n=new Date();var sameDay=d.toDateString()===n.toDateString();var yest=new Date(n.getTime()-864e5);var isYest=d.toDateString()===yest.toDateString();var t=String(d.getHours()).padStart(2,"0")+"h"+String(d.getMinutes()).padStart(2,"0");if(sameDay)return t;if(isYest)return"hier "+t;return d.getDate()+"/"+(d.getMonth()+1)+" "+t;}
function moOff(y,m){return(y-2026)*12+(m-2);}
// Retourne vrai si l'employé est actif pour le mois y/m.
// emp.fromMo : premier moOff actif (null = depuis toujours)
// emp.toMo   : premier moOff INACTIF (null = pour toujours)
function isEmpActive(emp,y,m){
  var mo=moOff(y,m);
  if(emp.fromMo!==undefined&&emp.fromMo!==null&&mo<emp.fromMo) return false;
  if(emp.toMo!==undefined&&emp.toMo!==null&&mo>=emp.toMo) return false;
  return true;
}
// Convertit un moOff en "Mois AAAA" pour l'affichage
function moToLabel(mo){
  var mIdx=mo+2,y2=2026+Math.floor(mIdx/12),m2=((mIdx%12)+12)%12;
  return MFR[m2]+" "+y2;
}
// Options <select> pour choisir un moOff (toMo / fromMo)
function moSelOpts(val,blank){
  var o=blank||'<option value="">Toujours</option>';
  for(var yy=2025;yy<=2028;yy++){for(var mm=0;mm<12;mm++){
    var mo=moOff(yy,mm);
    if(mo<-3) continue;
    o+='<option value="'+mo+'"'+(val===mo?' selected':'')+'>'+MFR[mm]+' '+yy+'</option>';
  }}
  return o;
}
function tc(tid){var t=A.teams.find(function(x){return x.id===tid;});return(t&&t.color)||TC[tid]||"#888";}
function gt(tid){return A.teams.find(function(x){return x.id===tid;})||null;}
function gm(tid){var t=gt(tid);return t&&t.mirrorTeamId?gt(t.mirrorTeamId):null;}

// Hachage mot de passe simple (pas crypto mais suffisant pour usage interne)
function hashPw(pw){
  var h=0;
  for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}
  return String(h>>>0);
}

  return "TMP"+((h>>>0).toString(16).toUpperCase()).padStart(7,"0");

// Recherche employé par nom+prénom complets.
// Stratégie : A.reg (exact) → source (prefixe stocké) → DEF_EMP (prefixe stocké)
// Les entrées DEF_EMP sont au format "NOM IN" (1-2 initiales).
// On vérifie que les initiales stockées sont un PRÉFIXE du prénom saisi.
function findEmpByName(nom,prenom,src){
  nom=nom.toUpperCase().trim(); prenom=prenom.toUpperCase().trim();
  if(!nom||!prenom)return null;
  var nomBase=nom+" ";
  // 1. A.reg — identité complète enregistrée
  var rk=Object.keys(A.reg).find(function(k){var r=A.reg[k];return r&&r.nom&&r.nom.toUpperCase()===nom&&r.prenom&&r.prenom.toUpperCase()===prenom;});
  if(rk){var re=A.employees.find(function(e){return e.id===rk;});if(re)return re;}
  // Génère les candidats d'initiales à tester depuis le prénom complet
  // ex. "JEAN" → ["J","JE"] ; "JEAN-PIERRE" → ["J","JE","JP"]
  function inits(p){
    var r=[];
    if(p.length>=1)r.push(p[0]);
    if(p.length>=2)r.push(p.substring(0,2));
    var w=p.split(/[\s\-]+/).filter(function(x){return x.length>0;});
    if(w.length>=2){var ci=w.map(function(x){return x[0];}).join("").substring(0,2);if(r.indexOf(ci)<0)r.push(ci);}
    return r;
  }
  var cands=inits(prenom);
  function searchSrc(list){
    // Essai exact pour chaque candidat d'initiales
    for(var i=0;i<cands.length;i++){
      var f=list.find(function(e){return e.name===nomBase+cands[i];});
      if(f)return f;
    }
    // Fallback : les initiales STOCKÉES doivent être un préfixe du prénom saisi
    return list.find(function(e){
      if(e.name.indexOf(nomBase)!==0)return false;
      var stored=e.name.slice(nomBase.length).toUpperCase();
      return prenom.indexOf(stored)===0;
    })||null;
  }
  return searchSrc(src||A.employees)||searchSrc(DEF_EMP)||null;
}

function stepRegister(){
  var nom=(document.getElementById("rNom")||{}).value||"";
  var prenom=(document.getElementById("rPrenom")||{}).value||"";
  var matIn=(document.getElementById("rMat")||{}).value||"";
  var email=(document.getElementById("rEmail")||{}).value||"";
  var pw1=(document.getElementById("rPw1")||{}).value||"";
  var pw2=(document.getElementById("rPw2")||{}).value||"";
  var errEl=document.getElementById("rerr");
  nom=nom.trim().toUpperCase(); prenom=prenom.trim(); matIn=matIn.trim().toUpperCase(); email=email.trim();
  if(!nom){if(errEl)errEl.textContent="Nom obligatoire.";return;}
  if(!prenom){if(errEl)errEl.textContent="Pr\u00e9nom obligatoire.";return;}
  if(matIn&&!/^U\d{3,}$/i.test(matIn)){if(errEl)errEl.textContent="Format matricule invalide \u2014 ex. U00001";return;}
  if(pw1.length<6){if(errEl)errEl.textContent="Mot de passe trop court (min. 6 caract\u00e8res).";return;}
  if(pw1!==pw2){if(errEl)errEl.textContent="Les mots de passe ne correspondent pas.";return;}

  var isTmp=loginUid.indexOf("TMP")===0;
  var finalUid=loginUid;

  // Si matricule fourni → essayer de lier au vrai employé
  if(matIn && isTmp){
    var empByMat=A.employees.find(function(e){return e.id===matIn;});
    if(empByMat){finalUid=matIn;}
    else{
      // Pas dans A.employees — chercher dans DEF_EMP
      var nb2=nom+" ",ii1=prenom[0].toUpperCase(),ii2=prenom.length>=2?prenom.substring(0,2).toUpperCase():"";
      var dm2=DEF_EMP.find(function(e){return e.id===matIn;})||null;
      if(dm2)finalUid=matIn; // matricule connu dans DEF_EMP
    }
  }

  // Sauvegarder identité
  A.reg[finalUid]={nom:nom,prenom:prenom,email:email,matricule:matIn||finalUid,createdAt:Date.now()};
  ls("cmc_reg",A.reg);
  A.passwords[finalUid]={h:hashPw(pw1)};
  // Migrer le compte temp si UID a changé
  if(finalUid!==loginUid){
    delete A.passwords[loginUid];
    delete A.reg[loginUid];
    loginUid=finalUid;
  }
  ls("cmc_pw",A.passwords);ls("cmc_reg",A.reg);

  // Trouver ou créer l'employé
  var emp=A.employees.find(function(e){return e.id===finalUid;});
  if(!emp){
    var nomBase=nom+" ";
    var init1=prenom.length>=1?prenom[0].toUpperCase():"X";
    var nomDef=nomBase+init1;
    var defMatch=findEmpByName(nom,prenom,DEF_EMP);
    if(defMatch){
      emp={id:finalUid,name:defMatch.name,team:defMatch.team,post:defMatch.post||"",chef:!!defMatch.chef,family:defMatch.family||"bj"};
      if(defMatch.toMo!==undefined)emp.toMo=defMatch.toMo;
      if(defMatch.fromMo!==undefined)emp.fromMo=defMatch.fromMo;
    } else {
      emp={id:finalUid,name:nomDef,team:"?",post:"",chef:false,family:"cmc"};
    }
    A.employees.push(emp);
    ls("cmc_e",A.employees);
  }
  var teamObj=gt(emp.team);
  // Alerte admin si l'employé n'est pas reconnu dans la base
  if(emp.team==="?"){
    var alerts=lg("cmc_reg_alerts",[]);
    alerts.push({ts:Date.now(),nom:nom,prenom:prenom,id:emp.id});
    if(alerts.length>50)alerts=alerts.slice(-50);
    ls("cmc_reg_alerts",alerts);
  }
  A.user=emp;ls("cmc_uid",emp.id);touchSession();loginStep=0;logUserLogin(emp);startPresenceHeartbeat();render();
  toast("Bienvenue "+prenom+"\u00a0!"+(teamObj?" \u2014 "+teamObj.name:"")+" Compte cr\u00e9\u00e9.");
}

function stepPin(){
  var pin=(document.getElementById("pinIn")||{}).value||"";
  var stored=lg("cmc_admin_pin",null);
  var er=document.getElementById("pinerr");
  // Rate-limiting : vérifier verrouillage
  var pf=lg("cmc_pin_fails",{count:0,until:0});
  if(pf.until&&Date.now()<pf.until){
    var resteSec=Math.ceil((pf.until-Date.now())/1000);
    var resteAff=resteSec>60?Math.ceil(resteSec/60)+" min":resteSec+" s";
    if(er)er.textContent="\ud83d\udd12 Verrouill\u00e9 — r\u00e9essayez dans "+resteAff;
    return;
  }
  if(hashPw(pin)!==stored){
    pf.count=(pf.count||0)+1;
    logAdminSession("pin_fail",{attempt:pf.count});
    // Délais : 30s, 2min, 10min, 1h, 24h
    var delais=[30000,120000,600000,3600000,86400000];
    if(pf.count>=5){
      var idx=Math.min(pf.count-5,delais.length-1);
      pf.until=Date.now()+delais[idx];
      var aff=delais[idx]>=3600000?Math.round(delais[idx]/3600000)+"h":Math.round(delais[idx]/60000)+"min";
      ls("cmc_pin_fails",pf);
      logAdminSession("pin_lock",{until:pf.until,delay:aff});
      if(er)er.textContent="\ud83d\udd12 Trop de tentatives — verrouill\u00e9 "+aff;
    } else {
      ls("cmc_pin_fails",pf);
      var restant=5-pf.count;
      if(er)er.textContent="Code incorrect — "+restant+" tentative"+(restant>1?"s":"")+" restante"+(restant>1?"s":"");
    }
    return;
  }
  // Succès PIN : réinitialiser compteur et journaliser
  var _failsSinceLast=(function(){var ss=lg("cmc_admin_sessions",[]);var fails=0;for(var i=ss.length-1;i>=0;i--){if(ss[i].type==="success")break;if(ss[i].type==="pin_fail")fails++;}return fails;})();
  ls("cmc_pin_fails",{count:0,until:0});
  logAdminSession("success",{method:"pin",failsSinceLast:_failsSinceLast});
  var emp=A.employees.find(function(e){return e.id===AID;});
  A.user=emp;ls("cmc_uid",emp.id);touchSession();loginStep=0;logUserLogin(emp);startPresenceHeartbeat();render();
}

  }

  if(!uid){
    var rk=Object.keys(A.reg).find(function(k){var r=A.reg[k];return r&&r.nom&&r.nom.toUpperCase()===nom&&r.prenom&&r.prenom.toUpperCase()===prenom.toUpperCase();});
    if(rk){uid=rk;emp=A.employees.find(function(e){return e.id===rk;});}
  }
  // 3. Par nom+prénom dans A.employees puis DEF_EMP
  if(!uid){
    var dm=findEmpByName(nom,prenom,A.employees);
    if(dm){emp=dm;uid=dm.id;}
  }
  // 4. Pas trouvé → UID temporaire déterministe
  if(!uid){uid=genTempUid(nom,prenom);}
  // Vérifier inactif
  if(emp&&!isEmpActive(emp,A.year,A.month)){if(er)er.textContent="Compte d\u00e9sactiv\u00e9 \u2014 contactez l\u2019administration.";return;}
  loginUid=uid;
  var hasAccount=!!A.passwords[uid];
  // Première connexion : matricule OBLIGATOIRE
  if(!hasAccount){
    if(!mat){if(er)er.textContent="Premi\u00e8re connexion : votre matricule SBM est obligatoire.";return;}
    if(mat!==uid&&!emp){
      // Matricule fourni → on l'utilise directement comme UID final
      var empByMat2=A.employees.find(function(e){return e.id===mat;});
      if(empByMat2){loginUid=mat;uid=mat;emp=empByMat2;}
      else{loginUid=mat;uid=mat;}
    }
    loginStep=3;render();return;
  }
  loginStep=1;render();

var _presInt=null;
function logUserLogin(emp){
  var ul=lg("cmc_userlog",[]);
  ul.push({ts:Date.now(),uid:emp.id,name:emp.name,team:emp.team,type:"login",ua:navigator.userAgent.slice(0,60)});
  if(ul.length>500)ul=ul.slice(-500);
  ls("cmc_userlog",ul);
  var pres=lg("cmc_presence",{});
  pres[emp.id]={ts:Date.now(),name:emp.name,team:emp.team};
  ls("cmc_presence",pres);
  // Nettoyer les entrées périmées (> 10 min)
  var cut=Date.now()-600000;
  Object.keys(pres).forEach(function(k){if(pres[k].ts<cut)delete pres[k];});
  ls("cmc_presence",pres);

function logUserLogout(uid){
  var emp=A.employees.find(function(e){return e.id===uid;});
  var ul=lg("cmc_userlog",[]);
  ul.push({ts:Date.now(),uid:uid,name:emp?emp.name:"?",team:emp?emp.team:"?",type:"logout"});
  if(ul.length>500)ul=ul.slice(-500);
  ls("cmc_userlog",ul);

  ls("cmc_presence",pres);

function updatePresence(){
  if(!A.user)return;
  var pres=lg("cmc_presence",{});
  pres[A.user.id]={ts:Date.now(),name:A.user.name,team:A.user.team};
  var cut=Date.now()-600000;
  Object.keys(pres).forEach(function(k){if(pres[k].ts<cut)delete pres[k];});
  ls("cmc_presence",pres);
}
function getOnlineUsers(){
  var pres=lg("cmc_presence",{});
  var cut=Date.now()-300000; // 5 min
  return Object.keys(pres).filter(function(uid){return pres[uid].ts>cut;})
    .map(function(uid){return {uid:uid,name:pres[uid].name,team:pres[uid].team,ts:pres[uid].ts};})
    .sort(function(a,b){return b.ts-a.ts;});
}

function startPresenceHeartbeat(){
  if(_presInt)clearInterval(_presInt);
  _presInt=setInterval(function(){updatePresence();},120000); // toutes les 2 min
  updatePresence(); // immédiatement
  // Horloge topbar
  if(_clockInt)clearInterval(_clockInt);

}

function logAdminSession(type,info){
  var sessions=lg("cmc_admin_sessions",[]);
  var entry={ts:Date.now(),type:type,ua:navigator.userAgent.slice(0,80)};
  if(info)entry.info=info;
  sessions.push(entry);
  if(sessions.length>200)sessions=sessions.slice(-200);
  ls("cmc_admin_sessions",sessions);
}
function doLogout(){

// ── Calcul position de départ pour un chef un jour donné ──
function calcDepPos(empName,tid,day){
  var CI=gCI(A.year,A.month);
  var chefNames=CHEFS_T[tid]||[];
  var sl=chefNames.length; if(!sl) return null;
  var SEQ=getSeqForSize(sl);
  var days=getDays(A.year,A.month);
  var da=[]; for(var i=1;i<=days;i++) da.push(i);
  // Uniquement les jours importés — cohérence avec vDeparts (pas de fallback REPOS)
  var pl=gpl();
  var refEmp=chefNames.map(function(n){return A.employees.find(function(e){return e.name===n;});})
    .find(function(e){return e&&isEmpActive(e,A.year,A.month)&&da.some(function(d){return isWork((pl[e.id]||{})[d]||'');});});
  if(!refEmp) return null; // pas de données importées → position inconnue
  var workDays=da.filter(function(d){return isWork((pl[refEmp.id]||{})[d]||'');});
  var wi=workDays.indexOf(day); if(wi<0) return null;
  var base=CI[empName]!==undefined?CI[empName]:0;
  var rotIdx=(wi%4+Math.floor(wi/4)+base)%sl;
  return SEQ[rotIdx];
}

// ── Export ICS planning personnel ──
function exportMyICS(){
  if(!A.user) return;
  var pl=gpl();
  var myPl=pl[A.user.id]||{};
  var days=getDays(A.year,A.month);
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CMCteams//FR','CALSCALE:GREGORIAN'];
  for(var d=1;d<=days;d++){
    var code=myPl[d]||'';
    if(!code||code==='R'||code==='RH') continue;
    var times={'22/6':{s:'220000',e:'060000',next:1},'19/4':{s:'190000',e:'040000',next:1},
      '16/3':{s:'160000',e:'030000',next:1},'14/19':{s:'140000',e:'190000',next:0},
      '20/5':{s:'200000',e:'050000',next:1},'16/22':{s:'160000',e:'220000',next:0}};
    var codeBase=code.replace('*','');
    var dtStr=A.year+String(A.month+1).padStart(2,'0')+String(d).padStart(2,'0');
    var t=times[codeBase];
    if(t){
      var dtEnd=new Date(A.year,A.month,d+(t.next?1:0));
      var dtEndStr=dtEnd.getFullYear()+String(dtEnd.getMonth()+1).padStart(2,'0')+String(dtEnd.getDate()).padStart(2,'0');
      lines.push('BEGIN:VEVENT');
      lines.push('UID:cmc-'+A.user.id+'-'+dtStr+'@cmcteams');
      lines.push('DTSTART:'+dtStr+'T'+t.s);
      lines.push('DTEND:'+dtEndStr+'T'+t.e);
      lines.push('SUMMARY:'+code+' \u2014 Casino de Monaco');
      lines.push('DESCRIPTION:'+A.user.name+' \u00b7 '+code);
      lines.push('END:VEVENT');
    } else {
      lines.push('BEGIN:VEVENT');
      lines.push('UID:cmc-'+A.user.id+'-'+dtStr+'@cmcteams');
      lines.push('DTSTART;VALUE=DATE:'+dtStr);
      lines.push('DTEND;VALUE=DATE:'+dtStr);
      lines.push('SUMMARY:'+code+' \u2014 Casino de Monaco');
      lines.push('END:VEVENT');
    }
  }
  lines.push('END:VCALENDAR');
  var ics=lines.join('\r\n');
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='planning-'+A.user.name.replace(/\s+/g,'-')+'-'+MFR[A.month]+A.year+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Planning export\u00e9 en .ics \u2014 importez dans votre calendrier');
}

function setCI(name,idx){
  if(!A.user||A.user.id!==AID)return;

  var tid=null;
  A.teams.forEach(function(t){var names=CHEFS_T[t.id]||[];if(names.indexOf(name)>=0)tid=t.id;});
  var teamNames=tid?(CHEFS_T[tid]||[]):[];
  var sl=teamNames.length||1;
  // Initialiser les chefs non encore définis avec leur position par défaut
  teamNames.forEach(function(n,ei){if(CI[n]===undefined)CI[n]=ei%sl;});
  // SWAP : l'autre chef qui avait idx prend l'ancienne position de name
  var oldIdx=CI[name]!==undefined?CI[name]:0;
  var other=null;
  teamNames.forEach(function(n){if(n!==name&&CI[n]===idx)other=n;});
  if(other!==null) CI[other]=oldIdx;
  CI[name]=idx;
  sCI(A.year,A.month,CI);
  dc();
}

      h+='<button onclick="chatSetDmEmp('+A.employees.indexOf(e)+')" style="display:block;width:100%;text-align:left;padding:5px 14px;background:transparent;border:none;border-bottom:1px solid #0c160a;font-size:13px;cursor:pointer;color:#90b870">'
        +'<span style="color:'+(tc(e.team)||"#c9a227")+';font-weight:700">'+esc(e.name)+'</span>'

    +'<button class="btn gold" onclick="sendMsg()" style="flex-shrink:0;padding:9px 14px;font-size:14px">\u2192</button>'
    +'</div></div>';
  return h;

function sendMsg(){
  var inp=document.getElementById("chatIn");if(!inp)return;
  var text=inp.value.trim();if(!text||!A.user)return;
  inp.value="";
  var msg={text:text,uid:A.user.id,name:A.user.name,team:A.user.team,ts:now()};
  if(_chatDm){msg.to=_chatDm.id;msg.toName=_chatDm.name;}
  if(_chatRep){msg.replyTo={ts:_chatRep.ts,name:_chatRep.name,text:(_chatRep.text||"").substring(0,100)};}
  _chatRep=null;
  A.chatMsgs.push(msg);
  if(A.chatMsgs.length>500)A.chatMsgs=A.chatMsgs.slice(-500);
  ls("cmc_chat",A.chatMsgs);
  dc();
  setTimeout(function(){var c=document.getElementById("chatMsgs");if(c)c.scrollTop=c.scrollHeight;},30);
}

m.del=true;ls("cmc_chat",A.chatMsgs);dc();}

function vMoisStockes(){
  // Calculer l'occupation localStorage
  var totalBytes=0;
  try{for(var k in localStorage){if(localStorage.hasOwnProperty(k))totalBytes+=((localStorage[k]||"").length+(k.length))*2;}}catch(e){}
  var totalKB=Math.round(totalBytes/1024),pct=Math.min(100,Math.round(totalKB/5120*100));
  var pctCol=pct>80?"#c04040":pct>50?"#c9a227":"#3a8a50";
  // Lister les mois stockés (cmc_ref_*)
  var moisList=[];
  try{for(var ki in localStorage){if(ki.indexOf("cmc_ref_")===0){var km=ki.replace("cmc_ref_","");var rm=lg(ki,{});moisList.push({key:km,ref:rm,hasOv:!!(A.overrides[km]&&Object.keys(A.overrides[km]).length>0)});}}}catch(e){}
  moisList.sort(function(a,b){return b.key.localeCompare(a.key);});
  var h='<div class="page"><div style="margin-bottom:12px">'
    +'<div class="sec-title">\ud83d\uddc3\ufe0f Mois stock\u00e9s</div>'
    +'<div class="sec-sub">Plannings enregistr\u00e9s dans le navigateur</div></div>';
  // Jauge localStorage
  h+='<div style="background:#0a1a0c;border:1px solid #1e3020;border-radius:10px;padding:12px;margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:12px;font-weight:700;color:#c0cca8">Stockage navigateur</span>'
    +'<span style="font-size:12px;font-weight:700;color:'+pctCol+'">'+totalKB+' Ko / 5 120 Ko ('+pct+'%)</span>'
    +'</div>'
    +'<div style="height:6px;background:#0c180e;border-radius:3px;overflow:hidden">'
    +'<div style="height:100%;background:'+pctCol+';border-radius:3px;width:'+pct+'%;transition:width .3s"></div>'
    +'</div>'
    +(pct>80?'<div style="margin-top:6px;font-size:11px;color:#c04040">\u26a0\ufe0f Stockage presque plein — supprimez les anciens mois ou exportez une sauvegarde.</div>':"")+
  '</div>';
  if(!moisList.length){
    h+='<div style="padding:20px;text-align:center;color:#7aaa80;font-size:13px">Aucun planning import\u00e9</div>';
  } else {
    h+='<div style="display:flex;flex-direction:column;gap:8px">';
    moisList.forEach(function(m){
      var parts=m.key.split("-"),yr=parts[0],mo=parseInt(parts[1]);
      var nomMois=(MFR[mo]||"?")+' '+yr;
      var importeAt=m.ref&&m.ref.importedAt?new Date(m.ref.importedAt).toLocaleDateString("fr-FR"):"?";
      var isCurrent=(yr==A.year&&mo==A.month);
      var ovSize=m.hasOv?Object.keys(A.overrides[m.key]||{}).length:0;
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0a1a0c;border:1px solid '+(isCurrent?"#c9a227":"#1e3020")+';border-radius:9px">'
        +'<div style="flex:1">'
        +'<div style="font-size:14px;font-weight:700;color:'+(isCurrent?"#c9a227":"#c0cca8")+'">'+nomMois+(isCurrent?' <span style="font-size:11px;color:#c9a227">\u25c4 Actif</span>':"")+'</div>'
        +'<div style="font-size:11px;color:#7aaa80;margin-top:2px">Import\u00e9 le '+importeAt+(ovSize?' \u00b7 '+ovSize+' employ\u00e9s':"")+''+(m.ref&&m.ref.synthetic?' \u00b7 <i>synth\u00e9tique</i>':"")+'</div>'
        +'</div>'
        +(isCurrent?'<span style="font-size:11px;color:#c9a227;font-style:italic">Mois courant</span>'
          :'<button onclick="deleteMois(\''+m.key+'\')" style="background:rgba(192,64,64,.12);border:1px solid rgba(192,64,64,.3);border-radius:6px;padding:4px 10px;font-size:12px;color:#c04040;cursor:pointer;font-weight:700">\ud83d\uddd1 Supprimer</button>')
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="btn ghost" onclick="sv(\'admin\')" style="width:100%;justify-content:center;margin-top:14px">\u2190 Retour admin</button>';
  return h+'</div>';
}
function deleteMois(key){
  if(!A.user||A.user.id!==AID)return;
  var parts=key.split("-"),yr=parts[0],mo=parseInt(parts[1]);
  if(!confirm("Supprimer le planning "+(MFR[mo]||"?")+" "+yr+" ?\nCette action est irréversible."))return;
  delete A.overrides[key];ls("cmc_ov",A.overrides);
  localStorage.removeItem("cmc_ref_"+key);
  localStorage.removeItem("cmc_verif_"+key);
  toast("Planning "+(MFR[mo]||key)+" "+yr+" supprim\u00e9");dc();
}

function exportPlanningCSV(){
  var pl=gpl(),days=getDays(A.year,A.month);
  var rows=[];
  // En-tête : Nom, Équipe, Famille, Jour1..JourN, Total_Travail, Total_RH_R
  var header=["Nom","Equipe","Famille"];
  for(var d=1;d<=days;d++) header.push(String(d));
  header.push("Total_Trav","Total_Repos");
  rows.push(header.join(";"));
  // Trier : famille puis équipe puis nom
  var emps=A.employees.filter(function(emp){return isEmpActive(emp,A.year,A.month);});
  emps.sort(function(a,b){
    var fo=["bj","roulettes","cmc"];
    var fa=fo.indexOf(a.family||"bj"),fb=fo.indexOf(b.family||"bj");
    if(fa!==fb) return fa-fb;
    if(a.team!==b.team) return String(a.team).localeCompare(String(b.team));
    return a.name.localeCompare(b.name);
  });
  emps.forEach(function(emp){
    var row=[emp.name,emp.team,emp.family||""];
    var trav=0,repos=0;
    for(var d=1;d<=days;d++){
      var c=(pl[emp.id]||{})[d]||"";
      row.push(c);
      if(c==="RH"||c==="R") repos++;
      else if(c&&c!=="CP"&&c!=="M"&&c!=="AF"&&c!=="RRT") trav++;
    }
    row.push(trav,repos);
    rows.push(row.join(";"));
  });
  var bom="\uFEFF"; // BOM UTF-8 pour Excel
  var blob=new Blob([bom+rows.join("\n")],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="planning-"+(MFR[A.month]||"").toLowerCase()+"-"+A.year+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("CSV export\u00e9 \u2014 "+emps.length+" employ\u00e9s");
}

// Similarite entre deux chaines (pour detecter noms proches)
function _strSim(a,b){
  a=a.toUpperCase();b=b.toUpperCase();
  if(a===b)return 1;
  if(a.length<2||b.length<2)return 0;
  var bigrams={};
  for(var i=0;i<a.length-1;i++){var bg=a.slice(i,i+2);bigrams[bg]=(bigrams[bg]||0)+1;}
  var inter=0;
  for(var i=0;i<b.length-1;i++){var bg=b.slice(i,i+2);if(bigrams[bg]>0){inter++;bigrams[bg]--;}}
  return 2*inter/(a.length+b.length-2);
}

function runAudit(y,m){
  y=y||A.year;m=m||A.month;
  var key=y+"-"+m;
  var pl=(function(){var tmp=A.year,tm=A.month;A.year=y;A.month=m;var r=gpl();A.year=tmp;A.month=tm;return r;})();
  var ref=lg("cmc_ref_"+key,null);
  var importedIds=ref&&ref.rows?new Set(Object.keys(ref.rows)):new Set();
  // Noms importes depuis le PDF (pour suggestions de correspondance)
  var importedNames=[];
  if(ref&&ref.rows){
    importedIds.forEach(function(eid){
      var emp=A.employees.find(function(e){return e.id===eid;});
      if(emp)importedNames.push(emp.name);
    });
  }
  // Lignes de depart
  var allDepartureNames=new Set();
  Object.keys(CHEFS_T).forEach(function(tid){(CHEFS_T[tid]||[]).forEach(function(n){allDepartureNames.add(n);});});
  var defIds=new Set(DEF_EMP.map(function(e){return e.id;}));
  var results={absentDuPDF:[],sansHoraire:[],sansDeparture:[],ok:0,hasImport:importedIds.size>0};
  A.employees.filter(function(emp){return isEmpActive(emp,y,m)&&defIds.has(emp.id);}).forEach(function(emp){
    var plRow=pl[emp.id]||{};
    var hasDays=Object.keys(plRow).some(function(d){return !!plRow[d];});
    var codes=Object.values(plRow);
    var codesSummary=codes.slice(0,10).join(' ');
    // Absent du PDF
    if(importedIds.size>0&&!importedIds.has(emp.id)){
      // Chercher noms similaires dans la liste des importes
      var suggestions=[];
      if(ref&&ref.rows){
        var allImportedEmps=[];
        importedIds.forEach(function(eid){var e=A.employees.find(function(x){return x.id===eid;});if(e)allImportedEmps.push(e.name);});
        allImportedEmps.forEach(function(n){
          if(_strSim(emp.name,n)>0.55)suggestions.push(n);
        });
      }
      results.absentDuPDF.push({id:emp.id,name:emp.name,team:emp.team,
        hasDays:false,codesSummary:'',suggestions:suggestions}); // toujours vide sans import
    } else {
      // OK : présent dans l'import avec données, ou mois sans import (genBase théorique)
      results.ok++;
    }
    if(!allDepartureNames.has(emp.name)){
      results.sansDeparture.push({id:emp.id,name:emp.name,team:emp.team});
    }
  });
  return results;
}

function exportAuditReport(){
  var y=A.year,m=A.month;
  var audit=runAudit(y,m);
  var ref=lg("cmc_ref_"+y+"-"+m,null);
  var lines=[];
  var d=new Date();
  lines.push("=== RAPPORT DIAGNOSTIC CMCteams "+d.toLocaleDateString("fr-FR")+" "+d.toLocaleTimeString("fr-FR")+" ===");
  lines.push("Planning : "+(MFR[m]||"?")+" "+y);
  lines.push("");
  // Sections importees
  if(ref&&ref.rows){
    var _famCnt={bj:0,roulettes:0,cmc:0,autre:0};
    Object.keys(ref.rows).forEach(function(eid){
      var e=A.employees.find(function(x){return x.id===eid;});
      if(e)_famCnt[e.family||"autre"]=(_famCnt[e.family||"autre"]||0)+1;
    });
    lines.push("--- SECTIONS IMPORTEES ---");
    lines.push("  BJ        : "+_famCnt.bj+" employ\u00e9(s)");
    lines.push("  Roulettes : "+_famCnt.roulettes+" employ\u00e9(s)");
    lines.push("  CMC       : "+_famCnt.cmc+" employ\u00e9(s)");
    if(_famCnt.autre)lines.push("  Autre     : "+_famCnt.autre+" employ\u00e9(s)");
    lines.push("");
  }
  // Absents du PDF par equipe
  if(audit.absentDuPDF.length){
    lines.push("--- ABSENTS DU PDF ("+audit.absentDuPDF.length+") ---");
    var byTeam={};
    audit.absentDuPDF.forEach(function(e){
      (byTeam[e.team]=byTeam[e.team]||[]).push(e.name+(e.suggestions&&e.suggestions.length?" [similaires: "+e.suggestions.join(", ")+"]":""));
    });
    Object.keys(byTeam).sort().forEach(function(t){
      lines.push("  Equipe "+t+":");
      byTeam[t].forEach(function(n){lines.push("    - "+n);});
    });
    lines.push("");
  }
  var blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="audit-"+y+"-"+(m<10?"0"+m:m)+".txt";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function cleanImportedEmps(){
  var defIds=DEF_EMP.map(function(e){return e.id;});
  var before=A.employees.length;
  // Supprimer les employes non-DEF_EMP (importes depuis PDF ou CSV)
  A.employees=A.employees.filter(function(e){return defIds.indexOf(e.id)>=0;});
  var removed=before-A.employees.length;
  // Restaurer family/chef/team des employes DEF_EMP si modifies par un import errone
  var fixed=0;
  DEF_EMP.forEach(function(def){
    var e=A.employees.find(function(x){return x.id===def.id;});
    if(!e) return;
    ["family","chef","team","post"].forEach(function(f){
      if(def[f]!==undefined&&JSON.stringify(e[f])!==JSON.stringify(def[f])){e[f]=def[f];fixed++;}
    });
  });
  ls("cmc_e",A.employees);
  // Nettoyer aussi les overrides qui referencent ces IDs
  var changed=false;
  Object.keys(A.overrides).forEach(function(key){
    Object.keys(A.overrides[key]).forEach(function(eid){
      if(defIds.indexOf(eid)<0){delete A.overrides[key][eid];changed=true;}
    });
  });
  if(changed) ls("cmc_ov",A.overrides);
  var msg=(removed===0&&fixed===0)?"Aucun employe importe a supprimer":"\u2705 "+removed+" supprime(s)"+(fixed?" \u2014 "+fixed+" profil(s) restaure(s)":"");
  toast(msg);
  dc();
}

function updEmp(id,field,val){
  if(!A.user||A.user.id!==AID)return;
  var e=A.employees.find(function(x){return x.id===id;});
  if(!e)return;
  e[field]=val;
  sav();
  // Re-render inline sans fermer
  var c=document.getElementById("content");if(c)c.innerHTML=vMain();
}
function updEmpMo(id,field,val){
  if(!A.user||A.user.id!==AID)return;
  var e=A.employees.find(function(x){return x.id===id;});
  if(!e)return;
  e[field]=(val===""||val===null||val===undefined)?null:parseInt(val);
  sav();
  var c=document.getElementById("content");if(c)c.innerHTML=vMain();
}
function updCDP(id,enabled){
  if(!A.user||A.user.id!==AID)return;
  var e=A.employees.find(function(x){return x.id===id;});
  if(!e)return;
  // Activer ou d\u00e9sactiver les shifts CDP selon le profil de l'employ\u00e9
  var prof=EP[e.name];
  if(enabled){
    // CDP par d\u00e9faut selon le profil
    var cdpBase=["16/3","20/5"];
    e.cdpShifts=prof?prof.d.length?prof.d:cdpBase:cdpBase;
  } else {
    e.cdpShifts=[];
  }
  sav();
  var c=document.getElementById("content");if(c)c.innerHTML=vMain();
}

function _audit(action,eid,empName,oldVal,newVal){
  var al=lg("cmc_audit",[]);
  al.push({ts:Date.now(),adminId:A.user?A.user.id:AID,action:action,eid:eid,name:empName,old:oldVal,new:newVal});
  if(al.length>500)al=al.slice(-500);
  ls("cmc_audit",al);
}

function createEmpFromImport(name,family){
  if(!A.user||A.user.id!==AID)return;
  var exists=A.employees.find(function(e){return e.name===name;});
  if(exists){toast("Cet employ\u00e9 existe d\u00e9j\u00e0 : "+name,"err");return;}
  var tmpId="U_TMP_"+Date.now().toString(36).toUpperCase().slice(-6);
  var newEmp={id:tmpId,name:name,team:"1",post:"",chef:false,family:family||"bj",cdpShifts:[]};
  A.employees.push(newEmp);
  ls("cmc_e",A.employees);
  _audit("createEmpFromImport",tmpId,name,null,{name:name,family:family,id:tmpId});
  toast("\u2705 "+name+" ajout\u00e9 \u2014 matricule temporaire \u00e0 corriger dans la fiche");
  editEmpId=tmpId;
  sv("employees");
}

function markAsRetired(empId,toMo){
  if(!A.user||A.user.id!==AID)return;
  var emp=A.employees.find(function(e){return e.id===empId;});
  if(!emp)return;
  var old=emp.toMo;
  emp.toMo=toMo;
  sav();
  _audit("markAsRetired",empId,emp.name,old,toMo);
  toast(esc(emp.name)+" marqu\u00e9 parti \u00e0 partir de "+moToLabel(toMo));
  dc();
}

function adminSetReg(id,field,val){
  if(!A.user||A.user.id!==AID)return;
  if(!A.reg[id])A.reg[id]={createdAt:Date.now()};
  A.reg[id][field]=(val||"").trim();
  ls("cmc_reg",A.reg);
  toast("Identit\u00e9 mise \u00e0 jour");
  dc();
}

function adminResetAllPw(){
  if(!A.user||A.user.id!==AID)return;
  if(!confirm("\u26a0\ufe0f R\u00e9initialiser TOUS les mots de passe employ\u00e9s ?\n\nTous les employ\u00e9s (hors admin) devront recr\u00e9er leur mot de passe \u00e0 la prochaine connexion.\n\nContinuer ?"))return;
  var kept={};
  if(A.passwords[AID])kept[AID]=A.passwords[AID];
  A.passwords=kept;
  ls("cmc_pw",A.passwords);
  _audit("reset_all_pw",AID,"Tous les employ\u00e9s",null,"mots de passe r\u00e9initialis\u00e9s");
  toast("\u2705 Mots de passe employ\u00e9s r\u00e9initialis\u00e9s \u2014 ils devront se r\u00e9inscrire");
  dc();
}

function adminChangeEmpId(oldId, newId){
  if(!A.user||A.user.id!==AID)return;
  newId=newId.trim().toUpperCase();
  if(!newId||newId===oldId)return;
  if(!/^U\d{3,}$/.test(newId)){toast("\u26a0\ufe0f Format invalide \u2014 ex. U00071");return;}
  if(A.employees.find(function(e){return e.id===newId;})){toast("\u26a0\ufe0f Ce matricule est d\u00e9j\u00e0 utilis\u00e9");return;}
  // Mettre à jour l'employé
  var emp=A.employees.find(function(e){return e.id===oldId;});
  if(!emp){toast("\u26a0\ufe0f Employ\u00e9 introuvable");return;}
  emp.id=newId;
  ls("cmc_e",A.employees);
  // Migrer mots de passe
  if(A.passwords[oldId]){A.passwords[newId]=A.passwords[oldId];delete A.passwords[oldId];ls("cmc_pw",A.passwords);}
  // Migrer identité
  if(A.reg[oldId]){A.reg[newId]=A.reg[oldId];A.reg[newId].matricule=newId;delete A.reg[oldId];ls("cmc_reg",A.reg);}
  // Migrer overrides (planning)
  Object.keys(A.overrides).forEach(function(month){
    if(A.overrides[month]&&A.overrides[month][oldId]){
      A.overrides[month][newId]=A.overrides[month][oldId];
      delete A.overrides[month][oldId];
    }
  });
  ls("cmc_ov",A.overrides);
  // Si l'utilisateur connecté est cet employé, mettre à jour la session
  if(A.user&&A.user.id===oldId){A.user=emp;ls("cmc_uid",newId);}
  _audit("change_matricule",AID,emp.name,oldId,newId);
  toast("\u2705 Matricule mis \u00e0 jour : "+oldId+" \u2192 "+newId);
  editEmpId=newId;
  dc();
}

// \u2500\u2500 Parser planning CMC (items avec coordonn\u00e9es X,Y) \u2500\u2500\u2500\u2500\u2500
function parseCMCPlanningFromItems(allItems, year, month){
  var days=getDays(year,month);
  var validCodesArr=Object.keys(CODES);

  // \u2500\u2500 1. Grouper les items par ligne Y (tol\u00e9rance \u00b15px) \u2500\u2500
  var sorted=allItems.slice().sort(function(a,b){return a.y-b.y||a.x-b.x;});
  var rows=[];
  var curY=null;
  sorted.forEach(function(item){
    if(curY===null||Math.abs(item.y-curY)>5){
      rows.push([]);curY=item.y;
    }
    rows[rows.length-1].push(item);
  });

  // \u2500\u2500 2. Trouver la ligne des jours (1-31) \u2500\u2500
  var dayRow=null;
  rows.forEach(function(row){
    var nums=row.filter(function(i){var n=parseInt(i.txt);return !isNaN(n)&&n>=1&&n<=31&&i.txt===String(n);});
    if(nums.length>=20) dayRow=nums; // au moins 20 jours trouv\u00e9s sur une ligne
  });
  // Fallback: prendre la ligne avec le plus de chiffres 1-31
  if(!dayRow){
    var best=0;
    rows.forEach(function(row){
      var nums=row.filter(function(i){var n=parseInt(i.txt);return !isNaN(n)&&n>=1&&n<=31&&i.txt===String(n);});
      if(nums.length>best){best=nums.length;dayRow=nums;}
    });
  }
  if(!dayRow||dayRow.length<5) return buildDebugCSV(allItems,"Ligne jours non trouv\u00e9e");

  // Position X de chaque jour
  var dayPos={};
  dayRow.forEach(function(i){dayPos[parseInt(i.txt)]=i.x;});

  // Tol\u00e9rance X = moiti\u00e9 espacement entre jours cons\u00e9cutifs
  var dNums=Object.keys(dayPos).map(Number).sort(function(a,b){return a-b;});
  var xTol=15;
  if(dNums.length>=2){
    var gaps=[];
    for(var i=1;i<Math.min(dNums.length,8);i++){
      var g=dayPos[dNums[i]]-dayPos[dNums[i-1]];
      if(g>2&&g<80) gaps.push(g);
    }
    if(gaps.length) xTol=Math.round(gaps.reduce(function(a,b){return a+b;})/gaps.length*0.55);
  }

  function xToDay(x){
    var best=null,bestDist=xTol*1.8;
    dNums.forEach(function(d){
      var dist=Math.abs(dayPos[d]-x);
      if(dist<bestDist){bestDist=dist;best=d;}
    });
    return best;
  }

  // \u2500\u2500 3. Trouver les lignes d'employ\u00e9s \u2500\u2500
  // Chaque employ\u00e9 appara\u00eet comme NOM + PRENOM sur une ligne
  var empLines=[]; // {empName, y, rowIdx}
  rows.forEach(function(row,ri){
    var rawLineText=row.map(function(i){return i.txt;}).join(" ").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    // Detecter l'etoile rouge juste apres le nom (chef roulette) : ★ ⭐
    var lineHasStar=/[\u2605\u2606\u2b50]/.test(rawLineText);
    var lineText=rawLineText.replace(/[\u2605\u2606\u2b50]/g," ");
    A.employees.forEach(function(emp){
      var eName=emp.name.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      var parts=eName.split(" ");
      // Match si le NOM de famille appara\u00eet dans cette ligne
      var nomMatch=parts[0]&&lineText.includes(parts[0]);
      var prenomMatch=parts.length>1&&parts[1]&&lineText.includes(parts[1][0]);
      if(nomMatch&&(parts.length===1||prenomMatch)){
        var existing=empLines.find(function(e){return e.empName===emp.name&&Math.abs(e.y-(row[0]||{y:0}).y)<20;});
        if(!existing) empLines.push({empName:emp.name,y:(row[0]||{y:0}).y,rowIdx:ri});
        // Etoile sur la ligne = chef roulette
        if(lineHasStar&&(emp.family!=="roulettes"||!emp.chef)){
          emp.family="roulettes";emp.chef=true;ls("cmc_e",A.employees);
        }
      }
    });
  });

  if(empLines.length===0) return buildDebugCSV(allItems,"Aucun employ\u00e9 trouv\u00e9. Noms dans le PDF: "+allItems.slice(0,20).map(function(i){return i.txt;}).join(","));

  // \u2500\u2500 4. D\u00e9tecter le s\u00e9parateur (trait noir = grand \u00e9cart vertical entre groupes d'employ\u00e9s) \u2500\u2500
  var empYsSorted=empLines.map(function(e){return e.y;}).sort(function(a,b){return a-b;});
  // Detecter TOUS les separateurs significatifs (traits rouges/noirs entre equipes et equipes miroirs)
  var separators=[];
  if(empYsSorted.length>2){
    var avgGap=(empYsSorted[empYsSorted.length-1]-empYsSorted[0])/(empYsSorted.length-1);
    for(var gi=1;gi<empYsSorted.length;gi++){
      var gap=empYsSorted[gi]-empYsSorted[gi-1];
      if(gap>avgGap*1.8) separators.push((empYsSorted[gi]+empYsSorted[gi-1])/2);
    }
  }
  // Retourne le numero de segment pour une position Y
  function getSegment(y){
    var seg=0;
    for(var si=0;si<separators.length;si++){if(y>separators[si])seg=si+1;}
    return seg;
  }

  // Planning vide par employe
  var planning={};
  empLines.forEach(function(e){if(!planning[e.empName])planning[e.empName]={};});

  // Index CDP : items contenant "CDP" ou "*" pour les rep\u00e9rer par position
  var cdpItems=[];
  allItems.forEach(function(item){
    var t=item.txt.trim().toUpperCase();
    if(t==="CDP"||t==="*"||t==="C.D.P") cdpItems.push({x:item.x,y:item.y});
  });

  allItems.forEach(function(item){
    var raw=item.txt.trim().toUpperCase().replace(/['']/g,"'");
    // Normaliser tiret\u2192slash pour codes horaires : "16-3"\u2192"16/3"
    var code=raw.replace(/^(\d{1,2})-(\d{1,2})(\*?)$/,'$1/$2$3');
    code=code.replace(/\s*\/\s*/,'/');
    code=code.replace(/CDP$/,'*');
    if(CDP_MAP[code]){
      var hasCdpNear=false;
      cdpItems.forEach(function(ci){if(Math.abs(ci.x-item.x)<20&&Math.abs(ci.y-item.y)<12)hasCdpNear=true;});
      if(hasCdpNear) code=CDP_MAP[code];
    }
    if(validCodesArr.indexOf(code)<0) return;

    var day=xToDay(item.x);
    if(!day||day<1||day>days) return;

    // Trouver l'employ\u00e9 le plus proche — DANS LE M\u00caMME GROUPE (m\u00eame c\u00f4t\u00e9 du trait noir)
    var bestEmp=null,bestDist=30;
    empLines.forEach(function(el){
      // Rester dans le meme segment (entre deux separateurs)
      if(getSegment(item.y)!==getSegment(el.y)) return;
      var d=Math.abs(el.y-item.y);
      if(d<bestDist){bestDist=d;bestEmp=el.empName;}
    });
    if(bestEmp){
      var empObj=A.employees.find(function(e){return e.name===bestEmp;});
      // Auto-upgrade CDP selon profil employe
      if(empObj&&!code.endsWith("*")&&CDP_MAP[code]&&empObj.cdpShifts&&empObj.cdpShifts.indexOf(code)>=0){
        code=CDP_MAP[code];
      }
      planning[bestEmp][day]=code;
    }
  });

  // \u2500\u2500 5. Construire CSV \u2500\u2500
  var found=Object.keys(planning).filter(function(n){return Object.keys(planning[n]).length>0;});
  if(!found.length) return buildDebugCSV(allItems,"Codes trouv\u00e9s mais pas associ\u00e9s. DayPos: "+JSON.stringify(dayPos).slice(0,100));

  var daysArr=(function(n){var a=[];for(var i=0;i<n;i++)a.push(i+1);return a;})(days);
  var header="NOM,"+daysArr.join(",");
  var csvLines=[header];
  found.forEach(function(name){
    var row=[name];
    for(var di=1;di<=days;di++){row.push(planning[name][di]||"");}
    csvLines.push(row.join(","));
  });
  return csvLines.join("\n");
}


function buildDebugCSV(items,reason){
  var lines=["# DEBUG: "+reason];
  // Afficher les 40 premiers items distincts
  var seen={};
  items.slice(0,200).forEach(function(i){if(!seen[i.txt]&&i.txt.length<20){seen[i.txt]=true;lines.push("x="+i.x+",y="+i.y+",txt="+i.txt);}});
  return lines.join("\n");
}



// === Extraction PDF structurée via PDF.js ===
function _extractPdfLines(file,onDone,onErr){
  if(typeof pdfjsLib==="undefined"){onErr("PDF.js non disponible — rechargez la page");return;}
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  var rd=new FileReader();
  rd.onload=function(ev){
    var arr=new Uint8Array(ev.target.result);
    pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
      var allLines=[],pg=1;
      function nextPage(){
        if(pg>pdf.numPages){onDone(allLines.join("\n"));return;}
        pdf.getPage(pg).then(function(page){
          page.getTextContent().then(function(tc){
            var TOL=3,rowMap={};
            tc.items.forEach(function(it){
              var y=Math.round(it.transform[5]/TOL)*TOL;
              var x=it.transform[4];
              var t=(it.str||"").replace(/\s+/g," ").trim();
              if(!t)return;
              if(!rowMap[y])rowMap[y]=[];
              rowMap[y].push({x:x,t:t});
            });
            var ys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
            ys.forEach(function(y){
              var items=rowMap[y].slice().sort(function(a,b){return a.x-b.x;});
              var line=items.map(function(i){return i.t;}).join("\t");
              if(line.trim())allLines.push(line);
            });
            pg++;nextPage();
          });
        });
      }
      nextPage();
    }).catch(function(e){onErr("Erreur PDF: "+e.message);});
  };
  rd.onerror=function(){onErr("Erreur lecture fichier");};
  rd.readAsArrayBuffer(file);
}

function _detectMonthFromFilename(fn){
  var s=fn.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var MOIS={"janvier":0,"fevrier":1,"mars":2,"avril":3,"mai":4,"juin":5,"juillet":6,"aout":7,"septembre":8,"octobre":9,"novembre":10,"decembre":11};
  var m=-1,y=-1;
  Object.keys(MOIS).forEach(function(k){if(s.indexOf(k)>=0)m=MOIS[k];});
  var ym=s.match(/20(2[0-9]|3[0-9])/);if(ym)y=parseInt(ym[0]);
  return {m:m,y:y};
}

function handleFileImport(input){
  if(!input.files||!input.files[0])return;

      return;
    }
    if(info)info.innerHTML='<span style="color:#c9a227">\u23f3 Conversion PDF en cours\u2026</span>';
    _extractPdfLines(file,function(text){
      var ta=document.getElementById("impTxt");

      var n=text.split("\n").filter(function(l){return l.trim();}).length;

        try{doImport();}catch(e){
          var r=document.getElementById("impRes");
          if(r)r.innerHTML+='<div style="color:#c04040;padding:10px"><b>Erreur:</b> '+esc(e.message)+'</div>';
        }
      },200);
    },function(err){
      if(info)info.innerHTML='<span style="color:#c04040">\u274c '+esc(err)+'</span>';
    });
    return;
  }
  var r=new FileReader();
  r.onload=function(e){
    var txt=e.target.result;
    if(txt.charCodeAt(0)===0xFEFF)txt=txt.slice(1);
    if(txt.slice(0,5)==="%PDF-"){
      if(info)info.innerHTML='<span style="color:#c04040">\u274c Lisez la notice : d\u00e9posez le fichier PDF directement</span>';
      return;
    }
    var ta=document.getElementById("impTxt");
    if(ta)ta.value=txt;
    var n=txt.split("\n").filter(function(l){return l.trim();}).length;
    if(info)info.innerHTML='<span style="color:#3a8a50">\u2705 '+esc(file.name)+' \u2014 '+n+' lignes</span>';
    setTimeout(function(){
      try{doImport();}catch(e){
        var r2=document.getElementById("impRes");
        if(r2)r2.innerHTML+='<div style="color:#c04040;padding:10px"><b>Erreur:</b> '+esc(e.message)+'</div>';
      }
    },100);
  };
  r.onerror=function(){if(info)info.innerHTML='<span style="color:#c04040">\u274c Erreur lecture</span>';};
  r.readAsText(file,"UTF-8");
}

function doImport(){
  if(!A.user||A.user.id!==AID)return;
  try{
  var txt=(document.getElementById("impTxt")||{}).value||"";
  var iy=parseInt((document.getElementById("impY")||{}).value||A.year);
  var im=parseInt((document.getElementById("impM")||{}).value||A.month);
  if(!txt){toast("Aucun contenu","err");return;}
  // Detecter mois/annee depuis le texte colle (pas juste le nom de fichier)
  (function(){
    var MOIS={"janvier":0,"fevrier":1,"mars":2,"avril":3,"mai":4,"juin":5,"juillet":6,"aout":7,"septembre":8,"octobre":9,"novembre":10,"decembre":11};
    var s=txt.slice(0,800).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    var detM=-1,detY=-1;
    // Regex avec word-boundary : "mai" ne doit pas matcher dans "mais"
    var _mRe=new RegExp('\\b('+Object.keys(MOIS).join('|')+')\\b');
    var _mMatch=s.match(_mRe);
    if(_mMatch)detM=MOIS[_mMatch[1]];
    var ym=s.match(/20(2[0-9]|3[0-9])/);
    if(ym) detY=parseInt(ym[0]);
    if(detM>=0){var sm=document.getElementById("impM");if(sm){sm.value=String(detM);im=detM;}}
    if(detY>0){var sy=document.getElementById("impY");if(sy){sy.value=String(detY);iy=detY;}}
  })();
  var lines=txt.split("\n").map(function(l){return l.trim();}).filter(Boolean);
  if(lines.length<2){toast("Format invalide","err");return;}
  // Preprocessing : fusionner les lignes de continuation (commencent par un code shift valide)
  (function(){
    function _isCodeTok(t){
      t=(t||"").toUpperCase().replace(/[C"']+$/,"");
      t=t.replace(/^(\d{1,2})-(\d{1,2})/,"$1/$2");
      if(!t)return false;
      return !!(CODES[t]||CODES[t.replace(/"'/g,"'")]);
    }
    for(var _cl=lines.length-1;_cl>1;_cl--){
      var _t0=(lines[_cl].trim().split(/\s+/)[0]||"").toUpperCase();
      // Continuation : pas chiffre, pas étoile, pas code poste (+), pas nom long
      if(_t0&&!(/^\d/.test(_t0))&&_t0!=="*"&&!/[+]/.test(_t0)&&!/^\.[A-Z]{2}/.test(_t0)&&_isCodeTok(_t0)){
        lines[_cl-1]+=" "+lines[_cl];
        lines.splice(_cl,1);
      }
    }
  })();
  var hasTabs=lines.some(function(l){return l.indexOf("\t")>=0;});
  var sep=hasTabs?"\t":",";
  var key=""+iy+"-"+im;
  var days=getDays(iy,im);
  // Table rase : le PDF est la seule référence, pas de pré-remplissage genBase
  A.year=iy;A.month=im; // necessaire pour isEmpActive
  A.overrides[key]={};
  // Stocker la r\u00e9f\u00e9rence brute pour v\u00e9rification ult\u00e9rieure
  var refData={year:iy,month:im,rows:{},importedAt:Date.now()};
  var ok=0,err=0,errLines=[],_fuzzyMatches=[]; // _fuzzyMatches = correspondances incertaines (bigram)
  var _csvParsed=false;
  var importFamily="bj"; // famille courante par defaut
  // Equipe de la section courante : permet de departager les equipes miroir (1↔4, 2↔5)
  var _contextTeam=null;
  // Detecter la section depuis les premieres lignes (dont lines[0] qui est skippe dans la boucle)
  for(var _si=0;_si<Math.min(5,lines.length);_si++){
    var _sp=lines[_si].split(sep);
    var _sh=_sp.slice(0,4).map(function(x){return x.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}).join(" ");
    if(/ROULETT/.test(_sh)&&_sp.filter(function(x){return x.trim();}).length<=4){importFamily="roulettes";break;}
    if(/(BLACKJACK|BLACK.JACK|CHEF.*JACK|JEUX.*AM|CHEF.*AM|CARTES.AM|AMERICAN|AMERIC|RESPONSABLE.DE.TABLE|AMENAGEMENT|AMENAG)/.test(_sh)){importFamily="bj";break;}
    if(/(CARTES.CMC|EMPLOYE.*CMC|CROUPIER.*CMC)/.test(_sh)){importFamily="cmc";break;}
  }
  var _postPat=/^\.?[A-Z][A-Z0-9+.\/\-]*\.?$/; // pattern code poste ex: BRTP+E. ou .BRTCP+K
  function _norm(s){return (s||"").trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
  // Distinguer code poste (BRTP+E., BRE, BRTPE) d'un nom de famille (GALLIS, COSTE, ENZA, BASILE)
  function _isRoleCode(t){
    var _tn=_norm(t);
    if(/[+\.]/.test(t))return true;               // contient + ou . → code poste (BRTP+E., BTP+K…)
    if(!_postPat.test(_tn))return false;
    if(/^B[A-Z]{0,2}$/.test(_tn))return true;     // B, BT, BTE, BRE (≤3 lettres commençant par B)
    if(/^BRT[A-Z]{0,2}$/.test(_tn))return true;   // BRTP, BRTPE, BRTCK, BRTCP
    return false;                                   // GALLIS, COSTE, ENZA, BASILE… → nom de famille
  }
  function _isInitTok(t){return /^[A-Z]{1,2}$/.test(_norm(t));}
  function _isSurnameTok(t){var _tn=_norm(t);return _postPat.test(_tn)&&!_isRoleCode(t)&&_tn.replace(/[^A-Z]/g,"").length>=3;}
  // Pré-découpage lignes à 2+ employés (3 patterns)
  (function splitTwoEmpLines(){
    var _dpat=/^\d{1,2}$/;
    for(var _li=lines.length-1;_li>=1;_li--){
      var _tk=lines[_li].trim().split(/\s+/);
      if(_tk.length<6)continue;
      // Trouver la première paire digit-digit (from/to de emp1)
      var _fd1=-1;
      for(var _ti=1;_ti<Math.min(10,_tk.length-1);_ti++){
        if(_dpat.test(_tk[_ti])&&_dpat.test(_tk[_ti+1])){_fd1=_ti;break;}
      }
      if(_fd1<1)continue;
      // === Pattern C : NAME1 INIT1 NAME2 INIT2 fd1 td1 codes1 fd2 td2 codes2 ===
      {
        var _rcC=0;
        while(_rcC<_fd1-1&&_isRoleCode(_tk[_rcC]))_rcC++;
        var _preC=_tk.slice(_rcC,_fd1);
        if(_preC.length===4&&_isSurnameTok(_preC[0])&&_isInitTok(_preC[1])&&_isSurnameTok(_preC[2])&&_isInitTok(_preC[3])){
          var _cStC=_fd1+2,_fd2C=-1;
          for(var _tiC=_cStC;_tiC<_tk.length-1;_tiC++){
            if(_dpat.test(_tk[_tiC])&&_dpat.test(_tk[_tiC+1])&&parseInt(_tk[_tiC])>=1&&parseInt(_tk[_tiC])<=31){_fd2C=_tiC;break;}
          }
          if(_fd2C>=0){
            var _c1C=_tk.slice(_cStC,_fd2C).join(" ");
            var _c2StC=_fd2C+2,_c2EnC=_tk.length;
            for(var _tiC2=_c2StC;_tiC2<_tk.length;_tiC2++){if(_isRoleCode(_tk[_tiC2])){_c2EnC=_tiC2;break;}}
            var _c2C=_tk.slice(_c2StC,_c2EnC).join(" ");
            var _pfxC=_rcC>0?_tk.slice(0,_rcC).join(" ")+" ":"";
            lines[_li]=_pfxC+_preC[0]+" "+_preC[1]+" "+_tk[_fd1]+" "+_tk[_fd1+1]+(_c1C?" "+_c1C:"");
            lines.splice(_li+1,0,_preC[2]+" "+_preC[3]+" "+_tk[_fd2C]+" "+_tk[_fd2C+1]+(_c2C?" "+_c2C:""));
            if(_c2EnC<_tk.length)lines.splice(_li+2,0,_tk.slice(_c2EnC).join(" "));
            continue;
          }
        }
      }
      // === Pattern A : [ROLE(s)] NAME1 fd1 td1 ROLE(s) NAME2 fd2 td2 codes ===
      // Emp2 démarre avec un code poste immédiatement après from/to de emp1
      {
        var _p2A=_fd1+2;

function exportImportReport(){
  var verif=A.lastVerif,errLines=A.lastImportErrLines||[];
  if(!verif){toast("Aucun rapport disponible","err");return;}
  var lines=[];
  var d=new Date();
  lines.push("=== RAPPORT D'IMPORT CMCteams \u2014 "+d.toLocaleDateString("fr-FR")+" "+d.toLocaleTimeString("fr-FR")+" ===");
  lines.push("Planning : "+(MFR[verif.month]||"?")+" "+verif.year);
  lines.push("Statut   : "+(verif.errors.length?"\u26a0\ufe0f "+verif.errors.length+" erreur(s)":"\u2705 OK"));
  lines.push("Couverture : "+((verif.summary&&verif.summary.coverage)||0)+"%");
  lines.push("");
  if(errLines.length){
    var notFound=errLines.filter(function(l){return l.indexOf("INTROUVABLE")>=0;});
    if(notFound.length){
      lines.push("--- NOMS NON RECONNUS ("+notFound.length+") ---");
      notFound.forEach(function(l){lines.push("  "+l);});
      lines.push("");
    }
  }
  if(verif.errors&&verif.errors.length){
    lines.push("--- ERREURS DE V\u00c9RIFICATION ("+verif.errors.length+") ---");
    verif.errors.forEach(function(e){lines.push("  "+e.msg);});
    lines.push("");
  }
  // Résumé par famille de section importée
  var _refKey=(verif.year||A.year)+"-"+(verif.month||A.month);
  var _ref2=lg("cmc_ref_"+_refKey,null);
  if(_ref2&&_ref2.rows){
    var _famCnt={bj:0,roulettes:0,cmc:0,autre:0};
    Object.keys(_ref2.rows).forEach(function(eid){
      var _em=A.employees.find(function(e){return e.id===eid;});
      if(_em)_famCnt[_em.family||"autre"]=(_famCnt[_em.family||"autre"]||0)+1;
    });
    lines.push("--- SECTIONS IMPORTEES ---");
    lines.push("  BJ        : "+_famCnt.bj+" employ\u00e9(s)");
    lines.push("  Roulettes : "+_famCnt.roulettes+" employ\u00e9(s)");
    lines.push("  CMC       : "+_famCnt.cmc+" employ\u00e9(s)");
    if(_famCnt.autre)lines.push("  Autre     : "+_famCnt.autre+" employ\u00e9(s)");
    lines.push("  NOMS NON RECONNUS (dans le texte PDF mais absents du DB) : "+(notFound.length||0));
    lines.push("");
  }
  if(verif.absentDuPDF&&verif.absentDuPDF.length){
    lines.push("--- ABSENTS DU PDF ("+verif.absentDuPDF.length+") ---");
    lines.push("  (employ\u00e9s dans la DB mais non trouv\u00e9s dans le texte PDF coll\u00e9)");
    verif.absentDuPDF.forEach(function(e){lines.push("  "+e.name+" (\u00c9q."+e.team+")");});
    lines.push("");
  }
  if(verif.sansHoraire&&verif.sansHoraire.length){
    lines.push("--- SANS HORAIRE ("+verif.sansHoraire.length+") ---");
    verif.sansHoraire.forEach(function(e){lines.push("  "+e.name);});
    lines.push("");
  }
  var blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="rapport-import-"+(MFR[verif.month]||"").toLowerCase()+"-"+verif.year+".txt";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// \u2500\u2500 MOTEUR DE V\u00c9RIFICATION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function runVerification(year,month,refData){
  var pl=gpl(); // planning tel qu'affich\u00e9 dans l'app
  var ref=refData||lg("cmc_ref_"+year+"-"+month,null);
  var result={year:year,month:month,errors:[],warnings:[],ok:[],
    absentDuPDF:[],sansHoraire:[],sansDeparture:[],checkedAt:Date.now()};
  if(!ref||!ref.rows){result.warnings.push({msg:"Aucune r\u00e9f\u00e9rence d'import pour ce mois"});return result;}
  var days=getDays(year,month);
  var importedIds=new Set(Object.keys(ref.rows));
  // --- 1. V\u00e9rifier la correspondance planning \u2194 r\u00e9f\u00e9rence PDF ---
  importedIds.forEach(function(empId){
    var emp=A.employees.find(function(e){return e.id===empId;});
    if(!emp){result.warnings.push({msg:"Employ\u00e9 "+empId+" introuvable dans la liste"});return;}
    var refRow=ref.rows[empId];
    var plRow=pl[empId]||{};
    Object.keys(refRow).forEach(function(d){
      var refCode=refRow[d];
      var plCode=plRow[parseInt(d)]||"";
      if(refCode!==plCode){
        result.errors.push({
          empId:empId,empName:emp.name,day:parseInt(d),
          refCode:refCode,plCode:plCode,
          msg:emp.name+" j"+d+": planning=\""+(plCode||"vide")+"\" \u2260 r\u00e9f\u00e9rence=\""+refCode+"\""
        });
      } else {
        result.ok.push({empId:empId,day:d,code:refCode});
      }
    });
  });
  // --- 2. V\u00e9rifier que tous les employ\u00e9s actifs DEF_EMP ont horaire + ligne d\u00e9part ---
  var allDepartureNames=new Set();
  Object.keys(CHEFS_T).forEach(function(tid){(CHEFS_T[tid]||[]).forEach(function(n){allDepartureNames.add(n);});});
  var defIds=new Set(DEF_EMP.map(function(e){return e.id;}));
  A.employees.filter(function(emp){return isEmpActive(emp,year,month)&&defIds.has(emp.id);}).forEach(function(emp){
    var isAbsent=!importedIds.has(emp.id);
    if(isAbsent) result.absentDuPDF.push({id:emp.id,name:emp.name,team:emp.team});
    var plRow=pl[emp.id]||{};
    var hasDays=Object.keys(plRow).some(function(d){return !!plRow[d];});
    // sansHoraire : uniquement les employés présents dans le PDF mais sans aucun code valide
    if(!isAbsent&&!hasDays) result.sansHoraire.push({id:emp.id,name:emp.name,team:emp.team});
    if(!allDepartureNames.has(emp.name)) result.sansDeparture.push({id:emp.id,name:emp.name,team:emp.team});
  });
  result.summary={
    total:result.ok.length+result.errors.length,
    correct:result.ok.length,
    errors:result.errors.length,
    absentDuPDF:result.absentDuPDF.length,
    sansHoraire:result.sansHoraire.length,
    sansDeparture:result.sansDeparture.length,
    coverage:Math.round(result.ok.length/(result.ok.length+result.errors.length+.001)*100)
  };
  return result;
}

function verifyCurrentMonth(){
  var key=A.year+"-"+A.month;
  var ref=lg("cmc_ref_"+key,null);
  if(!ref){return null;}
  var v=runVerification(A.year,A.month,ref);
  A.lastVerif=v;
  ls("cmc_verif_"+key,v);
  return v;
}

  if(!A.user||A.user.id!==AID)return;
  A.pt={eid:eid,day:day};
  var pl=gpl(),cur=(pl[eid]||{})[day]||"";
  var pk=document.getElementById("pk");
  pk.innerHTML=CK.map(function(c){
    var ci=CODES[c];
    return `<div class="pb${c===cur?" cur":""}" style="color:${ci.c};border-color:${c===cur?"#c9a227":ci.b}" onclick="pc('${c}')">${c}</div>`;
  }).join("")+`<div class="pclr" onclick="pc('')">\u2715 Effacer</div>`;
  var rect=el.getBoundingClientRect();
  var left=rect.left+rect.width/2-84,top=rect.bottom+5;
  if(left<4)left=4;if(left+168>window.innerWidth-4)left=window.innerWidth-172;
  if(top+230>window.innerHeight-75)top=rect.top-235;
  pk.style.cssText=`display:flex;left:${left}px;top:${top}px`;
  document.getElementById("ov").style.display="block";
}

function addEmp(){
  if(!A.user||A.user.id!==AID)return;
  var id=(document.getElementById("nid")||{}).value||"";
  var name=(document.getElementById("nname")||{}).value||"";
  var team=(document.getElementById("nteam")||{}).value||"1";
  var post=(document.getElementById("npost")||{}).value||"";
  var chef=document.getElementById("nchef")?document.getElementById("nchef").checked:false;

  sav();toast("Employ\u00e9 ajout\u00e9 !");showAddF=false;dc();
}

function buildIASystemPrompt(){
  var today=new Date();
  var s="Tu es l'assistant IA de CMC Teams, l'application de planning du Casino de Monte-Carlo.\n";
  s+="Date : "+today.toLocaleDateString("fr-FR")+". Mois affiché : "+MFR[A.month]+" "+A.year+".\n\n";
  s+="EFFECTIF ("+A.employees.length+" employés) :\n";
  ["bj","roulettes","cmc"].forEach(function(fid){
    var emps=A.employees.filter(function(e){return (e.family||"bj")===fid;});
    if(!emps.length)return;
    s+="\n"+getFamLabel(fid)+" ("+emps.length+") :\n";
    // Group by team
    var byT={};emps.forEach(function(e){if(!byT[e.team])byT[e.team]=[];byT[e.team].push(e.name+(e.chef?"★":""));});
    Object.keys(byT).forEach(function(tid){
      var t=gt(tid);s+="  "+(t?t.name:"Éq."+tid)+" : "+byT[tid].join(", ")+"\n";
    });
  });
  s+="\nCODES : 22/6=nuit, 19/4=soirée, 16/3=ap-midi-nuit, 14/19=journée, 20/5=soirée-nuit, 16/22=ap-midi, RH=repos hebdo, R=repos, CP=congé, M=maladie, AF=formation.\n";
  var pl=gpl();var tYear=today.getFullYear(),tMo=today.getMonth(),tDay=today.getDate();
  if(tYear===A.year&&tMo===A.month){
    var wk=A.employees.filter(function(e){return isWork((pl[e.id]||{})[tDay]||"");});
    var ab=A.employees.filter(function(e){var c=(pl[e.id]||{})[tDay]||"";return c==="RH"||c==="R"||c==="CP"||c==="M";});
    if(wk.length||ab.length)s+="\nAUJOURD'HUI ("+tDay+" "+MFR[A.month]+") : "+wk.length+" en service, "+ab.length+" en repos/congé.\n";
    if(wk.length){s+="En service : "+wk.map(function(e){var c=(pl[e.id]||{})[tDay]||"";return e.name+"("+c+")";}).join(", ")+"\n";}
  }
  s+="\nRéponds en français, sois concis et précis. Tu peux répondre à toute question sur les plannings, équipes, horaires, absences.";
  return s;
}

function callClaudeIA(q){
  if(!iaApiKey||!iaEnabled)return;
  var msgs=[];
  iaHistory.filter(function(m){return m.role!=="loading";}).slice(-14).forEach(function(m){
    if(m.role==="user")msgs.push({role:"user",content:m.text});
    else if(m.role==="bot")msgs.push({role:"assistant",content:(m.html||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().slice(0,400)});
  });
  if(!msgs.length||msgs[msgs.length-1].role!=="user")msgs.push({role:"user",content:q});

  function _updateLoading(html){
    if(iaHistory.length&&iaHistory[iaHistory.length-1].role==="loading")
      iaHistory[iaHistory.length-1].html=html;
    dc();setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},40);
  }
  function _finalize(txt,isErr){
    if(iaHistory.length&&iaHistory[iaHistory.length-1].role==="loading")iaHistory.pop();
    var html=isErr
      ?"<span style='color:#f08080'>"+esc(txt)+"</span>"
      :esc(txt).replace(/\n/g,"<br>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>");
    iaHistory.push({role:"bot",html:html});
    dc();setTimeout(function(){var m=document.getElementById("iaMsgs");if(m)m.scrollTop=m.scrollHeight;},60);
  }

  function _doFetch(messages,depth){
    if(depth>4){_finalize("Trop d'étapes de recherche. Réessayez.",true);return;}
    var body={model:"claude-haiku-4-5-20251001",max_tokens:1024,system:buildIASystemPrompt(),messages:messages};
    if(iaWebSearch)body.tools=[{type:"web_search_20250305",name:"web_search",max_uses:3}];
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":iaApiKey,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body)
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){_finalize("Erreur API : "+(data.error.message||"inconnu").slice(0,120),true);return;}
      if(data.stop_reason==="tool_use"){
        _updateLoading("<span style='color:#4a9aff;font-style:italic'>🔍 Recherche internet en cours…</span>");
        var toolResults=(data.content||[]).filter(function(b){return b.type==="tool_use";}).map(function(b){return{type:"tool_result",tool_use_id:b.id,content:""};});
        _doFetch(messages.concat([{role:"assistant",content:data.content},{role:"user",content:toolResults}]),depth+1);
      } else {
        var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n")||"Pas de réponse.";
        _finalize(txt,false);
      }
    })
    .catch(function(err){
      _finalize("Erreur réseau : "+(err.message||"connexion impossible").slice(0,80)+"\nVérifiez votre clé API et connexion.",true);
    });
  }
  _doFetch(msgs,0);
}
