/* ============================================================================
 *  Apex Chat — Application script v1.0.0
 *  Architecture : PWA monofichier vanilla JS (pas de framework)

 *    K (state global)
 *    Persistence (localStorage + IndexedDB + Firebase)
 *    Auth Firebase Phone + comptes pré-configurés
 *    UI Light user + Admin Kevin avec toggles
 *    IA Apex (failover provider, cache LRU)
 *    Push notifications (Web Push)
 *    Sentinelles + self-healing pipeline → ax_telemetry_in Apex
 *    Helpers (logging, telemetry, audit, escalade)
 * ========================================================================== */

'use strict';

// ============================================================================
//  Configuration globale
// ============================================================================
const API_BASE = 'https://apex-chat-api.workers.dev';
const PUSH_BASE = 'https://apex-push-worker.desarzens-kevin.workers.dev';
const FIREBASE_URL = 'https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app';
const VAPID_PUBLIC = 'BJ5XN-ZzchRPPDVO4aEkFkhUOQC8E0tScaTKFXFBDq3o8MATBdRW879hSTLCTfH5mo3S_i5JOf1E4pTDALETBsY';

const ADMIN_KEVIN_ALIASES = [
  'kevin','kevin desarzens','desarzens kevin','desarzens',
  'kevin.desarzens','kevind@monaco.mc','kdmc','k desarzens'
];

const PRECONFIGURED_USERS = {
  'kdmc_admin': {pseudo:'kevin', real_name:'Kevin DESARZENS', email:'kevind@monaco.mc', role:'admin', premium:true},
  'user_laurence': {pseudo:'laurence', real_name:'Laurence SAINT-POLIT', role:'family', premium:true},
  'user_tardieu_sandrine': {pseudo:'sandrine', real_name:'Sandrine TARDIEU', role:'client', premium:false},
  'user_tardieu_christophe': {pseudo:'christophe', real_name:'Christophe TARDIEU', role:'client', premium:false}

// ============================================================================
//  K — État global
// ============================================================================
window.K = {
  user: null,
  view: 'splash',
  conversations: [],
  messages: {},          // {convId: [...messages]}
  contacts: [],
  unread: {},
  online: new Set(),
  token: null,

// ============================================================================
//  Helpers — utility

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function normalizeName(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[\s\-_.@]+/g,' ').trim();
}

function isKevinAdmin(name){
  if(!name) return false;
  const n = normalizeName(name);
  if(ADMIN_KEVIN_ALIASES.includes(n)) return true;
  const tokens = n.split(/\s+/).filter(Boolean);
  for(const alias of ADMIN_KEVIN_ALIASES){
    const aTokens = normalizeName(alias).split(/\s+/);
    if(tokens.length >= 1 && tokens.every(t => aTokens.includes(t) && t.length >= 4)) return true;
  }
  return false;
}

function formatTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  if(d.toDateString() === today.toDateString()){
    return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  if(d.toDateString() === yesterday.toDateString()) return 'Hier';
  if(today - d < 7 * 86400000) return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()];
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}

// ============================================================================
//  Persistence — Triple (localStorage + IndexedDB + serveur)
// ============================================================================
const PERSIST_PREFIX = 'apex_chat_';

function lg(key, fallback){
  try{
    const v = localStorage.getItem(PERSIST_PREFIX + key);
    return v !== null ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}

function ls(key, value){
  try{
    localStorage.setItem(PERSIST_PREFIX + key, JSON.stringify(value));
    // Shadow IndexedDB best-effort
    idbSet(key, value).catch(()=>{});
  }catch(e){
    // Quota exceeded — cleanup auto
    _safeCatch('localStorage', e);
    _cleanupStorage();
  }
}

// IndexedDB shadow store
let _idb = null;
async function idbOpen(){
  if(_idb) return _idb;
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('apex_chat_idb', 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { _idb = req.result; resolve(_idb); };
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    };
  });
}

async function idbSet(key, value){
  try{
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(['kv'], 'readwrite');
      tx.objectStore('kv').put(value, key);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }catch(e){ _safeCatch('idbSet', e); }
}

async function idbGet(key){
  try{
    const db = await idbOpen();
    return new Promise((resolve) => {
      const tx = db.transaction(['kv'], 'readonly');
      const req = tx.objectStore('kv').get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  }catch(e){ return null; }
}

function _cleanupStorage(){
  // Garde whitelist + supprime entries volumineuses
  try{
    const keep = ['user','token','config','contacts'];
    const all = Object.keys(localStorage).filter(k => k.startsWith(PERSIST_PREFIX));
    for(const k of all){
      const short = k.replace(PERSIST_PREFIX, '');
      if(!keep.includes(short) && localStorage.getItem(k).length > 5000){
        localStorage.removeItem(k);
      }
    }
  }catch(e){}
}

// ============================================================================
//  Self-healing — Logging + Sentinelles + Escalade Apex
// ============================================================================
function _safeCatch(ctx, e){
  console.error(`[apex-chat:${ctx}]`, e?.message || e, e?.stack);
  _logTelemetry('err', ctx, { message: e?.message || String(e), stack: e?.stack });
}

function _logTelemetry(severity, sentinel, payload){
  try{
    const log = lg('telemetry', []);
    log.push({severity, sentinel, payload, ts: Date.now(), src: 'apex-chat', uid: K.user?.id || 'anon'});
    if(log.length > 200) log.splice(0, log.length - 200);
    ls('telemetry', log);

    // Push vers Apex Firebase si severity warn/err/critical
    if(severity !== 'info' && severity !== 'ok'){
      _escalateToApex(severity, sentinel, payload).catch(()=>{});
    }
  }catch(e){}
}

async function _escalateToApex(severity, sentinel, payload){
  try{
    const entry = {
      id: 'apexchat_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      src: 'apex-chat',
      severity,
      sentinel,
      payload,
      v: __APEX_CHAT_VERSION__,
      user: K.user?.id || 'anon',
      ts: Date.now(),
      processed: false
    };
    await fetch(FIREBASE_URL + '/apex/ax_telemetry_in.json', {
      method: 'POST',
      body: JSON.stringify(entry)
    });
  }catch(e){}
}

function _runSentinels(){
  // Sentinelle storage : quota
  try{
    if('storage' in navigator && 'estimate' in navigator.storage){
      navigator.storage.estimate().then(est => {
        const usage = est.usage || 0, quota = est.quota || 1;
        const ratio = usage / quota;
        K.sentinels.storage = { ratio, usage, quota };
        if(ratio > 0.85) _logTelemetry('warn', 'storage-watch', { ratio, usage, quota });
        if(ratio > 0.95){ _cleanupStorage(); _logTelemetry('err', 'storage-critical', { ratio }); }
      }).catch(()=>{});
    }
  }catch(e){ _safeCatch('sentinel-storage', e); }

  // Sentinelle network
  K.sentinels.network = { online: navigator.onLine, ts: Date.now() };
  if(!navigator.onLine) _logTelemetry('warn', 'network-offline', {});

  // Sentinelle SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistration().then(reg => {
      K.sentinels.sw = { active: !!reg?.active, version: __APEX_CHAT_VERSION__ };
    }).catch(()=>{});
  }
}

// ============================================================================
//  Crypto E2E — Génération / restoration des clés identité
// ============================================================================
async function _ensureCryptoKeys(){
  if(!window.ApexCrypto) return;
  if(K._cryptoKeys) return;

  // Tenter restoration depuis localStorage
  const storedPub = lg('crypto_pub', null);
  const storedPriv = lg('crypto_priv', null);

  if(storedPub && storedPriv){
    try{
      const publicKey = await ApexCrypto.importPublicKey(storedPub);
      const privateKey = await ApexCrypto.importPrivateKey(storedPriv);
      K._cryptoKeys = { publicKey, privateKey };
      _logTelemetry('ok', 'crypto-keys-restored', {});
      return;
    }catch(e){ _safeCatch('crypto-restore', e); }
  }

  // Génération nouvelle paire
  try{
    const keys = await ApexCrypto.generateIdentityKeys();
    K._cryptoKeys = keys;
    const pubB64 = await ApexCrypto.exportPublicKey(keys.publicKey);
    const privB64 = await ApexCrypto.exportPrivateKey(keys.privateKey);
    ls('crypto_pub', pubB64);
    ls('crypto_priv', privB64);  // Phase 2b : wrappé avec PIN
    _logTelemetry('ok', 'crypto-keys-generated', { pub: pubB64.slice(0,20)+'...' });

    // TODO Phase 3 : upload pubkey au serveur via /api/keys/prekeys
  }catch(e){
    _safeCatch('crypto-generate', e);
  }
}

K._handleAuthPhone = async function(){
  const phone = $('#auth-phone').value.replace(/[^\d+]/g,'');
  const name = $('#auth-name').value.trim();
  if(!phone || !/^\+?\d{8,15}$/.test(phone)) return toast('Numéro invalide', 'err');
  if(!name || name.length < 2) return toast('Saisis ton prénom et nom', 'err');

  try{
    toast('Envoi du SMS...', 'info', 1500);
    await _authSendOtp(phone, name);
    K.authData = { phone, name };
    K.authStep = 'otp';
    renderAuthStep();
  }catch(e){

K._handleAuthOtp = async function(){
  const otp = $('#auth-otp').value.replace(/\D/g,'');
  if(otp.length !== 6) return toast('Code à 6 chiffres', 'err');
  // Phase 1 : on accepte tout OTP (vérification réelle Firebase Auth Phase 2)
  K.authData.firebase_id_token = 'phase1_placeholder_' + otp;
  K.authStep = 'pseudo';
  renderAuthStep();

K._handleAuthPseudo = async function(){
  const pseudo = $('#auth-pseudo').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if(!/^[a-z0-9_-]{3,20}$/.test(pseudo)) return toast('Pseudo 3-20 lettres/chiffres', 'err');

  try{
    toast('Création du compte...', 'info', 1500);
    const result = await _authVerifyOtp(K.authData.phone, K.authData.name, pseudo, K.authData.firebase_id_token);
    if(result.ok){
      K.login(result.user, result.token);
    }else{
      toast(result.message || 'Erreur', 'err');
    }
  }catch(e){
    // Fallback Phase 1 : créer compte local pour test
    const isKevin = isKevinAdmin(K.authData.name);
    const localUser = {
      id: isKevin ? 'kdmc_admin' : ('local_' + Date.now()),
      pseudo,
      real_name: K.authData.name,
      phone: K.authData.phone,
      is_admin: isKevin,

K.openConv = async function(convId){
  const conv = K.conversations.find(c => c.id === convId);
  if(!conv){ toast('Conversation introuvable', 'err'); return; }

  // Phase 3 : ouvrir WebSocket pour temps réel
  K._closeWs();
  K._openWs(convId);

  // Phase 2 : établir session E2E si pas déjà fait
  try{
    if(window.ApexCrypto && !ApexCrypto.getSessionKey(convId) && K._cryptoKeys && conv.peer_pubkey){
      const peerKey = await ApexCrypto.importPublicKey(conv.peer_pubkey);
      await ApexCrypto.establishSession(convId, K._cryptoKeys.privateKey, peerKey);
    }
  }catch(e){ _safeCatch('establish-session', e); }

  K.sv('chat', conv);
};

K._sendMsg = async function(){
  const input = $('#msg-input');
  const text = input.value.trim();
  if(!text) return;
  const conv = K.viewData;

  // Phase 2 : chiffrer E2E si session active
  let ciphertext = null;
  let displayText = text;
  try{
    if(window.ApexCrypto && ApexCrypto.getSessionKey(conv.id)){
      ciphertext = await ApexCrypto.encryptForConv(conv.id, text);
      // Le texte clair reste local (pour affichage), le ciphertext part au serveur
    }
  }catch(e){
    _safeCatch('encrypt-message', e);
  }

  const msg = {
    id: 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    from: K.user.id,
    text: displayText,      // affichage local clair
    ciphertext,             // envoyé au serveur (null si pas de session)
    ts: Date.now(),
    encrypted: !!ciphertext
  };

  if(!K.messages[conv.id]) K.messages[conv.id] = [];
  K.messages[conv.id].push(msg);
  ls('messages_' + conv.id, K.messages[conv.id]);
  input.value = '';
  K.render();

  // Phase 3 : envoyer via WebSocket
  if(K.ws && K.ws.readyState === WebSocket.OPEN){
    try{
      K.ws.send(JSON.stringify({
        type: 'message',
        ciphertext: ciphertext || text,  // fallback texte clair si pas de session
        mime: 'text/plain',
        ts: msg.ts
      }));
      toast('🛡 Envoyé chiffré', 'ok', 1000);
    }catch(e){
      _safeCatch('ws-send', e);
      toast('Envoi local (offline) — sera synchro plus tard', 'warn', 1500);
    }
  } else {
    toast('Mode local (pas de WS) — message stocké', 'info', 1500);
  }
};

// ============================================================================
//  WebSocket client (Phase 3)
// ============================================================================
K._openWs = async function(convId){
  if(K.ws){ try{K.ws.close()}catch(_){}; K.ws = null; }
  if(!K.user || !K.token) return;

  try{
    const wsUrl = API_BASE.replace(/^https?/, 'wss') +
      `/api/conversations/${encodeURIComponent(convId)}/ws` +
      `?token=${encodeURIComponent(K.token)}&uid=${encodeURIComponent(K.user.id)}&conv=${encodeURIComponent(convId)}`;

    K.ws = new WebSocket(wsUrl);

    K.ws.addEventListener('open', () => {
      _logTelemetry('ok', 'ws-open', { convId });
    });

    K.ws.addEventListener('message', async (event) => {
      try{
        const data = JSON.parse(event.data);
        await _handleWsMessage(data, convId);
      }catch(e){ _safeCatch('ws-message', e); }
    });

    K.ws.addEventListener('error', (e) => {
      _logTelemetry('warn', 'ws-error', { convId });
    });

    K.ws.addEventListener('close', (e) => {
      _logTelemetry('info', 'ws-close', { convId, code: e.code });
      K.ws = null;
    });

    // Ping keep-alive 25s
    K.wsPing = setInterval(() => {
      if(K.ws?.readyState === WebSocket.OPEN){
        K.ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 25000);
  }catch(e){
    _safeCatch('ws-open', e);
  }
};

K._closeWs = function(){
  if(K.wsPing){ clearInterval(K.wsPing); K.wsPing = null; }
  if(K.ws){ try{K.ws.close()}catch(_){}; K.ws = null; }
};

async function _handleWsMessage(data, convId){
  switch(data.type){
    case 'hello':
      // Server accepts connection
      break;
    case 'message':
      // Nouveau message reçu
      let decryptedText = '(message chiffré)';
      try{
        if(window.ApexCrypto && ApexCrypto.getSessionKey(convId) && data.ciphertext){
          decryptedText = await ApexCrypto.decryptForConv(convId, data.ciphertext);
        } else if(data.ciphertext){
          // Fallback : si c'est du texte clair (Phase 1 testing)
          decryptedText = data.ciphertext;
        }
      }catch(e){ _safeCatch('decrypt-message', e); }

      const msg = {
        id: data.id || 'm_' + Date.now(),
        from: data.sender_id,
        text: decryptedText,
        ts: data.ts || Date.now(),
        encrypted: !!data.ciphertext
      };
      if(!K.messages[convId]) K.messages[convId] = [];
      // Dédup
      if(!K.messages[convId].some(m => m.id === msg.id)){
        K.messages[convId].push(msg);
        ls('messages_' + convId, K.messages[convId]);
        if(K.view === 'chat' && K.viewData?.id === convId) K.render();
        else toast(`Nouveau message`, 'info', 2000);
      }
      break;
    case 'ack':
      // Server ack
      break;
    case 'typing':
      // TODO Phase 3 : afficher "X est en train d'écrire..."
      break;
    case 'read':
      // TODO Phase 3 : afficher read receipts
      break;
    case 'reaction':
      // TODO Phase 3 : afficher reactions
      break;
    case 'presence':
      // Joined / left
      break;
    case 'pong':
      break;
    case 'error':
      _logTelemetry('warn', 'ws-server-error', data);
      break;
  }
}

  const users = Object.entries(PRECONFIGURED_USERS)
    .filter(([id, u]) => !norm ||

      u.real_name.toLowerCase().includes(norm) ||
      id.toLowerCase().includes(norm))

// ============================================================================
//  API client helper
// ============================================================================
K._api = async function(method, path, body){
  try{
    const headers = { 'Content-Type': 'application/json' };
    if(K.token) headers['Authorization'] = 'Bearer ' + K.token;
    const opts = { method, headers };
    if(body) opts.body = JSON.stringify(body);
    const r = await fetch(API_BASE + path, opts);
    const data = await r.json().catch(() => ({}));
    if(!r.ok){
      _logTelemetry('warn', 'api-error', { method, path, status: r.status, msg: data.message });
      throw new Error(data.message || ('Erreur ' + r.status));
    }
    return data;
  }catch(e){
    if(e.name === 'TypeError'){
      // Worker indisponible : fallback local
      _logTelemetry('warn', 'api-offline', { method, path });
      return { ok: false, offline: true, message: 'Worker indisponible (mode local)' };
    }
    throw e;
  }
};

K._createGroup = async function(){
  const name = $('#group-name').value.trim();
  const description = $('#group-desc').value.trim();
  if(!name) return toast('Nom requis', 'err');
  try{
    const r = await K._api('POST', '/api/conversations', { type: 'group', name, members: [] });
    if(r.ok && r.conversation){
      K.conversations.unshift({
        id: r.conversation.id, type: 'group', name, member_count: 1,
        last_msg_ts: Date.now(), description
      });
      ls('conversations', K.conversations);
      K._closeModal();
      K.sv('chats');
      toast('Groupe "' + name + '" créé', 'ok');
    } else {
      toast(r.message || 'Erreur création groupe', 'err');
    }
  }catch(e){
    // Fallback local
    const id = 'group_local_' + Date.now();
    K.conversations.unshift({ id, type: 'group', name, member_count: 1, last_msg_ts: Date.now(), description });
    ls('conversations', K.conversations);
    K._closeModal();
    K.sv('chats');
    toast('Groupe créé (local)', 'warn');
  }
};

    </p>
    <label class="label" style="margin-top:14px">Destinataire (pseudo)</label>
    <input id="tc-recipient" class="input" placeholder="laurence">
    <label class="label" style="margin-top:14px">Date d'ouverture</label>
    <input id="tc-date" class="input" type="date" min="${new Date(Date.now() + 86400000).toISOString().slice(0,10)}" value="${nextYear}">
    <label class="label" style="margin-top:14px">Ton message</label>
    <textarea id="tc-msg" class="input" rows="4" placeholder="Cher Toi, dans 1 an..."></textarea>
    <label class="label" style="margin-top:14px">Aperçu (visible avant ouverture)</label>
    <input id="tc-preview" class="input" placeholder="Ex: Une surprise pour ton anniversaire" maxlength="100">
    <button class="btn btn-block" onclick="K._createTimeCapsule()" style="margin-top:14px">🔒 Sceller la capsule</button>
  `);
};

K._createTimeCapsule = async function(){
  const recipient = $('#tc-recipient').value.trim().toLowerCase();
  const date = $('#tc-date').value;
  const msg = $('#tc-msg').value.trim();
  const preview = $('#tc-preview').value.trim();
  if(!recipient || !date || !msg) return toast('Tous les champs requis', 'err');

  const openAt = new Date(date).getTime();
  if(openAt < Date.now() + 86400000) return toast('Date d\'ouverture minimum dans 24h', 'err');

  // Phase 2 : chiffrer avec clé recipient (si on a la pubkey). Phase 1 : texte brut.
  const ciphertext = btoa(unescape(encodeURIComponent(msg)));

  try{
    const r = await K._api('POST', '/api/time-capsules', {
      recipient_id: 'user_' + recipient,  // Phase 2 : lookup vraie ID
      ciphertext,
      mime: 'text/plain',
      open_at: openAt,
      preview
    });
    if(r.ok){
      K._closeModal();
      toast('Capsule scellée jusqu\'au ' + new Date(openAt).toLocaleDateString('fr-FR'), 'ok', 4000);
    } else {
      toast(r.message || 'Erreur', 'err');
    }
  }catch(e){
    // Fallback local
    const tcs = lg('time_capsules', []);
    tcs.push({ id: 'tc_' + Date.now(), recipient, ciphertext, open_at: openAt, preview, created_at: Date.now() });
    ls('time_capsules', tcs);
    K._closeModal();
    toast('Capsule sauvegardée (local)', 'warn');
  }
};

K._createLetter = async function(){

  const msg = $('#ltr-msg').value.trim();
  const delay = parseInt($('#ltr-delay').value) || 24;
  if(!conv_id || !msg) return toast('Conversation + message requis', 'err');

  const ciphertext = btoa(unescape(encodeURIComponent(msg)));
  try{
    const r = await K._api('POST', '/api/letters', { conv_id, ciphertext, delay_hours: delay });
    if(r.ok){
      K._closeModal();
      toast(`Lettre programmée pour ${delay}h (annulable avant)`, 'ok', 4000);
    } else {
      toast(r.message || 'Erreur', 'err');
    }
  }catch(e){
    K._closeModal();
    toast('Erreur réseau, réessaie', 'err');
  }
};

      }
    } else {
      c.innerHTML = '<p style="color:var(--ax-text-3)">Memory Lane indisponible (worker offline)</p>';
    }
  }catch(e){
    $('#ml-content').innerHTML = '<p style="color:var(--ax-err)">Erreur : ' + esc(e.message) + '</p>';
  }
};

// ============================================================================
//  Modal helpers
// ============================================================================
K._showModal = function(title, html){
  const host = $('#modal-host');
  host.innerHTML = `
    <div class="modal-back" onclick="if(event.target===this)K._closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="K._closeModal()">✕</button>
        <h3 class="modal-title">${esc(title)}</h3>
        ${html}
      </div>
    </div>
  `;
};

K._closeModal = function(){ $('#modal-host').innerHTML = ''; };

// ============================================================================
//  Invitation viral SMS
// ============================================================================
K.openInvite = function(){
  K._showModal('📤 Inviter des amis', `
    <p style="color:var(--ax-text-2);font-size:.9em">Envoie un SMS d'invitation à tes amis. Ils rejoindront Apex Chat avec ton code unique.</p>
    <label class="label" style="margin-top:14px">Numéro de téléphone</label>
    <input id="invite-phone" type="tel" class="input" placeholder="+33 6 12 34 56 78" inputmode="tel">
    <button class="btn btn-block" onclick="K._sendInvite()" style="margin-top:14px">📲 Envoyer l'invitation SMS</button>
    <p style="color:var(--ax-text-3);font-size:.75em;margin-top:14px;text-align:center">5 amis qui acceptent = 1 an Apex Chat+ offert 🎁</p>
  `);
};

K._sendInvite = async function(){
  const phone = $('#invite-phone').value.trim().replace(/[^\d+]/g,'');
  if(!phone) return toast('Numéro requis', 'err');
  toast('Invitation préparée — Phase 2 envoi SMS', 'info');
  K._closeModal();
};

K._reload = function(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistration().then(r => {
      if(r){ r.update(); r.waiting?.postMessage({type:'SKIP_WAITING'}); }
      setTimeout(()=>location.reload(), 300);
    });
  } else location.reload();
};

// ============================================================================
//  Init / Boot
// ============================================================================
async function _boot(){
  // SW update banner listener
  window.addEventListener('sw-update-available', () => {
    $('#update-banner').classList.remove('h');
  });

  // Network listener
  window.addEventListener('online', () => {
    K.isOnline = true;
    $('#conn-status').textContent = '●';
    $('#conn-status').style.color = 'var(--ax-ok)';
    toast('Connexion rétablie', 'ok', 1500);
  });
  window.addEventListener('offline', () => {
    K.isOnline = false;
    $('#conn-status').textContent = '○';
    $('#conn-status').style.color = 'var(--ax-text-3)';
    toast('Hors ligne — tes messages partiront dès reconnexion', 'warn', 3000);
  });

  // Bottom nav handler
  $$('.bnav-btn').forEach(b => b.addEventListener('click', () => K.sv(b.dataset.view)));

  // Restaurer session
  const user = lg('user', null);
  const token = lg('token', null);
  if(user && token){
    K.user = user; K.token = token;
    if(isKevinAdmin(user.real_name || user.pseudo)){
      K.user.is_admin = true;
      $('#bnav-admin').classList.remove('h');
    }
    K.view = 'chats';
    $('#splash').classList.add('h');
    $('#topbar').classList.remove('h');
    $('#security-banner').classList.remove('h');
    $('#bnav').classList.remove('h');

    // Charger état persisté
    K.conversations = lg('conversations', []);
    K.contacts = lg('contacts', []);
    for(const c of K.conversations){
      K.messages[c.id] = lg('messages_' + c.id, []);
    }

    K.render();
  } else {
    // Splash auth
    K.authStep = 'phone';
    renderAuthStep();
  }

  // Démarrer sentinelles (toutes les 30s)
  _runSentinels();
  setInterval(_runSentinels, 30000);

  // Charger config depuis API (best-effort)
  fetch(API_BASE + '/api/system/config').then(r => r.json()).then(d => {
    if(d.config) K.config = d.config;
  }).catch(() => {
    K.config = { ADMIN_MODE: 'A', KEVIN_INVISIBLE_ADMIN: 'true', AUTH_PROVIDER: 'firebase' };
  });

  // Cross-app : détecter SSO depuis Apex
  const params = new URLSearchParams(location.search);
  if(params.get('from') === 'apex' && params.get('token') && params.get('uid')){
    try{
      const r = await _authSsoFromApex(params.get('token'), params.get('uid'), params.get('name'));
      if(r.ok) K.login(r.user, r.token);
    }catch(e){}
  }
}

// Error capture global
window.addEventListener('error', (e) => _safeCatch('window.error', e.error || new Error(e.message)));
window.addEventListener('unhandledrejection', (e) => _safeCatch('unhandledrejection', e.reason));

// Démarrage
document.addEventListener('DOMContentLoaded', _boot);
if(document.readyState !== 'loading') _boot();
</script>
