  function idbDB(){ return new Promise(function(res,rej){ if(_idb)return res(_idb); var rq=indexedDB.open('fin_docs',1); rq.onupgradeneeded=function(){ try{rq.result.createObjectStore('docs');}catch(e){} }; rq.onsuccess=function(){ _idb=rq.result; res(_idb); }; rq.onerror=function(){ rej(rq.error); }; }); }
  async function idbSet(k,v){ var db=await idbDB(); return new Promise(function(res,rej){ var tx=db.transaction('docs','readwrite'); tx.objectStore('docs').put(v,k); tx.oncomplete=function(){res();}; tx.onerror=function(){rej(tx.error);}; }); }
  async function idbGet(k){ var db=await idbDB(); return new Promise(function(res,rej){ var tx=db.transaction('docs','readonly'); var rq=tx.objectStore('docs').get(k); rq.onsuccess=function(){res(rq.result||null);}; rq.onerror=function(){rej(rq.error);}; }); }
  async function idbDel(k){ try{ var db=await idbDB(); return new Promise(function(res){ var tx=db.transaction('docs','readwrite'); tx.objectStore('docs').delete(k); tx.oncomplete=function(){res();}; tx.onerror=function(){res();}; }); }catch(e){} }
  async function openDoc(docId){
    try{ var pack=await idbGet('doc:'+docId); if(!pack){ toast('Original non stocké sur cet appareil',true); return; }
      var d=await decWith(KEY,pack); var blob=new Blob([bufFromB64(d.data)],{type:d.mime}); var url=URL.createObjectURL(blob);
      if(d.mime==='application/pdf'){ window.open(url,'_blank'); }
      else { var w=window.open('','_blank'); if(w){ w.document.write('<title>'+esc(d.name)+'</title><body style="margin:0;background:#111"><img src="'+url+'" style="max-width:100%;display:block;margin:auto"><script>setTimeout(function(){window.print()},400)<\/script></body>'); } else window.open(url,'_blank'); }
      setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
    }catch(e){ toast('❌ '+(e.message||e),true); }
  }
  function markDocFile(docId){ var d=(VAULT.docs||[]).filter(function(x){return x.id===docId;})[0]; if(d)d.hasFile=true; }

  /* Voix : micro (dictée) + haut-parleur (lecture). */
  function startMic(cb){ var SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){ toast('Micro non supporté sur ce navigateur',true); return null; }
    var r=new SR(); r.lang='fr-FR'; r.interimResults=false; r.maxAlternatives=1;
    r.onresult=function(e){ try{ cb(e.results[0][0].transcript); }catch(x){} }; r.onerror=function(){ toast('Micro : autorise l\'accès',true); };
    try{ r.start(); }catch(e){} return r; }
  function speak(txt){ try{ if(!window.speechSynthesis)return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(txt).slice(0,2000)); u.lang='fr-FR'; u.rate=1; speechSynthesis.speak(u); }catch(e){} }
  function stopSpeak(){ try{ if(window.speechSynthesis)speechSynthesis.cancel(); }catch(e){} }

  /* Q&A : cherche dans TOUS les documents/opérations et répond. */
  function buildDocContext(){
    var L=['OPÉRATIONS (date | libellé | montant € | catégorie):'];
    (VAULT.tx||[]).slice(0,700).forEach(function(t){ L.push(ymd(t.date)+' | '+stripSecrets(t.label)+' | '+t.amount.toFixed(2)+' | '+t.category); });
    if((VAULT.devis||[]).length){ L.push(''); L.push('DEVIS non payés (date | libellé | montant €):'); VAULT.devis.forEach(function(d){ L.push(ymd(d.date)+' | '+stripSecrets(d.label)+' | '+Number(d.amount).toFixed(2)); }); }
    if((VAULT.docs||[]).length){ L.push(''); L.push('DOCUMENTS: '+(VAULT.docs||[]).map(function(d){return d.name;}).slice(0,80).join(' · ')); }
    return L.join('\n');
  }
  async function aiAnswer(q){
    return aiCall([{ t:'Tu es mon assistant finances. Réponds à la QUESTION en te basant UNIQUEMENT sur mes données ci-dessous. Donne les montants et dates EXACTS, additionne si besoin, sois concis et clair en français. Si l\'info n\'y est pas, dis-le.\n\n'+buildDocContext()+'\n\nQUESTION : '+q }], 900);
  }
  function extractJson(s){ /* récupère l'objet JSON du texte IA (objet PRIORITAIRE : garde meta.kind/ht/tva/vendor) */
    if(!s)return null;
    var t=String(s).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'');
    try{ return JSON.parse(t); }catch(e){}
    var c=t.indexOf('{'), d=t.lastIndexOf('}');           /* objet {meta,tx} d'abord — sinon on perdrait meta */
    if(c>=0&&d>c){ try{ return JSON.parse(t.slice(c,d+1)); }catch(e){} }
    var a=t.indexOf('['), b=t.lastIndexOf(']');            /* sinon tableau nu */
    if(a>=0&&b>a){ try{ return JSON.parse(t.slice(a,b+1)); }catch(e){} }
    return null;
  }
  var EXTRACT_PROMPT =
    'Tu es un extracteur COMPTABLE de relevés bancaires, factures, tickets, fiches de paie ET devis (France/Monaco/Italie, EUR). '+
    'Analyse le document et renvoie UNIQUEMENT un JSON strict, sans texte autour:\n'+
    '{"meta":{"kind":"releve|facture|ticket|paie|devis","vendor":"","invoice_no":"","bank":"","account_masked":"","period":"","date":"YYYY-MM-DD","total":null,"ht":null,"tva":null,"tva_rate":null,"opening":null,"closing":null},'+
    '"tx":[{"date":"YYYY-MM-DD","label":"libellé exact","amount":-12.34,"category":"une catégorie parmi la liste","vendor":"","ht":null,"tva":null,"tva_rate":null}]}\n'+
    'Règles: amount NÉGATIF pour une dépense/débit, POSITIF pour un revenu/crédit. '+
    'Reproduis les montants EXACTEMENT (aucune invention; ligne illisible -> ne pas l\'inventer). '+
    'category ∈ ['+DEFAULT_CATS.map(function(c){return '"'+c+'"';}).join(',')+']. '+
    'Pour une FACTURE/TICKET: renseigne ht (montant hors taxes), tva (montant de TVA) et tva_rate (taux %, ex 20) si visibles; amount = TTC négatif; vendor = nom du fournisseur/commerçant. '+
    'Une facture/ticket = une seule ligne (montant TOTAL TTC). '+
    'Une fiche de paie = une ligne Revenus (salaire net, positif). '+
    'Un DEVIS / PREVENTIVO / estimation NON payé : meta.kind="devis", meta.total=montant total (positif), meta.vendor=émetteur, tx=[] (ne compte PAS une dépense). '+
    'Réponds en JSON seulement.';

  async function importFile(file, srcMeta){
    var buf=await file.arrayBuffer(); var b64=b64FromBuf(buf); var mt=file.type||'';
    var isPdf=(mt==='application/pdf'||/\.pdf$/i.test(file.name));
    var isImg=/^image\//.test(mt)||/\.(png|jpe?g|webp|heic|heif)$/i.test(file.name);
    if(!isPdf && !isImg){ return importText(stripSecrets(await file.text()), file.name); }
    var hash=await sha256HexBuf(buf);
    if(docHashExists(hash)){ return { added:0, devis:0, dup:true }; }   /* même fichier déjà importé */
    var mime=isPdf?'application/pdf':(mt||'image/jpeg');
    var out=await aiCall([ {f:{mime:mime,data:b64}}, {t:EXTRACT_PROMPT} ], 4096);
    var res=finishImport(out, file.name, isPdf?'pdf':'image', hash, srcMeta);
    try{ await idbSet('doc:'+res.docId, await encWith(KEY,{mime:mime,name:file.name,data:b64})); markDocFile(res.docId); }catch(e){}
    return res;
  }
  async function importText(text, name, hash){
    var out=await aiCall([ {t:'DOCUMENT (texte):\n'+text.slice(0,60000)+'\n\n'+EXTRACT_PROMPT} ], 4096);
    return finishImport(out, name||'texte', 'texte', hash||null);
  }
  /* Import d'une pièce jointe (bytes b64) — utilisé par la récupération auto des mails. */
  async function importBytes(b64, mime, name, srcMeta){
    var buf=bufFromB64(b64); var isPdf=(mime==='application/pdf'||/\.pdf$/i.test(name||''));
    var hash=await sha256HexBuf(buf); if(docHashExists(hash)) return { added:0, devis:0, dup:true };
    var out=await aiCall([ {f:{mime:mime,data:b64}}, {t:EXTRACT_PROMPT} ], 4096);
    var res=finishImport(out, name||'mail', isPdf?'pdf':'image', hash, srcMeta||{src:'mail'});
    try{ await idbSet('doc:'+res.docId, await encWith(KEY,{mime:mime,name:name||'mail',data:b64})); markDocFile(res.docId); }catch(e){}
    return res;
  }

  /* ============================ Récupération auto des mails (factures/devis) ============================ */
  /* Le worker "kdmc-mail" reçoit les mails envoyés/transférés à factures@kd-mc.com (Cloudflare Email
     Routing), extrait les pièces jointes PDF/photo et les met en attente. Ici on les récupère (admin),
     on les classe (IA), on dédoublonne, puis on acquitte. Les originaux sont conservés (chiffrés). */
  async function mailScan(statEl){
    if(!VAULT.aiPinHash){ toast('Active d\'abord le classement IA',true); STATE.tab='set'; render(); return; }
    var grant=adminGrantTok(); if(!grant){ toast('Active la sauvegarde en ligne (code admin) d\'abord',true); STATE.tab='set'; render(); return; }
    function say(m){ if(statEl)statEl.textContent=m; }
    say('📧 Recherche de factures dans tes mails…');
    var list;
    try{ var r=await fetch('/__mail/scan',{ headers:{'x-kdmc-admin':grant}, cache:'no-store' });
      if(!r.ok){ say('❌ mails : HTTP '+r.status); return; } var j=await r.json();
      if(!j.ok){ say('❌ '+(j.reason||'erreur')); return; } list=j.items||[];
    }catch(e){ say('❌ réseau'); return; }
    if(!list.length){ say('✅ Aucune nouvelle pièce jointe (rien à importer).'); return; }
    var okc=0, devc=0, dupc=0, err=0, ackIds=[];
    for(var i=0;i<list.length;i++){ var it=list[i]; say('⏳ '+(i+1)+'/'+list.length+' — '+(it.filename||'pièce jointe'));
      try{ var res=await importBytes(it.b64, it.mime||'application/pdf', it.filename||('mail-'+(it.id||i)), {src:'mail:'+(it.from||'')});
        if(res.dup)dupc++; else { okc+=res.added; if(res.devis)devc+=res.devis; } ackIds.push(it.id); await persist();
      }catch(e){ err++; }
    }
    if(ackIds.length){ try{ await fetch('/__mail/ack',{ method:'POST', headers:{'content-type':'application/json','x-kdmc-admin':grant}, body:JSON.stringify({ids:ackIds}) }); }catch(e){} }
    var rm=dedupeAll(); await persist();
    say('✅ Mails importés : '+okc+' op.'+(devc?(' · '+devc+' devis'):'')+(dupc?(' · '+dupc+' doublon(s) ignoré(s)'):'')+(err?(' · '+err+' échec'):''));
    toast('📧 '+okc+' opérations + '+devc+' devis depuis tes mails');
    setTimeout(function(){ STATE.tab=(okc===0&&devc>0)?'devis':'dash'; render(); }, 1200);
  }
  function finishImport(out, name, ftype, hash, srcMeta){
    var j=extractJson(out); if(!j) throw new Error('Réponse IA illisible');
    var meta=j.meta||{}; var rows=j.tx||j.transactions||(Array.isArray(j)?j:[]);
    var docId=uid(); var kind=meta.kind||'releve';
    VAULT.docs.unshift({ id:docId, name:name, kind:kind, ftype:ftype, addedAt:Date.now(), hash:hash||null,
      bank:meta.bank||meta.vendor||'', vendor:meta.vendor||'', invoiceNo:meta.invoice_no||'', account:meta.account_masked||'', period:meta.period||'',
      opening:num(meta.opening), closing:num(meta.closing), src:(srcMeta&&srcMeta.src)||'', count:(kind==='devis'?1:rows.length) });
    if(kind==='devis'){
      var damt=null, dl=name;
      rows.forEach(function(r){ var a=num(r.amount); if(a!==null){ damt=(damt||0)+Math.abs(a); if(r.label)dl=r.label; } });
      if(damt===null)damt=num(meta.total)||num(meta.amount)||0;
      VAULT.devis.unshift({ id:uid(), date:parseFrDate(meta.date||meta.period||'')||ymd(Date.now()),
        label:(meta.vendor?meta.vendor+' — ':'')+(dl||'Devis'), amount:Math.abs(damt||0), vendor:meta.vendor||meta.bank||'', docId:docId, hash:hash||null });
      audit('devis', name); dedupeAll(); return { added:0, devis:1, docId:docId, kind:'devis' };
    }
    var added=0, isInvoice=(kind==='facture'||kind==='ticket');
    rows.forEach(function(r){
      var amt=num(r.amount); if(amt===null)return;
      var lb=String(r.label||'').trim(); if(!lb&&!amt)return;
      var cat=cleanCat(r.category, amt); var key=norm(lb);
      if(VAULT.merchantMap[key]) cat=VAULT.merchantMap[key]; else if(cat) VAULT.merchantMap[key]=cat;
      var t={ id:uid(), date:ymd(r.date)||ymd(Date.now()), label:lb, amount:amt, category:cat, docId:docId, kind:kind, addedAt:Date.now() };
      var vd=r.vendor||meta.vendor||''; if(vd)t.vendor=vd;
      var ht=num(r.ht!=null?r.ht:(isInvoice?meta.ht:null)), tva=num(r.tva!=null?r.tva:(isInvoice?meta.tva:null)), tr=num(r.tva_rate!=null?r.tva_rate:(isInvoice?meta.tva_rate:null));
      if(ht!=null)t.ht=Math.abs(ht); if(tva!=null)t.tva=Math.abs(tva); if(tr!=null)t.tvaRate=tr;
      if(isInvoice){ t.ttc=Math.abs(amt); if(t.pro===undefined)t.pro=false; }
      VAULT.tx.unshift(t);
      added++;
    });
    audit('import', name+' — '+added+' op.'); dedupeAll();
    return { added:added, docId:docId, kind:kind };
  }
  function num(v){ if(v===null||v===undefined||v==='')return null; if(typeof v==='number')return isFinite(v)?v:null;
    var s=String(v).replace(/\s/g,'').replace(/[^\d,.\-]/g,''); if(!s)return null;
    if(s.indexOf(',')>=0&&s.indexOf('.')>=0){ s=s.replace(/\./g,'').replace(',','.'); } else s=s.replace(',','.');
    var n=parseFloat(s); return isFinite(n)?n:null; }
  function cleanCat(c, amt){
    var cats=VAULT.categories||DEFAULT_CATS;
    if(c&&cats.indexOf(c)>=0)return c;
    /* meilleur effort si l'IA renvoie une variante */
    if(c){ var n=norm(c); for(var i=0;i<cats.length;i++){ if(norm(cats[i])===n)return cats[i]; } }
    return (amt>0)?'Revenus':'Autres';
  }

  /* ============================ Import CSV local (fidèle, sans IA) ============================ */
  function parseFrDate(s){ s=String(s||'').trim();
    var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    m=s.match(/(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/); if(m){ var y=m[3].length===2?('20'+m[3]):m[3]; return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0'); }
    return ymd(s); }
  function csvCells(l,delim){ var out=[],cur='',q=false; for(var i=0;i<l.length;i++){ var c=l[i];
    if(q){ if(c==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===delim){out.push(cur);cur='';} else cur+=c; } } out.push(cur); return out; }
  function parseCsvImport(text, name, hash){
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
    if(!lines.length) throw new Error('CSV vide');
    var delim=(lines[0].split(';').length>=lines[0].split(',').length)?';':',';
    var header=csvCells(lines[0],delim).map(function(h){return norm(h);});
    function col(names){ for(var i=0;i<header.length;i++){ for(var j=0;j<names.length;j++){ if(header[i].indexOf(names[j])>=0)return i; } } return -1; }
    var ci={ date:col(['date']), label:col(['libell','descript','designation','intitul','objet','marchand']),
      amt:col(['montant','amount','ttc','debit','somme','prix']), cat:col(['categ']), type:col(['type','kind']) };
    if(ci.amt<0||ci.date<0) throw new Error('CSV : colonnes « Date » et « Montant » requises');
    var docId=uid(), added=0, dev=0;
    for(var r=1;r<lines.length;r++){ var c=csvCells(lines[r],delim); var amt=num(c[ci.amt]); if(amt===null)continue;
      var lb=(ci.label>=0?(c[ci.label]||''):'').trim()||'(sans libellé)';
      var typ=(ci.type>=0?((c[ci.type]||'').trim().toLowerCase()):'');
      if(typ==='devis'||typ==='preventivo'){ VAULT.devis.unshift({ id:uid(), date:parseFrDate(c[ci.date])||ymd(Date.now()), label:lb, amount:Math.abs(amt), vendor:'', docId:docId }); dev++; continue; }
      var rawCat=(ci.cat>=0?(c[ci.cat]||'').trim():''); var cat;
      if(rawCat){ if(VAULT.categories.indexOf(rawCat)<0)VAULT.categories.push(rawCat); cat=rawCat; }
      else cat=VAULT.merchantMap[norm(lb)]||cleanCat('',amt);
      VAULT.tx.unshift({ id:uid(), date:parseFrDate(c[ci.date])||ymd(Date.now()), label:lb, amount:amt,
        category:cat, docId:docId, kind:(typ||'import'), addedAt:Date.now() });
      if(cat)VAULT.merchantMap[norm(lb)]=cat; added++;
    }
    VAULT.docs.unshift({ id:docId, name:name||'CSV', kind:'import', ftype:'csv', addedAt:Date.now(), hash:hash||null, bank:'Import CSV', account:'', period:'', count:added });
    audit('import_csv', (name||'CSV')+' — '+added+' op.'+(dev?(' + '+dev+' devis'):'')); dedupeAll();
    return { added:added, devis:dev, docId:docId, kind:'import' };
  }

  /* ============================ Sauvegarde EN LIGNE (E2E, admin, temps réel) ============================ */
  var LS_GRANT='kdmc_admin_grant', _bkTimer=null, _backupState='';
  function adminGrantTok(){ try{ return localStorage.getItem(LS_GRANT)||''; }catch(e){ return ''; } }
  async function adminLoginCode(code){
    try{ var r=await fetch('/__admin/login',{ method:'POST', credentials:'include',
        headers:{'content-type':'application/json'}, body:JSON.stringify({code:String(code||'')}) });
      var j=await r.json().catch(function(){return{};});
      if(j&&j.ok&&j.grant){ try{ localStorage.setItem(LS_GRANT,j.grant); }catch(e){} return {ok:true}; }
      return {ok:false, reason:(j&&j.reason)||('http_'+r.status)};
    }catch(e){ return {ok:false, reason:'neterr'}; }
  }
  function scheduleBackup(){ if(!VAULT||!VAULT.backupOnline)return; clearTimeout(_bkTimer); _bkTimer=setTimeout(backupPush,6000); }
  async function backupPush(){
    if(!VAULT||!VAULT.backupOnline)return; var grant=adminGrantTok(); if(!grant){ _backupState='no_grant'; updateBackupBadge(); return; }
    var raw=localStorage.getItem(LS_VAULT); if(!raw)return;
    try{ var pack=JSON.parse(raw);
      var r=await fetch('/__fin/vault',{ method:'PUT', credentials:'include',
        headers:{'content-type':'application/json','x-kdmc-admin':grant},
        body:JSON.stringify({ blob:pack, savedAt:VAULT.savedAt||Date.now(), tx:(VAULT.tx||[]).length }) });
      _backupState=r.ok?'ok':('http_'+r.status);
    }catch(e){ _backupState='neterr'; }
    updateBackupBadge();
  }
  async function backupPull(){
    var grant=adminGrantTok(); if(!grant) return {ok:false,reason:'no_grant'};
    try{ var r=await fetch('/__fin/vault',{ credentials:'include', headers:{'x-kdmc-admin':grant}, cache:'no-store' });
      if(!r.ok) return {ok:false,reason:'http_'+r.status};
      var j=await r.json(); if(!j.ok) return {ok:false,reason:j.reason||'ko'}; if(j.empty) return {ok:false,reason:'empty'};
      return {ok:true, blob:j.blob, meta:j.meta};
    }catch(e){ return {ok:false,reason:'neterr'}; }
  }
  async function restoreFromCloud(pass){
    var pr=await backupPull(); if(!pr.ok) throw new Error(pr.reason==='empty'?'aucune sauvegarde en ligne':('cloud : '+pr.reason));
    var pack=pr.blob; var key;
    if(KEY && VAULT && VAULT._salt===pack.salt){ key=KEY; }   /* même appareil déjà déverrouillé */
    else { if(!pass){ var er=new Error('need_pass'); er.needPass=true; throw er; } key=await deriveKey(pass, pack.salt); }
    var data=await decWith(key,{iv:pack.iv,ct:pack.ct});
    data._salt=pack.salt; data.backupOnline=true; VAULT=data; KEY=key;
    localStorage.setItem(LS_VAULT, JSON.stringify({salt:pack.salt, iv:pack.iv, ct:pack.ct, ver:1}));
    audit('restore_cloud',''); await persist(); return data;
  }
  function updateBackupBadge(){ var b=$('bk-state'); if(b)b.textContent=_backupState==='ok'?'🟢 synchronisé':(_backupState==='no_grant'?'🔒 code requis':(_backupState?('🟡 '+_backupState):'…')); }

  /* ============================ Vérification par Claude (export redacté) ============================ */
  function buildReviewText(){
    var a=analyze(VAULT.tx||[]); var L=[];
    L.push('=== VÉRIFICATION FINANCES (à envoyer à Claude) ===');
    L.push('Opérations: '+(VAULT.tx||[]).length+' · Documents: '+(VAULT.docs||[]).length);
    L.push('Revenus: '+a.rev.toFixed(2)+' € · Dépenses: '+a.dep.toFixed(2)+' € · Net: '+a.net.toFixed(2)+' € · Épargne: '+a.rate.toFixed(0)+'%');
    L.push(''); L.push('-- Dépenses par catégorie --');
    Object.keys(a.byCat).sort(function(x,y){return a.byCat[y]-a.byCat[x];}).forEach(function(c){ L.push(c+': '+a.byCat[c].toFixed(2)+' €'); });
    L.push(''); L.push('-- Opérations (date | libellé | montant | catégorie) --');
    (VAULT.tx||[]).slice().sort(function(x,y){return x.date<y.date?-1:1;}).forEach(function(t){ L.push(ymd(t.date)+' | '+stripSecrets(t.label)+' | '+t.amount.toFixed(2)+' € | '+t.category); });
    return L.join('\n');
  }
  function verifyExport(){ var txt=buildReviewText(); dl('verification-finances-'+ymd(Date.now())+'.txt', txt, 'text/plain');
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).catch(function(){}); }
    toast('🔎 Export vérification prêt (copié + téléchargé) — envoie-le à Claude'); }

  /* ============================ Analyse ============================ */
  function activeTx(){
    var f=STATE.filter;
    return (VAULT.tx||[]).filter(function(t){
      if(f.month && ym(t.date)!==f.month)return false;
      if(f.kind && t.kind!==f.kind)return false;
      return true;
    });
  }
  function months(){ var s={}; (VAULT.tx||[]).forEach(function(t){ var k=ym(t.date); if(k)s[k]=1; }); return Object.keys(s).sort(); }
  function analyze(txs){
    var rev=0,dep=0, byCat={}, byMonth={}, internal=0;
    txs.forEach(function(t){
      if(t.recDup)return; /* facture rapprochée d'une ligne bancaire → déjà comptée (anti-doublon) */
      if(t.category==='Virements internes'){ internal+=Math.abs(t.amount); return; }
      var k=ym(t.date); byMonth[k]=byMonth[k]||{rev:0,dep:0};
      if(t.amount>=0){ rev+=t.amount; byMonth[k].rev+=t.amount; }
      else { dep+=(-t.amount); byMonth[k].dep+=(-t.amount);
        byCat[t.category]=(byCat[t.category]||0)+(-t.amount); }
    });
    var net=rev-dep; var rate=rev>0?(net/rev*100):0;
    return { rev:rev, dep:dep, net:net, rate:rate, byCat:byCat, byMonth:byMonth, internal:internal, count:txs.length };

  function subscriptions(){
    /* récurrences : même marchand normalisé, ≥2 mois distincts, montant régulier */
    var g={};
    (VAULT.tx||[]).forEach(function(t){ if(t.amount>=0||t.category==='Virements internes')return;
      var k=norm(t.label).split(' ').slice(0,4).join(' '); if(!k)return;
      (g[k]=g[k]||[]).push(t); });
    var subs=[];
    Object.keys(g).forEach(function(k){
      var arr=g[k]; var mset={}; arr.forEach(function(t){ mset[ym(t.date)]=1; });
      var mcount=Object.keys(mset).length;
      if(mcount>=2 && arr.length>=2){
        var avg=arr.reduce(function(s,t){return s+(-t.amount);},0)/arr.length;
        subs.push({ label:arr[0].label, cat:arr[0].category, avg:avg, n:arr.length, months:mcount });
      }
    });
    return subs.sort(function(a,b){return b.avg-a.avg;});

  async function handleFiles(list){
    var files=[].slice.call(list); if(!files.length)return;
    var isLocal=function(f){ return /\.csv$/i.test(f.name); };
    var isText=function(f){ return /\.txt$/i.test(f.name); };
    var needAI=files.some(function(f){ return !isLocal(f); });
    if(needAI && !VAULT.aiPinHash){ toast('Active d\'abord le classement IA (Réglages)',true); STATE.tab='set'; render(); return; }
    var stat=$('impstat'); var okc=0, err=0, devc=0, dupc=0, lines=[];
    function draw(){ if(stat)stat.innerHTML=lines.join(''); }
    files.forEach(function(f,i){ lines[i]='<div class="doc" id="ip'+i+'"><span>⏳</span><div class="grow" style="min-width:0"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(f.name)+'</div></div><span class="tiny">en file…</span></div>'; });

    for(var i=0;i<files.length;i++){
      var f=files[i]; setLine(i,'⏳','lecture…');
      try{
        var r;
        if(isLocal(f)||isText(f)){
          var txt=await f.text(); var h=await sha256Hex(txt);
          if(docHashExists(h)){ r={added:0,devis:0,dup:true}; }
          else r=isLocal(f)?parseCsvImport(txt, f.name, h):await importText(stripSecrets(txt), f.name, h);
        }
        else { if(f.size>30*1024*1024) throw new Error('trop volumineux (>30 Mo) — scinde le PDF'); r=await importFile(f); }
        if(r.dup){ dupc++; setLine(i,'⏭️','déjà importé (doublon ignoré)','var(--dim)'); }
        else { okc+=r.added; if(r.devis)devc+=r.devis; setLine(i,'✅',(r.devis?'1 devis':(r.added+' op.')),'var(--green)'); }
      }catch(e){ err++; setLine(i,'❌',(e.message||String(e)).slice(0,60),'var(--red)'); }
      await persist();
    }
    var rm=dedupeAll(); if(rm){ await persist(); }
    toast('✅ '+okc+' opérations'+(devc?(' · '+devc+' devis'):'')+' ajoutés'+(dupc?(' · '+dupc+' doublon(s) ignoré(s)'):'')+((rm)?(' · '+rm+' doublon(s) nettoyé(s)'):'')+(err?(' · '+err+' échec(s) — voir la liste'):''));

  function donutSvg(byCat,total){
    if(!total)return '';

      segs+='<circle r="'+R+'" cx="70" cy="70" fill="none" stroke="'+catColor(c)+'" stroke-width="16" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 70 70)"/>';
      off+=len; });
    return '<div style="text-align:center;margin-bottom:8px"><svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="Répartition des dépenses">'+segs+'<text x="70" y="66" text-anchor="middle" fill="#eaf3e2" font-size="15" font-weight="800">'+eur0(total).replace(/ /g,' ')+'</text><text x="70" y="82" text-anchor="middle" fill="#9fb59a" font-size="9">dépenses</text></svg></div>';

    var max=1; data.forEach(function(d){ max=Math.max(max,d.rev,d.dep); });
    var bw=26, gap=14, W=Math.max(300,data.length*(bw+gap)+20), H=150, base=120;
    var bars='';
    data.forEach(function(d,i){ var x=14+i*(bw+gap);
      var hr=d.rev/max*100, hd=d.dep/max*100;
      bars+='<rect x="'+x+'" y="'+(base-hr)+'" width="'+(bw/2-1)+'" height="'+hr+'" fill="#4fce7c" rx="2"/>';
      bars+='<rect x="'+(x+bw/2+1)+'" y="'+(base-hd)+'" width="'+(bw/2-1)+'" height="'+hd+'" fill="#ff7a6b" rx="2"/>';

    });

  function reconcile(invId, bankId){
    var inv=VAULT.tx.filter(function(t){return t.id===invId;})[0], bk=VAULT.tx.filter(function(t){return t.id===bankId;})[0];
    if(!inv||!bk)return; inv.recWith=bankId; bk.recWith=invId; inv.recDup=true; /* la facture ne recompte pas la dépense */

      cl.appendChild(r);
    });
    cl.querySelectorAll('[data-cat]').forEach(function(i){ i.onchange=function(){ renameCat(i.getAttribute('data-cat'), i.value.trim()); }; });
    cl.querySelectorAll('[data-delcat]').forEach(function(b){ b.onclick=function(){ delCat(b.getAttribute('data-delcat')); }; });
    cCat.querySelector('#addcat').onclick=function(){ var n=(cCat.querySelector('#newcat').value||'').trim(); if(!n)return; if((VAULT.categories||DEFAULT_CATS).indexOf(n)<0){ VAULT.categories.push(n); persist(); render(); } };

    /* Sauvegarde EN LIGNE (temps réel, E2E, admin) */
    var boOn=!!VAULT.backupOnline;
    var cBk=el('<div class="card"><h2>☁️ Sauvegarde en ligne<span class="r" id="bk-state">'+(boOn?'temps réel':'inactive')+'</span></h2>'+
      '<p class="tiny">Chiffrée de bout en bout : le serveur ne stocke qu\'un bloc <b>illisible</b> (seul ton code de coffre déchiffre). Réservé admin. Se met à jour <b>automatiquement</b> à chaque changement → tu retrouves tout sur iPhone et ordi.</p>'+
      (boOn
        ? '<div class="row"><button class="btn grow" id="bk-now">↻ Sauvegarder maintenant</button><button class="btn grow" id="bk-pull">☁️ Restaurer depuis le cloud</button></div><button class="btn ghost grow danger" id="bk-off" style="margin-top:8px">Désactiver</button>'
        : '<button class="btn gold grow" id="bk-on">Activer la sauvegarde en ligne</button>')+
      '<div id="bk-msg" class="tiny" style="margin-top:8px"></div></div>');
    v.appendChild(cBk);

    /* Export / sauvegarde fichier + vérification Claude */
    var cEx=el('<div class="card"><h2>📥 Export & vérification</h2>'+
      '<div class="row"><button class="btn grow" id="csv1">📊 CSV opérations</button><button class="btn grow" id="csv2">📅 CSV synthèse mensuelle</button></div>'+
      '<button class="btn grow" id="verify" style="margin-top:8px">🔎 Vérifier avec Claude (export à m\'envoyer)</button>'+
      '<div class="sep"></div>'+
      '<p class="tiny">Sauvegarde chiffrée (fichier <b>.kdmcfin</b>) — à ré-importer sur un autre appareil (illisible sans ton code de coffre).</p>'+
      '<div class="row"><button class="btn gold grow" id="backup">💾 Exporter la sauvegarde chiffrée</button><button class="btn grow" id="restore">📂 Restaurer un fichier</button></div>'+
      '<input type="file" id="restorefile" accept=".kdmcfin,application/json" style="display:none"></div>');
    v.appendChild(cEx);

    /* Sécurité */
    var remember=localStorage.getItem(LS_REMEMBER)==='1';
    var cSec=el('<div class="card"><h2>🔐 Sécurité</h2>'+
      '<label class="toggle" style="justify-content:flex-start"><input type="checkbox" id="rem" '+(remember?'checked':'')+'> Rester déverrouillé sur cet appareil (reconnu auto)</label>'+
      '<div class="row" style="margin-top:8px"><button class="btn grow" id="dedup">🧹 Nettoyer les doublons</button></div>'+
      '<div class="row" style="margin-top:8px"><button class="btn grow" id="lock2">🔒 Verrouiller maintenant</button><button class="btn danger grow" id="wipe">🗑️ Tout effacer</button></div>'+
      '<div class="tiny" style="margin-top:8px">Version '+APP_VER+' · '+(VAULT.audit?VAULT.audit.length:0)+' actions journalisées · 100% local + chiffré.</div></div>');
    v.appendChild(cSec);

    /* wiring IA */
    cAi.querySelector('#ai-prov').onchange=async function(e){ VAULT.aiProvider=e.target.value; await persist(); toast('Moteur : '+AI_LABEL[VAULT.aiProvider]); if(aiOn)render(); };
    if(aiOn){ cAi.querySelector('#ai-off').onclick=async function(){ VAULT.aiPinHash=null; await persist(); toast('IA désactivée'); render(); }; }
    else {
      cAi.querySelector('#ai-on').onclick=async function(){
        var pin=(cAi.querySelector('#ai-pin').value||'').trim(); var msg=cAi.querySelector('#ai-msg');
        if(!pin){ msg.textContent='Entre ton code admin.'; return; }
        msg.style.color='var(--dim)'; msg.textContent='⏳ Vérification…';
        try{
          var h=await sha256Hex(pin);
          var r=await fetch(PROXY+'/health'); if(!r.ok) throw new Error('proxy injoignable ('+r.status+')');
          VAULT.aiPinHash=h;
          var pv=VAULT.aiProvider||'gemini';
          try{ await aiCallProvider(pv,[{t:'Réponds juste: ok'}],16); msg.style.color='var(--green)'; msg.textContent='✅ IA activée ('+AI_LABEL[pv]+').'; }
          catch(e){ VAULT.aiPinHash=null; await persist(); msg.style.color='var(--red)'; msg.textContent='❌ '+(e.message||e); return; }
          await persist(); toast('✅ Classement IA activé'); setTimeout(render,700);
        }catch(e){ msg.style.color='var(--red)'; msg.textContent='❌ '+(e.message||e); }
      };
    }
    /* online backup wiring */
    if(boOn){ updateBackupBadge();
      cBk.querySelector('#bk-now').onclick=async function(){ var m=cBk.querySelector('#bk-msg'); m.textContent='⏳ envoi…'; await backupPush(); m.textContent=(_backupState==='ok'?'✅ sauvegardé en ligne':'⚠️ '+_backupState); };
      cBk.querySelector('#bk-pull').onclick=async function(){ var m=cBk.querySelector('#bk-msg');
        if(!confirm('Remplacer les données de cet appareil par la sauvegarde en ligne ?'))return;
        m.textContent='⏳ restauration…';
        try{ var d=await restoreFromCloud(); toast('☁️ Restauré ('+(d.tx?d.tx.length:0)+' op.)'); render(); }
        catch(e){ if(e.needPass){ var p=prompt('Code du coffre de la sauvegarde en ligne :'); if(!p){m.textContent='';return;} try{ var d2=await restoreFromCloud(p); toast('☁️ Restauré'); render(); }catch(e2){ m.textContent='❌ '+(e2.message||'code incorrect'); } } else m.textContent='❌ '+(e.message||e); } };
      cBk.querySelector('#bk-off').onclick=async function(){ VAULT.backupOnline=false; await persist(); toast('Sauvegarde en ligne désactivée'); render(); };
    } else {
      cBk.querySelector('#bk-on').onclick=function(){
        var m=cBk.querySelector('#bk-msg');
        m.innerHTML='<div class="row" style="margin-top:6px"><input id="bk-code" type="password" inputmode="numeric" placeholder="Ton code admin" class="grow"><button class="btn gold" id="bk-code-go">OK</button></div>';
        var go=cBk.querySelector('#bk-code-go'), inp=cBk.querySelector('#bk-code');
        inp.focus();
        go.onclick=async function(){ var code=(inp.value||'').trim(); if(!code){return;} go.disabled=true; go.textContent='…';
          var lr=await adminLoginCode(code);
          if(!lr.ok){ go.disabled=false; go.textContent='OK'; m.insertAdjacentHTML('beforeend','<div style="color:var(--red);margin-top:6px">❌ '+esc(lr.reason==='code_invalide'?'code incorrect':lr.reason)+'</div>'); return; }
          VAULT.backupOnline=true; await persist(); await backupPush(); toast('☁️ Sauvegarde en ligne activée'); render();
        };
        inp.addEventListener('keydown',function(e){ if(e.key==='Enter')go.onclick(); });
      };
    }
    /* export wiring */
    cEx.querySelector('#csv1').onclick=exportOpsCsv;
    cEx.querySelector('#csv2').onclick=exportMonthlyCsv;
    cEx.querySelector('#verify').onclick=verifyExport;
    cEx.querySelector('#backup').onclick=exportBackup;
    var rf=cEx.querySelector('#restorefile');
    cEx.querySelector('#restore').onclick=function(){ rf.click(); };
    rf.onchange=function(){ if(rf.files[0])restoreBackup(rf.files[0]); rf.value=''; };
    /* sec wiring */
    cSec.querySelector('#rem').onchange=async function(e){ if(e.target.checked){ localStorage.setItem(LS_REMEMBER,'1'); await persist(); toast('Cet appareil restera déverrouillé'); } else { localStorage.removeItem(LS_REMEMBER); localStorage.removeItem(LS_DEV); toast('Déverrouillage automatique désactivé'); } };
    cSec.querySelector('#dedup').onclick=async function(){ var n=dedupeAll(); await persist(); toast(n?('🧹 '+n+' doublon(s) retiré(s)'):'✅ Aucun doublon'); render(); };
    cSec.querySelector('#lock2').onclick=lockNow;
    cSec.querySelector('#wipe').onclick=wipeAll;
  }
  function renameCat(oldN,newN){ if(!newN||oldN===newN)return; var cats=VAULT.categories; var i=cats.indexOf(oldN); if(i<0)return; if(cats.indexOf(newN)>=0){ toast('Catégorie déjà existante',true); render(); return; } cats[i]=newN;
    VAULT.tx.forEach(function(t){ if(t.category===oldN)t.category=newN; });
    Object.keys(VAULT.merchantMap).forEach(function(k){ if(VAULT.merchantMap[k]===oldN)VAULT.merchantMap[k]=newN; });
    if(VAULT.budget[oldN]!=null){ VAULT.budget[newN]=VAULT.budget[oldN]; delete VAULT.budget[oldN]; }
    persist(); toast('Renommée'); render(); }
  function delCat(c){ if(!confirm('Supprimer la catégorie « '+c+' » ? Ses opérations passeront en « Autres ».'))return;
    VAULT.categories=VAULT.categories.filter(function(x){return x!==c;});
    if(VAULT.categories.indexOf('Autres')<0)VAULT.categories.push('Autres');
    VAULT.tx.forEach(function(t){ if(t.category===c)t.category='Autres'; });
    Object.keys(VAULT.merchantMap).forEach(function(k){ if(VAULT.merchantMap[k]===c)VAULT.merchantMap[k]='Autres'; });
    persist(); render(); }

  /* ---------- Export ---------- */
  function dl(name, text, mime){ var blob=new Blob([text],{type:mime||'text/plain'}); var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); },100); }
  function csvCell(s){ s=String(s==null?'':s); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
  function exportOpsCsv(){
    var rows=[['Date','Libellé','Montant','Catégorie','Type','Document']];
    VAULT.tx.slice().sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(t){
      var doc=(VAULT.docs.find(function(d){return d.id===t.docId;})||{}).name||t.kind||'';
      rows.push([ymd(t.date),t.label,String(t.amount).replace('.',','),t.category,kindLabel(t.kind),doc]);
    });
    dl('operations_classees.csv','﻿'+rows.map(function(r){return r.map(csvCell).join(';');}).join('\n'),'text/csv');
    toast('CSV opérations téléchargé');
  }
  function exportMonthlyCsv(){
    var mk=months(); var cats=VAULT.categories.slice();
    var head=['Mois','Revenus','Dépenses','Net'].concat(cats);
    var rows=[head];
    mk.forEach(function(m){ var mm=analyze((VAULT.tx||[]).filter(function(t){return ym(t.date)===m;}));
      var row=[frMonth(m),f2(mm.rev),f2(mm.dep),f2(mm.net)]; cats.forEach(function(c){ row.push(f2(mm.byCat[c]||0)); }); rows.push(row); });
    dl('synthese_mensuelle.csv','﻿'+rows.map(function(r){return r.map(csvCell).join(';');}).join('\n'),'text/csv');
    toast('CSV synthèse téléchargé');
  }
  function f2(n){ return (Number(n)||0).toFixed(2).replace('.',','); }
  async function exportBackup(){
    /* le blob EST déjà chiffré dans localStorage — on l'exporte tel quel */
    var raw=localStorage.getItem(LS_VAULT); if(!raw){ await persist(); raw=localStorage.getItem(LS_VAULT); }
    dl('coffre-finances-'+ymd(Date.now())+'.kdmcfin', raw, 'application/json');
    toast('💾 Sauvegarde chiffrée exportée');
  }
  async function restoreBackup(file){
    try{
      var txt=await file.text(); var pack=JSON.parse(txt);
      if(!pack.salt||!pack.ct){ throw new Error('fichier invalide'); }
      var pass=prompt('Code du coffre de CETTE sauvegarde :'); if(!pass)return;
      var key=await deriveKey(pass, pack.salt);
      var data=await decWith(key,{iv:pack.iv,ct:pack.ct}); /* throw si mauvais code */
      if(!confirm('Restaurer '+(data.tx?data.tx.length:0)+' opérations ? Cela remplacera les données actuelles.'))return;
      data._salt=pack.salt; VAULT=data; KEY=key; localStorage.setItem(LS_VAULT,txt);
      audit('restore',file.name); await persist(); toast('✅ Sauvegarde restaurée'); render();
    }catch(e){ toast('❌ Restauration : '+(e.message||'code incorrect'),true); }
  }

  /* ---------- Verrou / wipe ---------- */
  function lockNow(){ KEY=null; VAULT=null; localStorage.removeItem(LS_DEV); showGate(); }
  function wipeAll(){ if(!confirm('⚠️ EFFACER TOUT le coffre Finances de cet appareil ? Irréversible (sauf sauvegarde exportée).'))return;
    if(!confirm('Confirme une dernière fois : tout supprimer ?'))return;
    localStorage.removeItem(LS_VAULT); localStorage.removeItem(LS_DEV); localStorage.removeItem(LS_REMEMBER);
    KEY=null; VAULT=null; toast('Coffre effacé'); showGate(); }

  /* ============================ Gate (déverrouillage) ============================ */
  function showGate(){
    var existing=!!localStorage.getItem(LS_VAULT);
    var app=$('app');
    app.innerHTML='<div class="gate"><div class="card">'+
      '<div class="ic">💰</div>'+
      '<h2>'+(existing?'Coffre Finances':'Nouveau coffre Finances')+'</h2>'+
      '<p>'+(existing?'Entre ton code de coffre pour déverrouiller.':'Choisis un code de coffre. Il chiffre TOUT (personne ne peut lire sans lui).')+'</p>'+
      '<input id="g-pass" type="password" inputmode="numeric" placeholder="Code du coffre" autocomplete="off">'+
      (existing?'':'<input id="g-pass2" type="password" inputmode="numeric" placeholder="Confirme le code" autocomplete="off" style="margin-top:8px">')+
      '<button class="btn gold" id="g-go" style="margin-top:12px;width:100%">'+(existing?'🔓 Déverrouiller':'Créer mon coffre')+'</button>'+
      '<div class="err" id="g-err"></div>'+
      '<label class="toggle"><input type="checkbox" id="g-rem" '+(localStorage.getItem(LS_REMEMBER)!=='0'?'checked':'')+'> Rester déverrouillé sur cet appareil</label>'+
      '<div class="lk"><a href="#" id="g-cloud">☁️ Restaurer depuis la sauvegarde en ligne</a></div>'+
      '<div id="g-cloudbox"></div>'+
      '</div></div>';
    var go=$('g-go');
    go.onclick=existing?unlock:createVault;
    $('g-pass').addEventListener('keydown',function(e){ if(e.key==='Enter')go.click(); });
    if(!existing){ $('g-pass2').addEventListener('keydown',function(e){ if(e.key==='Enter')go.click(); }); }
    $('g-cloud').onclick=function(e){ e.preventDefault(); cloudRestoreFromGate(); };
    setTimeout(function(){ try{$('g-pass').focus();}catch(e){} },80);
  }
  async function createVault(){
    var p=($('g-pass').value||'').trim(), p2=($('g-pass2').value||'').trim(), err=$('g-err');
    if(p.length<6){ err.textContent='Code trop court (6 min.).'; return; }
    if(p!==p2){ err.textContent='Les deux codes ne correspondent pas.'; return; }
    var salt=b64FromBuf(crypto.getRandomValues(new Uint8Array(16)).buffer);
    KEY=await deriveKey(p,salt);
    VAULT=blankVault(); VAULT._salt=salt;
    if($('g-rem').checked)localStorage.setItem(LS_REMEMBER,'1'); else localStorage.setItem(LS_REMEMBER,'0');
    audit('create','coffre créé'); await persist(); toast('🔐 Coffre créé'); STATE.tab='set'; render();
  }
  async function unlock(){
    var p=($('g-pass').value||'').trim(), err=$('g-err');
    if(!p){ err.textContent='Entre ton code.'; return; }
    try{
      var pack=JSON.parse(localStorage.getItem(LS_VAULT));
      var key=await deriveKey(p,pack.salt);
      var data=await decWith(key,{iv:pack.iv,ct:pack.ct}); /* throw si mauvais code */
      data._salt=pack.salt; VAULT=data; KEY=key;
      if($('g-rem').checked)localStorage.setItem(LS_REMEMBER,'1'); else { localStorage.setItem(LS_REMEMBER,'0'); localStorage.removeItem(LS_DEV); }
      await persist(); toast('🔓 Déverrouillé'); render();
    }catch(e){ err.textContent='Code incorrect.'; }
  }
  async function tryAutoUnlock(){
    if(localStorage.getItem(LS_REMEMBER)!=='1')return false;
    var devRaw=localStorage.getItem(LS_DEV), vRaw=localStorage.getItem(LS_VAULT);
    if(!devRaw||!vRaw)return false;
    try{
      var dev=JSON.parse(devRaw), pack=JSON.parse(vRaw);
      if(dev.salt!==pack.salt)return false;
      var key=await crypto.subtle.importKey('raw',bufFromB64(dev.key),{name:'AES-GCM'},true,['encrypt','decrypt']);
      var data=await decWith(key,{iv:pack.iv,ct:pack.ct});
      data._salt=pack.salt; VAULT=data; KEY=key; return true;
    }catch(e){ return false; }
  }

  async function cloudRestoreFromGate(){
    var box=$('g-cloudbox'), err=$('g-err');
    var pass=($('g-pass').value||'').trim();
    if(!pass){ err.style.color='var(--red)'; err.textContent='Entre d\'abord ton code de coffre ci-dessus.'; return; }
    box.innerHTML='<div class="row" style="margin-top:8px"><input id="g-acode" type="password" inputmode="numeric" placeholder="Ton code admin" class="grow" autocomplete="off"><button class="btn gold" id="g-acgo">Restaurer</button></div>';
    var inp=$('g-acode'), b=$('g-acgo'); try{inp.focus();}catch(e){}
    b.onclick=async function(){
      var code=(inp.value||'').trim(); if(!code)return; b.disabled=true; b.textContent='…'; err.style.color='var(--dim)'; err.textContent='⏳ connexion…';
      var lr=await adminLoginCode(code);
      if(!lr.ok){ b.disabled=false; b.textContent='Restaurer'; err.style.color='var(--red)'; err.textContent='Code admin : '+(lr.reason==='code_invalide'?'incorrect':lr.reason); return; }
      err.textContent='⏳ restauration…';
      try{ await restoreFromCloud(pass); toast('☁️ Restauré depuis la sauvegarde en ligne'); render(); }
      catch(e2){ b.disabled=false; b.textContent='Restaurer'; err.style.color='var(--red)'; err.textContent='❌ '+(e2.message==='need_pass'?'code de coffre incorrect':(e2.message||e2)); }
    };
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter')b.onclick(); });
  }

  /* ============================ Boot ============================ */
  (async function boot(){
    if(!(window.crypto&&crypto.subtle)){ $('app').innerHTML='<div class="gate"><div class="card"><div class="ic">🔒</div><h2>Navigateur non sécurisé</h2><p>Ouvre cette page en HTTPS (chiffrement requis).</p></div></div>'; return; }
    if(await tryAutoUnlock()){ render(); return; }
    showGate();
  })();

  /* Sauvegarde en ligne « temps réel » : pousse aussi au retour au premier plan. */
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible' && VAULT && VAULT.backupOnline) backupPush(); });
  window.addEventListener('focus',function(){ if(VAULT && VAULT.backupOnline) backupPush(); });
})();
</script>
</body>
