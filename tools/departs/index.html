<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
<title>Départs — Chefs Black Jack</title>
<style>
:root{--gold:#c9a227;--gold2:#ffd700;--bg:#0a1a0c;--bg2:#0e2410;--card:#13301a;--ink:#eaf5ea;--mut:#9bb89b;--ease:cubic-bezier(.4,0,.2,1);
 --c-work:#1d3a55;--c-rh:#7a5cc0;--c-r:#a98fe0;--c-cp:#d98aa8;--c-m:#d98a4a;--c-conv:#d8342e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;max-width:100vw;overflow-x:hidden;background:var(--bg);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;-webkit-text-size-adjust:100%}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 70px) env(safe-area-inset-left)}
header{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,#0e2410,#0a1a0c);
 border-bottom:1px solid rgba(201,162,39,.3);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.3px;color:var(--gold2)}
.sub{font-size:12px;color:var(--mut);margin:0}
.spacer{flex:1}
button{font-family:inherit;cursor:pointer}
select{font-family:inherit;background:#0a1a0c;color:var(--gold2);border:1px solid rgba(201,162,39,.4);
 border-radius:9px;padding:8px 10px;font-size:13px;font-weight:700;min-height:40px}
.btn{background:rgba(201,162,39,.12);color:var(--gold2);border:1px solid rgba(201,162,39,.4);
 border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;min-height:40px}
.btn:active{transform:translateY(1px)}
.btn.prim{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none}
.wrap{padding:12px 8px 4px}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid rgba(201,162,39,.18);border-radius:12px;background:var(--card)}
table{border-collapse:separate;border-spacing:0;font-size:12px;min-width:max-content}
th,td{padding:5px 4px;text-align:center;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.05)}
thead th{position:sticky;top:0;background:#0b1d0e;color:var(--gold2);font-size:11px;z-index:5;padding:7px 4px}
thead th.wknd{color:#ffb37a}
.cNom{position:sticky;left:0;background:#0f2613;text-align:left;z-index:8;min-width:118px;font-weight:700;
 box-shadow:2px 0 6px rgba(0,0,0,.4)}
thead .cNom{z-index:12}
.cNR{background:#10240f;min-width:46px;border-left:2px solid rgba(201,162,39,.35)}
.cCq{background:#10240f;min-width:46px}
.today{box-shadow:inset 0 0 0 2px var(--gold2)}
thead th.today{background:#3a3410;color:#fff}
.cell{font-size:10px;line-height:1.15;padding:3px 2px;min-width:42px}
.dep{display:inline-block;font-weight:900;font-size:12px;color:#ffe23a;background:rgba(0,0,0,.62);border-radius:5px;padding:0 5px;margin-top:2px}
.w{background:var(--c-work)} .conv{background:var(--c-conv);color:#ffe23a}
.rh{background:var(--c-rh)} .r{background:var(--c-r);color:#221} .cp{background:var(--c-cp);color:#221} .m{background:var(--c-m);color:#221}
.off .dep{display:none}
.mark{font-size:13px;color:var(--gold2);font-weight:700;min-height:28px}
body.admin .mark{cursor:pointer}
.ed{display:none}
body.admin .ed{display:inline;cursor:pointer;opacity:.55;margin-left:4px;font-size:12px}
.tot td{background:#0b1d0e;font-weight:800;color:var(--gold2);border-top:2px solid rgba(201,162,39,.35)}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;font-size:11px;color:var(--mut)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.note{padding:10px 14px;font-size:11px;color:var(--mut);line-height:1.5}
.posp{margin:8px;padding:12px;background:rgba(201,162,39,.06);border:1px solid rgba(201,162,39,.25);border-radius:12px}
.posp-t{font-size:13px;color:var(--gold2);font-weight:700;margin-bottom:10px}
.posp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.posp-nm{flex:1;font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.posp-btns{display:flex;gap:5px;flex-wrap:wrap}
.posp-b{width:38px;height:38px;border-radius:8px;border:2px solid #2a3a2c;background:#13241a;color:#7a8a7c;font-size:16px;font-weight:900}
.posp-b.sel{border-color:var(--gold2);background:rgba(201,162,39,.18);color:var(--gold2)}
.rest{padding:6px 14px;font-size:11px;color:var(--mut)}
.rest b{color:var(--gold2)}
.warn{color:#ffb37a;font-weight:700}
.adminbar{display:none;gap:8px;flex-wrap:wrap;padding:8px 12px;background:rgba(201,162,39,.06);border-bottom:1px solid rgba(201,162,39,.15)}
body.admin .adminbar{display:flex}
.mv{display:none}
body.admin .mv{display:inline-block;background:none;border:none;color:var(--gold2);font-size:13px;padding:0 3px}
body.admin td.cell{cursor:pointer}
body.admin td.cell:hover{outline:1px solid var(--gold2)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:100;display:none;
 align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.box{background:var(--card);border:1px solid rgba(201,162,39,.4);border-radius:16px;padding:22px;max-width:340px;width:100%}
.box h2{margin:0 0 6px;font-size:17px;color:var(--gold2)}
.box p{margin:0 0 14px;font-size:13px;color:var(--mut)}
.box input{width:100%;padding:12px;font-size:18px;text-align:center;letter-spacing:6px;border-radius:10px;
 border:1px solid rgba(201,162,39,.4);background:#0a1a0c;color:var(--ink);margin-bottom:12px}
.row{display:flex;gap:8px}
.badge{position:fixed;left:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);z-index:50;
 background:rgba(10,26,12,.9);color:var(--gold);border:1px solid rgba(201,162,39,.35);border-radius:20px;
 padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer}
.toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%);background:#13301a;color:var(--gold2);
 border:1px solid var(--gold);border-radius:10px;padding:10px 16px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.on{opacity:1}
tr.me td{box-shadow:inset 0 0 0 2px var(--gold)}
/* v1.12.1 — fond OPAQUE sur la colonne nom (sinon les cases du jour défilent
   dessous à travers le fond transparent → nom illisible, cf. capture Kevin). */
tr.me .cNom{background:#2c280c;color:var(--gold2);font-weight:800;z-index:9}
.mebanner{margin:8px 0 4px;padding:8px 12px;border:1px solid rgba(201,162,39,.35);border-radius:10px;
 background:rgba(10,26,12,.55);font-size:13px;color:var(--gold2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mebanner b{color:#fff}
.mebanner .jump{margin-left:auto;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
 border:none;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:13px}
#meSel{max-width:150px}
</style>

<body>
<header>
  <div>
    <h1>Départs — Chefs Black Jack</h1>
    <p class="sub" id="hSub"></p>
  </div>
  <span class="spacer"></span>
  <select id="meSel" onchange="setMe(this.value)" title="Connexion — ton nom ou matricule SBM (U…)"></select>
  <select id="moSel" onchange="setMonth(this.value)" title="Choisir le mois"></select>
  <input id="teamSearch" placeholder="🔎 équipe / nom" oninput="fillSel()" autocomplete="off" title="Chercher une autre équipe ou une personne"
   style="min-width:110px;max-width:150px;min-height:40px;padding:8px 10px;border-radius:9px;border:1px solid rgba(201,162,39,.4);background:#0a1a0c;color:var(--ink);font-size:13px">
  <select id="boardSel" onchange="switchBoard(this.value)" title="Équipe du mois"></select>
  <button class="btn" id="lockBtn" onclick="toggleAdmin()">🔒 Admin</button>
</header>

<div class="adminbar">
  <button class="btn" onclick="togglePositions()">⚙️ Positions de départ</button>
  <button class="btn" id="anchorBtn" onclick="toggleAnchor()">📍 Placer Départ 1</button>
  <button class="btn" onclick="resetAnchor()">↩︎ Rotation normale</button>
  <button class="btn" onclick="resetCounters()">↺ Vider NR/5e</button>
  <button class="btn" onclick="resetAll()">⚠️ Réinit. ce mois</button>
  <span class="sub" id="adminHint" style="align-self:center">Touche une case = corriger le code · NR/5e : tap = ✗, ✎ = écrire</span>
</div>

<div class="wrap">
  <div class="mebanner" id="meBanner" style="display:none"></div>
  <div class="scroll"><table id="grid"></table></div>
  <div id="posPanel"></div>
  <div class="rest" id="restCheck"></div>
  <div class="legend">
    <span><i class="dot" style="background:#fbfaf3;border:1px solid #b8c0b0"></i>travail</span>
    <span><i class="dot" style="background:#d8342e"></i>Convention</span>
    <span><i class="dot" style="background:#ffc488"></i>Café de Paris</span>
    <span><i class="dot" style="background:var(--c-rh)"></i>RH</span>
    <span><i class="dot" style="background:var(--c-r)"></i>R</span>
    <span><i class="dot" style="background:#f8c0d0"></i>CP</span>
    <span><i class="dot" style="background:#f0a0a0"></i>M/abs</span>
    <span><b style="color:var(--gold2)">↑N</b> = ordre de départ</span>
    <span><b>NR</b> = non-retour · <b>5e</b> = cinquième</span>
  </div>
  <div class="rest" id="appDiag" style="cursor:pointer" onclick="showAppDiag()" title="Toucher pour le détail"></div>
</div>

<div class="modal" id="pinModal">
  <div class="box">
    <h2>🔒 Accès admin</h2>
    <p>Code à 6 chiffres pour modifier (les collègues restent en lecture seule).</p>
    <input id="pinIn" type="password" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="off">
    <div class="row">
      <button class="btn" style="flex:1" onclick="closePin()">Annuler</button>
      <button class="btn prim" style="flex:1" onclick="checkPin()">Déverrouiller</button>
    </div>
  </div>
</div>

<div class="badge" id="ver" onclick="forceRefresh()">v1.13.2</div>
<div class="toast" id="toast"></div>

<script src="boards-gen.js"></script>

function isWork(c){return !!c && ["RH","R","CP","M","AF","RRT","PAT","MT","AT","FL","ABS","ABI","CSS","DEPL","DEP","SS"].indexOf(c)<0;}
function cellClass(c){
  if(!c) return "off";
  if(c==="RH") return "rh"; if(c==="R") return "r";
  if(c==="CP") return "cp"; if(["M","AF","RRT","PAT","MT","AT","ABS","ABI","DEPL","DEP","SS"].indexOf(c)>=0) return "m";

}

var CODE_COLORS={

  "RH":{bg:"#c8a8e0",fg:"#0c0430"}, "R":{bg:"#d8c8f0",fg:"#2a1850"}, "CP":{bg:"#f8c0d0",fg:"#2a0410"},
  "AF":{bg:"#a8e0a8",fg:"#031805"}, "M":{bg:"#ffe840",fg:"#1a1004"}, "RRT":{bg:"#ffd850",fg:"#1a1004"},
  "MAL":{bg:"#ffe840",fg:"#1a1004"}, "MT":{bg:"#ffe840",fg:"#1a1004"}, "AT":{bg:"#ffe840",fg:"#1a1004"},

// AF (vert), maladie M (rouge clair), RRT (jaune). Aligné sur cmcCodeStatusBg de l'app.
function codeStyle(c){
  if(!c) return null;
  if(/['"]$/.test(c)) return CONV_COLOR;                                  // Convention = ' ou " EN FIN (19/4', 19/3') → rouge ; PAS les 'c/c chef → blancs
  if(/\*/.test(c)||/CDP/i.test(c)) return {bg:"#ffc488",fg:"#5a2808"};    // CDP → orange
  var base=String(c).replace(/[c*:]+$/,"").replace(/['"]/g,"").toUpperCase();
  if(base==="CP"||base==="CRH"||base==="CDP"||base==="CDH"||base==="CPS"||base==="CPM") return {bg:"#f8c0d0",fg:"#2a0410"}; // congé → rose
  if(base==="RH") return {bg:"#c8a8e0",fg:"#0c0430"};                      // repos hebdo → violet
  if(base==="R")  return {bg:"#d8c8f0",fg:"#2a1850"};                      // repos → lavande
  if(base==="AF") return {bg:"#a8e0a8",fg:"#031805"};                      // formation → vert
  if(base==="M"||base==="MAL") return {bg:"#f0a0a0",fg:"#3a0808"};         // maladie → rouge clair
  if(base==="RRT"||base==="PRT"||base==="RTP"||base==="RTR") return {bg:"#ffd850",fg:"#1a1004"}; // RRT → jaune
  if(base==="DEPL"||base==="DEP") return {bg:"#e0d2bc",fg:"#3a2810"};      // déplacement → beige
  if(base==="AT"||base==="PAT"||base==="ABI"||base==="ABS"||base==="SS"||base==="CL"||base==="CFL"||base==="MT") return {bg:"#dcdcdc",fg:"#202020"}; // autres absences → gris
  return {bg:"#fbfaf3",fg:"#1a2a1a"};                                      // TRAVAIL → blanc (PDF)
}
function isRest(c){return c==="RH"||c==="R";} // pour la détection d'équipe (jours de repos)

// rythme de roulement (chef plein-mois) + générateur de planning par personne
function mkPerson(rhy,days,opts){ // opts:{from,to,marks}
  var o={};
  for(var d=1;d<=days;d++){
    var c=rhy[d]||"";
    if(opts.from && d<opts.from) c="CP";
    if(opts.to && d>opts.to) c="CP";
    if(opts.marks && opts.marks[d]!==undefined) c=opts.marks[d];
    o[d]=c;
  }
  return o;
}

// départ : taille = nb de personnes (conservée même en congé). W = jours où ≥1 membre travaille.
function compute(){
  var days=B.days;
  // IDENTIQUE à calcDepPos (CMCteams) : chefs ACTIFS uniquement (>=1 jour travaillé, full-CP exclus),
  // refEmp = 1er chef actif, wi = index du jour dans SES jours de travail, base = index dans les chefs actifs.
  var active=ST.order.filter(function(nm){ for(var d=1;d<=days;d++){ if(isWork(ST.codes[nm][d])) return true; } return false; });
  var sl=active.length, SEQ=seqForSize(sl);
  // v1.11.1 (Kevin 2026-06-22 « il manque les départs à partir du 16 ») :
  // jours de travail de l'ÉQUIPE = UNION des jours travaillés par TOUT chef actif.
  // AVANT : workDays indexés sur le SEUL 1er chef actif → s'il part en CP à la
  // mi-mois (ex MARIOTTINI J en CP du 16 au 31), wi=-1 pour TOUS dès le 16 →
  // plus AUCUN ordre de départ affiché alors que les autres chefs travaillent.
  // La rotation avance sur chaque jour où L'ÉQUIPE a un service.
  var workDays=[];
  for(var d=1;d<=days;d++){
    for(var _ai=0;_ai<active.length;_ai++){ if(isWork(ST.codes[active[_ai]][d])){ workDays.push(d); break; } }
  }
  var deps={}; ST.order.forEach(function(nm){ deps[nm]={}; });
  var off=ST.off||0;
  // index de base (rotation) par chef : CI perso (CMCteams) sinon position dans active.
  var baseOf={}; active.forEach(function(nm,ai){ baseOf[nm]=(ST.ci&&ST.ci[nm]!==undefined)?ST.ci[nm]:ai; });
  // v1.11.1 (Kevin 2026-06-22 « passer à 4 pour l'algo ») : l'ordre de départ est
  // calculé PAR JOUR sur les chefs réellement PRÉSENTS, et la TAILLE de séquence
  // suit ce nombre (6 en 1ʳᵉ quinzaine, 4 en 2ᵉ quand 2 chefs sont en CP) → fini
  // les numéros fantômes/trous. La rotation (wi) avance sur chaque jour de service
  // de l'équipe (workDays = union). Jours 1-12 inchangés ; le jour où le 1er chef
  // est absent (RRT/CP) reçoit désormais ses départs au lieu de rester vide.
  for(var d=1;d<=days;d++){
    var wi=workDays.indexOf(d); if(wi<0) continue;
    var present=active.filter(function(nm){ return isWork(ST.codes[nm][d]); })
                      .sort(function(a,b){ return baseOf[a]-baseOf[b]; });
    var pc=present.length; if(!pc) continue;
    var SEQd=seqForSize(pc), rot=(wi%4)+Math.floor(wi/4)+off;
    present.forEach(function(nm,j){ deps[nm][d]=SEQd[(((rot+j)%pc)+pc)%pc]; });
  }
  return {deps:deps,workDays:workDays,SEQ:SEQ,n:sl,active:active};
}

    html+="<tr"+(nm===ME?" class='me'":"")+"><td class='cNom'>"+esc(nm)+"</td>";
    for(var d=1;d<=days;d++){ var c=ST.codes[nm][d]||"", dep=R.deps[nm][d], stl=codeStyle(c);
      html+="<td class='cell"+(dep?"":" off")+(d===todayD?" today":"")+"'"
        +(stl?(" style='background:"+stl.bg+";color:"+stl.fg+"'"):"")
        +" onclick=\"editCell('"+esc(nm)+"',"+d+")\">"+esc(c||"·")+(dep?"<span class='dep'>"+dep+"</span>":"")+"</td>"; }
    html+="<td class='cNR mark' onclick=\"addCross('nr','"+esc(nm)+"')\">"+esc(nr)
      +"<span class='ed' onclick=\"event.stopPropagation();editMark('nr','"+esc(nm)+"')\">✎</span></td>";
    html+="<td class='cCq mark' onclick=\"addCross('cq','"+esc(nm)+"')\">"+esc(cq)
      +"<span class='ed' onclick=\"event.stopPropagation();editMark('cq','"+esc(nm)+"')\">✎</span></td></tr>";
  });
  var cx=function(o){var t=0;ST.order.forEach(function(nm){t+=((o[nm]||"").match(/✗/g)||[]).length;});return t;};
  html+="<tr class='tot'><td class='cNom'>TOTAL ✗</td>";
  for(var d2=1;d2<=days;d2++) html+="<td"+(d2===todayD?" class='today'":"")+"></td>";
  html+="<td class='cNR'>"+cx(ST.nr)+"</td><td class='cCq'>"+cx(ST.cq)+"</td></tr></tbody>";
  document.getElementById("grid").innerHTML=html;
  if(todayD){ var sc=document.querySelector(".scroll"), th=document.querySelector("#grid thead th.today");
    if(sc&&th) sc.scrollLeft=Math.max(0, th.offsetLeft - sc.clientWidth/2 + th.offsetWidth/2); }
  var _pp=document.getElementById("posPanel"); if(_pp) _pp.innerHTML=(isAdmin()&&window._posOpen)?positionsPanelHTML(R):"";
  document.getElementById("hSub").textContent=B.kind==="abs"
    ? B.month+" · "+ST.order.length+" absents (M/CP/FORMATION)"
    : B.month+" · "+ST.order.length+" chefs · séquence "+R.SEQ.join("·");
  // contrôle jours de repos : comparer chaque chef à l'ancre SUR LA PÉRIODE COMMUNE
  // (un chef en CP une partie du mois a moins de RH/R — normal, on ne compare que les jours planifiés des deux)
  var sched=function(nm,d){ var c=ST.codes[nm][d]||""; return c!=="" && ["CP","M","AF","ABS","ABI","FL","DEPL","DEP","SS"].indexOf(c)<0; };
  var cntSched=function(nm){ var t=0; for(var d=1;d<=B.days;d++) if(sched(nm,d)) t++; return t; };
  var anchor=ST.order.slice().sort(function(a,b){return cntSched(b)-cntSched(a);})[0];
  var bad=[];
  ST.order.forEach(function(nm){ if(nm===anchor)return; var miss=0;
    for(var d=1;d<=B.days;d++){ if(sched(nm,d)&&sched(anchor,d) && isRest(ST.codes[nm][d])!==isRest(ST.codes[anchor][d])) miss++; }
    if(miss>=2) bad.push(nm+" ("+miss+"j)"); });
  document.getElementById("restCheck").innerHTML = B.kind==="abs"
    ? "🛌 Absents tout le mois (M/CP/FORMATION) — pas d'ordre de départ. Chacun a bien son planning."
    : (bad.length===0
      ? "<b>✅ Jours de repos cohérents</b> sur la période commune ("+ST.order.length+" chefs) — équipe validée."
      : "<span class='warn'>⚠️ Repos différents</span> pour : "+bad.join(", ")+" → vérifier (lecture imprécise ou équipe miroir).");
  // bannière "Ma vue" : équipe + miroir de la personne choisie
  var mb=document.getElementById("meBanner");
  if(mb){
    if(!ME){ mb.style.display="none"; mb.innerHTML=""; }
    else {
      var inHere=ST.order.indexOf(ME)>=0, myBid=teamForMeInMonth(), mir=mirrorBoardId(BID);
      var h2="👤 <b>"+esc(ME)+"</b>";
      if(inHere){ h2+=" · ton équipe : <b>"+esc(B.label)+"</b>";
        if(mir) h2+=" <button class='jump' onclick=\"switchBoard('"+mir+"')\">Équipe miroir →</button>"; }
      else if(myBid){ h2+=" · ton équipe : <b>"+esc(BOARDS[myBid].label)+"</b> <button class='jump' onclick=\"switchBoard('"+myBid+"')\">Aller à mon équipe →</button>"; }
      else { h2+=" · <i>pas d'équipe ce mois</i>"; }
      mb.innerHTML=h2; mb.style.display="flex";
    }
  }
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

function isAdmin(){return document.body.classList.contains("admin");}
function guard(){ if(!isAdmin()){toast("Lecture seule — déverrouille en admin");return false;} return true; }
function move(idx,dir){ if(!guard())return; var j=idx+dir; if(j<0||j>=ST.order.length)return;
  var a=ST.order,t=a[idx];a[idx]=a[j];a[j]=t; save(); render(); }
function addCross(f,nm){ if(!guard())return; ST[f][nm]=(ST[f][nm]||"")+"✗"; save(); render(); toast(nm+" "+(f==="nr"?"non-retour":"5e")+" +✗"); }
function editMark(f,nm){ if(!guard())return; var v=prompt((f==="nr"?"Non-retour":"5ème")+" — "+nm+"\n(✗ ou texte ; vide pour effacer)",ST[f][nm]||"");
  if(v===null)return; ST[f][nm]=v.trim(); save(); render(); }
function editCell(nm,d){ if(!guard())return;
  if(window._anchorMode){ setAnchor(nm,d); return; }
  var v=prompt("Code "+nm+" — jour "+d+"\n(ex 20/5c, 16/3*, RH, R, CP, M ; vide = rien)",ST.codes[nm][d]||"");
  if(v===null)return; ST.codes[nm][d]=v.trim(); save(); render(); }
function toggleAnchor(){ if(!guard())return; window._anchorMode=!window._anchorMode;
  document.getElementById("anchorBtn").style.background=window._anchorMode?"linear-gradient(135deg,var(--gold),var(--gold2))":"";
  document.getElementById("anchorBtn").style.color=window._anchorMode?"#000":"";
  document.getElementById("adminHint").innerHTML=window._anchorMode
    ? "<b style='color:var(--gold2)'>📍 Mode Départ 1 : touche la case de la personne (jour) qui doit être DÉPART 1 → toute la rotation se cale.</b>"
    : "Touche une case = corriger le code · NR/5e : tap = ✗, ✎ = écrire";
  toast(window._anchorMode?"📍 Touche la case = Départ 1":"Mode normal"); }
function anchorOff(nm,d){ // offset pour que nm = Départ 1 le jour d (null si impossible)
  var R=compute(); var ai=R.active.indexOf(nm); if(ai<0) return null;
  var wi=R.workDays.indexOf(d); if(wi<0 || !isWork(ST.codes[nm][d])) return null;
  var base=(ST.ci&&ST.ci[nm]!==undefined)?ST.ci[nm]:ai, sl=R.n;
  return ((-((wi%4)+Math.floor(wi/4)+base))%sl+sl)%sl; }
function setAnchor(nm,d){ var o=anchorOff(nm,d);
  if(o===null){ toast("Choisis un JOUR TRAVAILLÉ d'une personne présente"); return; }
  ST.off=o; save();
  window._anchorMode=false; document.getElementById("anchorBtn").style.background=""; document.getElementById("anchorBtn").style.color="";
  document.getElementById("adminHint").textContent="Touche une case = corriger le code · NR/5e : tap = ✗, ✎ = écrire";
  render(); toast("✅ "+nm+" = Départ 1 le "+d+" — rotation calée"); }
function resetAnchor(){ if(!guard())return; ST.off=0; save(); render(); toast("Rotation remise par défaut"); }
function togglePositions(){ if(!guard())return; window._posOpen=!window._posOpen; render(); toast(window._posOpen?"Positions : touche un n° pour échanger":"Fermé"); }
function panelDay(R){ var now=new Date(); var td=(now.getFullYear()===B.year&&now.getMonth()===B.monthIdx)?now.getDate():0;
  if(td && R.workDays.indexOf(td)>=0) return td;
  return R.workDays.length?R.workDays[R.workDays.length-1]:1; }
function setPos(nm,p){ if(!guard())return; var R=compute(); var day=panelDay(R);
  if(!ST.ci) ST.ci={}; R.active.forEach(function(n,ai){ if(ST.ci[n]===undefined) ST.ci[n]=ai; });
  var other=null; R.active.forEach(function(n){ if(n!==nm && R.deps[n][day]===p) other=n; });
  if(other){ var t=ST.ci[nm]; ST.ci[nm]=ST.ci[other]; ST.ci[other]=t; save(); render(); toast(nm+" ⇄ "+other+" (départ "+p+")"); }
  else { toast("Départ "+p+" non occupé ce jour (trou)"); } }
function replaceLine(){ if(!guard())return; var R=compute();
  var entr=prompt("Remplaçant (qui ENTRE et reprend la ligne de départ) — nom exact :",""); if(entr===null)return; entr=entr.trim();
  if(ST.order.indexOf(entr)<0){ toast("Nom introuvable dans cette équipe"); return; }
  var leav=prompt("Personne REMPLACÉE (dont il reprend la ligne) — nom exact :",""); if(leav===null)return; leav=leav.trim();
  if(ST.order.indexOf(leav)<0){ toast("Nom remplacé introuvable"); return; }
  if(entr===leav){ toast("Choisis deux personnes différentes"); return; }
  if(!ST.ci) ST.ci={}; R.active.forEach(function(n,ai){ if(ST.ci[n]===undefined) ST.ci[n]=ai; });
  var base=(ST.ci[leav]!==undefined)?ST.ci[leav]:ST.order.indexOf(leav);
  ST.ci[entr]=base; save(); render(); toast(entr+" reprend la ligne de départ de "+leav); }
function positionsPanelHTML(R){
  var day=panelDay(R), sl=R.n;
  var h="<div class='posp'><div class='posp-t'>⚙️ Ordre de départ du "+day+" — touche un n° pour ÉCHANGER deux personnes (les lignes ne bougent pas) · <button class='posp-b' style='width:auto;padding:2px 9px' onclick=\"replaceLine()\">♻︎ Remplacement</button></div>";
  R.active.forEach(function(nm){ var cur=R.deps[nm][day];
    h+="<div class='posp-row'><span class='posp-nm'>"+esc(nm)+(cur?"":" <span style='color:#888'>(absent)</span>")+"</span><span class='posp-btns'>";
    for(var p=1;p<=sl;p++){ h+="<button class='posp-b"+(cur===p?" sel":"")+"' onclick=\"setPos('"+esc(nm)+"',"+p+")\">"+p+"</button>"; }
    h+="</span></div>"; });
  return h+"</div>"; }
function resetCounters(){ if(!guard())return; if(!confirm("Vider NR et 5e ?"))return; ST.nr={};ST.cq={};save();render();toast("Vidé"); }
function resetAll(){ if(!guard())return; if(!confirm("Réinitialiser ce mois (codes, ordre, NR/5e) ?"))return;
  try{localStorage.removeItem(B.key);}catch(e){} load(); render(); toast("Réinitialisé"); }

function switchBoard(id){ if(!BOARDS[id])return; BID=id; CURMO=BOARDS[id].year+"-"+BOARDS[id].monthIdx;
  try{localStorage.setItem("cmc_dep_board",id);}catch(e){}
  var mo=document.getElementById("moSel"); if(mo)mo.value=CURMO;
  fillSel(); load(); render(); }
// v1.12.1 — liste des équipes SCOPÉE au mois choisi (CURMO), groupée par famille,
// + recherche : si on tape qqch, on cherche dans TOUS les mois (autres équipes/personnes).
function _famOf(k){ var b=BOARDS[k]; if(!b)return "bj"; if(b.kind==="abs")return "abs"; if(b.fam)return b.fam==="baccara"?"cmc":b.fam;
  if(/-r\d+$/.test(k))return "roulettes"; if(/-c\d+$/.test(k)||/-amenage/.test(k))return "cmc"; return "bj"; }
function fillSel(){ var s=document.getElementById("boardSel"); if(!s)return; s.innerHTML="";
  var q=((document.getElementById("teamSearch")||{}).value||"").trim().toLowerCase();
  function matchQ(k){ if(!q)return true; var b=BOARDS[k]; if(String(b.label).toLowerCase().indexOf(q)>=0)return true;
    return (b.people||[]).some(function(p){return String(p.name).toLowerCase().indexOf(q)>=0||(p.id&&String(p.id).toLowerCase().indexOf(q)>=0);}); }
  function inScope(k){ if(q)return true; var b=BOARDS[k]; return (b.year+"-"+b.monthIdx)===CURMO; } // recherche = tous mois
  var groups=[["♣ Chefs Black Jack","bj"],["🎡 Roulettes","roulettes"],["🃏 CMC (cartes)","cmc"],["🏖 Absences","abs"]];
  var used={};
  groups.forEach(function(g){ var keys=Object.keys(BOARDS).filter(function(k){return !used[k]&&inScope(k)&&matchQ(k)&&_famOf(k)===g[1];}); if(!keys.length)return;
    var og=document.createElement("optgroup"); og.label=g[0]+(q?"":"");
    keys.forEach(function(k){ used[k]=1; var o=document.createElement("option"); o.value=k; o.textContent=BOARDS[k].label; if(k===BID)o.selected=true; og.appendChild(o); });
    s.appendChild(og); });
  Object.keys(BOARDS).filter(function(k){return !used[k]&&inScope(k)&&matchQ(k);}).forEach(function(k){ var o=document.createElement("option"); o.value=k; o.textContent=BOARDS[k].label; if(k===BID)o.selected=true; s.appendChild(o); });
  if(!s.options.length){ var o0=document.createElement("option"); o0.value=""; o0.textContent=q?"(aucun résultat)":"(aucune équipe ce mois)"; s.appendChild(o0); }
}
// ── Ma vue (vue par personne) ──
function allNames(){ var set={},out=[]; Object.keys(BOARDS).forEach(function(k){ var b=BOARDS[k]; if(b.kind==="abs")return;
  (b.people||[]).forEach(function(p){ if(!set[p.name]){ set[p.name]=1; out.push(p.name); } }); }); out.sort(); return out; }
function boardForName(nm){ var ks=Object.keys(BOARDS); for(var i=0;i<ks.length;i++){ var b=BOARDS[ks[i]]; if(b.kind==="abs")continue;
  if((b.people||[]).some(function(p){return p.name===nm;})) return ks[i]; } return null; }
function mirrorBoardId(id){ if(!id)return null;
  if(DEP_MIRROR[id]&&BOARDS[DEP_MIRROR[id]])return DEP_MIRROR[id]; // miroir explicite (données générées)
  if(/m$/.test(id)){ var base=id.replace(/m$/,""); return BOARDS[base]?base:null; } var m=id+"m"; return BOARDS[m]?m:null; }
// v1.12 — résout une personne par matricule SBM (U…) → {bid, name}
function personById(uid){ if(!uid)return null; var U=String(uid).toUpperCase(); var ks=Object.keys(BOARDS);
  for(var i=0;i<ks.length;i++){ var b=BOARDS[ks[i]]; if(b.kind==="abs")continue;
    var p=(b.people||[]).find(function(x){return x.id&&String(x.id).toUpperCase()===U;}); if(p)return {bid:ks[i],name:p.name}; } return null; }
function fillMeSel(){ var s=document.getElementById("meSel"); if(!s)return; s.innerHTML="";
  var o0=document.createElement("option"); o0.value=""; o0.textContent="👤 Ma vue…"; s.appendChild(o0);
  allNames().forEach(function(n){ var o=document.createElement("option"); o.value=n; o.textContent=n; if(n===ME)o.selected=true; s.appendChild(o); }); }
function setMe(val){ var nm=val;
  // v1.12 — accepte aussi un matricule SBM (U…) : connexion par identifiant employé
  if(/^u\w*\d/i.test(val||"")){ var hit=personById(val); if(hit){ nm=hit.name; } }
  ME=nm; try{localStorage.setItem("cmc_dep_me",nm);}catch(e){}
  // « ma vue » → MON équipe POUR LE MOIS affiché (pas le 1er board trouvé tous mois)
  if(nm){ var bid=teamForMeInMonth()||boardForName(nm); if(bid&&bid!==BID){ switchBoard(bid); return; } } render(); }

function toggleAdmin(){ if(isAdmin()){ document.body.classList.remove("admin"); document.getElementById("lockBtn").textContent="🔒 Admin"; toast("Verrouillé — lecture seule"); }
  else { document.getElementById("pinModal").classList.add("on"); setTimeout(function(){var e=document.getElementById("pinIn");if(e){e.value="";e.focus();}},60); } }
function closePin(){ document.getElementById("pinModal").classList.remove("on"); }
async function sha256(s){ var b=new TextEncoder().encode(s); var h=await crypto.subtle.digest("SHA-256",b);
  return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,"0");}).join(""); }
async function checkPin(){ var h=await sha256((document.getElementById("pinIn").value||"").trim());
  if(h===PIN_SHA256){ document.body.classList.add("admin"); document.getElementById("lockBtn").textContent="🔓 Quitter admin"; closePin(); render(); toast("Mode admin activé"); }
  else toast("Code incorrect"); }
document.addEventListener("keydown",function(e){ if(e.key==="Enter"&&document.getElementById("pinModal").classList.contains("on"))checkPin(); });
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("on"); clearTimeout(window._tt); window._tt=setTimeout(function(){t.classList.remove("on");},2200); }
function _appDiagText(){ var d=window._appBoardDiag||{}; var c=d.counts||{};
  if(window.DEPARTS_GEN&&window.DEPARTS_GEN.months&&window.DEPARTS_GEN.months.length){
    var _ms=window.DEPARTS_GEN.months.map(function(m){return m.label;}).join(" + ");
    var _nb=Object.keys(window.DEPARTS_GEN.boards||{}).length;
    return "✅ Plannings à jour : "+_ms+" — "+_nb+" équipes intégrées (pas besoin d'ouvrir l'app).";
  }
  if(!d.cmc_e&&!d.ov) return "📥 Données de l'app introuvables — ouvre d'abord l'app CMCteams (même iPhone) puis reviens ici.";
  if(!d.hasKey) return "📥 Aucun planning juillet 2026 dans l'app — importe le PDF de juillet dans CMCteams, puis recharge.";
  var fam=["roulettes","cmc","amenage"].filter(function(f){return c[f];}).map(function(f){return ({roulettes:"Roulettes",cmc:"Cartes CMC",amenage:"CMC aménagé"}[f])+" "+c[f];});
  return fam.length ? ("📥 Importé de l'app : "+fam.join(" · ")+" → "+(d.added||0)+" équipe(s).")
                    : "📥 App lue mais aucun employé carte/roulette trouvé pour juillet (vérifie l'import dans CMCteams).";
}
function showAppDiag(){ var d=window._appBoardDiag||{}; var c=d.counts||{};
  toast(_appDiagText()+" | app:"+(d.cmc_e?"oui":"non")+" planning:"+(d.hasKey?"oui":"non")+" R:"+(c.roulettes||0)+" C:"+(c.cmc||0)+" A:"+(c.amenage||0)); }
function paintAppDiag(){ var el=document.getElementById("appDiag"); if(!el)return;
  var d=window._appBoardDiag||{};
  var hasGen=!!(window.DEPARTS_GEN&&window.DEPARTS_GEN.months&&window.DEPARTS_GEN.months.length);
  var warn=hasGen?false:(!d.cmc_e||!d.hasKey||!(d.added>0));
  el.innerHTML=(warn?"<span class='warn'>":"<b style='color:var(--gold2)'>")+_appDiagText()+(warn?"</span>":"</b>"); }
function forceRefresh(){ var go=function(){location.replace(location.href.split("?")[0]+"?_force_upd_"+Date.now());};
  if('serviceWorker' in navigator){ navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));})
    .then(function(){return ('caches' in window)?caches.keys().then(function(k){return Promise.all(k.map(function(x){return caches.delete(x);}));}):0;}).then(go).catch(go); } else go(); }

document.getElementById("ver").textContent=APP_VER;
var ME=(function(){try{return localStorage.getItem("cmc_dep_me")||"";}catch(e){return "";}})();
// v1.12 — lien profond ?me=U11804 (matricule SBM) ou ?me=DESARZENS+K (nom) →
// ouvre directement sur l'équipe de l'employé (connexion par identifiant).
var _MEBID=null;
try{ var _mq=new URLSearchParams(location.search).get("me");
  if(_mq){ if(/^u\w*\d/i.test(_mq)){ var _h=personById(_mq); if(_h){ ME=_h.name; _MEBID=_h.bid; } } else { ME=_mq; _MEBID=boardForName(_mq); }
    try{localStorage.setItem("cmc_dep_me",ME);}catch(_){} }
}catch(_){}
BID=(function(){ if(_MEBID&&BOARDS[_MEBID])return _MEBID;
  try{var s=localStorage.getItem("cmc_dep_board");return (s&&BOARDS[s])?s:defaultBoard();}catch(e){return defaultBoard();}})();
CURMO=(BID&&BOARDS[BID])?(BOARDS[BID].year+"-"+BOARDS[BID].monthIdx):null;
fillSel(); fillMeSel(); fillMoSel(); load(); render(); paintAppDiag();
if(_appCmcCount>0){ setTimeout(function(){ toast("✅ CMC importé depuis l'app : "+_appCmcCount+" équipes"); },800); }
</script>
