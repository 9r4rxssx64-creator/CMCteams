<!doctype html>
<!-- v0.11.12 -->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#0a1622" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PoolPilot">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>PoolPilot — Beatbot+</title>
<script>/* thème avant premier rendu (pas de flash) */
try{var _t=localStorage.getItem("pp_theme");if(_t==="light"){document.documentElement.setAttribute("data-theme","light");}}catch(e){}</script>
<style>
  :root{
    --bg:#08131f; --bg2:#0e2032; --card:#11263a; --card2:#183753;
    --line:#22456580; --line2:#2b5580; --txt:#eef5fb; --dim:#a8c4dc; --dim2:#8ba9c4;
    --gold:#3ad0ff; --gold2:#0e88c9; --acc:#3ad0ff;
    --ok:#3ddc84; --warn:#f2b632; --bad:#f0674d; --stair:#c88bff; --deep:#2d7bd6;
    --grad:linear-gradient(135deg,#4ad6ff,#0e88c9);
    --r:16px; --r-sm:12px;
    --sh:0 10px 30px -16px rgba(0,0,0,.75); --sh-btn:0 8px 20px -8px rgba(14,136,201,.55);
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  /* ---- thème clair (☀️, opt-in, persistant) ---- */
  html[data-theme="light"]{
    --bg:#eef6fc; --bg2:#dfecf7; --card:#ffffff; --card2:#eef5fb;
    --line:#c9dded; --line2:#aecbe2; --txt:#0b2334; --dim:#48708f; --dim2:#5f83a1;
    --gold:#0e88c9; --gold2:#0a6ba0; --acc:#0e88c9; --deep:#1d68c0;
    --sh:0 10px 26px -18px rgba(21,72,110,.45); --sh-btn:0 8px 18px -8px rgba(14,136,201,.45);
  }
  html[data-theme="light"] body{
    background:
      radial-gradient(120% 60% at 50% -10%,rgba(14,136,201,.10),transparent 60%),
      radial-gradient(90% 50% at 100% 0%,rgba(58,208,255,.12),transparent 55%),
      linear-gradient(180deg,#eaf4fc,#dcebf7 55%);
    color:var(--txt);
  }
  html[data-theme="light"] #top{background:rgba(240,247,253,.78)}
  html[data-theme="light"] #nav{background:rgba(240,247,253,.86)}
  html[data-theme="light"] .card{background:linear-gradient(180deg,#ffffff,#f4f9fd);box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.8)}
  html[data-theme="light"] input,html[data-theme="light"] select,html[data-theme="light"] textarea{background:#fff;color:var(--txt)}
  html[data-theme="light"] .btn{color:#fff}
  html[data-theme="light"] .btn.ghost{background:#eaf3fb;color:var(--txt)}
  html[data-theme="light"] .stat{background:linear-gradient(180deg,#fff,#eef5fb)}
  html[data-theme="light"] .pill,html[data-theme="light"] .hero-state,html[data-theme="light"] .chipzone{background:#eaf3fb;color:var(--txt)}
  html[data-theme="light"] .chip-robot,html[data-theme="light"] #top .robot{background:#eaf3fb;color:var(--txt)}
  html[data-theme="light"] .tool{background:#eaf3fb}
  html[data-theme="light"] .tool.on{background:rgba(14,136,201,.14);color:#0b2334}
  html[data-theme="light"] canvas{background:#dfeefa}
  html[data-theme="light"] code{background:#eaf3fb}
  html[data-theme="light"] .note{color:#0d3752;background:linear-gradient(180deg,rgba(14,136,201,.10),rgba(14,136,201,.04))}
  html[data-theme="light"] .warn{color:#6b4d05;background:linear-gradient(180deg,rgba(242,182,50,.16),rgba(242,182,50,.06))}
  html[data-theme="light"] #nav button.on{background:rgba(14,136,201,.12)}
  html[data-theme="light"] .ring .rt{stroke:rgba(11,35,52,.12)}
  html[data-theme="light"] .hero-bg{opacity:.55}
  html[data-theme="light"] #top h1 span{-webkit-text-fill-color:transparent}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;max-width:100vw;overflow-x:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(120% 60% at 50% -10%,rgba(58,208,255,.10),transparent 60%),
      radial-gradient(90% 50% at 100% 0%,rgba(14,136,201,.08),transparent 55%),
      linear-gradient(180deg,#0a1826,#050c14 55%);
    background-attachment:fixed;color:var(--txt);
    font-size:15px;line-height:1.5;min-height:100vh;letter-spacing:.1px;
    padding-bottom:calc(80px + var(--safe-b));
    -webkit-font-smoothing:antialiased;
  }
  #top{
    position:sticky;top:0;z-index:20;background:rgba(8,19,31,.72);backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border-bottom:1px solid var(--line);padding:calc(11px + var(--safe-t)) 16px 11px;
    display:flex;align-items:center;gap:11px;
  }
  #top::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(58,208,255,.55),transparent)}
  #top .logo{font-size:21px;filter:drop-shadow(0 2px 6px rgba(58,208,255,.4))}
  #top h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.2px;flex:1;line-height:1.15}
  #top h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  #top .robot{font-size:11px;font-weight:600;color:var(--dim);background:rgba(24,55,83,.6);padding:5px 11px 5px 9px;border-radius:20px;border:1px solid var(--line2);white-space:nowrap}
  #app{padding:16px;max-width:640px;margin:0 auto}
  .card{
    background:linear-gradient(180deg,rgba(24,55,83,.5),rgba(15,32,50,.72));
    border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:0 0 14px;
    box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.04);
  }
  .card h2{margin:0 0 5px;font-size:15.5px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:9px}
  .card .sub{color:var(--dim);font-size:12.5px;line-height:1.5;margin:0 0 13px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1;min-width:0}
  label{display:block;font-size:12px;color:var(--dim);margin:0 0 4px;font-weight:600}
  input,select,textarea{
    width:100%;background:rgba(8,19,31,.7);border:1px solid var(--line2);color:var(--txt);
    border-radius:var(--r-sm);padding:12px 13px;font-size:16px;font-family:inherit;
    transition:border-color .15s,box-shadow .15s;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(58,208,255,.18)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--grad);color:#04202f;
    border:none;border-radius:var(--r-sm);padding:13px 16px;font-size:15px;font-weight:800;letter-spacing:.2px;
    cursor:pointer;min-height:48px;width:100%;box-shadow:var(--sh-btn);
    transition:transform .12s ease,box-shadow .15s ease,filter .15s ease;
  }
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px);box-shadow:0 3px 10px -6px rgba(14,136,201,.5)}
  .btn.ghost{background:rgba(24,55,83,.55);color:var(--txt);border:1px solid var(--line2);box-shadow:none;font-weight:700}
  .btn.ghost:active{background:rgba(24,55,83,.8)}
  .btn.sm{min-height:40px;padding:9px 13px;font-size:13px;width:auto;border-radius:10px}
  .btn.bad{background:linear-gradient(135deg,#f0674d,#c23a26);color:#fff;box-shadow:0 8px 20px -8px rgba(192,58,38,.5)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--line2);background:rgba(8,19,31,.6)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{
    background:linear-gradient(180deg,rgba(14,32,50,.85),rgba(8,19,31,.7));
    border:1px solid var(--line);border-radius:14px;padding:13px 12px;text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
  }
  .stat .n{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;letter-spacing:.3px}
  .stat .l{font-size:10.5px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .note{background:linear-gradient(180deg,rgba(58,208,255,.1),rgba(58,208,255,.05));border:1px solid rgba(58,208,255,.32);border-radius:var(--r-sm);padding:11px 13px;font-size:12.5px;line-height:1.5;color:#cbe9fb;margin:11px 0}
  .warn{background:linear-gradient(180deg,rgba(242,182,50,.12),rgba(242,182,50,.05));border:1px solid rgba(242,182,50,.42);color:#f7dc9a}
  canvas{width:100%;display:block;border-radius:12px;background:#071726;border:1px solid var(--line);touch-action:none}
  #poolCanvas{height:420px}
  #covCanvas{height:300px}
  .palette{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 8px}
  .tool{flex:0 0 auto;padding:9px 11px;border-radius:11px;border:1px solid var(--line);background:var(--bg2);font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .tool.on{border-color:var(--gold);background:rgba(57,194,255,.15);color:#cdeafd}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--dim);margin-top:8px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:-1px}
  .step{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:none}
  .step .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--gold);color:#052034;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .step .b{flex:1}
  .step .b b{font-size:14px}
  .step .b span{display:block;color:var(--dim);font-size:12.5px;margin-top:2px}
  .logrow{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .logrow:last-child{border-bottom:none}
  .logrow .d{flex:1}
  .logrow .d b{font-size:14px}
  .logrow .d span{color:var(--dim);font-size:12px;display:block}
  .maint{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .maint:last-child{border-bottom:none}
  .maint .bar{flex:1;height:8px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .maint .bar i{display:block;height:100%;border-radius:6px}
  #nav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(8,19,31,.82);
    backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border-top:1px solid var(--line);
    display:flex;padding:8px 6px calc(8px + var(--safe-b));gap:2px;
  }
  #nav button{
    flex:1;background:none;border:none;color:var(--dim2);font-size:9.5px;font-weight:600;letter-spacing:.2px;
    padding:7px 2px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border-radius:12px;min-height:50px;
    transition:color .15s,background .15s;position:relative;
  }
  #nav button .ic{font-size:19px;line-height:1;transition:transform .15s}
  #nav button.on{color:var(--gold);background:rgba(58,208,255,.12)}
  #nav button.on .ic{transform:translateY(-1px) scale(1.06)}
  #nav button.on::before{content:"";position:absolute;top:2px;width:20px;height:3px;border-radius:3px;background:var(--grad)}
  .disabled-wrap{opacity:.55;pointer-events:none;filter:grayscale(.3)}
  .center{text-align:center}
  .mut{color:var(--dim);font-size:12.5px}
  ol.clean{margin:8px 0 0;padding-left:18px}
  ol.clean li{margin:6px 0;font-size:13.5px}
  code{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:12px}
  a{color:var(--gold)}
  .chipzone{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:5px 10px;font-size:12px;margin:3px 4px 0 0}
  .empty{text-align:center;color:var(--dim);padding:26px 10px;font-size:13.5px}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .kv:last-child{border-bottom:none}.kv b{color:var(--txt);font-weight:600}.kv span{color:var(--dim);text-align:right}
  #d3{position:fixed;inset:0;z-index:60;background:#04101c;display:flex;flex-direction:column}
  #d3[hidden]{display:none}
  #lv{position:fixed;inset:0;z-index:60;background:#04101c;display:flex;flex-direction:column}
  #lv[hidden]{display:none}
  #cam{position:fixed;inset:0;z-index:70;background:#000;display:flex;flex-direction:column}
  #cam[hidden]{display:none}
  #camtop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;background:#04101c}
  #camtop button{background:#0d1c2c;border:1px solid #1f3d5a;color:#e8f1fa;border-radius:10px;min-width:44px;min-height:44px;font-size:17px}
  #cambadge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;border:1px solid var(--line)}
  #camwrap{position:relative;flex:1;overflow:hidden;background:#000}
  #camv{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  #camc{position:absolute;inset:0;width:100%;height:100%;touch-action:manipulation}
  #camhint{padding:9px 14px;font-size:12.5px;color:#93b0c8;background:#04101c;text-align:center;min-height:20px}
  #camctl{display:flex;gap:10px;padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 12px);background:#04101c}
  #camctl button{flex:1;min-height:48px;border-radius:12px;border:1px solid #1f3d5a;background:#0d1c2c;color:#e8f1fa;font-size:14px;font-weight:600}
  #lvtop{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;border-bottom:1px solid var(--line)}
  #lvtop b{font-size:15px;flex:1}
  #lvbadge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;border:1px solid var(--line)}
  #lvtop button{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;width:40px;height:40px;font-size:16px}
  #lvc{flex:1;width:100%;display:block;touch-action:none}
  #lvstat{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--line);flex-wrap:wrap}
  #lvstat .s{flex:1;min-width:70px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
  #lvstat .s .n{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  #lvstat .s .l{font-size:10px;color:var(--dim)}
  #lvctl{display:flex;gap:8px;padding:8px 14px calc(10px + var(--safe-b));border-top:1px solid var(--line)}
  #lvctl button{flex:1;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:13px;font-weight:700;background:var(--card2);color:var(--txt)}
  #lvctl button.pri{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#052034;border:none}
  #d3top{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--safe-t)) 14px 10px;border-bottom:1px solid var(--line)}
  #d3top b{font-size:15px}
  #d3top button{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;width:40px;height:40px;font-size:16px}
  #d3c{flex:1;width:100%;display:block;touch-action:none}
  #d3hint{position:absolute;top:calc(60px + var(--safe-t));left:0;right:0;text-align:center;color:var(--dim);font-size:11.5px;pointer-events:none}
  #d3ctl{display:flex;gap:8px;padding:10px 14px calc(10px + var(--safe-b));border-top:1px solid var(--line)}
  #d3ctl button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px;font-size:13px;font-weight:700}
  /* ---- hero accueil ---- */
  .hero{position:relative;overflow:hidden}
  .hero-bg{position:absolute;inset:0;pointer-events:none;background:
    radial-gradient(120% 90% at 12% -10%,rgba(58,208,255,.20),transparent 58%),
    radial-gradient(90% 80% at 110% 120%,rgba(14,136,201,.16),transparent 55%)}
  /* eau animée (discrète) : caustiques qui dérivent + vague en bas du hero */
  .hero-bg::before{content:"";position:absolute;inset:-45%;
    background:
      radial-gradient(32% 26% at 28% 42%,rgba(58,208,255,.13),transparent 70%),
      radial-gradient(26% 22% at 68% 58%,rgba(14,136,201,.12),transparent 70%),
      radial-gradient(20% 18% at 50% 30%,rgba(120,220,255,.08),transparent 70%);
    animation:heroDrift 16s ease-in-out infinite alternate;will-change:transform}
  .hero-bg::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:38px;opacity:.5;
    background:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 34' preserveAspectRatio='none'%3E%3Cpath d='M0 22 Q 27 8 55 22 T 110 22 T 165 22 T 220 22 V34 H0 Z' fill='%233ad0ff' fill-opacity='.16'/%3E%3Cpath d='M0 27 Q 27 15 55 27 T 110 27 T 165 27 T 220 27 V34 H0 Z' fill='%230e88c9' fill-opacity='.20'/%3E%3C/svg%3E") repeat-x bottom/220px 34px;
    animation:heroWave 11s linear infinite;will-change:background-position}
  @keyframes heroDrift{from{transform:translate3d(-2.5%,-2%,0) rotate(-1.5deg)}to{transform:translate3d(2.5%,2%,0) rotate(1.5deg)}}
  @keyframes heroWave{from{background-position-x:0}to{background-position-x:-220px}}
  .hero-row{position:relative;display:flex;gap:16px;align-items:center}
  .hero-live{display:flex;flex-direction:column;align-items:center;gap:9px;flex:0 0 auto}
  .ring{position:relative;width:90px;height:90px}
  .ring svg{width:90px;height:90px;transform:rotate(-90deg);display:block}
  .ring .rt{fill:none;stroke:rgba(255,255,255,.08);stroke-width:7}
  .ring .rp{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
  .ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-n{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .ring-n small{font-size:12px;font-weight:700;color:var(--dim)}
  .ring-l{font-size:12px;margin-top:2px;opacity:.85}
  .hero-state{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--dim);background:rgba(8,19,31,.55);border:1px solid var(--line2);padding:5px 11px;border-radius:20px}
  .hero-state .dot{width:7px;height:7px;border-radius:50%}
  .hero-info{flex:1;min-width:0}
  .hero-eyebrow{font-size:10.5px;letter-spacing:1.4px;font-weight:800;color:var(--acc)}
  .hero-title{font-size:33px;font-weight:800;line-height:1.02;margin:4px 0 8px;letter-spacing:-.6px}
  .hero-title small{font-size:16px;font-weight:700;color:var(--dim);letter-spacing:0}
  .chip-robot{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;background:rgba(24,55,83,.55);border:1px solid var(--line2);padding:5px 11px;border-radius:20px;color:var(--txt)}
  /* ---- finitions expert ---- */
  .card>.btn+.btn,.card>.btn+.row,.card>.row+.btn{margin-top:10px}
  .kv b{font-weight:700}
  .step .n{box-shadow:0 4px 12px -4px rgba(58,208,255,.5)}
  .tool{transition:transform .12s,border-color .15s,background .15s}
  .tool:active{transform:scale(.96)}
  .pill,.chipzone{transition:border-color .15s}
  ::-webkit-scrollbar{width:0;height:0}
  /* ---- bouton thème (☀️/🌙) ---- */
  #themeBtn{flex:0 0 auto;width:40px;height:40px;border-radius:12px;border:1px solid var(--line2);
    background:rgba(24,55,83,.55);color:var(--txt);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .12s,background .15s}
  #themeBtn:active{transform:scale(.92)}
  html[data-theme="light"] #themeBtn{background:#eaf3fb}
  /* ---- jauge circulaire (score) ---- */
  .gauge{position:relative;width:190px;margin:2px auto 6px}
  .gauge svg{width:100%;display:block}
  .gauge .gt{fill:none;stroke:rgba(255,255,255,.09);stroke-width:13;stroke-linecap:round}
  html[data-theme="light"] .gauge .gt{stroke:rgba(11,35,52,.10)}
  .gauge .gp{fill:none;stroke-width:13;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
  .gauge-c{position:absolute;left:0;right:0;top:56%;text-align:center}

var APP_VER="v0.11.12";
function $(s,el){return (el||document).querySelector(s)}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}
function lg(k,d){try{var v=localStorage.getItem("pr_"+k);return v==null?d:JSON.parse(v)}catch(e){return d}}

/* ============ GÉOMÉTRIE bassin (haricot / rectangle) ============ */
var BEAN_RAW=[[0.10,0.30],[0.20,0.15],[0.34,0.10],[0.44,0.17],[0.50,0.23],[0.56,0.17],[0.66,0.10],[0.80,0.12],[0.90,0.26],[0.94,0.45],[0.90,0.64],[0.80,0.79],[0.66,0.86],[0.50,0.84],[0.34,0.86],[0.20,0.79],[0.07,0.62],[0.05,0.44]];
var BEAN=(function(){
  var xs=BEAN_RAW.map(function(p){return p[0]}),ys=BEAN_RAW.map(function(p){return p[1]});
  var x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs),y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
  return BEAN_RAW.map(function(p){return {x:(p[0]-x0)/(x1-x0),y:(p[1]-y0)/(y1-y0)}});
})();
var RECTPOLY=[{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:1}];
function poolPoly(){return pool.shape==="bean"?BEAN:RECTPOLY}
function pointInPoly(x,y,poly){var inside=false;for(var i=0,j=poly.length-1;i<poly.length;j=i++){var xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/((yj-yi)||1e-9)+xi))inside=!inside}return inside}
function segDist(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;var t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0;t=Math.max(0,Math.min(1,t));var cx=ax+t*dx,cy=ay+t*dy;return Math.sqrt((px-cx)*(px-cx)+(py-cy)*(py-cy))}
function distToPoly(x,y,poly){var m=1e9;for(var i=0,j=poly.length-1;i<poly.length;j=i++)m=Math.min(m,segDist(x,y,poly[j].x,poly[j].y,poly[i].x,poly[i].y));return m}
function polyArea(poly){var a=0;for(var i=0,j=poly.length-1;i<poly.length;j=i++)a+=(poly[j].x+poly[i].x)*(poly[j].y-poly[i].y);return Math.abs(a/2)}
function polyCentroid(poly){var cx=0,cy=0;poly.forEach(function(p){cx+=p.x;cy+=p.y});return {x:cx/poly.length,y:cy/poly.length}}
function poolAreaM2(){return polyArea(poolPoly())*pool.L*pool.W}
function worldPerimeter(){var poly=poolPoly(),per=0;for(var i=0;i<poly.length;i++){var a=poly[i],b=poly[(i+1)%poly.length];per+=Math.hypot((a.x-b.x)*pool.L,(a.y-b.y)*pool.W)}return per}
function depthShallow(){return +pool.depthShallow||1.1}
function depthDeep(){return +pool.depthDeep||1.7}
function avgDepth(){
  if(pool.depthProfile==="pente")return (depthShallow()+depthDeep())/2;
  var poly=poolPoly(),sum=0,n=0;
  for(var y=0;y<20;y++)for(var x=0;x<30;x++){var nx=(x+0.5)/30,ny=(y+0.5)/20;if(!pointInPoly(nx,ny,poly))continue;sum+=-floorDepthAt(nx,ny);n++}
  return n?sum/n:(depthShallow()+depthDeep())/2;
}
function volumeM3(){return poolAreaM2()*avgDepth()}
function wallAreaM2(){return worldPerimeter()*avgDepth()}
function floorSlopeLen(){return Math.hypot(pool.L,depthDeep()-depthShallow())}

function analyzeCapture(text){
  var hosts={},auth=null,cands=[],maps=[],stats=[];
  var NOISE=/(apple|icloud|gstatic|googleapis|google-analytics|firebaseio|crashlytics|sentry|facebook|doubleclick|akamai|appsflyer|adjust\.com|amplitude|mixpanel|branch\.io|bugsnag|datadog)/i;
  function push(method,url,headers,body){
    var h;try{h=new URL(url).hostname;}catch(e){return;}
    if(NOISE.test(h))return;
    hosts[h]=(hosts[h]||0)+1;
    var lc=(url+" "+(body||"")).toLowerCase(),label=null;
    if(/start|clean|\bwork\b|begin|\bplay\b|\brun\b/.test(lc))label="start";
    else if(/stop|pause|\bhalt\b/.test(lc))label="stop";
    else if(/mode|program|setting|profile|waterline|floor/.test(lc))label="mode";
    else if(/dock|home|charge|return|\bpark\b|\bbase\b/.test(lc))label="dock";
    if(/map|coverage|track|record|\bpath\b|route/.test(lc))maps.push({method:method||"GET",url:url});
    if(/status|state|realtime|position|location|\/info\b|device.?status|heartbeat|telemetr/.test(lc))stats.push({method:method||"GET",url:url});
    if(headers)for(var k in headers){var kl=k.toLowerCase();if((kl==="authorization"||kl==="token"||/x-.*(token|auth|session)/.test(kl))&&!auth)auth={header:k,value:String(headers[k])};}
    var mine=false;try{var idn=[cfg.robotId,cfg.robotUuid,cfg.serial].filter(Boolean);var blob=(url+" "+(body||"")+" "+JSON.stringify(headers||{}));mine=idn.some(function(x){return x&&blob.indexOf(x)>=0;});}catch(e){}
    cands.push({method:method||"GET",url:url,label:label,headers:headers||{},body:body||"",mine:mine});
  }
  var t=(text||"").trim(),har=null;try{har=JSON.parse(t);}catch(e){}
  if(har&&har.log&&har.log.entries){har.log.entries.forEach(function(e){var r=e.request||{},hs={};(r.headers||[]).forEach(function(x){hs[x.name]=x.value;});push(r.method,r.url,hs,(r.postData&&r.postData.text)||"");});}
  else{var urls=t.match(/https:\/\/[^\s"'<>]+/g)||[];var al=(t.match(/authorization["']?\s*[:=]\s*["']?([^"'\r\n]+)/i)||[])[1];if(al&&!auth)auth={header:"Authorization",value:al.trim()};urls.forEach(function(u){push("POST",u,al?{Authorization:al.trim()}:{},"");});}
  return {hosts:Object.keys(hosts).sort(function(a,b){return hosts[b]-hosts[a]}),auth:auth,candidates:cands,maps:maps,stats:stats};
}

/* ---- Tuya : contrôle RÉEL du robot via l'API officielle (Smart Life / Tuya) ----
   Le robot passe par le cloud Tuya (Smart Life = l'app Tuya). Aucune capture, aucune
   bidouille firmware → garantie intacte. Kevin lie son compte Smart Life à un projet
   Tuya IoT et colle 2 clés ; le worker signe et relaie. On lit/écrit les VRAIS data
   points (batterie, état, marche/arrêt, mode…). Honnête : position live seulement si
   le robot publie un DP de position. */
var TUYA_BASE=(location.hostname==="beatbot.kd-mc.com"?"":"https://beatbot.kd-mc.com")+"/__beatbot/tuya/";
var TUYA={funcs:null,status:null,online:null,name:"",pollTimer:0,lastErr:""};
function onBeatbotHost(){return location.hostname==="beatbot.kd-mc.com";}
function tuyaApi(seg,method,body){
  return fetch(TUYA_BASE+seg,{method:method||"GET",credentials:"include",headers:{"content-type":"application/json"},body:body?JSON.stringify(body):undefined})
    .then(function(r){return r.json();}).catch(function(e){return {ok:false,reason:"net",detail:String(e&&e.message||e)};});
}
/* mappe un tableau Tuya [{code,value}] vers batterie/état lisibles */
function tuyaMap(status){
  var o={batt:null,state:null,mode:null,fault:null,area:null,time:null};
  (status||[]).forEach(function(s){var k=String(s.code||"").toLowerCase(),v=s.value;
    if(o.batt==null&&/electric|battery|soc|elec_left|residual/.test(k)&&typeof v==="number"&&v>=0&&v<=100)o.batt=Math.round(v);
    if(o.mode==null&&/^mode$|work_mode|clean_mode/.test(k))o.mode=String(v);
    if(o.fault==null&&/fault|error|alarm/.test(k)&&v&&v!=="0"&&v!=="no_fault")o.fault=String(v);
    if(o.state==null&&/status|state|work_state|working/.test(k))o.state=String(v);
    if(o.area==null&&/clean_area|^area$/.test(k)&&typeof v==="number")o.area=v;
    if(o.time==null&&/clean_time|work_time/.test(k)&&typeof v==="number")o.time=v;
  });
  return o;
}

/* RE-LIAISON AUTO : les clés (ID/Secret) + le robot choisi vivent CÔTÉ SERVEUR (KV).
   Le drapeau « lié » local (localStorage) peut disparaître (réinstall PWA, purge iOS)
   → au boot on redemande la vérité au serveur et on se re-lie tout seul. Fail-open :
   réseau KO → on garde l'état local, jamais de casse (règle #55/#81). */
function tuyaBootSync(){
  if(!onBeatbotHost()||S._tuyaSyncing)return;S._tuyaSyncing=1;
  tuyaApi("state").then(function(j){
    S._tuyaSyncing=0;S._tuyaSynced=1;
    if(!j||j.ok!==true){if(S._tuyaNeedRender){S._tuyaNeedRender=0;render();}return;} /* réseau KO → état local conservé, formulaire de secours affiché */
    var was=tuya.linked,changed=false;
    if(j.linked){
      if(!tuya.linked){tuya.linked=true;changed=true;}
      if(j.region&&tuya.region!==j.region){tuya.region=j.region;changed=true;}
      if(j.device_id&&tuya.device_id!==j.device_id){tuya.device_id=j.device_id;changed=true;}
    }else if(tuya.linked){tuya.linked=false;tuya.device_id="";tuya.device_name="";changed=true;}
    if(changed||S._tuyaNeedRender){S._tuyaNeedRender=0;save();render();
      if(!was&&tuya.linked)toast("🔗 Liaison robot retrouvée sur le serveur — rien à re-coller");}
    if(tuya.linked)setTimeout(tuyaStatsSync,150); /* récupère l'historique auto du robot */
  });
}
/* HISTORIQUE AUTO : le serveur relève le robot toutes les 5 min et enregistre chaque
   cycle RÉEL terminé (durée clean_time, surface clean_area, batterie) — même app fermée,
   comme l'app d'origine. Ici on récupère ces cycles et on alimente Journal + compteurs
   + entretien tout seul. Kevin n'a plus rien à loguer à la main. */
function tuyaStatsSync(){
  if(!onBeatbotHost()||!tuya.linked)return;
  var now=Date.now();if(S._statsAt&&now-S._statsAt<240000)return;S._statsAt=now;
  tuyaApi("stats").then(function(j){
    if(!j||j.ok!==true){S._statsAt=0;return;} /* réseau KO → on retentera */
    S._tuyaStats=j.stats||null;
    var added=0,addH=0;
    (j.sessions||[]).forEach(function(sv){
      var id="auto_"+sv.ts;
      if(sessions.some(function(s){return s.id===id}))return;
      sessions.push({id:id,ts:sv.ts,mode:"Cycle robot 🤖",dur:+sv.dur||0,batt:(sv.batt!=null?sv.batt:null),area:(sv.area!=null?sv.area:null),auto:true});
      added++;addH+=(+sv.dur||0)/60;
    });
    if(added){
      sessions.sort(function(a,b){return b.ts-a.ts});if(sessions.length>300)sessions=sessions.slice(0,300);
      addH=Math.round(addH*10)/10;
      cfg.runHours=Math.round((cfg.runHours+addH)*10)/10;
      ["filter","brush","seal","clearwater"].forEach(function(k){maint[k]=Math.round(((maint[k]||0)+addH)*10)/10});

function tuyaCmdButtons(){
  var fns=TUYA.funcs||[];if(!fns.length)return '<div class="mut" style="font-size:12px">Aucune commande exposée par ce robot.</div>';
  var lc=function(f){return String(f.code).toLowerCase();};

  if(dir.length){var dc=dir[0].code,r=tuyaEnumRange(dir[0]),has=function(v){return r.indexOf(v)>=0;};

    out+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:230px;margin-bottom:10px">'+

      b("turn_left","⬅️")+b("stop","⏹️")+b("turn_right","➡️")+
      '<span></span>'+b("backward","⬇️")+'<span></span></div>';
  }
  /* tous les Enum restants (aspiration, mode…) → sélecteur libellé */
  var enums=fns.filter(function(f){return f.type==="Enum"&&!/direction|move|joystick/.test(lc(f));});
  var extra="";
  var home=fns.filter(function(f){return f.type==="Boolean"&&/seek|home|dock|charge|back/.test(lc(f));});
  if(home.length)extra+='<button class="btn ghost sm" onclick="tuyaCmd(\''+esc(home[0].code)+'\',true)">🏠 Base</button>';

      '<button class="btn ghost sm" onclick="tuyaCmd(\''+esc(en.code)+'\',$(\'#'+id+'\').value)">✅</button></span>';
  });
  if(extra)out+='<div class="row" style="gap:10px;flex-wrap:wrap;align-items:center">'+extra+'</div>';
  out+='<div id="tyCmdOut" style="margin-top:8px"></div>';
  return out;

/* Mode Ultra « la totale » : aspiration MAX + démarrage du cycle complet du robot.

/* Escaliers : aspiration max réelle + guidage manuel (seule voie réelle — Tuya n'expose
   pas de programme escaliers ; le robot ignore la position de tes marches). */
function tuyaStairs(){
  var fns=TUYA.funcs||[],lc=function(f){return String(f.code).toLowerCase();};
  var suc=fns.filter(function(f){return f.type==="Enum"&&/suction|fan|power/.test(lc(f));})[0];
  var el=$("#tyCmdOut"),send=[];
  if(suc){var r=[];try{r=(JSON.parse(suc.values||"{}").range)||[];}catch(e){}
    var mx=r.filter(function(v){return /strong|max|super|ultra|high|turbo/.test(String(v).toLowerCase());})[0]||r[0];
    if(mx)send.push({code:suc.code,value:mx});}
  var done=function(ok,detail){
    if(!el)return;
    el.innerHTML=(ok===false?'<div class="note warn">Échec réglage aspiration : '+esc(detail||"?")+'</div>':'')+
      '<div class="note" style="border-color:#39c2ff;color:#cfeee0">🪜 <b>Mode Escaliers</b> — aspiration réglée au MAX'+(ok===false?' (échec, réessaie)':'')+'.<br>Utilise le pavé 🕹️ <b>ci-dessous</b> pour amener le robot sur tes marches (escalier roman, lobe avant-droit), puis laisse-le brosser. C\'est toi qui le guides : le robot ne connaît pas la position des marches.</div>';
  };
  if(send.length){tuyaApi("command","POST",{commands:send}).then(function(j){done(j.ok,j.detail||j.reason);if(j.ok)setTimeout(tuyaRefresh,1500);});}
  else done(true);
}
function tuyaUltra(){
  var fns=TUYA.funcs||[],lc=function(f){return String(f.code).toLowerCase();},cmds=[];
  /* aspiration à sa valeur MAX réelle (strong/max/turbo…), sinon 1re du range */
  var suc=fns.filter(function(f){return f.type==="Enum"&&/suction|fan|power/.test(lc(f));})[0];
  if(suc){var r=[];try{r=(JSON.parse(suc.values||"{}").range)||[];}catch(e){}
    var mx=r.filter(function(v){return /strong|max|super|ultra|high|turbo/.test(String(v).toLowerCase());})[0]||r[0];
    if(mx)cmds.push({code:suc.code,value:mx});}
  /* MODE DE CYCLE (surface incluse) : utilisé UNIQUEMENT si le robot expose un DP mode
     via Tuya — les valeurs viennent de SON catalogue déclaré, jamais inventées.
     Préférence : cycle TOTAL (smart/multi/full), sinon surface/ligne d'eau. */
  var md=fns.filter(function(f){return f.type==="Enum"&&/^mode$|work_mode|clean_mode|scene|water/.test(lc(f));})[0];
  if(md){var mr=[];try{mr=(JSON.parse(md.values||"{}").range)||[];}catch(e){}
    var pick=mr.filter(function(v){return /smart|auto|multi|all|full|total/.test(String(v).toLowerCase());})[0]
          ||mr.filter(function(v){return /surface|water|wall/.test(String(v).toLowerCase());})[0]||null;
    if(pick)cmds.push({code:md.code,value:pick});}
  /* MESURÉ (thing model 2026-07-21) : le DP « mode » du robot est écrivable, range
     [fast/surface/custom/standard/pro/cec/multi] — « multi » = le Mode multizone
     de l'app Beatbot (fond+parois+ligne d'eau+surface). On l'envoie si pas déjà posé. */
  if(!cmds.some(function(c){return c.code==="mode";}))cmds.push({code:"mode",value:"multi"});
  /* interrupteur principal + démarrage nettoyage (toutes les vraies fonctions marche/go) */
  var sw=fns.filter(function(f){return f.type==="Boolean"&&/^switch$|power/.test(lc(f));})[0];
  if(sw)cmds.push({code:sw.code,value:true});
  fns.filter(function(f){return f.type==="Boolean"&&/go|clean|work|start/.test(lc(f));}).forEach(function(g){
    if(!cmds.some(function(c){return c.code===g.code;}))cmds.push({code:g.code,value:true});});
  var el=$("#tyCmdOut");
  if(!cmds.length){if(el)el.innerHTML='<div class="note warn">Ce robot n\'expose pas de démarrage via Tuya.</div>';return;}
  if(!confirm("🌊 Lancer le mode Ultra ?\n\nLe robot DÉMARRE à pleine puissance pour un cycle complet (fond, parois, ligne d'eau).\n\n⚠️ Vérifie qu'il est bien dans l'eau."))return;
  if(el)el.innerHTML='<span class="mut">Lancement Ultra…</span>';
  tuyaApi("command","POST",{commands:cmds}).then(function(j){
    if(j.ok){
      sessions.unshift({id:uid(),ts:Date.now(),mode:"Ultra 🌊",dur:0,batt:tuyaMap(TUYA.status).batt});
      if(sessions.length>300)sessions=sessions.slice(0,300);save();
      if(el)el.innerHTML='<div class="note" style="border-color:#5fd38a;color:#cfeee0">✅ Mode Ultra lancé — aspiration max + cycle complet ('+esc(cmds.map(function(c){return c.code+"="+c.value;}).join(" · "))+'). Session notée.</div>';
      setTimeout(tuyaRefresh,1800);
    } else if(el)el.innerHTML='<div class="note warn">Échec : '+esc(j.detail||j.reason||"?")+'</div>';
  });
}

/* ============ PERFORMANCE / RÉGLAGES ============ */
var SEASONS={
  printemps:{ic:"🌱",l:"Printemps (ouverture)",usage:"moyenne",debris:"fines",focus:"equilibre",note:"Eau trouble à la réouverture → Standard + ClearWater, 2-3×/sem le temps que l'eau s'éclaircisse."},
  ete:{ic:"☀️",l:"Été (baignade)",usage:"forte",debris:"fines",focus:"ligne",note:"Forte fréquentation → priorité ligne d'eau (crème solaire/gras) + fréquence haute."},
  automne:{ic:"🍂",l:"Automne (feuilles)",usage:"faible",debris:"feuilles",focus:"sol",note:"Feuilles : cycle Sol, vide le panier souvent, filtre standard (pas ultra-fin qui se bouche)."},
  hivernage:{ic:"❄️",l:"Avant hivernage",usage:"faible",debris:"fines",focus:"equilibre",note:"Grand nettoyage final Sol + Ligne d'eau avant de bâcher."}
};
function recommend(){
  var m=MODELS[cfg.model]||MODELS.autre;
  var envScore={peu:0,arbres:1,pollen:2}[cfg.env]||0;
  var useScore={faible:0,moyenne:1,forte:2}[cfg.usage]||1;
  var debris=cfg.debris||"fines";
  var s=envScore+useScore+({fines:0,feuilles:1,sable:1,algues:2}[debris]||0);
  var freq=s>=5?"tous les jours":s>=4?"3×/semaine":s>=2?"2×/semaine":"1×/semaine";
  var mode;
  if(cfg.focus==="ligne"||debris==="algues")mode="Ligne d'eau";
  else if(cfg.focus==="escaliers")mode="Sol";
  else if(debris==="sable")mode=(m.modes.indexOf("Ultra profond")>=0?"Ultra profond":"Sol");
  else if(cfg.focus==="sol")mode="Sol";
  else mode="Standard";
  if(m.modes.indexOf(mode)<0)mode=m.modes[0];
  var filter=(debris==="sable"||debris==="fines")?"Ultra-fin":"Standard";
  var clearwater=!!(m.clearwater&&(debris==="algues"||useScore>=2));
  return {freq:freq,mode:mode,filter:filter,clearwater:clearwater};
}
function realAutonomy(){
  var wb=sessions.filter(function(s){return s.batt!=null&&s.dur>10&&s.batt<95});
  var est=wb.map(function(s){return s.dur/(100-s.batt)*100}).filter(function(v){return isFinite(v)&&v>0&&v<600});
  if(!est.length)return null;
  return Math.round(est.reduce(function(a,b){return a+b},0)/est.length);
}
function coverageMean(mode){
  var cv=computeCoverage(mode);var sum=0,n=0;
  for(var y=0;y<cv.NY;y++)for(var x=0;x<cv.NX;x++){var c=cv.grid[y][x];if(c<0)continue;sum+=c;n++}
  return n?Math.round(sum/n*100):0;
}
function effTips(){
  var t=[],cv=computeCoverage(recommend().mode);
  if(!pool.markers.some(function(m){return m.type==="escalier"}))t.push("Marque tes escaliers (🗺️) — le score les ignore tant qu'ils ne sont pas placés.");
  if(!pool.markers.some(function(m){return m.type==="depot"}))t.push("Place le point de dépôt optimal (bouton ci-dessous) : bien démarrer améliore la couverture.");
  if(recommend().mode.indexOf("Ligne")<0)t.push("Ajoute un cycle « Ligne d'eau » de temps en temps : le rétrécissement du haricot y accumule le gras.");
  return t.slice(0,2);
}

function applyReco(){plan.mode=recommend().mode;plan.generatedAt=Date.now();save();toast("✅ Mode « "+plan.mode+" » appliqué au plan");}
function applySeason(k){var s=SEASONS[k];if(!s)return;cfg.usage=s.usage;cfg.debris=s.debris;cfg.focus=s.focus;save();toast(s.ic+" Preset « "+s.l+" » appliqué");render()}
function setBattery(){cfg.batteryMin=Math.max(30,+$("#battMin").value||180);save();render()}
function optimizeDepot(){
  var poly=poolPoly(),c=polyCentroid(poly),dx=0,dy=0;
  var stairs=pool.markers.filter(function(m){return m.type==="escalier"});
  if(stairs.length){var sx=0,sy=0;stairs.forEach(function(m){sx+=m.x;sy+=m.y});sx/=stairs.length;sy/=stairs.length;dx=c.x-sx;dy=c.y-sy;var L=Math.hypot(dx,dy)||1;dx/=L;dy/=L}
  var best={x:c.x,y:c.y};
  for(var k=0.32;k>=0;k-=0.04){var px=c.x+dx*k,py=c.y+dy*k;if(pointInPoly(px,py,poly)){best={x:px,y:py};break}}
  pool.markers=pool.markers.filter(function(m){return m.type!=="depot"});
  pool.markers.push({id:uid(),type:"depot",x:best.x,y:best.y});
  save();toast("📍 Point de dépôt optimal placé — vois-le sur ta carte 🗺️");render();

/* ============ Coverage engine (estimation, contour réel) ============ */
function computeCoverage(modeOverride){
  var poly=poolPoly();
  var NX=40,NY=Math.max(12,Math.round(40*(pool.W/Math.max(1,pool.L))));
  var mode=modeOverride||plan.mode||"Standard";
  var grid=[],weakSet={};
  var stairs=pool.markers.filter(function(m){return m.type==="escalier"});
  var deads=pool.markers.filter(function(m){return m.type==="anglemort"});
  var obst=pool.markers.filter(function(m){return m.type==="obstacle"});
  for(var y=0;y<NY;y++){grid[y]=[];for(var x=0;x<NX;x++){
    var nx=(x+0.5)/NX,ny=(y+0.5)/NY;
    if(!pointInPoly(nx,ny,poly)){grid[y][x]=-1;continue}
    var edge=distToPoly(nx,ny,poly);var isBand=edge<0.06;
    var c;
    if(mode.indexOf("Ligne")>=0)      c=isBand?0.92:0.35;
    else if(mode.indexOf("Sol")>=0)   c=isBand?0.45:0.9;
    else if(mode.indexOf("Ultra")>=0) c=isBand?0.78:0.9;
    else if(mode.indexOf("Éco")>=0)   c=0.55;
    else                              c=isBand?0.7:0.8;
    stairs.forEach(function(m){if(dist(nx,ny,m.x,m.y)<0.13)c=Math.min(c,0.32)});
    deads.forEach(function(m){if(dist(nx,ny,m.x,m.y)<0.11)c=Math.min(c,0.28)});
    obst.forEach(function(m){if(dist(nx,ny,m.x,m.y)<0.09)c=Math.min(c,0.4)});
    grid[y][x]=c;
    if(c<0.5){var q=(ny<0.5?"avant":"arrière")+"-"+(nx<0.5?"gauche":"droite");weakSet[q]=(weakSet[q]||0)+1}
  }}
  var weak=[];
  if(stairs.length)weak.push("🪜 Escaliers ("+stairs.length+")");
  Object.keys(weakSet).sort(function(a,b){return weakSet[b]-weakSet[a]}).slice(0,3).forEach(function(q){weak.push("Zone "+q)});
  return {grid:grid,NX:NX,NY:NY,mode:mode,weak:weak,stairs:stairs};
}
function dist(a,b,c,d){return Math.sqrt((a-c)*(a-c)+(b-d)*(b-d))}

function buildPlanSteps(cv){
  if(!plan.generatedAt)return [];
  var m=MODELS[cfg.model]||MODELS.autre,steps=[];
  var depot=pool.markers.filter(function(x){return x.type==="depot"})[0];
  var stairs=cv.stairs;
  if((maint.filter||0)>=8)steps.push({t:"Nettoie le filtre AVANT",d:"Filtre encrassé = aspiration réduite → escaliers encore moins bien faits."});
  if(m.clearwater&&(maint.clearwater||0)>=40)steps.push({t:"Vérifie la cartouche ClearWater",d:"Clarifiant épuisé = eau moins limpide. Remplace avant le cycle."});
  steps.push({t:"Dépose le robot au bon endroit",d:depot?"Repère 📍 posé sur ta carte. Sur un haricot, dépose-le dans la grande courbe, face au rétrécissement, pour qu'il finisse près des escaliers.":"Sur ta piscine haricot : dépose-le dans la grande boucle, face au grand axe. (Astuce : marque un point 📍 Dépôt sur ta carte)."});
  steps.push({t:"Lance le cycle « "+esc(cv.mode)+" »",d:cv.mode.indexOf("Sol")>=0?"Bon pour le fond, mais ligne d'eau et escaliers restent faibles → étapes suivantes.":cv.mode.indexOf("Ligne")>=0?"Couvre bien la ligne d'eau ; enchaîne un cycle Sol pour le fond.":"Cycle mixte fond + ligne d'eau."});
  if(stairs.length)steps.push({t:"Renforce les escaliers ("+stairs.length+")",d:"Point noir des robots. En fin de cycle : "+(m.map?"crée une zone 'escaliers' si ton AquaSense 2 Ultra le permet, sinon ":"")+"repositionne le robot au pied des marches et relance 5–8 min, ×2. Passage manuel via 🎮 une fois le protocole branché."});
  if(m.waterline&&cv.mode.indexOf("Ligne")<0)steps.push({t:"Cycle ligne d'eau",d:"Dépôts gras en surface ? Ajoute un cycle « Ligne d'eau » dédié (le rétrécissement du haricot en accumule souvent)."});
  steps.push({t:"Contrôle & log",d:"Vérifie escaliers + angles ⛔. Note la session dans 📊 Journal (durée/batterie) pour suivre l'efficacité dans le temps."});
  return steps;
}

/* ============ Canvas: pool editor ============ */
var canvasState={drag:null,sel:null};
function poolRectCss(W,H){
  var pad=26,w=W-pad*2,h=H-pad*2;
  var ar=pool.L/Math.max(0.1,pool.W),car=w/h,rw,rh;
  if(ar>car){rw=w;rh=w/ar}else{rh=h;rw=h*ar}
  return {x:(W-rw)/2,y:(H-rh)/2,w:rw,h:rh};
}
function polyPix(r){return poolPoly().map(function(p){return {x:r.x+p.x*r.w,y:r.y+p.y*r.h}})}
function tracePoly(g,pts){
  var n=pts.length,mid=function(a,b){return {x:(a.x+b.x)/2,y:(a.y+b.y)/2}};
  var st=mid(pts[n-1],pts[0]);g.beginPath();g.moveTo(st.x,st.y);
  for(var i=0;i<n;i++){var cur=pts[i],nxt=pts[(i+1)%n],mm=mid(cur,nxt);g.quadraticCurveTo(cur.x,cur.y,mm.x,mm.y)}

}
function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath()}
function drawBasin(g,r,fill){
  if(pool.shape==="bean"){var pts=polyPix(r);tracePoly(g,pts);if(fill){g.fill()}g.stroke();
    if(fill){var c=polyCentroid(poolPoly());var inPts=poolPoly().map(function(p){return {x:r.x+(c.x+(p.x-c.x)*0.9)*r.w,y:r.y+(c.y+(p.y-c.y)*0.9)*r.h}});g.save();g.strokeStyle="rgba(120,200,255,.35)";g.lineWidth=1;tracePoly(g,inPts);g.stroke();g.restore()}
  }else{roundRect(g,r.x,r.y,r.w,r.h,10);if(fill){g.fill()}g.stroke();if(fill){g.save();g.strokeStyle="rgba(120,200,255,.35)";g.lineWidth=1;roundRect(g,r.x+7,r.y+7,r.w-14,r.h-14,8);g.stroke();g.restore()}}
}

function markerIcon(t){return{escalier:"🪜",pointbas:"🕳️",depot:"📍",anglemort:"⛔",obstacle:"🪨"}[t]||"•"}
function markerColor(t){return{escalier:"#c46bff",pointbas:"#2d7bd6",depot:"#39c2ff",anglemort:"#e8624a",obstacle:"#8a97a6"}[t]||"#888"}

function hitMarker(p){var best=null,bd=22;pool.markers.forEach(function(m){var mx=p.r.x+m.x*p.r.w,my=p.r.y+m.y*p.r.h,d=Math.sqrt((mx-p.px)*(mx-p.px)+(my-p.py)*(my-p.py));if(d<bd){bd=d;best=m}});return best}

/* ============ Canvas: coverage heatmap ============ */
function drawCoverage(){
  var cv=$("#covCanvas");if(!cv)return;
  var dpr=Math.min(2,window.devicePixelRatio||1);var cssW=cv.clientWidth||300;
  cv.width=cssW*dpr;cv.height=300*dpr;var g=cv.getContext("2d");g.setTransform(dpr,0,0,dpr,0,0);
  var W=cssW,H=300;g.clearRect(0,0,W,H);var cvd=computeCoverage(),r=poolRectCss(W,H);
  var cw=r.w/cvd.NX,ch=r.h/cvd.NY;
  /* clip au contour réel */
  g.save();g.beginPath();if(pool.shape==="bean"){tracePoly(g,polyPix(r))}else{roundRect(g,r.x,r.y,r.w,r.h,8)}g.clip();
  for(var y=0;y<cvd.NY;y++)for(var x=0;x<cvd.NX;x++){var c=cvd.grid[y][x];if(c<0)continue;g.fillStyle=heat(c);g.fillRect(r.x+x*cw,r.y+y*ch,cw+0.6,ch+0.6)}
  g.restore();
  g.strokeStyle="#2d7bd6";g.lineWidth=2;if(pool.shape==="bean"){tracePoly(g,polyPix(r));g.stroke()}else{roundRect(g,r.x,r.y,r.w,r.h,8);g.stroke()}
  pool.markers.forEach(function(m){var px=r.x+m.x*r.w,py=r.y+m.y*r.h;g.font="13px -apple-system";g.textAlign="center";g.textBaseline="middle";g.fillText(markerIcon(m.type),px,py)});
  g.textBaseline="alphabetic";
}
function heat(c){
  var r,gc,b;
  if(c<0.5){r=232;gc=Math.round(98+(c/0.5)*(179-98));b=74}
  else{r=Math.round(232-((c-0.5)/0.5)*(232-46));gc=Math.round(179+((c-0.5)/0.5)*(204-179));b=Math.round(74+((c-0.5)/0.5)*(113-74))}
  return "rgba("+r+","+gc+","+b+",.82)";
}

/* ============ trend chart (data-viz pro : courbe lissée + aire dégradée + grille) ============ */
function drawTrend(){
  var cv=$("#trendCanvas");if(!cv)return;
  var dpr=Math.min(2,window.devicePixelRatio||1);var cssW=cv.clientWidth||300,cssH=176;
  cv.width=cssW*dpr;cv.height=cssH*dpr;var g=cv.getContext("2d");g.setTransform(dpr,0,0,dpr,0,0);
  var W=cssW,H=cssH;g.clearRect(0,0,W,H);
  var data=sessions.slice(0,14).reverse().map(function(s){return +s.dur||0});if(data.length<2)return;
  var light=isLight();
  var cGrid=light?"rgba(11,35,52,.10)":"rgba(255,255,255,.07)";
  var cTxt=light?"#48708f":"#93b0c8";
  var cLine=light?"#0e88c9":"#39c2ff";
  var mx=Math.max.apply(null,data)*1.15||1;
  var padL=34,padR=14,padT=24,padB=16,iw=W-padL-padR,ih=H-padT-padB;
  function X(i){return padL+i/(data.length-1)*iw}
  function Y(v){return padT+ih-(v/mx)*ih}
  /* grille horizontale + échelle */
  g.font="10px -apple-system";g.lineWidth=1;g.textAlign="right";
  [0,0.5,1].forEach(function(f){var v=Math.round(mx*f),y=Y(v);
    g.strokeStyle=cGrid;g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke();
    g.fillStyle=cTxt;g.fillText(String(v),padL-6,y+3)});
  /* ligne de moyenne (pointillés) */
  var avg=data.reduce(function(a,b){return a+b},0)/data.length;
  g.save();g.setLineDash([4,4]);g.strokeStyle=light?"rgba(14,136,201,.45)":"rgba(58,208,255,.35)";
  g.beginPath();g.moveTo(padL,Y(avg));g.lineTo(W-padR,Y(avg));g.stroke();g.restore();
  /* courbe lissée (bézier par points milieux) + aire dégradée */
  function curve(){
    g.beginPath();g.moveTo(X(0),Y(data[0]));
    for(var i=1;i<data.length;i++){var xm=(X(i-1)+X(i))/2;g.bezierCurveTo(xm,Y(data[i-1]),xm,Y(data[i]),X(i),Y(data[i]))}
  }
  var lg=g.createLinearGradient(0,padT,0,H-padB);
  lg.addColorStop(0,light?"rgba(14,136,201,.26)":"rgba(58,208,255,.28)");lg.addColorStop(1,"rgba(58,208,255,0)");
  curve();g.lineTo(X(data.length-1),H-padB);g.lineTo(X(0),H-padB);g.closePath();g.fillStyle=lg;g.fill();
  curve();g.strokeStyle=cLine;g.lineWidth=2.5;g.lineJoin="round";g.stroke();
  /* points + dernier point mis en avant avec sa valeur */
  g.fillStyle=cLine;
  data.forEach(function(v,i){g.beginPath();g.arc(X(i),Y(v),i===data.length-1?4.5:2.4,0,6.3);g.fill()});
  var lx=X(data.length-1),ly=Y(data[data.length-1]);
  g.strokeStyle=light?"#ffffff":"#071726";g.lineWidth=2;g.beginPath();g.arc(lx,ly,4.5,0,6.3);g.stroke();
  g.textAlign="right";g.font="700 11px -apple-system";g.fillStyle=light?"#0a6ba0":"#7fdcff";
  g.fillText(data[data.length-1]+" min",Math.min(W-padR,lx+4),Math.max(padT+9,ly-9));
  /* titre + repère moyenne */
  g.textAlign="left";g.font="10px -apple-system";g.fillStyle=cTxt;
  g.fillText("Durée des "+data.length+" dernières sessions (min)",padL,13);
  g.fillText("moy "+Math.round(avg),padL+2,Y(avg)-4);
}
/* jauge circulaire réutilisable (score, %) */

/* ============ VUE 3D (canvas, projection maison — pas de WebGL) ============ */
var D3={raf:0,t0:0,prog:0,playing:true,yaw:-0.7,pitch:1.02,zoom:1,drag:null,pointers:{},pinch:0,path:null};
function floorDepthAt(nx,ny){
  var s=depthShallow(),d=depthDeep();

  return -(s+(d-s)*f);
}
function worldPt3(nx,ny,z){return {x:(nx-0.5)*pool.L,y:(ny-0.5)*pool.W,z:z}}
function proj3(w){
  var cy=Math.cos(D3.yaw),sy=Math.sin(D3.yaw);
  var rx=w.x*cy-w.y*sy, ry=w.x*sy+w.y*cy;
  return {x:rx, y:-(ry*Math.sin(D3.pitch)+w.z*Math.cos(D3.pitch)), depth:ry*Math.cos(D3.pitch)-w.z*Math.sin(D3.pitch)};

function close3D(){var o=$("#d3");if(o)o.hidden=true;cancelAnimationFrame(D3.raf)}
function toggle3D(){D3.playing=!D3.playing;if(D3.playing)D3.t0=performance.now()-D3.prog*24000;var b=$("#d3play");if(b)b.textContent=D3.playing?"⏸️ Pause robot":"▶️ Lancer robot"}
function reset3D(){D3.yaw=-0.7;D3.pitch=1.02;D3.zoom=1}

function draw3D(){
  var cv=$("#d3c");if(!cv)return;var dpr=cv._dpr||1;var g=cv.getContext("2d");
  var W=cv.width/dpr,H=cv.height/dpr;g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,W,H);
  g.fillStyle="#04101c";g.fillRect(0,0,W,H);
  var poly=poolPoly();
  /* fit: projeter contour haut + fond → bbox → scale/centre */
  var proj=[],i;
  for(i=0;i<poly.length;i++){proj.push(proj3(worldPt3(poly[i].x,poly[i].y,0)));proj.push(proj3(worldPt3(poly[i].x,poly[i].y,floorDepthAt(poly[i].x,poly[i].y))))}
  var minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;proj.forEach(function(p){minx=Math.min(minx,p.x);maxx=Math.max(maxx,p.x);miny=Math.min(miny,p.y);maxy=Math.max(maxy,p.y)});
  var scale=0.8*Math.min(W/(maxx-minx||1),H/(maxy-miny||1))*D3.zoom;
  var cx=W/2-(minx+maxx)/2*scale, cy=H/2-(miny+maxy)/2*scale;
  function S(nx,ny,z){var p=proj3(worldPt3(nx,ny,z));return {x:cx+p.x*scale,y:cy+p.y*scale}}
  function tp(pts,close){g.beginPath();pts.forEach(function(p,k){k?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)});if(close!==false)g.closePath()}
  /* FOND */
  tp(poly.map(function(p){return S(p.x,p.y,floorDepthAt(p.x,p.y))}));
  var fg=g.createLinearGradient(0,cy-scale,0,cy+scale);fg.addColorStop(0,"#0a3a58");fg.addColorStop(1,"#062338");g.fillStyle=fg;g.fill();
  /* grille fond */
  g.strokeStyle="rgba(120,200,255,.12)";g.lineWidth=1;
  for(var gx=0;gx<=10;gx++){g.beginPath();for(var t=0;t<=20;t++){var ny=t/20,nx=gx/10;var s=S(nx,ny,floorDepthAt(nx,ny));t?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y)}g.stroke()}
  /* TRAÎNÉE robot (nettoyé) */
  if(D3.path&&D3.path.length){var ci=Math.floor(D3.prog*D3.path.length);g.strokeStyle="rgba(120,240,200,.45)";g.lineWidth=Math.max(6,scale*0.42);g.lineJoin="round";g.lineCap="round";g.beginPath();for(i=0;i<=ci;i++){var pt=D3.path[i];var s=S(pt.x,pt.y,floorDepthAt(pt.x,pt.y));i?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y)}g.stroke()}
  /* MARQUEURS (au fond) */
  pool.markers.forEach(function(m){var z=floorDepthAt(m.x,m.y);var sf=S(m.x,m.y,z),ss=S(m.x,m.y,0);
    g.strokeStyle=markerColor(m.type);g.lineWidth=2;g.beginPath();g.moveTo(sf.x,sf.y);g.lineTo(ss.x,ss.y);g.stroke();
    if(m.type==="escalier"){for(var st=0;st<3;st++){drawBox3D(g,S,m.x,m.y,0.5,depthShallow()*0.33*(st+1),floorDepthAt(m.x,m.y),"rgba(196,107,255,.7)")}}
  });
  /* PAROIS (verre translucide) */
  g.lineWidth=1;g.strokeStyle="rgba(120,200,255,.25)";
  for(i=0;i<poly.length;i++){var a=poly[i],b=poly[(i+1)%poly.length];
    tp([S(a.x,a.y,0),S(b.x,b.y,0),S(b.x,b.y,floorDepthAt(b.x,b.y)),S(a.x,a.y,floorDepthAt(a.x,a.y))]);
    g.fillStyle="rgba(45,123,214,.16)";g.fill();g.stroke();
  }
  /* SURFACE EAU */
  tp(poly.map(function(p){return S(p.x,p.y,0)}));g.fillStyle="rgba(80,190,255,.22)";g.fill();g.strokeStyle="#5bc8ff";g.lineWidth=2;g.stroke();
  /* ROBOT */
  if(D3.path&&D3.path.length){var idx=Math.min(D3.path.length-1,Math.floor(D3.prog*D3.path.length));var rp=D3.path[idx];drawBox3D(g,S,rp.x,rp.y,0.42,0.16,floorDepthAt(rp.x,rp.y),"#39c2ff",true)}
  /* MARQUEURS icônes (au-dessus de l'eau, lisibles) */
  pool.markers.forEach(function(m){var ss=S(m.x,m.y,0.05);g.font="15px -apple-system";g.textAlign="center";g.textBaseline="middle";g.fillText(markerIcon(m.type),ss.x,ss.y-6)});
  /* COTES */
  g.font="12px -apple-system";g.textAlign="center";g.textBaseline="middle";
  dimLine(g,S(0,1,0),S(1,1,0),pool.L.toFixed(2)+" m");
  dimLine(g,S(0,0,0),S(0,1,0),pool.W.toFixed(2)+" m");
  var cC=polyCentroid(poolPoly());
  var dS=S(0.14,0.5,floorDepthAt(0.14,0.5)*0.5),dD=S(cC.x,cC.y,floorDepthAt(cC.x,cC.y)*0.55);
  g.fillStyle="#f6d68a";g.fillText("PB "+depthShallow().toFixed(2)+" m",dS.x,dS.y);g.fillText((pool.depthProfile==="pente"?"GB ":"Fosse ")+depthDeep().toFixed(2)+" m",dD.x,dD.y);
  /* légende chiffres */
  g.textAlign="left";g.fillStyle="#bfe3fb";g.font="11px -apple-system";
  g.fillText("Surface "+poolAreaM2().toFixed(1)+" m² · Volume "+(pool.volOfficial>0?(+pool.volOfficial).toFixed(1)+" m³ (officiel)":"~"+volumeM3().toFixed(1)+" m³")+" · Périmètre "+worldPerimeter().toFixed(1)+" m",12,H-10);
}
function drawBox3D(g,S,nx,ny,sizeM,hM,zFloor,col,top){
  var hx=sizeM/pool.L/2,hy=sizeM/pool.W/2;
  var c=[[-1,-1],[1,-1],[1,1],[-1,1]].map(function(o){return {x:nx+o[0]*hx,y:ny+o[1]*hy}});
  var bot=c.map(function(p){return S(p.x,p.y,zFloor)}),topP=c.map(function(p){return S(p.x,p.y,zFloor+hM)});
  for(var i=0;i<4;i++){var j=(i+1)%4;g.beginPath();g.moveTo(bot[i].x,bot[i].y);g.lineTo(bot[j].x,bot[j].y);g.lineTo(topP[j].x,topP[j].y);g.lineTo(topP[i].x,topP[i].y);g.closePath();g.fillStyle=col;g.globalAlpha=.85;g.fill();g.globalAlpha=1}
  g.beginPath();topP.forEach(function(p,k){k?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)});g.closePath();g.fillStyle=top?"#cdeafd":col;g.fill();if(top){g.strokeStyle="#052034";g.lineWidth=1.5;g.stroke()}
}
function dimLine(g,a,b,label){
  g.strokeStyle="rgba(255,255,255,.5)";g.lineWidth=1;g.setLineDash([4,3]);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke();g.setLineDash([]);
  var mx=(a.x+b.x)/2,my=(a.y+b.y)/2;g.fillStyle="#0e88c9";var w=g.measureText(label).width+10;g.fillRect(mx-w/2,my-9,w,18);g.fillStyle="#fff";g.fillText(label,mx,my);
}
window.addEventListener("resize",function(){if($("#d3")&&!$("#d3").hidden)resize3D()});

/* ============ VUE LIVE 2D — 100% RÉELLE (aucune simulation) ============
   N'affiche QUE la position/trace/batterie réellement remontées par le robot
   (via la capture → endpoint statut, relayé par le proxy admin). Pas de robot
   simulé. Le robot n'émet pas sous l'eau → « en attente » tant qu'il n'est pas
   connecté (surface/base) ou tant que la capture n'est pas faite. */
var LV={raf:0,grid:null,realPos:null,realTrack:null,batt:null,state:null,pollTimer:0,lastData:0,startedTs:0};
function buildLiveGrid(){
  var poly=poolPoly(),NX=46,NY=Math.max(14,Math.round(46*(pool.W/Math.max(1,pool.L))));
  var inside=[],n=0;
  for(var y=0;y<NY;y++)for(var x=0;x<NX;x++){var nx=(x+0.5)/NX,ny=(y+0.5)/NY;var ins=pointInPoly(nx,ny,poly);inside.push(ins);if(ins)n++;}
  LV.grid={NX:NX,NY:NY,inside:inside,total:n,visited:new Uint8Array(NX*NY)};
}
function openLive(){
  var o=$("#lv");if(!o)return;o.hidden=false;buildLiveGrid();
  LV.realPos=null;LV.realTrack=null;LV.batt=null;LV.state=null;LV.lastData=0;LV.startedTs=performance.now();
  var rb=$("#lvReal");if(rb)rb.style.display=(beatbotClient.configured()||tuyaLive())?"":"none";
  resizeLive();
  if(tuyaLive()){tuyaPollLive();LV.pollTimer=setInterval(tuyaPollLive,5000);}
  else if(beatbot.statusUrl){lvPollNow();LV.pollTimer=setInterval(lvPollNow,4000);}
  cancelAnimationFrame(LV.raf);LV.raf=requestAnimationFrame(loopLive);
}
/* Live via Tuya (source réelle) : batterie + état. La position n'est fournie que si le
   robot publie un DP de position — sinon on reste honnête (« en attente »). */
function tuyaLive(){return !!(tuya.linked&&tuya.device_id&&onBeatbotHost());}
function tuyaPollLive(){
  if(!tuyaLive())return;
  tuyaApi("status").then(function(j){
    if(!j.ok||!j.status)return;
    var m=tuyaMap(j.status);
    if(m.batt!=null)LV.batt=m.batt;
    if(m.state||m.mode)LV.state=tuyaLabelState(m.state||m.mode);
    /* cherche un DP de position éventuel (rare sur ces robots) */
    j.status.forEach(function(s){var k=String(s.code||"").toLowerCase();
      if(/position|coordinate|robot_pos|point/.test(k)&&s.value){
        var v=s.value;try{if(typeof v==="string")v=JSON.parse(v);}catch(e){}
        if(v&&typeof v.x==="number"&&typeof v.y==="number"){var x=v.x>1.5?v.x/Math.max(1,pool.L):v.x,y=v.y>1.5?v.y/Math.max(1,pool.W):v.y;LV.realPos={x:Math.max(0,Math.min(1,x)),y:Math.max(0,Math.min(1,y))};LV.lastData=performance.now();}
      }
    });
    /* état de nettoyage = signe de vie même sans position */
    if(m.state&&/clean|work/.test(String(m.state).toLowerCase()))LV.lastData=performance.now();
  });
}
function closeLive(){var o=$("#lv");if(o){o.hidden=true;if(o.dataset.fromCam){o.dataset.fromCam="";var c=$("#cam");if(c)c.style.zIndex="";}}cancelAnimationFrame(LV.raf);if(LV.pollTimer){clearInterval(LV.pollTimer);LV.pollTimer=0;}}
function resizeLive(){var cv=$("#lvc");if(!cv)return;var dpr=Math.min(2,window.devicePixelRatio||1);cv.width=cv.clientWidth*dpr;cv.height=cv.clientHeight*dpr;cv._dpr=dpr;}
function lvStartReal(){ if(!beatbotClient.configured()){toast("Configure d'abord le pilotage (onglet 🎮)");return;} beatbotClient.send("start"); toast("▶️ Commande Démarrer envoyée au robot"); }
function lvPollNow(){
  if(!beatbot.statusUrl){return;}
  var headers={};if(beatbot.token)headers[beatbot.tokenHeader||"Authorization"]=beatbot.token;
  fetch(beatbot.relay,{method:"POST",credentials:"include",headers:{"content-type":"application/json"},body:JSON.stringify({url:beatbot.statusUrl,method:"GET",headers:headers})})
  .then(function(r){return r.json();}).then(function(j){
    if(!j.ok||!j.body||!j.body.text)return;
    var data;try{data=JSON.parse(j.body.text);}catch(e){return;}
    var t=parseTelemetry(data);
    if(t.pos){LV.realPos=t.pos;LV.lastData=performance.now();}
    if(t.track&&t.track.length){LV.realTrack=t.track;LV.lastData=performance.now();}
    if(t.batt!=null)LV.batt=t.batt;
    if(t.state)LV.state=t.state;
  }).catch(function(){});
}
function parseTelemetry(d){
  var out={pos:null,track:null,batt:null,state:null};
  function num(v){return typeof v==="number"&&isFinite(v);}
  function norm(p){ if(!p)return null; var x=p.x,y=p.y; if(!num(x)||!num(y))return null; if(x>1.5||y>1.5){x=x/Math.max(1,pool.L);y=y/Math.max(1,pool.W);} return {x:Math.max(0,Math.min(1,x)),y:Math.max(0,Math.min(1,y))}; }
  function walk(o,depth){
    if(!o||depth>4)return;
    if(Array.isArray(o)){ if(o.length>3&&o[0]&&(num(o[0].x)||num(o[0].lat))){out.track=o.map(function(p){return norm(p);}).filter(Boolean);} else o.forEach(function(v){walk(v,depth+1);}); return; }
    if(typeof o!=="object")return;
    for(var k in o){var kl=k.toLowerCase(),v=o[k];
      if(num(v)&&/batt|power|soc|electric/.test(kl)&&v>=0&&v<=100)out.batt=Math.round(v);
      if(typeof v==="string"&&/state|status|mode|working|cleaning/.test(kl)&&!out.state)out.state=v;
      if(!out.pos&&num(o.x)&&num(o.y))out.pos=norm(o);
    }
    for(var k2 in o)walk(o[k2],depth+1);
  }
  walk(d,0);return out;
}
function markVisited(nx,ny){var g=LV.grid;if(!g)return;
  var cx=Math.round(nx*g.NX-0.5),cy=Math.round(ny*g.NY-0.5);
  for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){var x=cx+dx,y=cy+dy;if(x<0||y<0||x>=g.NX||y>=g.NY)continue;var k=y*g.NX+x;if(g.inside[k])g.visited[k]=1;}
}
function loopLive(ts){
  if($("#lv").hidden)return;
  var g=LV.grid;if(!g){LV.raf=requestAnimationFrame(loopLive);return;}
  if(LV.realTrack)LV.realTrack.forEach(function(p){if(p)markVisited(p.x,p.y);});
  if(LV.realPos)markVisited(LV.realPos.x,LV.realPos.y);
  drawLive(ts);updateLiveStats(ts);
  LV.raf=requestAnimationFrame(loopLive);
}
function drawLive(ts){
  var cv=$("#lvc");if(!cv)return;var dpr=cv._dpr||1,g=cv.getContext("2d");
  var W=cv.width/dpr,H=cv.height/dpr;g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,W,H);
  g.fillStyle="#04101c";g.fillRect(0,0,W,H);
  var r=poolRectCss(W,H),gr=LV.grid,cw=r.w/gr.NX,ch=r.h/gr.NY,poly=poolPoly();
  var pp=poly.map(function(p){return {x:r.x+p.x*r.w,y:r.y+p.y*r.h}});
  g.save();g.beginPath();if(pool.shape==="bean")tracePoly(g,pp);else roundRect(g,r.x,r.y,r.w,r.h,10);g.clip();
  for(var y=0;y<gr.NY;y++)for(var x=0;x<gr.NX;x++){var k=y*gr.NX+x;if(!gr.inside[k])continue;g.fillStyle=gr.visited[k]?"rgba(60,220,150,.55)":"rgba(20,70,110,.45)";g.fillRect(r.x+x*cw,r.y+y*ch,cw+0.6,ch+0.6);}
  g.restore();
  g.strokeStyle="#5bc8ff";g.lineWidth=2;if(pool.shape==="bean"){tracePoly(g,pp);g.stroke();}else{roundRect(g,r.x,r.y,r.w,r.h,10);g.stroke();}
  pool.markers.forEach(function(m){var px=r.x+m.x*r.w,py=r.y+m.y*r.h;g.font="14px -apple-system";g.textAlign="center";g.textBaseline="middle";g.fillText(markerIcon(m.type),px,py);});
  if(LV.realPos){
    var px=r.x+LV.realPos.x*r.w,py=r.y+LV.realPos.y*r.h;
    g.beginPath();g.arc(px,py,Math.max(14,18+3*Math.sin(ts/200)),0,7);g.strokeStyle="rgba(255,90,90,.6)";g.lineWidth=2;g.stroke();
    g.beginPath();g.arc(px,py,11,0,7);g.fillStyle="#39c2ff";g.fill();g.strokeStyle="#fff";g.lineWidth=2;g.stroke();
  }else{
    g.fillStyle="rgba(147,176,200,.9)";g.font="600 14px -apple-system";g.textAlign="center";g.textBaseline="middle";
    var linked=tuyaLive()||beatbot.statusUrl;
    var msg=linked?"En attente de la position réelle du robot…":"Position réelle non configurée";
    g.fillText(msg,W/2,H/2-10);
    g.fillStyle="rgba(147,176,200,.7)";g.font="12px -apple-system";
    var sub=camActive()?"📷 Caméra active — la position s'affichera dès que le robot est détecté dans l'image.":(tuyaLive()?"Batterie/état lus via Tuya. Pour la position sous l'eau : lance le 📷 suivi caméra.":(beatbot.statusUrl?"Le robot n'émet pas sous l'eau — dispo quand il est connecté (surface/base).":"Lie ton robot via Tuya (onglet 🎮) ou lance le 📷 suivi caméra."));
    g.fillText(sub,W/2,H/2+12);
  }
  g.textBaseline="alphabetic";
}
function updateLiveStats(ts){
  var gr=LV.grid;if(!gr)return;var vis=0;for(var i=0;i<gr.visited.length;i++)if(gr.visited[i])vis++;
  var hasData=!!(LV.realPos||LV.realTrack);
  setTxt("lvCov",hasData?(gr.total?Math.round(vis/gr.total*100):0)+"%":"—");
  var sec=Math.floor((ts-LV.startedTs)/1000);setTxt("lvTime",Math.floor(sec/60)+":"+("0"+(sec%60)).slice(-2));
  setTxt("lvBatt",LV.batt!=null?LV.batt+"%":"—");
  var fresh=hasData&&(performance.now()-LV.lastData<15000);
  setTxt("lvSpeed",LV.state?String(LV.state).slice(0,10):(fresh?"connecté":"hors ligne"));
  var bd=$("#lvbadge");if(bd){var t=fresh?"🔴 LIVE":((camActive()||tuyaLive()||beatbot.statusUrl)?"⏳ EN ATTENTE":"⚙️ À CONFIGURER");if(bd.textContent!==t)bd.textContent=t;bd.style.color=fresh?"#ff5a5a":"#93b0c8";}
}
function setTxt(id,t){var el=$("#"+id);if(el&&el.textContent!==t)el.textContent=t;}
window.addEventListener("resize",function(){if($("#lv")&&!$("#lv").hidden)resizeLive();});

/* ============ SUIVI CAMÉRA — voir le robot SOUS l'eau ============
   La radio ne traverse pas l'eau, la LUMIÈRE oui : l'iPhone (posé en hauteur) filme le
   bassin, on détecte le robot (tache sombre mobile) À TRAVERS l'eau et on le projette
   en direct dans le plan. 100% RÉEL : la position vient de la vraie vidéo ; si rien
   n'est détecté → « robot non détecté » (jamais de position inventée).
   Pipeline : calibrage 4 coins → homographie caméra→bassin ; modèle de fond (moyenne
   mobile) sur grille 96×54 ; plus grosse composante connexe sombre DANS le bassin ;
   centroïde → homographie → plan + carte de couverture (LV). Tout en local, rien envoyé. */
var CAM={stream:null,raf:0,corners:[],H:null,mask:null,maskN:0,bg:null,GW:96,GH:54,frames:0,lock:null,lastDet:0,calStep:0,det:null,thresh:16};
var camCal=lg("camcal",null);
function camActive(){return !!CAM.stream;}
/* Homographie 4 points (src vidéo normalisée → carré unité = coords bassin) */
function camGauss(A,b){var n=8,i,j,k,M=[];for(i=0;i<n;i++)M.push(A[i].concat([b[i]]));
  for(i=0;i<n;i++){var p=i;for(j=i+1;j<n;j++)if(Math.abs(M[j][i])>Math.abs(M[p][i]))p=j;
    if(Math.abs(M[p][i])<1e-12)return null;var t=M[i];M[i]=M[p];M[p]=t;
    for(j=i+1;j<n;j++){var f=M[j][i]/M[i][i];for(k=i;k<=n;k++)M[j][k]-=f*M[i][k];}}
  var x=new Array(n);for(i=n-1;i>=0;i--){var s=M[i][n];for(j=i+1;j<n;j++)s-=M[i][j]*x[j];x[i]=s/M[i][i];}return x;}
function camSolveH(src,dst){var A=[],b=[];
  for(var i=0;i<4;i++){var x=src[i].x,y=src[i].y,u=dst[i].x,v=dst[i].y;
    A.push([x,y,1,0,0,0,-u*x,-u*y]);b.push(u);
    A.push([0,0,0,x,y,1,-v*x,-v*y]);b.push(v);}
  var h=camGauss(A,b);if(!h)return null;
  return [h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1];}
function camMap(H,x,y){var w=H[6]*x+H[7]*y+H[8];if(Math.abs(w)<1e-9)return null;return {x:(H[0]*x+H[1]*y+H[2])/w,y:(H[3]*x+H[4]*y+H[5])/w};}
/* Détection : ImageData (GW×GH) → {x,y,size} en coords vidéo normalisées, ou null (honnête) */
function camProcessFrame(im,W,Hh){
  var d=im.data,n=W*Hh,i;
  var lum=CAM._lum&&CAM._lum.length===n?CAM._lum:(CAM._lum=new Float32Array(n));
  for(i=0;i<n;i++){var o=i*4;lum[i]=d[o]*0.299+d[o+1]*0.587+d[o+2]*0.114;}
  if(!CAM.bg||CAM.bg.length!==n){CAM.bg=new Float32Array(n);CAM.bg.set(lum);return null;}
  var bg=CAM.bg,mask=CAM.mask,cand=CAM._cand&&CAM._cand.length===n?CAM._cand:(CAM._cand=new Uint8Array(n));
  var th=CAM.thresh,cnt=0,inMask=CAM.maskN||n;
  for(i=0;i<n;i++){cand[i]=0;
    if(mask&&!mask[i]){bg[i]+=(lum[i]-bg[i])*0.05;continue;}
    var diff=bg[i]-lum[i];
    if(diff>th){cand[i]=1;cnt++;}else bg[i]+=(lum[i]-bg[i])*0.03;} /* n'apprend jamais le robot dans le fond */
  if(!cnt)return null;
  if(cnt>inMask*0.3){for(i=0;i<n;i++)bg[i]+=(lum[i]-bg[i])*0.3;return null;} /* changement global de lumière → réapprend, pas de fausse détection */
  /* plus grosse composante connexe */
  var seen=CAM._seen&&CAM._seen.length===n?CAM._seen:(CAM._seen=new Uint8Array(n));seen.fill(0);
  var best=0,bx=0,by=0,stack=[];
  for(i=0;i<n;i++){
    if(!cand[i]||seen[i])continue;
    var size=0,sx=0,sy=0;stack.length=0;stack.push(i);seen[i]=1;
    while(stack.length){var c=stack.pop(),cx=c%W,cy=(c/W)|0;size++;sx+=cx;sy+=cy;
      if(cx>0&&cand[c-1]&&!seen[c-1]){seen[c-1]=1;stack.push(c-1);}
      if(cx<W-1&&cand[c+1]&&!seen[c+1]){seen[c+1]=1;stack.push(c+1);}
      if(cy>0&&cand[c-W]&&!seen[c-W]){seen[c-W]=1;stack.push(c-W);}
      if(cy<Hh-1&&cand[c+W]&&!seen[c+W]){seen[c+W]=1;stack.push(c+W);}}
    if(size>best){best=size;bx=sx/size;by=sy/size;}}
  if(best<3||best>inMask*0.15)return null; /* trop petit = bruit, trop gros = ombre/nuage */
  return {x:(bx+0.5)/W,y:(by+0.5)/Hh,size:best};}
/* Détection (coords vidéo) → position bassin + alimentation du plan Live */
function camApplyDetection(det){
  if(!det||!CAM.H)return null;
  var p=camMap(CAM.H,det.x,det.y);if(!p)return null;
  if(p.x<-0.06||p.x>1.06||p.y<-0.06||p.y>1.06)return null;
  var px=Math.max(0,Math.min(1,p.x)),py=Math.max(0,Math.min(1,p.y));
  if(!pointInPoly(px,py,poolPoly())&&distToPoly(px,py,poolPoly())>0.05)return null;
  CAM.det={vx:det.x,vy:det.y,x:px,y:py};CAM.lastDet=performance.now();
  LV.realPos={x:px,y:py};LV.lastData=performance.now();if(LV.grid)markVisited(px,py);
  return {x:px,y:py};}
function camBuildMask(){
  if(!CAM.H){CAM.mask=null;CAM.maskN=0;return;}
  var W=CAM.GW,Hh=CAM.GH,m=new Uint8Array(W*Hh),n=0,poly=poolPoly();
  for(var y=0;y<Hh;y++)for(var x=0;x<W;x++){
    var p=camMap(CAM.H,(x+0.5)/W,(y+0.5)/Hh);
    if(p&&p.x>-0.03&&p.x<1.03&&p.y>-0.03&&p.y<1.03){
      var cx=Math.max(0,Math.min(1,p.x)),cy=Math.max(0,Math.min(1,p.y));
      if(pointInPoly(cx,cy,poly)||distToPoly(cx,cy,poly)<0.03){m[y*W+x]=1;n++;}}}
  CAM.mask=m;CAM.maskN=n;}
var CAM_CORNER_LABELS=["coin AVANT-GAUCHE","coin AVANT-DROIT","coin ARRIÈRE-DROIT","coin ARRIÈRE-GAUCHE"];
function camRecal(){CAM.corners=[];CAM.H=null;CAM.mask=null;CAM.bg=null;CAM.calStep=0;CAM.det=null;camHint();}
function camHint(){var el=$("#camhint");if(!el)return;
  if(CAM.calStep<4)el.textContent="Calibrage "+(CAM.calStep+1)+"/4 — touche le "+CAM_CORNER_LABELS[CAM.calStep]+" de l'eau dans l'image.";
  else el.textContent="Calibré ✓ — pose le téléphone stable. Le robot est détecté à travers l'eau (eau calme = meilleur suivi).";}
function camFinishCal(){
  CAM.H=camSolveH(CAM.corners,[{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:1}]);
  if(!CAM.H){toast("Coins invalides, recommence le calibrage");camRecal();return;}
  camCal=CAM.corners.slice();ls("camcal",camCal);
  camBuildMask();CAM.bg=null;CAM.calStep=4;camHint();}
function camTapToFrame(ev){
  var v=$("#camv"),r=$("#camwrap").getBoundingClientRect();
  var vw=v.videoWidth||1280,vh=v.videoHeight||720;
  var sc=Math.min(r.width/vw,r.height/vh),dw=vw*sc,dh=vh*sc,ox=(r.width-dw)/2,oy=(r.height-dh)/2;
  var x=(ev.clientX-r.left-ox)/dw,y=(ev.clientY-r.top-oy)/dh;
  if(x<0||x>1||y<0||y>1)return null;return {x:x,y:y};}
function camFrameToCss(p,r,v){
  var vw=v.videoWidth||1280,vh=v.videoHeight||720;
  var sc=Math.min(r.width/vw,r.height/vh),dw=vw*sc,dh=vh*sc,ox=(r.width-dw)/2,oy=(r.height-dh)/2;
  return {x:ox+p.x*dw,y:oy+p.y*dh};}
function openCam(){
  var o=$("#cam");if(!o)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast("Caméra non disponible sur ce navigateur");return;}
  o.hidden=false;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280}},audio:false}).then(function(st){
    CAM.stream=st;var v=$("#camv");v.srcObject=st;var pl=v.play();if(pl&&pl.catch)pl.catch(function(){});
    if(camCal&&camCal.length===4){CAM.corners=camCal.slice();camFinishCal();}else camRecal();
    if(!LV.grid)buildLiveGrid();if(!LV.startedTs)LV.startedTs=performance.now();
    if(navigator.wakeLock&&navigator.wakeLock.request)navigator.wakeLock.request("screen").then(function(l){CAM.lock=l;}).catch(function(){});
    cancelAnimationFrame(CAM.raf);CAM.raf=requestAnimationFrame(camLoop);
  }).catch(function(e){o.hidden=true;
    var msg=(e&&e.name==="NotAllowedError")?"Autorise la caméra : Réglages iPhone → Safari (ou l'app) → Caméra":"Caméra : "+String(e&&e.message||e).slice(0,120);
    toast(msg);});}
function closeCam(){var o=$("#cam");if(o)o.hidden=true;cancelAnimationFrame(CAM.raf);
  if(CAM.stream){CAM.stream.getTracks().forEach(function(t){t.stop();});CAM.stream=null;}
  if(CAM.lock){try{CAM.lock.release();}catch(e){}CAM.lock=null;}}
function camOpenPlan(){openLive();var c=$("#cam");if(c)c.style.zIndex="50";var o=$("#lv");if(o)o.dataset.fromCam="1";}
function camLoop(){
  var o=$("#cam");if(!o||o.hidden)return;
  var v=$("#camv");
  if(v&&v.readyState>=2&&CAM.calStep>=4){
    var pc=CAM._pc||(CAM._pc=document.createElement("canvas"));
    if(pc.width!==CAM.GW){pc.width=CAM.GW;pc.height=CAM.GH;}
    var g=pc.getContext("2d",{willReadFrequently:true});
    try{g.drawImage(v,0,0,CAM.GW,CAM.GH);
      var det=camProcessFrame(g.getImageData(0,0,CAM.GW,CAM.GH),CAM.GW,CAM.GH);
      CAM.frames++;if(det)camApplyDetection(det);}catch(e){}
  }
  camDraw();
  CAM.raf=requestAnimationFrame(camLoop);}
function camDraw(){
  var cv=$("#camc"),v=$("#camv");if(!cv||!v)return;
  var r=$("#camwrap").getBoundingClientRect(),dpr=Math.min(2,window.devicePixelRatio||1);
  if(cv.width!==Math.round(r.width*dpr)){cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);}
  var g=cv.getContext("2d");g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,r.width,r.height);
  /* contour du bassin calibré */
  if(CAM.corners.length){g.strokeStyle="rgba(91,200,255,.9)";g.lineWidth=2;g.beginPath();
    for(var i=0;i<CAM.corners.length;i++){var s=camFrameToCss(CAM.corners[i],r,v);i?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y);}
    if(CAM.corners.length===4)g.closePath();g.stroke();
    g.fillStyle="#5bc8ff";CAM.corners.forEach(function(c,idx){var s=camFrameToCss(c,r,v);g.beginPath();g.arc(s.x,s.y,7,0,7);g.fill();g.fillStyle="#04101c";g.font="700 10px -apple-system";g.textAlign="center";g.textBaseline="middle";g.fillText(String(idx+1),s.x,s.y);g.fillStyle="#5bc8ff";});}
  /* détection */
  var fresh=CAM.lastDet&&(performance.now()-CAM.lastDet<4000);
  if(fresh&&CAM.det){var dpx=camFrameToCss({x:CAM.det.vx,y:CAM.det.vy},r,v);
    g.strokeStyle="rgba(255,90,90,.85)";g.lineWidth=3;g.beginPath();g.arc(dpx.x,dpx.y,16,0,7);g.stroke();
    g.fillStyle="#39c2ff";g.beginPath();g.arc(dpx.x,dpx.y,6,0,7);g.fill();}
  var bd=$("#cambadge");if(bd){
    var t=CAM.calStep<4?("🎯 CALIBRAGE "+(CAM.calStep+1)+"/4"):(fresh?"🔴 SUIVI":"👀 ROBOT NON DÉTECTÉ");
    if(bd.textContent!==t)bd.textContent=t;bd.style.color=fresh?"#ff5a5a":"#93b0c8";}}
(function(){var c=$("#camc");if(!c)return;
  c.addEventListener("click",function(ev){
    if(CAM.calStep>=4)return;
    var p=camTapToFrame(ev);if(!p)return;
    CAM.corners.push(p);CAM.calStep++;
    if(CAM.calStep===4)camFinishCal();else camHint();});})();


/* ============ render ============ */
function renderRobotTag(){var m=MODELS[cfg.model]||MODELS.autre;var t=$("#robotTag");if(t)t.textContent="🤖 "+m.name}
function render(){
  renderRobotTag();
  var v=S.view,html="";
  if(v==="accueil")html=vAccueil();
  else if(v==="bassin"){S.tool=S.tool||"escalier";html=vBassin()}
  else if(v==="plan")html=vPlan();
  else if(v==="journal")html=vJournal();
  else if(v==="reglage")html=vReglage();
  else if(v==="entretien")html=vEntretien();
  else if(v==="pilotage")html=vPilotage();
  $("#app").innerHTML=html;renderNav();
  if(v==="bassin"){
    setTimeout(function(){drawPool();bindCanvas();
      var sh=$("#poolShape");if(sh)sh.addEventListener("change",function(){pool.shape=this.value;save();render()});
      $("#poolL").addEventListener("change",function(){pool.L=Math.max(1,+this.value||6.9);save();render()});
      $("#poolW").addEventListener("change",function(){pool.W=Math.max(1,+this.value||4);save();render()});
      var pb=$("#poolPB");if(pb)pb.addEventListener("change",function(){pool.depthShallow=Math.max(0.3,+this.value||1.1);save();render()});
      var gb=$("#poolGB");if(gb)gb.addEventListener("change",function(){pool.depthDeep=Math.max(0.3,+this.value||1.7);save();render()});
      var pf=$("#poolProfile");if(pf)pf.addEventListener("change",function(){pool.depthProfile=this.value;save();render()});
      var pv=$("#poolVol");if(pv)pv.addEventListener("change",function(){pool.volOfficial=Math.max(0,+this.value||0);save();render()});
    },30);
  }
  if(v==="plan")setTimeout(drawCoverage,40);
  if(v==="journal"){if(sessions.length>1)setTimeout(drawTrend,40);setTimeout(tuyaStatsSync,120);}
  if(v==="reglage"){
    var bind={rgEnv:"env",rgUse:"usage",rgDeb:"debris",rgFoc:"focus"};
    Object.keys(bind).forEach(function(id){var el=$("#"+id);if(el)el.addEventListener("change",function(){setPerf(bind[id],this.value)})});
  }
  if(v==="pilotage"){setTimeout(function(){var f=$("#bbFile");if(f)f.addEventListener("change",function(){var file=this.files&&this.files[0];if(!file)return;var rd=new FileReader();rd.onload=function(){var ta=$("#bbPaste");if(ta){ta.value=String(rd.result||"").slice(0,3000000);bbAnalyze();}};rd.readAsText(file);});},30);}
}
document.addEventListener("click",function(e){
  var nb=e.target.closest("#nav button");if(nb){go(nb.getAttribute("data-v"));return}
  var tl=e.target.closest(".tool");if(tl){S.tool=tl.getAttribute("data-tool");render();return}
});
window.addEventListener("resize",function(){if(S.view==="bassin")drawPool();if(S.view==="plan")drawCoverage()});

/* ============ thème clair/sombre ============ */
function isLight(){return document.documentElement.getAttribute("data-theme")==="light"}
function applyThemeUi(){
  var b=$("#themeBtn");if(b)b.textContent=isLight()?"🌙":"☀️";
  var m=document.getElementById("metaTheme");if(m)m.setAttribute("content",isLight()?"#eaf4fc":"#0a1622");
}
function toggleTheme(){
  var toLight=!isLight();
  if(toLight)document.documentElement.setAttribute("data-theme","light");
  else document.documentElement.removeAttribute("data-theme");
  try{localStorage.setItem("pp_theme",toLight?"light":"dark")}catch(e){}
  applyThemeUi();
  /* redessiner les canvas avec la bonne palette */
  if(S.view==="plan")setTimeout(drawCoverage,30);
  if(S.view==="journal"&&sessions.length>1)setTimeout(drawTrend,30);
  if(S.view==="bassin")setTimeout(function(){if(typeof drawPool==="function")drawPool()},30);
}

/* boot */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}
renderRobotTag();render();applyThemeUi();
tuyaBootSync(); /* re-liaison auto depuis le serveur (clés jamais perdues) */
/* splash : on le laisse le temps du premier rendu puis fondu */
setTimeout(function(){var s=$("#splash");if(s)s.classList.add("off")},500);
setTimeout(function(){var s=$("#splash");if(s&&s.parentNode)s.parentNode.removeChild(s)},1400);
</script>
