name = "kdmc-outlook"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

# KV PARTAGÉ avec kdmc-router / kdmc-mail (même namespace, id FIGÉ — lesson #99 :
# ne jamais provisionner dynamiquement). Le worker y dépose les pièces jointes
# (mail:p:<id>) que l'app récupère, et y garde sa config OAuth (out:cid/out:rt).
[[kv_namespaces]]
binding = "ACCOUNTS"
id = "8cfa33a28ac045adb7b7a9556ca8a073"

# Récupération automatique des nouvelles factures Outlook (incrémental) toutes les 2 h.
[triggers]
crons = ["0 */2 * * *"]

# Secret injecté par le workflow deploy-kdmc-outlook.yml (réutilise APEX_ADMIN_PIN_SHA256).
# KDMC_ADMIN_PIN_SHA256 = sha256(code admin) → protège /setup, /config, /connect, /sync.
