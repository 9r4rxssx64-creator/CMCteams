name = "kdmc-apis"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

# ⚠️ TOML SCOPING (leçon kdmc-router) : `routes` DOIT rester AVANT toute [[table]]/[table].
# apis.kd-mc.com n'est PAS revendiqué par kdmc-router → ce worker peut le prendre en
# custom_domain (auto-provisionne DNS + certificat SSL sur la zone kd-mc.com, 0 manip).
routes = [
  { pattern = "apis.kd-mc.com", custom_domain = true },
]

# Aucun binding (KV/D1) : le worker est un pur relais sans état. Rate-limit best-effort
# assuré par Cloudflare + les quotas des upstreams. Les clés sont posées en secrets par
# le workflow deploy-kdmc-apis.yml (jamais dans ce fichier).
