name = "apex-vault-svc"
main = "src/index.js"
compatibility_date = "2026-04-30"

[[kv_namespaces]]
binding = "VAULT_KV"
id = "REPLACE_WITH_KV_ID"

[vars]
FIREBASE_PROJECT_ID = "kdmc-clients"

# SECRETS:
#   wrangler secret put VAULT_MASTER_KEY    # base64 32-byte AES-GCM key
#   wrangler secret put JWT_VERIFY_KEY      # Firebase RS256 public key

[observability]
enabled = true
