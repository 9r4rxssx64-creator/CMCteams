<body>
<div class="badge" id="verBadge" onclick="CF.about()">🔐 …</div>
<div class="wrap" id="app"><div class="center muted" style="margin-top:40vh">Chargement…</div></div>

<script>
"use strict";
/* ============================================================
   COFFRE-FORT PERSO — page autonome, zero-knowledge E2E.
   Local-first (localStorage + IndexedDB) + sync best-effort
   (Firebase chiffré + Cloudflare R2 pour les gros fichiers).
   Aucune donnée en clair n'est stockée ni envoyée.
   ============================================================ */
(function(){
const VERSION = "v1.0.2";
const ENC = new TextEncoder(), DEC = new TextDecoder();
const $ = function(id){ return document.getElementById(id); };
const APP = $("app");

/* ---- état runtime (jamais persisté en clair) ---- */
var ST = {
  cfg:null, uid:null, profile:null,
  MK:null,                 // CryptoKey master (mémoire seule)
  unlocked:false,
  meta:{ items:[], updated:0 }, // index déchiffré en mémoire
  section:null,
  idleTimer:null, clipTimer:null,
  pinFails:0
};
const SECTIONS = [
  {id:"codes",  ico:"🔑", nm:"Codes & Identifiants"},
  {id:"banque", ico:"🏦", nm:"Banque"},
  {id:"docs",   ico:"📄", nm:"Documents"},
  {id:"photos", ico:"📷", nm:"Photos"},
  {id:"dossiers",ico:"📁",nm:"Dossiers"},
  {id:"notes",  ico:"📝", nm:"Notes"}
];
const LS = {
  salt:"cf_salt", verify:"cf_verify", profile:"cf_profile", uid:"cf_uid",
  meta:"cf_meta",            // index chiffré (CFENC1:)
  pinWrap:"cf_pin_wrap", pinSalt:"cf_pin_salt", pinFails:"cf_pin_fails",
  bioWrap:"cf_bio_wrap", bioCred:"cf_bio_cred",
  audit:"cf_audit", duressWrap:"cf_duress_wrap"
};

/* ============================================================
   CRYPTO  (Web Crypto : PBKDF2 200k + AES-GCM-256)
   ============================================================ */
function rand(n){ return crypto.getRandomValues(new Uint8Array(n)); }
function abToB64(buf){
  var bytes=new Uint8Array(buf), bin="", CH=0x8000;
  for(var i=0;i<bytes.length;i+=CH){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH)); }
  return btoa(bin);
}
function b64ToAb(b64){
  var bin=atob(b64), len=bin.length, out=new Uint8Array(len);
  for(var i=0;i<len;i++) out[i]=bin.charCodeAt(i);
  return out;
}
async function deriveKey(passphrase, salt, iter){
  var base=await crypto.subtle.importKey("raw",ENC.encode(passphrase),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:iter||200000,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
/* enc/dec avec une CryptoKey AES déjà dérivée — bon marché (par item) */
async function encWithKey(key, bytes){
  var iv=rand(12);
  var ct=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,bytes);
  return "CFENC1:"+abToB64(iv)+"."+abToB64(ct);
}
async function decWithKey(key, payload){
  try{
    if(typeof payload!=="string"||payload.indexOf("CFENC1:")!==0) return null;
    var p=payload.slice(7).split("."); if(p.length!==2) return null;
    var iv=b64ToAb(p[0]), ct=b64ToAb(p[1]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    return new Uint8Array(pt);
  }catch(e){ return null; }
}
async function encStr(key,str){ return encWithKey(key,ENC.encode(str)); }
async function decStr(key,payload){ var b=await decWithKey(key,payload); return b?DEC.decode(b):null; }
/* wrap d'un secret (passphrase) par un mot de passe faible (PIN) — local only */
async function wrapSecret(secret, pass, salt, iter){
  var k=await deriveKey(pass,salt,iter); return encStr(k,secret);
}
async function unwrapSecret(payload, pass, salt, iter){
  var k=await deriveKey(pass,salt,iter); return decStr(k,payload);
}
async function sha256Hex(str){
  var h=await crypto.subtle.digest("SHA-256",ENC.encode(str));
  return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
}

/* ============================================================
   STORAGE : localStorage + IndexedDB (gros blobs) + Firebase
   ============================================================ */
var IDB=null;
function idb(){
  return new Promise(function(res,rej){
    if(IDB) return res(IDB);
    var r=indexedDB.open("cf_vault",1);
    r.onupgradeneeded=function(e){ var db=e.target.result;
      if(!db.objectStoreNames.contains("blobs")) db.createObjectStore("blobs");
    };
    r.onsuccess=function(e){ IDB=e.target.result; res(IDB); };
    r.onerror=function(){ rej(r.error); };
  });
}
async function idbPut(key,val){ var db=await idb(); return new Promise(function(res,rej){
  var tx=db.transaction("blobs","readwrite"); tx.objectStore("blobs").put(val,key);
  tx.oncomplete=function(){res(true);}; tx.onerror=function(){rej(tx.error);}; }); }
async function idbGet(key){ var db=await idb(); return new Promise(function(res){
  var tx=db.transaction("blobs","readonly"); var rq=tx.objectStore("blobs").get(key);
  rq.onsuccess=function(){res(rq.result||null);}; rq.onerror=function(){res(null);}; }); }
async function idbDel(key){ var db=await idb(); return new Promise(function(res){
  var tx=db.transaction("blobs","readwrite"); tx.objectStore("blobs").delete(key);
  tx.oncomplete=function(){res(true);}; tx.onerror=function(){res(false);}; }); }

/* Firebase REST (best-effort, ne bloque jamais l'UI) */
function fbBase(){ if(!ST.cfg||!ST.cfg.firebase_url||!ST.uid) return null;
  return ST.cfg.firebase_url.replace(/\/$/,"")+"/"+(ST.cfg.firebase_path||"coffre_vault")+"/"+ST.uid; }
/* Auth anonyme Identity Toolkit (durcissement /coffre_vault auth != null, Kevin 2026-07-04).
   Clé Web PUBLIQUE du projet cmcteams-c16ab (même que CMCteams v9.792 — la sécurité vient
   des règles RTDB, pas de la clé). FAIL-OPEN : échec → pas de token → comportement d'avant. */
var FB_WEB_APIKEY="AIzaSyDciW-0sIIg9msdmgZjQHBksqzsfA6DCMs";
var _fbTok=null,_fbTokExp=0,_fbTokNext=0,_fbTokP=null;
function _fbQS(){ return (_fbTok&&_fbTokExp>Date.now()+30000)?("?auth="+encodeURIComponent(_fbTok)):""; }
async function fbAnonAuth(){
  if(_fbTok&&_fbTokExp>Date.now()+30000) return _fbTok;
  if(Date.now()<_fbTokNext) return null;
  if(_fbTokP) return _fbTokP;
  _fbTokP=(async function(){
    try{
      var r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+encodeURIComponent(FB_WEB_APIKEY),
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({returnSecureToken:true})});
      var d=await r.json().catch(function(){return null;});
      if(d&&d.idToken){ _fbTok=d.idToken; _fbTokExp=Date.now()+((parseInt(d.expiresIn||"3600",10)||3600)*1000); return _fbTok; }
      _fbTokNext=Date.now()+60000;
      try{console.warn("[coffre fb auth] HTTP "+r.status+" : "+((d&&d.error&&d.error.message)||"reponse inattendue"));}catch(e){}
      return null;
    }catch(e){ _fbTokNext=Date.now()+60000; try{console.warn("[coffre fb auth] reseau KO : "+((e&&e.message)||"?"));}catch(_){} return null; }
    finally{ _fbTokP=null; }
  })();
  return _fbTokP;
}
async function fbPut(path,val){ var b=fbBase(); if(!b) return false;
  try{ await fbAnonAuth();
    var r=await fetch(b+"/"+path+".json"+_fbQS(),{method:"PUT",body:JSON.stringify(val)}); return r.ok; }
  catch(e){ return false; } }
async function fbGet(path){ var b=fbBase(); if(!b) return null;
  try{ await fbAnonAuth();
    var r=await fetch(b+"/"+path+".json"+_fbQS()); if(!r.ok) return null; return await r.json(); }
  catch(e){ return null; } }

/* R2 (gros fichiers) via worker — best-effort */
function r2On(){ return ST.cfg && ST.cfg.r2_worker_url; }
async function r2Put(id, encPayload){
  if(!r2On()) return false;
  try{ var r=await fetch(ST.cfg.r2_worker_url.replace(/\/$/,"")+"/v1/chunk/"+encodeURIComponent(id),
      {method:"PUT",headers:{"content-type":"application/octet-stream"},body:encPayload});
    return r.ok; }catch(e){ return false; }
}
async function r2Get(id){
  if(!r2On()) return null;
  try{ var r=await fetch(ST.cfg.r2_worker_url.replace(/\/$/,"")+"/v1/chunk/"+encodeURIComponent(id));
    if(!r.ok) return null; return await r.text(); }catch(e){ return null; }
}

/* ============================================================
   INDEX (méta) : chiffré, multi-couches
   ============================================================ */
async function saveMeta(){
  ST.meta.updated=Date.now();
  var enc=await encStr(ST.MK, JSON.stringify(ST.meta));
  try{ localStorage.setItem(LS.meta, enc); }catch(e){}
  try{ await idbPut("meta", enc); }catch(e){}
  fbPut("meta", enc);            // best-effort
}
async function loadMeta(){
  var enc=localStorage.getItem(LS.meta);
  if(!enc){ try{ enc=await idbGet("meta"); }catch(e){} }
  // tente Firebase si rien en local OU pour fusion (prend le plus récent)
  var remote=await fbGet("meta");
  var localMeta=null, remoteMeta=null;
  if(enc){ var s=await decStr(ST.MK,enc); if(s) try{localMeta=JSON.parse(s);}catch(e){} }
  if(remote){ var rs=await decStr(ST.MK,remote); if(rs) try{remoteMeta=JSON.parse(rs);}catch(e){} }
  var chosen = (remoteMeta && (!localMeta || (remoteMeta.updated||0)>(localMeta.updated||0))) ? remoteMeta : localMeta;
  ST.meta = chosen || {items:[],updated:0};
  if(!ST.meta.items) ST.meta.items=[];
}

/* ============================================================
   AUDIT (chaîne de hash, anti-altération) — chiffré
   ============================================================ */
async function audit(action, info){
  try{
    var log = ST.meta._audit || [];
    var prev = log.length? log[log.length-1].h : "genesis";
    var entry={t:Date.now(),a:action,i:(info||"").slice(0,80)};
    entry.h=(await sha256Hex(prev+JSON.stringify(entry))).slice(0,16);
    log.push(entry); if(log.length>200) log=log.slice(-200);
    ST.meta._audit=log;
  }catch(e){}
}

/* ============================================================
   AUTO-CLASSIFICATION (où ranger un texte collé)
   ============================================================ */
var PATTERNS=[
  [/^sk-ant-api\d{2}-[A-Za-z0-9_\-]{30,}/, "codes","Clé Anthropic"],
  [/^sk-(?!ant)[A-Za-z0-9_\-]{30,}/,       "codes","Clé OpenAI"],
  [/^(ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{60,})/,"codes","Token GitHub"],
  [/^AIza[A-Za-z0-9_\-]{33}$/,             "codes","Clé Google/Gemini"],
  [/^gsk_[A-Za-z0-9]{40,}/,                "codes","Clé Groq"],
  [/^sk_(live|test)_[A-Za-z0-9]{20,}/,     "codes","Clé Stripe"],
  [/^[A-Z]{2}\d{2}[A-Z0-9]{10,30}$/,       "banque","IBAN"],
  [/^(\d[ \-]?){13,19}$/,                  "banque","N° de carte (⚠ ne pas stocker le CVV)"],
  [/^bc1[a-z0-9]{20,}|^0x[a-fA-F0-9]{40}$/,"codes","Adresse crypto"],
  [/^https?:\/\/\S+$/i,                     "notes","Lien"]
];
function autoClassify(text){
  var t=(text||"").trim();
  for(var i=0;i<PATTERNS.length;i++){ if(PATTERNS[i][0].test(t)) return {section:PATTERNS[i][1],hint:PATTERNS[i][2]}; }
  return {section:"notes",hint:""};
}

/* ============================================================
   ITEMS : create / read / delete
   item = {id,section,title,type:"text"|"file",mime,size,tags,created,updated,
           storage:"inline"|"idb"|"r2", ref, encInline?}
   ============================================================ */
function uuid(){ return "it_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8); }

async function addTextItem(section, title, text, tags){
  var enc=await encStr(ST.MK, text);
  var it={id:uuid(),section:section,title:title||"(sans titre)",type:"text",
    mime:"text/plain",size:text.length,tags:tags||[],created:Date.now(),updated:Date.now(),
    storage:"inline",encInline:enc};
  ST.meta.items.push(it); await audit("add_text",section+":"+it.title); await saveMeta(); return it;
}
async function getTextItem(it){
  if(it.storage==="inline"&&it.encInline) return await decStr(ST.MK, it.encInline);
  return null;
}
async function addFileItem(section, file, onprog){
  var buf=new Uint8Array(await file.arrayBuffer());
  var enc=await encWithKey(ST.MK, buf); // chaîne CFENC1:
  var inlineMax=(ST.cfg&&ST.cfg.r2_inline_max_bytes)||5242880;
  var it={id:uuid(),section:section,title:file.name||"fichier",type:"file",
    mime:file.type||"application/octet-stream",size:file.size,tags:[],
    created:Date.now(),updated:Date.now()};
  if(file.size<=inlineMax || !r2On()){
    // local : IndexedDB (+ Firebase chunk best-effort si petit)
    await idbPut("blob_"+it.id, enc);
    it.storage="idb"; it.ref="blob_"+it.id;
    if(file.size<=262144){ fbPut("chunks/"+it.id, enc); } // <256Ko : sync cloud aussi
  } else {
    // gros fichier : R2
    var ok=await r2Put(it.id, enc);
    if(ok){ it.storage="r2"; it.ref=it.id; }
    else { await idbPut("blob_"+it.id, enc); it.storage="idb"; it.ref="blob_"+it.id; }
  }
  if(onprog) onprog(1);
  ST.meta.items.push(it); await audit("add_file",section+":"+it.title); await saveMeta(); return it;
}
async function getFileBytes(it){
  var enc=null;
  if(it.storage==="idb") enc=await idbGet(it.ref);
  if(!enc && it.storage==="r2") enc=await r2Get(it.ref);
  if(!enc) enc=await fbGet("chunks/"+it.id);     // fallback cloud
  if(!enc && it.storage!=="idb") enc=await idbGet("blob_"+it.id);
  if(!enc) return null;
  return await decWithKey(ST.MK, enc);
}
async function delItem(id){
  var idx=ST.meta.items.findIndex(function(x){return x.id===id;});
  if(idx<0) return;
  var it=ST.meta.items[idx];
  if(it.ref){ idbDel(it.ref); }
  if(it.storage==="r2"&&r2On()){ try{fetch(ST.cfg.r2_worker_url.replace(/\/$/,"")+"/v1/chunk/"+encodeURIComponent(it.ref),{method:"DELETE"});}catch(e){} }
  fbPut("chunks/"+it.id, null);
  ST.meta.items.splice(idx,1); await audit("delete",it.title); await saveMeta();
}

/* ============================================================
   UI helpers
   ============================================================ */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
var _toastT=null;

  if(s<86400)return Math.floor(s/3600)+" h"; return Math.floor(s/86400)+" j"; }

/* ============================================================
   AUTH : setup / unlock / lock / FaceID / PIN
   ============================================================ */
function normName(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[\s\-_.]+/g," ").trim(); }
async function computeUid(prenom, nom){
  var toks=[normName(prenom),normName(nom)].sort();
  return "u_"+(await sha256Hex("coffre|"+toks.join("|"))).slice(0,24);
}
function hasVault(){ return !!localStorage.getItem(LS.verify); }

async function doSetup(prenom, nom, passphrase, pin){
  var salt=rand(16);
  localStorage.setItem(LS.salt, abToB64(salt));
  ST.uid=await computeUid(prenom,nom);
  localStorage.setItem(LS.uid, ST.uid);
  ST.MK=await deriveKey(passphrase, salt, 200000);
  ST.profile={prenom:prenom,nom:nom,created:Date.now()};
  localStorage.setItem(LS.profile, await encStr(ST.MK, JSON.stringify(ST.profile)));
  localStorage.setItem(LS.verify, await encStr(ST.MK, "CFOK|"+ST.uid));
  // sync salt+verify dans Firebase (pour autres appareils)
  fbPut("salt", abToB64(salt)); fbPut("verify", localStorage.getItem(LS.verify));
  ST.meta={items:[],updated:Date.now()}; await audit("setup", prenom+" "+nom);
  if(pin) await enablePin(passphrase, pin);
  await saveMeta();
  ST.unlocked=true;
}
async function tryUnlockPassphrase(passphrase){
  var saltB=localStorage.getItem(LS.salt);
  if(!saltB){ var rs=await fbGet("salt"); if(rs){ saltB=rs; localStorage.setItem(LS.salt,rs); } }
  if(!saltB) return false;
  var verify=localStorage.getItem(LS.verify) || await fbGet("verify");
  if(!verify) return false;
  var k=await deriveKey(passphrase, b64ToAb(saltB), 200000);
  var chk=await decStr(k, verify);
  if(!chk || chk.indexOf("CFOK|")!==0) return false;
  ST.MK=k; ST.uid=(chk.split("|")[1])||localStorage.getItem(LS.uid);
  localStorage.setItem(LS.verify, verify);
  var pe=localStorage.getItem(LS.profile); if(pe){ var ps=await decStr(k,pe); if(ps) try{ST.profile=JSON.parse(ps);}catch(e){} }
  await loadMeta(); ST.unlocked=true; await audit("unlock","passphrase"); return true;
}
function lockVault(){ ST.MK=null; ST.unlocked=false; ST.meta={items:[],updated:0}; ST.section=null; clearTimeout(ST.idleTimer); render(); }

/* PIN (couche de confort, local only, rate-limited) */
async function enablePin(passphrase, pin){
  var ps=rand(16); localStorage.setItem(LS.pinSalt, abToB64(ps));
  localStorage.setItem(LS.pinWrap, await wrapSecret(passphrase, pin, ps, 200000));
}
function pinLockState(){ try{ return JSON.parse(localStorage.getItem(LS.pinFails)||'{"n":0,"until":0}'); }catch(e){ return {n:0,until:0}; } }
async function tryUnlockPin(pin){
  var st=pinLockState();
  if(st.until>Date.now()) return {ok:false,locked:Math.ceil((st.until-Date.now())/1000)};
  var wrap=localStorage.getItem(LS.pinWrap), ps=localStorage.getItem(LS.pinSalt);
  if(!wrap||!ps) return {ok:false,no:true};
  var pass=await unwrapSecret(wrap, pin, b64ToAb(ps), 200000);
  if(!pass){ st.n=(st.n||0)+1;
    var d=[0,0,0,0,0,30,120,600,3600,86400][Math.min(st.n,9)];
    st.until=d?Date.now()+d*1000:0; localStorage.setItem(LS.pinFails,JSON.stringify(st));
    return {ok:false,fails:st.n,locked:d}; }
  localStorage.setItem(LS.pinFails,JSON.stringify({n:0,until:0}));
  var ok=await tryUnlockPassphrase(pass); return {ok:ok};
}

/* FaceID / TouchID via WebAuthn (PRF si dispo, sinon gate device) */
async function bioAvailable(){
  try{ return !!(window.PublicKeyCredential &&
    await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()); }catch(e){ return false; }
}
async function enableBio(passphrase){
  if(!await bioAvailable()) return false;
  try{
    var userId=rand(16);
    var cred=await navigator.credentials.create({publicKey:{
      challenge:rand(32), rp:{name:"Coffre-fort perso", id:location.hostname},
      user:{id:userId, name:(ST.profile&&ST.profile.prenom||"user"), displayName:"Coffre"},
      pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
      extensions:{prf:{eval:{first:ENC.encode("coffre-prf-v1")}}},
      timeout:60000, attestation:"none"
    }});
    var credId=abToB64(cred.rawId);
    var ext=cred.getClientExtensionResults&&cred.getClientExtensionResults();
    var prf=ext&&ext.prf&&ext.prf.results&&ext.prf.results.first;
    var wrapKey;
    if(prf){ wrapKey=await crypto.subtle.importKey("raw",prf,{name:"AES-GCM"},false,["encrypt","decrypt"]);
      localStorage.setItem(LS.bioCred, JSON.stringify({id:credId,prf:true})); }
    else { // fallback : clé device (moins fort, opt-in)
      var dk=rand(32); wrapKey=await crypto.subtle.importKey("raw",dk,{name:"AES-GCM"},false,["encrypt","decrypt"]);
      localStorage.setItem(LS.bioCred, JSON.stringify({id:credId,prf:false,dk:abToB64(dk)})); }
    localStorage.setItem(LS.bioWrap, await encStr(wrapKey, passphrase));
    return true;
  }catch(e){ return false; }
}
function bioEnrolled(){ return !!localStorage.getItem(LS.bioWrap); }
async function tryUnlockBio(){
  var credRaw=localStorage.getItem(LS.bioCred), wrap=localStorage.getItem(LS.bioWrap);
  if(!credRaw||!wrap) return false;
  var meta; try{ meta=JSON.parse(credRaw); }catch(e){ return false; }
  try{
    var asrt=await navigator.credentials.get({publicKey:{
      challenge:rand(32), rpId:location.hostname,
      allowCredentials:[{type:"public-key",id:b64ToAb(meta.id)}],
      userVerification:"required",
      extensions: meta.prf? {prf:{eval:{first:ENC.encode("coffre-prf-v1")}}} : {},
      timeout:60000
    }});
    if(!asrt) return false;
    var wrapKey;
    if(meta.prf){ var ext=asrt.getClientExtensionResults(); var prf=ext&&ext.prf&&ext.prf.results&&ext.prf.results.first;
      if(!prf) return false; wrapKey=await crypto.subtle.importKey("raw",prf,{name:"AES-GCM"},false,["decrypt"]); }
    else { wrapKey=await crypto.subtle.importKey("raw",b64ToAb(meta.dk),{name:"AES-GCM"},false,["decrypt"]); }
    var pass=await decStr(wrapKey, wrap); if(!pass) return false;
    return await tryUnlockPassphrase(pass);
  }catch(e){ return false; }
}

/* kill-switch / export / import */
function killLocal(){
  Object.values(LS).forEach(function(k){ try{localStorage.removeItem(k);}catch(e){} });
  indexedDB.deleteDatabase("cf_vault");
  lockVault(); toast("🧨 Données locales effacées (le cloud reste).");
}
async function exportVault(){
  var bundle={v:1,exported:Date.now(),profile:ST.profile,meta:ST.meta,blobs:{}};
  // inclure les blobs IDB (export complet hors-ligne)
  for(var i=0;i<ST.meta.items.length;i++){ var it=ST.meta.items[i];
    if(it.storage==="idb"){ var b=await idbGet(it.ref); if(b) bundle.blobs[it.ref]=b; } }
  var enc=await encStr(ST.MK, JSON.stringify(bundle));
  var blob=new Blob([enc],{type:"application/octet-stream"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="coffre-"+new Date().toISOString().slice(0,10)+".coffre"; a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  toast("💾 Export chiffré téléchargé");
}
async function importVault(file){
  var enc=await file.text(); var s=await decStr(ST.MK, enc);
  if(!s){ toast("Mauvais coffre ou mauvaise phrase secrète","err"); return; }
  var b; try{ b=JSON.parse(s); }catch(e){ toast("Fichier illisible","err"); return; }
  if(b.blobs){ for(var k in b.blobs){ await idbPut(k, b.blobs[k]); } }
  // fusion par id
  var existing={}; ST.meta.items.forEach(function(x){existing[x.id]=true;});
  (b.meta&&b.meta.items||[]).forEach(function(x){ if(!existing[x.id]) ST.meta.items.push(x); });
  await saveMeta(); toast("📥 Coffre importé"); render();
}

    modal('<h3>↪ Déplacer «'+esc(it.title)+'»</h3><p class="small muted">Choisis la nouvelle catégorie. Le contenu reste chiffré, rien n\'est perdu.</p>'+btns+
      '<button style="width:100%;margin-top:12px" onclick="this.closest(\'.modal\').remove()">Annuler</button>'); },
  moveTo:async function(id, sid){ var it=ST.meta.items.find(function(x){return x.id===id;}); if(!it) return;
    it.section=sid; it.updated=Date.now(); await audit("move", it.title+" -> "+sid); await saveMeta();
    var m=document.querySelector(".modal"); if(m) m.remove();
    var sec=SECTIONS.find(function(s){return s.id===sid;})||{nm:sid}; toast("↪ Déplacé vers "+sec.nm); render(); },
  del:function(id){ var it=ST.meta.items.find(function(x){return x.id===id;});
    var m=modal('<h3>Supprimer ?</h3><p class="small muted">«'+esc(it.title)+'» sera définitivement supprimé.</p><div class="row" style="margin-top:12px"><button class="grow" onclick="this.closest(\'.modal\').remove()">Annuler</button><button class="grow danger" id="dl_y">Supprimer</button></div>');

  search:function(){ var m=modal('<h3>🔎 Rechercher</h3><input id="sq" placeholder="titre, type, section…" autofocus><div id="sr" style="margin-top:10px"></div>');

      var res=ST.meta.items.filter(function(it){ return normName(it.title+" "+it.section+" "+it.type).indexOf(v)>=0; }).slice(0,30);
      r.innerHTML=res.length? res.map(itemCard).join("") : '<div class="muted small">Aucun résultat</div>'; }; },

        '<a class="pill" style="min-height:38px;display:inline-flex;align-items:center;padding:0 12px" href="'+u+'" download>⬇️ Télécharger</a></div></div>'; }).join("");

function openAddSheet(sec){
  var opts=SECTIONS.map(function(s){return '<option value="'+s.id+'"'+(s.id===sec?' selected':'')+'>'+s.ico+' '+s.nm+'</option>';}).join("");
  var m=modal('<h3>＋ Ajouter</h3>'+
    '<div class="seg" id="ad_seg"><button class="on" data-t="text">📝 Texte / Code</button><button data-t="file">📎 Fichier</button></div>'+
    '<label>Section</label><select id="ad_sec">'+opts+'</select>'+
    '<div id="ad_text"><label>Titre</label><input id="ad_title" placeholder="ex: Clé API Anthropic">'+
      '<label>Contenu (collé ici, classé automatiquement)</label><textarea id="ad_val" placeholder="Colle ton code, mot de passe, note…"></textarea>'+
      '<div class="small muted" id="ad_hint"></div></div>'+
    '<div id="ad_file" class="hide"><label>Fichier (toute taille)</label>'+
      '<div class="drop" id="ad_drop">📎 Touche ici ou dépose un fichier<input type="file" id="ad_finput" class="hide"></div>'+
      '<div id="ad_fname" class="small muted" style="margin-top:8px"></div><progress id="ad_prog" class="hide" max="1" value="0"></progress></div>'+
    '<button class="primary" id="ad_go" style="width:100%;margin-top:14px">Enregistrer 🔐</button>');
  var mode="text";
  m.querySelectorAll("#ad_seg button").forEach(function(b){ b.onclick=function(){
    m.querySelectorAll("#ad_seg button").forEach(function(x){x.classList.remove("on");}); b.classList.add("on");
    mode=b.dataset.t; m.querySelector("#ad_text").classList.toggle("hide",mode!=="text");
    m.querySelector("#ad_file").classList.toggle("hide",mode!=="file"); }; });
  var val=m.querySelector("#ad_val"), hint=m.querySelector("#ad_hint"), selSec=m.querySelector("#ad_sec");
  if(val) val.oninput=function(){ var c=autoClassify(val.value); if(c.hint){ hint.textContent="Détecté : "+c.hint+" → rangé dans "+(SECTIONS.find(function(s){return s.id===c.section;})||{}).nm; selSec.value=c.section; } else hint.textContent=""; };
  var fileObj=null;
  var drop=m.querySelector("#ad_drop"), finput=m.querySelector("#ad_finput"), fname=m.querySelector("#ad_fname");
  if(drop){ drop.onclick=function(){ finput.click(); };
    finput.onchange=function(){ fileObj=finput.files[0]; if(fileObj) fname.textContent=fileObj.name+" · "+fmtBytes(fileObj.size); };
    ["dragover","dragenter"].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add("over");}); });
    ["dragleave","drop"].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove("over");}); });
    drop.addEventListener("drop",function(e){ if(e.dataTransfer.files[0]){ fileObj=e.dataTransfer.files[0]; fname.textContent=fileObj.name+" · "+fmtBytes(fileObj.size); } });
  }
  m.querySelector("#ad_go").onclick=async function(){
    this.disabled=true; var section=selSec.value;
    try{
      if(mode==="text"){ var t=val.value; if(!t.trim()){ toast("Contenu vide","err"); this.disabled=false; return; }
        var title=m.querySelector("#ad_title").value.trim()||(t.slice(0,28));
        await addTextItem(section,title,t,[]); }
      else { if(!fileObj){ toast("Choisis un fichier","err"); this.disabled=false; return; }
        var pr=m.querySelector("#ad_prog"); pr.classList.remove("hide"); this.textContent="Chiffrement…";
        await addFileItem(section, fileObj, function(p){ pr.value=p; }); }
      m.remove(); render(); toast("🔐 Enregistré (chiffré)");
    }catch(e){ toast("Erreur: "+(e.message||e),"err"); this.disabled=false; }
  };
}

      '<button class="danger" style="margin-top:8px" id="se_kill">🧨 Effacer cet appareil</button></div>'+
    '<button style="width:100%" onclick="this.closest(\'.modal\').remove()">Fermer</button>');
  m.querySelector("#se_exp").onclick=function(){ exportVault(); };
  m.querySelector("#se_imp").onclick=function(){ m.querySelector("#se_impf").click(); };

  m.querySelector("#se_kill").onclick=function(){ var c=modal('<h3>🧨 Effacer cet appareil ?</h3><p class="small muted">Le coffre local sera effacé. Tu pourras le restaurer avec ta phrase secrète (cloud) ou un export.</p><div class="row" style="margin-top:12px"><button class="grow" onclick="this.closest(\'.modal\').remove()">Annuler</button><button class="grow danger" id="k_y">Effacer</button></div>');
    c.querySelector("#k_y").onclick=function(){ killLocal(); c.remove(); m.remove(); render(); }; };
}

function maybeOfferBio(pass){
  bioAvailable().then(function(ok){ if(ok && !bioEnrolled()){

    m.querySelector("#ob_y").onclick=async function(){ this.textContent="…"; var r=await enableBio(pass); m.remove(); toast(r?"😊 Face ID activé":"Indisponible",r?null:"err"); render(); };
  }});
}

async function boot(){
  // anti-cache : recharge propre 1×/jour
  try{ var dk=new Date().toISOString().slice(0,10);
    if(location.search.indexOf("_h=")<0){ location.replace(location.pathname+"?_h="+dk+location.hash); return; } }catch(e){}
  // config (R2 url, firebase)
  try{ var r=await fetch("config.json?_="+Date.now(),{cache:"reload"}); ST.cfg=await r.json(); }
  catch(e){ ST.cfg={firebase_url:"https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app",firebase_path:"coffre_vault",r2_worker_url:"",r2_inline_max_bytes:5242880}; }
  ST.uid=localStorage.getItem(LS.uid)||null;
  try{fbAnonAuth();}catch(e){} // pré-chauffe token anonyme (règles auth != null)
  // SW
  if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js"); }catch(e){} }
  render(); bumpIdle();
}
