# Déploie un DEUXIÈME bot crypto (crypto-bot-2) sur Railway — le bot « champion ».
# Déclenchement : manuel uniquement (workflow_dispatch).
#
# Pourquoi un 2e bot ?
#   Kevin voulait « copier le meilleur trader du moment ». Honnêtement, copier en
#   direct un vrai top-trader Binance n'est PAS possible sur le testnet SPOT via API
#   (ça, c'est le produit Binance Futures Copy Trading, sur un compte RÉEL — je ne
#   vais pas inventer un faux trader). Le « meilleur » qu'on peut mesurer honnêtement,
#   c'est la MEILLEURE stratégie au backtest : EMA 8/21 + stop classique (elle a battu
#   la mean-reversion ET le « ne pas vendre à perte » en rendement mesuré).
#   Ce bot #2 fait donc tourner ce réglage CHAMPION, en parallèle du bot #1 (qui, lui,
#   ne vend jamais à perte) → tu compares les deux politiques EN DIRECT, sur du testnet.
#
# IMPORTANT — indépendance : ce bot #2 DOIT avoir son PROPRE compte Binance testnet,
# sinon il se bat avec le bot #1 pour le même solde. Ajoute donc 2 secrets :
#   BINANCE_TESTNET_API_KEY_2     (clé d'un 2e compte testnet Binance)
#   BINANCE_TESTNET_API_SECRET_2  (secret du 2e compte testnet)
#   RAILWAY_TOKEN                 (déjà présent)
# Sans ces 2 secrets, le workflow s'arrête proprement en te disant quoi ajouter.

name: Crypto Bot 2 Deploy (champion)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_NAME: crypto-bot-2
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les secrets requis (2e compte testnet)
        env:
          BK: ${{ secrets.BINANCE_TESTNET_API_KEY_2 }}
          BS: ${{ secrets.BINANCE_TESTNET_API_SECRET_2 }}
        run: |
          MISSING=""
          [ -z "$RAILWAY_TOKEN" ] && MISSING="$MISSING RAILWAY_TOKEN"
          [ -z "$BK" ] && MISSING="$MISSING BINANCE_TESTNET_API_KEY_2"
          [ -z "$BS" ] && MISSING="$MISSING BINANCE_TESTNET_API_SECRET_2"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets manquants :$MISSING — le bot #2 a besoin de son PROPRE compte Binance testnet (sinon il partage le solde du bot #1). Crée un 2e compte testnet, puis ajoute BINANCE_TESTNET_API_KEY_2 / BINANCE_TESTNET_API_SECRET_2 dans Settings > Secrets > Actions."
            exit 1
          fi
          echo "✅ Secrets du 2e compte présents."

      - name: Installer Railway CLI
        run: |
          npm i -g @railway/cli
          railway --version

      - name: Créer le service crypto-bot-2 s'il n'existe pas (tolérant)
        working-directory: crypto-bot
        run: |
          set +e
          OUT=$(railway add --service "$SERVICE_NAME" 2>&1)
          RC=$?
          echo "railway add (rc=$RC) : $OUT"
          echo "$OUT" | grep -qiE "already exists|existe" && echo "ℹ️ Service déjà présent — OK."
          exit 0

      - name: "Régler les variables (réglage CHAMPION mesuré — EMA 8/21 + stop)"
        working-directory: crypto-bot
        env:
          BK: ${{ secrets.BINANCE_TESTNET_API_KEY_2 }}
          BS: ${{ secrets.BINANCE_TESTNET_API_SECRET_2 }}
        run: |
          set +e
          # Réglage CHAMPION = le meilleur mesuré au backtest (marché normal ET plat) :
          # EMA 8/21 + RSI 78 + stop ATR x2.0, stop classique (HOLD_UNTIL_PROFIT=false).
          # Garde-fous standards actifs (perte/jour 3%, drawdown 15%).
          OUT=$(railway variables --service "$SERVICE_NAME" --skip-deploys \
            --set "BINANCE_API_KEY=$BK" \
            --set "BINANCE_API_SECRET=$BS" \
            --set "TESTNET=true" \
            --set "BOT_KILL=0" \
            --set "SYMBOLS=BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT" \
            --set "SYMBOL=BTC/USDT" \
            --set "TIMEFRAME=5m" \
            --set "LOOP_SECONDS=30" \
            --set "STRATEGY=ema" \
            --set "EMA_FAST=8" \
            --set "EMA_SLOW=21" \
            --set "ATR_STOP_MULT=2.0" \
            --set "RSI_MAX=78" \
            --set "HOLD_UNTIL_PROFIT=false" 2>&1)
          RC=$?
          echo "railway variables rc=$RC"
          if [ $RC -ne 0 ]; then
            echo "::error::Échec réglage variables — sortie CLI : $(echo "$OUT" | sed 's/[A-Za-z0-9]\{20,\}/***MASQUÉ***/g')"
            exit 1
          fi
          echo "✅ Variables réglées (clés masquées)."

      - name: Déployer le bot #2 (railway up)
        working-directory: crypto-bot
        run: |
          set +e
          OUT=$(railway up --service "$SERVICE_NAME" --detach 2>&1)
          RC=$?
          echo "railway up (rc=$RC) :"
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "::error::Échec du déploiement — sortie CLI complète ci-dessus."
            exit 1
          fi
          echo "✅ Bot #2 lancé."

      - name: Récapitulatif
        run: |
          {
            echo "## 🤖 Crypto Bot #2 (champion) — déploiement Railway"
            echo ""
            echo "- Mode : 🧪 TESTNET (faux argent), compte SÉPARÉ du bot #1"
            echo "- Stratégie : EMA 8/21 + stop classique — **le meilleur réglage mesuré au backtest**"
            echo "- But : tourner en parallèle du bot #1 (« ne vend jamais à perte ») pour comparer les 2 politiques en direct"
            echo "- Honnête : ce n'est PAS de la copie d'un vrai top-trader (indispo sur testnet spot) — c'est la meilleure stratégie mesurée"
            echo "- Suivi : Railway → service crypto-bot-2 → View Logs"
            echo "- Kill switch : Variables → BOT_KILL=1"
          } >> $GITHUB_STEP_SUMMARY
