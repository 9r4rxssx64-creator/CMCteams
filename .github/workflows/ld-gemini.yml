name: LD Gemini Image
on:
  push:
    paths: ['shops/la-detente/.gemini-request.json']
permissions:
  contents: write
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.ref_name }}' }
      - name: Imagen4
        env: { GKEY: '${{ secrets.GEMINI_API_KEY }}' }
        run: |
          REQ=shops/la-detente/.gemini-request.json
          LOG=shops/la-detente/.gemini-log.txt; echo "start $(date -u +%FT%TZ)" > "$LOG"
          N=$(jq '.jobs|length' "$REQ")
          for k in $(seq 0 $((N-1))); do
            P=$(jq -r ".jobs[$k].prompt" "$REQ"); O=$(jq -r ".jobs[$k].outfile" "$REQ")
            B=$(jq -n --arg p "$P" '{instances:[{prompt:$p}],parameters:{sampleCount:1,aspectRatio:"1:1"}}')
            OK=""
            for M in imagen-4.0-ultra-generate-001 imagen-4.0-generate-001; do
              H=$(curl -s -o /tmp/r.json -w "%{http_code}" "https://generativelanguage.googleapis.com/v1beta/models/$M:predict?key=$GKEY" -H "Content-Type: application/json" -d "$B")
              D=$(jq -r '.predictions[0].bytesBase64Encoded // empty' /tmp/r.json 2>/dev/null)
              if [ -n "$D" ]; then mkdir -p "$(dirname "$O")"; echo "$D" | base64 -d > "$O" 2>/dev/null; echo "$O <- $M http=$H $(wc -c <"$O")o" >> "$LOG"; OK=1; break; fi
              echo "$O x $M http=$H $(jq -r '.error.message//empty' /tmp/r.json|head -c 90)" >> "$LOG"
            done
            [ -z "$OK" ] && echo "$O ÉCHEC" >> "$LOG"
            sleep 3
          done
          cat "$LOG"
      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"; git config user.email "bot@users.noreply.github.com"
          git add -A; git commit -m "imagen4 batch [skip ci]" || exit 0
          git push origin HEAD:'${{ github.ref_name }}' || echo pushfail
