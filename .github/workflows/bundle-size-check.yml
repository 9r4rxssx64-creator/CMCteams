name: Bundle Size Check (Apex v13)

# v13.4.220 (Kevin "100/100 réel Performance gap") :
# Run size-limit après chaque build pour vérifier que les budgets bundle
# définis dans package.json size-limit[] sont respectés :
# - dist/index.html < 30 KB
# - dist/assets/css/*.css < 30 KB gzip
# - dist/core/bootstrap-*.js < 80 KB gzip
#
# Si seuil dépassé → workflow CI rouge → Issue auto via github-actions[bot]
# → ma prochaine session lis Issue → optimise bundle

on:
  # Anti-spam : seulement sur PR + push main (déjà workflows lighthouse pattern v9.618)
  push:
    branches: [main]
    paths:
      - 'apex-ai/v13/**'
      - '!apex-ai/v13/tests/**'
      - '!apex-ai/v13/**/*.test.ts'
      - '!apex-ai/v13/**/*.spec.ts'
      - '!apex-ai/v13/coverage/**'
      - '!apex-ai/v13/SERVICES-INVENTORY.md'
  pull_request:
    branches: [main]
    paths:
      - 'apex-ai/v13/**'
  workflow_dispatch:

concurrency:
  group: bundle-size-check
  cancel-in-progress: true

jobs:
  size-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apex-ai/v13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apex-ai/v13/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production
        run: npm run build

      - name: Run size-limit check (budgets in package.json)
        id: size
        run: |
          npm run size 2>&1 | tee size-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Append GitHub Step Summary
        if: always()
        run: |
          {
            echo "## 📦 Bundle Size Check Apex v13"
            echo ""
            echo "Budgets définis dans \`package.json\` size-limit[] :"
            echo "- dist/index.html < 30 KB raw"
            echo "- dist/assets/css/*.css < 30 KB gzip"
            echo "- dist/core/bootstrap-*.js < 80 KB gzip"
            echo ""
            echo "### Résultat size-limit"
            echo '```'
            cat size-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail si seuils dépassés
        if: steps.size.outputs.exit_code != '0'
        run: |
          echo "::error::Bundle size dépasse seuils package.json size-limit[]. Voir Step Summary."
          exit 1
