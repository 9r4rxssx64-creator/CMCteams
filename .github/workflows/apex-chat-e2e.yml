name: Apex Chat E2E — tests Playwright sur prod live

# Lance Playwright Chromium + WebKit iPhone sur la prod après chaque déploiement
# messaging-app/ (cf règle CLAUDE.md "TOUJOURS TESTER END-TO-END").

on:
  push:
    branches: [main]
    paths:
      - 'messaging-app/index.html'
      - 'messaging-app/sw.js'
      - 'messaging-app/lib/**'
      - 'messaging-app/cgu.html'
      - 'messaging-app/privacy.html'
      - 'messaging-app/manifest.json'
      - 'messaging-app/e2e/**'
      - 'messaging-app/workers/**'
      - '.github/workflows/apex-chat-e2e.yml'
  workflow_dispatch:
  schedule:
    # Cron quotidien à 04:00 UTC (5h Monaco) pour détecter régression silencieuse
    - cron: '0 4 * * *'

permissions:
  contents: read
  issues: write   # v1.1.199 — report des échecs E2E dans une issue lisible

jobs:
  e2e:
    name: Smoke tests Playwright
    runs-on: ubuntu-latest
    # Attend ~2 min après le push pour laisser GitHub Pages déployer
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + browsers
        working-directory: messaging-app/e2e
        run: |
          npm install --no-fund --no-audit
          npx playwright install --with-deps chromium webkit

      - name: Wait for GitHub Pages deploy propagation (2 min)
        if: github.event_name == 'push'
        run: sleep 120

      - name: Pre-flight check (HTTP 200 sur prod)
        run: |
          URL="${APEX_CHAT_URL:-https://9r4rxssx64-creator.github.io/CMCteams/messaging-app/}"
          echo "Testing $URL"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$CODE" = "200" ]; then
              echo "::notice::Prod OK (HTTP $CODE)"
              exit 0
            fi
            echo "Tentative $i : HTTP $CODE — retry dans 20s…"
            sleep 20
          done
          echo "::error::Prod injoignable après 5 retries"
          exit 1

      - name: Run Playwright smoke tests
        working-directory: messaging-app/e2e
        env:
          APEX_CHAT_URL: https://9r4rxssx64-creator.github.io/CMCteams/messaging-app/
          # v1.1.198 — secret du login de test sûr (== APEX_CHAT_ADMIN_TOKEN côté worker)
          E2E_TEST_SECRET: ${{ secrets.APEX_CHAT_ADMIN_TOKEN }}
          # v1.1.199 — le flag CLI --reporter=json IGNORE le outputFile du config →
          # le json partait en STDOUT et results.json n'était jamais écrit (print-fails
          # ne trouvait rien). Cet env force l'écriture du fichier.
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
        run: npx playwright test --reporter=list,json

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            messaging-app/e2e/playwright-report/
            messaging-app/e2e/results.json
            messaging-app/e2e/test-results/
          retention-days: 14

      - name: Job summary
        if: always()
        working-directory: messaging-app/e2e
        run: |
          if [ -f results.json ]; then
            echo "## 🎭 Apex Chat E2E — résultats" >> $GITHUB_STEP_SUMMARY
            # v1.1.198 — liste EXACTE des specs échouées, sur stdout ET dans le summary.
            python3 print-fails.py results.json | tee -a $GITHUB_STEP_SUMMARY
            echo "- 📦 Artefacts : voir 'playwright-report-${{ github.run_id }}'" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Reporter les échecs dans une issue (lisible)
        if: failure()
        working-directory: messaging-app/e2e
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 report-fails.py

      - name: Refermer l'issue E2E si succès
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          N=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues?state=open&labels=e2e-fails&per_page=1" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['number'] if d else '')")
          if [ -n "$N" ]; then
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/issues/$N" -d '{"state":"closed"}' >/dev/null
            echo "Issue #$N refermée (E2E vert)"
          fi
