# Déploie le worker wm-brief (synthèse IA du panneau "Synthèse actu" de World Monitor).
# Secrets requis (noms EXACTS — règle CLAUDE.md secrets) :
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, ANTHROPIC_API_KEY
# Anti-spam : pas de cron — dispatch manuel + push sur le dossier du worker uniquement.
name: Deploy WM Brief Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/cloudflare/wm-brief/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: tools/cloudflare/wm-brief
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier les secrets requis (erreur exacte, pas silencieuse)
        env:
          AK: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          [ -z "$AK" ] && MISSING="$MISSING ANTHROPIC_API_KEY"
          if [ -n "$MISSING" ]; then echo "::error::Secrets manquants :$MISSING"; exit 1; fi
          echo "Secrets OK"

      - name: Installer wrangler
        run: npm i -g wrangler && wrangler --version

      - name: Déployer le worker
        run: |
          set -e
          wrangler deploy 2>&1 | tee /tmp/deploy.log
          grep -Eo 'https://[a-z0-9.-]+workers.dev' /tmp/deploy.log | head -1 > /tmp/url.txt
          echo "URL déployée : $(cat /tmp/url.txt)"

      - name: Pousser la clé Anthropic (secret worker, jamais dans le code)
        env:
          AK: ${{ secrets.ANTHROPIC_API_KEY }}
        run: printf '%s' "$AK" | wrangler secret put ANTHROPIC_API_KEY

      - name: Smoke test réel (leçon 95 — un deploy vert sans test live ne prouve rien)
        run: |
          URL=$(cat /tmp/url.txt); [ -z "$URL" ] && URL="https://wm-brief.9r4rxssx64.workers.dev"
          sleep 8
          echo "--- /health ---"
          curl -sS "$URL/health" | tee /tmp/h.json; echo
          grep -q '"hasKey":true' /tmp/h.json || { echo "::error::La clé ANTHROPIC_API_KEY n'est PAS visible par le worker"; exit 1; }
          echo "--- /brief ---"
          curl -sS "$URL/brief" | tee /tmp/b.json; echo
          grep -q '"brief"' /tmp/b.json || { echo "::error::Réponse /brief invalide : $(cat /tmp/b.json)"; exit 1; }
          echo "✅ wm-brief live et authentifié"
