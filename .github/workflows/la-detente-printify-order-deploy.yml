name: La Détente — Déploie le Worker de commande Printify

# Déploie ld-printify-order sur Cloudflare, injecte PRINTIFY_API_KEY en secret,
# capture l'URL réelle et la commit dans printify-order-config.json. 100% auto.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'shops/la-detente/worker-order/**'
      - '.github/workflows/la-detente-printify-order-deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install wrangler
        run: npm i -g wrangler@3
      - name: VAPID — réutilise la clé publique existante (sinon génère)
        id: vapid
        run: |
          set -e
          CFG=shops/la-detente/push-config.json
          PUB=""
          if [ -f "$CFG" ]; then PUB=$(node -e "try{console.log((require('./'+process.argv[1]).vapid_public)||'')}catch(e){console.log('')}" "$CFG"); fi
          if [ -n "$PUB" ]; then
            echo "Clé VAPID existante réutilisée (subscriptions préservées)."
            echo "vapid_public=$PUB" >> "$GITHUB_OUTPUT"
            echo "generated=0" >> "$GITHUB_OUTPUT"
          else
            echo "Génération d'un nouveau couple VAPID dédié La Détente."
            OUT=$(node -e "const c=require('crypto');const {privateKey}=c.generateKeyPairSync('ec',{namedCurve:'prime256v1'});const j=privateKey.export({format:'jwk'});const x=Buffer.from(j.x,'base64url'),y=Buffer.from(j.y,'base64url');const pub=Buffer.concat([Buffer.from([4]),x,y]).toString('base64url');console.log(pub+' '+j.d)")
            echo "vapid_public=$(echo "$OUT" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
            echo "vapid_private=$(echo "$OUT" | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
            echo "generated=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Déploiement + secrets + capture URL
        id: deploy
        working-directory: shops/la-detente/worker-order
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          VAPID_GENERATED: ${{ steps.vapid.outputs.generated }}
          VAPID_PUBLIC_KEY: ${{ steps.vapid.outputs.vapid_public }}
          VAPID_PRIVATE_KEY: ${{ steps.vapid.outputs.vapid_private }}
        run: |
          set -e
          wrangler deploy 2>&1 | tee deploy.log
          printf '%s' "$PRINTIFY_API_KEY" | wrangler secret put PRINTIFY_API_KEY 2>&1 | tail -3 || true
          if [ "$VAPID_GENERATED" = "1" ]; then
            printf '%s' "$VAPID_PUBLIC_KEY"  | wrangler secret put VAPID_PUBLIC_KEY  2>&1 | tail -2 || true
            printf '%s' "$VAPID_PRIVATE_KEY" | wrangler secret put VAPID_PRIVATE_KEY 2>&1 | tail -2 || true
            printf '%s' "desarzens.kevin@gmail.com" | wrangler secret put VAPID_EMAIL 2>&1 | tail -2 || true
          else
            echo "Secrets VAPID déjà en place sur le worker (déploiement précédent)."
          fi
          URL=$(grep -oE 'https://[a-z0-9._-]+\.workers\.dev' deploy.log | head -1)
          echo "URL=$URL"
          if [ -z "$URL" ]; then echo "::error::URL worker introuvable"; exit 1; fi
          echo "worker_url=$URL" >> "$GITHUB_OUTPUT"
      - name: Health check
        run: curl -fsS "${{ steps.deploy.outputs.worker_url }}" | head -c 200 || echo "(health peut mettre qq sec)"
      - name: Commit configs (worker URL + clé push)
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          PUB="${{ steps.vapid.outputs.vapid_public }}"
          TS="$(date -u +%FT%TZ)"
          printf '{\n  "worker_url": "%s",\n  "app_tag": "ld-order-v1",\n  "shop_id": 27791653,\n  "updated_at": "%s"\n}\n' "$URL" "$TS" > shops/la-detente/printify-order-config.json
          printf '{\n  "vapid_public": "%s",\n  "updated_at": "%s"\n}\n' "$PUB" "$TS" > shops/la-detente/push-config.json
          cat shops/la-detente/printify-order-config.json shops/la-detente/push-config.json
          git config user.name "kdmc-bot"; git config user.email "bot@kdmc.local"
          BR="claude/printify-order-config-${{ github.run_id }}"
          git checkout -b "$BR"
          git add shops/la-detente/printify-order-config.json shops/la-detente/push-config.json
          if git diff --cached --quiet; then echo "config inchangée"; else
            git commit -m "La Détente — URL worker + clé push VAPID ($URL) [skip ci]"
            git push -u origin "$BR"; echo "Poussé $BR (auto-merge)."
          fi
