name: Deploy kdmc-apis (passerelle APIs gratuites domaine)

# Déploie le worker services/kdmc-apis (apis.kd-mc.com) : pose les clés en secrets
# Cloudflare (uniquement celles présentes → fail-open), déploie via wrangler, puis
# smoke-test /health sur la VRAIE URL (leçon #85/#95 : un endpoint sans auth ne prouve
# rien tout seul, mais /health confirme au moins que le worker répond + quelles clés
# sont chargées). Isolation CMCteams : ne touche aucune autre app.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/kdmc-apis/**'
      - '.github/workflows/deploy-kdmc-apis.yml'

permissions:
  contents: read

concurrency:
  group: deploy-kdmc-apis
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Tests unitaires (bloquant)
        working-directory: services/kdmc-apis
        run: |
          node --check worker.js
          node --test worker.test.mjs

      - name: Install wrangler
        run: npm install -g wrangler@^3.80.0

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN manquant"; exit 1
          fi
          wrangler whoami

      - name: Pose les clés (secrets présents uniquement, fail-open)
        working-directory: services/kdmc-apis
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -e
          put() {
            local name="$1"; local val="${!1}"
            if [ -n "$val" ]; then
              printf '%s' "$val" | wrangler secret put "$name" 2>&1 | tail -1
              echo "  → $name posé"
            else
              echo "  → $name absent (route dépendante en 501, fail-open)"
            fi
          }
          for s in GEMINI_API_KEY GROQ_API_KEY OPENROUTER_API_KEY MISTRAL_API_KEY \
                   COHERE_API_KEY DEEPSEEK_API_KEY TOGETHER_API_KEY XAI_API_KEY \
                   TAVILY_API_KEY BRAVE_API_KEY PEXELS_API_KEY FINNHUB_API_KEY \
                   PRINTIFY_API_KEY RESEND_API_KEY GOOGLE_API_KEY; do
            put "$s"
          done

      - name: Deploy
        working-directory: services/kdmc-apis
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy 2>&1 | tee /tmp/deploy.log

      - name: Smoke test /health (vraie URL)
        run: |
          set +e
          echo "## kdmc-apis /health" >> $GITHUB_STEP_SUMMARY
          for URL in "https://apis.kd-mc.com/health" "https://kdmc-apis.9r4rxssx64.workers.dev/health"; do
            CODE=$(curl -sS -o /tmp/h.json -w "%{http_code}" -m 15 "$URL")
            echo "- $URL → HTTP $CODE" >> $GITHUB_STEP_SUMMARY
            if [ "$CODE" = "200" ]; then
              echo '```json' >> $GITHUB_STEP_SUMMARY
              head -c 800 /tmp/h.json >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
          done
          echo "::warning::/health pas encore 200 (custom_domain apis.kd-mc.com peut mettre ~1 min à provisionner DNS+SSL)"
