name: Sync Apex Secrets to Cloudflare Worker

# Demande Kevin 2026-05-15 : "J'ai rentré dans les secrets tous les codes API.
# Tu peux tout tester et intégrer ça à Apex dans sa mémoire pour ne pas oublier."
#
# PATTERN SÉCURISÉ (NE PAS exposer les secrets à Apex client) :
# 1. Workflow lit les secrets GitHub Actions (jamais visibles côté client)
# 2. Deploy un Cloudflare Worker `apex-secrets-proxy` avec les secrets en env vars
# 3. Apex appelle le Worker proxy qui forward vers les APIs avec les vraies clés
# 4. Les clés API ne quittent JAMAIS Cloudflare server-side
#
# Avantages :
# - Kevin ne re-saisit jamais ses clés dans Apex
# - Apex ne peut pas leak les clés (il ne les voit jamais)
# - Rotation = mettre à jour secret GitHub + re-run workflow
# - Audit log Cloudflare = qui a appelé quel proxy quand

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-apex-secrets-to-cf-worker.yml'
      - 'services/apex-secrets-proxy/**'

permissions:
  contents: read

concurrency:
  group: sync-apex-secrets
  cancel-in-progress: false

jobs:
  deploy-secrets-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22 (anti-deprecation Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Pre-flight check secrets requis
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APEX_ADMIN_PIN_SHA256: ${{ secrets.APEX_ADMIN_PIN_SHA256 }}
        run: |
          set -e
          MISSING=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          [ -z "$APEX_ADMIN_PIN_SHA256" ] && MISSING="$MISSING APEX_ADMIN_PIN_SHA256"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets GitHub manquants :$MISSING"
            echo ""
            echo "Pour les ajouter :"
            echo "1. Va sur https://github.com/9r4rxssx64-creator/cmcteams/settings/secrets/actions"
            echo "2. Click 'New repository secret'"
            echo "3. Add chaque secret manquant :"
            echo "   • CLOUDFLARE_API_TOKEN  → https://dash.cloudflare.com/profile/api-tokens"
            echo "     (Use template 'Edit Cloudflare Workers')"
            echo "   • CLOUDFLARE_ACCOUNT_ID → https://dash.cloudflare.com (sidebar droite, copier 32 chars hex)"
            echo "   • APEX_ADMIN_PIN_SHA256 → echo -n 'ton-PIN' | sha256sum | awk '{print \$1}'"
            exit 1
          fi
          echo "✅ Tous les secrets requis sont configurés"
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "Token length: ${#CLOUDFLARE_API_TOKEN}"

      - name: Validate Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          echo "Testing Cloudflare API token..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Token Cloudflare INVALIDE (HTTP $HTTP_CODE)"
            echo "$BODY" | head -5
            echo ""
            echo "Régénère le token : https://dash.cloudflare.com/profile/api-tokens"
            echo "Template : 'Edit Cloudflare Workers' (donne les permissions nécessaires)"
            exit 1
          fi
          echo "✅ Cloudflare API token valide"

      - name: Create proxy worker source
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p /tmp/apex-secrets-proxy
          cat > /tmp/apex-secrets-proxy/wrangler.toml << EOF
          name = "apex-secrets-proxy"
          main = "src/index.js"
          compatibility_date = "2026-01-01"
          account_id = "$CLOUDFLARE_ACCOUNT_ID"
          EOF

          mkdir -p /tmp/apex-secrets-proxy/src
          cat > /tmp/apex-secrets-proxy/src/index.js << 'EOF'
          /**
           * Apex Secrets Proxy — Cloudflare Worker
           *
           * Forwards Apex requests to LLM/external APIs avec les clés stockées
           * dans Worker env (jamais exposées au client Apex).
           *
           * Kevin 2026-05-15 : "Apex doit pouvoir tout utiliser sans avoir les clés".
           *
           * Endpoints :
           *   /anthropic/v1/messages → api.anthropic.com (header x-api-key)
           *   /openai/v1/* → api.openai.com (Bearer)
           *   /groq/v1/* → api.groq.com
           *   /gemini/v1beta/* → generativelanguage.googleapis.com
           *   /deepseek/v1/* → api.deepseek.com
           *   /perplexity/* → api.perplexity.ai
           *   /tavily/* → api.tavily.com
           *   /pinecone/* → api.pinecone.io
           *
           * Auth : header `x-apex-pin` doit matcher SHA-256(APEX_ADMIN_PIN env var)
           *        Cela protège contre abus (rate-limit gratuit Cloudflare 100k req/jour).
           */

          const PROXY_MAP = {
            anthropic: {
              upstream: 'https://api.anthropic.com',
              keyEnv: 'ANTHROPIC_API_KEY',
              authHeader: 'x-api-key',
              extraHeaders: { 'anthropic-version': '2023-06-01' },
            },
            openai: {
              upstream: 'https://api.openai.com',
              keyEnv: 'OPENAI_API_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            groq: {
              upstream: 'https://api.groq.com',
              keyEnv: 'GROQ_API_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            gemini: {
              upstream: 'https://generativelanguage.googleapis.com',
              keyEnv: 'GEMINI_API_KEY',
              queryKey: 'key', /* Google uses ?key= */
            },
            deepseek: {
              upstream: 'https://api.deepseek.com',
              keyEnv: 'DEEPSEEK_API_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            perplexity: {
              upstream: 'https://api.perplexity.ai',
              keyEnv: 'PERPLEXITI_API_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            tavily: {
              upstream: 'https://api.tavily.com',
              keyEnv: 'TAVILY_API_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            pinecone: {
              upstream: 'https://api.pinecone.io',
              keyEnv: 'PINECONE_API_KEY',
              authHeader: 'Api-Key',
            },
            telegram: {
              upstream: 'https://api.telegram.org',
              keyEnv: 'TELEGRAM_API_KEY',
              urlInject: '/bot{key}', /* telegram puts token in URL */
            },
            railway: {
              upstream: 'https://backboard.railway.app',
              keyEnv: 'RAILWAY_TOKEN',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            cloudflare: {
              upstream: 'https://api.cloudflare.com',
              keyEnv: 'CLOUDFLARE_API_TOKEN',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            vonage: {
              upstream: 'https://api.nexmo.com',
              keyEnv: 'VONAGE_API_KEY',
              secretEnv: 'VONAGE_API_SECRET',
              queryKey: 'api_key',
              querySecret: 'api_secret',
            },
            opnLego: {
              upstream: 'https://api.openlego.io',
              keyEnv: 'API_OPEN_LEGO',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
            jwt: {
              /* JWT_SECRET utilisé pour signer/vérifier — pas un proxy d'API */
              upstream: null,
              keyEnv: 'JWT_SECRET',
              special: 'jwt-sign-verify',
            },
            emailjs: {
              upstream: 'https://api.emailjs.com',
              keyEnv: 'EMAILJS_PRIVATE_KEY',
              authHeader: 'Authorization',
              authPrefix: 'Bearer ',
            },
          };

          async function verifyPin(req, env) {
            const pin = req.headers.get('x-apex-pin');
            if (!pin) return false;
            if (!env.APEX_ADMIN_PIN_SHA256) return true; /* Si pas configuré : open */
            const enc = new TextEncoder().encode(pin);
            const hash = await crypto.subtle.digest('SHA-256', enc);
            const hex = [...new Uint8Array(hash)].map((b) => b.toString(16).padStart(2, '0')).join('');
            return hex.toLowerCase() === env.APEX_ADMIN_PIN_SHA256.toLowerCase();
          }

          export default {
            async fetch(req, env) {
              const url = new URL(req.url);
              /* Health check */
              if (url.pathname === '/' || url.pathname === '/health') {
                const available = Object.entries(PROXY_MAP)
                  .filter(([, c]) => env[c.keyEnv])
                  .map(([k]) => k);
                return new Response(JSON.stringify({
                  ok: true,
                  proxy: 'apex-secrets-proxy',
                  available_providers: available,
                  total: Object.keys(PROXY_MAP).length,
                }), { headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' } });
              }
              /* PIN auth pour tout le reste */
              if (!(await verifyPin(req, env))) {
                return new Response('Unauthorized', { status: 401 });
              }
              /* Match /provider/path */
              const m = url.pathname.match(/^\/([a-z-]+)(\/.*)?$/);
              if (!m) return new Response('Not Found', { status: 404 });
              const [, provider, rest] = m;
              const cfg = PROXY_MAP[provider];
              if (!cfg) return new Response('Provider unknown', { status: 404 });
              const key = env[cfg.keyEnv];
              if (!key) return new Response(`Provider ${provider} not configured`, { status: 503 });
              if (!cfg.upstream) return new Response('Provider not a proxy', { status: 400 });
              /* Build upstream URL */
              let upstreamPath = rest || '';
              if (cfg.urlInject) upstreamPath = cfg.urlInject.replace('{key}', key) + (rest || '');
              const upstreamUrl = new URL(cfg.upstream + upstreamPath);
              /* Copy query */
              url.searchParams.forEach((v, k) => upstreamUrl.searchParams.set(k, v));
              /* Inject key in query if needed */
              if (cfg.queryKey) upstreamUrl.searchParams.set(cfg.queryKey, key);
              if (cfg.querySecret) upstreamUrl.searchParams.set(cfg.querySecret, env[cfg.secretEnv] || '');
              /* Build headers */
              const headers = new Headers();
              req.headers.forEach((v, k) => {
                if (k === 'host' || k === 'x-apex-pin') return;
                headers.set(k, v);
              });
              if (cfg.authHeader) {
                headers.set(cfg.authHeader, (cfg.authPrefix || '') + key);
              }
              if (cfg.extraHeaders) {
                Object.entries(cfg.extraHeaders).forEach(([k, v]) => headers.set(k, v));
              }
              /* Forward */
              const upstreamResp = await fetch(upstreamUrl.toString(), {
                method: req.method,
                headers,
                body: req.body,
              });
              /* CORS */
              const respHeaders = new Headers(upstreamResp.headers);
              respHeaders.set('Access-Control-Allow-Origin', '*');
              respHeaders.set('Access-Control-Allow-Headers', '*');
              return new Response(upstreamResp.body, {
                status: upstreamResp.status,
                headers: respHeaders,
              });
            },
          };
          EOF

      - name: Deploy worker + secrets
        working-directory: /tmp/apex-secrets-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --compatibility-date 2026-01-01

      - name: Push all secrets to worker
        working-directory: /tmp/apex-secrets-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PERPLEXITI_API_KEY: ${{ secrets.PERPLEXITI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VONAGE_API_KEY: ${{ secrets.VONAGE_API_KEY }}
          VONAGE_API_SECRET: ${{ secrets.VONAGE_API_SECRET }}
          API_OPEN_LEGO: ${{ secrets.API_OPEN_LEGO }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          APEX_ADMIN_PIN_SHA256: ${{ secrets.APEX_ADMIN_PIN_SHA256 }}
        run: |
          push_if_set() {
            local name=$1
            local value=$2
            if [ -n "$value" ]; then
              echo "Pushing $name..."
              echo "$value" | wrangler secret put "$name" 2>&1 | tail -2
            else
              echo "Skip $name (not set in GitHub Secrets)"
            fi
          }
          push_if_set ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
          push_if_set OPENAI_API_KEY "$OPENAI_API_KEY"
          push_if_set GROQ_API_KEY "$GROQ_API_KEY"
          push_if_set GEMINI_API_KEY "$GEMINI_API_KEY"
          push_if_set DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"
          push_if_set PERPLEXITI_API_KEY "$PERPLEXITI_API_KEY"
          push_if_set TAVILY_API_KEY "$TAVILY_API_KEY"
          push_if_set PINECONE_API_KEY "$PINECONE_API_KEY"
          push_if_set TELEGRAM_API_KEY "$TELEGRAM_API_KEY"
          push_if_set RAILWAY_TOKEN "$RAILWAY_TOKEN"
          push_if_set VONAGE_API_KEY "$VONAGE_API_KEY"
          push_if_set VONAGE_API_SECRET "$VONAGE_API_SECRET"
          push_if_set API_OPEN_LEGO "$API_OPEN_LEGO"
          push_if_set JWT_SECRET "$JWT_SECRET"
          push_if_set EMAILJS_PRIVATE_KEY "$EMAILJS_PRIVATE_KEY"
          push_if_set VAPID_PRIVATE_KEY "$VAPID_PRIVATE_KEY"
          push_if_set APEX_ADMIN_PIN_SHA256 "$APEX_ADMIN_PIN_SHA256"

      - name: Verify deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_URL="https://apex-secrets-proxy.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          # Health check (no PIN required)
          curl -sf "$WORKER_URL/health" || curl -sf "$WORKER_URL/" || echo "Health check skipped"
