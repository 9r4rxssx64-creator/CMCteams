## 🧠 Leçons clés (méthodes expert, à réutiliser)
1. **Diagnostic CI sans MCP/token** : `curl <https://api.github.com/repos/OWNER/REPO/actions/workflows/<f>.yml/runs`> (conclusion/head_sha) + `/runs/<id>/jobs` (étape en échec). Lecture anonyme = 60 req/h ; logs = 403 (token requis).
2. **Reproduire le build CI en local** : le CI tourne en **Node 20** → `nvm install 20 && nvm use 20`, puis `git checkout origin/main -- apex-ai/v13 && cd apex-ai/v13 && npx tsc --noEmit && npx vite build`.
3. **Vérité d'un fichier = objets git** (`git fetch origin main && git show origin/main:<path>`), JAMAIS `curl raw.githubusercontent` seul (CDN caché ~15 min).
4. **Auto-merge bloqué** : `auto-merge-claude.yml` n'a pas `workflows:write` → tout changement `.github/workflows/` dans une branche `claude/*` bloque TOUT le merge (même le code). → garder les workflows hors des branches auto-mergées ; Kevin applique les changements CI sur <github.com>.
5. **Branche divergente = conflit CLAUDE.md** : une autre session édite CLAUDE.md en parallèle → `git merge` du bot échoue. → repartir de `main` à jour + cherry-pick le commit code seul.
6. **APIs infra/data (Cloudflare/Railway/Finnhub) bloquent le CORS** → les tester via le proxy server-side, pas en fetch direct navigateur.
7. **Bump version Apex = 3 spots alignés** : `data-app-ver` (index.html), `APP_VER` (core/bootstrap.ts), `CACHE_VERSION` (sw.js) — sinon SW garde l'ancien cache OU boucle de MAJ.

