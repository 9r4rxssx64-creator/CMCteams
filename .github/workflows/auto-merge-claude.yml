name: Auto-merge Claude branches into main

# CRITIQUE (CLAUDE.md erreur #33) : éviter "branch jamais merge = deploiement fantome".
# Quand Claude push sur claude/* après pre-commit OK, merge auto vers main pour
# que GitHub Pages déploie immédiatement.
#
# Sécurité : ne touche QUE branches commençant par "claude/" (pas main, pas autres).
# Tests pre-commit déjà validés au push (node --check + 26 tests Apex).

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branche claude/* à merger sur main'
        required: true
        type: string
  # v13.4.337 (Kevin « continue le pipeline … pareil pour les futures branches ») :
  # CRON de rattrapage. Le push proxy ne déclenche pas toujours le webhook `push`
  # → des branches prêtes ne se mergeaient jamais (cause de blocages répétés).
  # Toutes les 6h (anti-spam), on rattrape les PR claude/* OUVERTES + mergeables.
  # Sûr : n'agit QUE sur des PR déjà ouvertes (intention explicite) — jamais un
  # merge en masse des branches expérimentales. Couvre les futures branches sans
  # config par branche. (Le job `auto-merge` push/dispatch reste inchangé.)
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine source branch
        id: src
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Validate JS syntax (CMCteams + Apex + Apex Chat)
        run: |
          set -e
          # CMCteams
          if [ -f index.html ]; then
            node -e "
              const fs=require('fs');
              const html=fs.readFileSync('index.html','utf8');
              const m=html.match(/<script>([\s\S]*?)<\/script>/g) || [];
              let combined='';
              m.forEach(s=>combined+=s.replace(/<\/?script>/g,'')+'\n');
              fs.writeFileSync('/tmp/check_cmc.js',combined);
            "
            node --check /tmp/check_cmc.js
            echo "OK: CMCteams JS syntax"
          fi
          # Apex AI
          if [ -f apex-ai/index.html ]; then
            node -e "
              const fs=require('fs');
              const html=fs.readFileSync('apex-ai/index.html','utf8');
              const m=html.match(/<script>([\s\S]*?)<\/script>/g) || [];
              let combined='';
              m.forEach(s=>combined+=s.replace(/<\/?script>/g,'')+'\n');
              fs.writeFileSync('/tmp/check_apex.js',combined);
            "
            node --check /tmp/check_apex.js
            echo "OK: Apex JS syntax"
          fi
          # Apex Chat
          if [ -f messaging-app/index.html ]; then
            node -e "
              const fs=require('fs');
              const html=fs.readFileSync('messaging-app/index.html','utf8');
              const m=html.match(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g) || [];
              let combined='';
              m.forEach(s=>{
                const open=(s.match(/<script(?:\s[^>]*)?>/)||[''])[0];
                if(/\bsrc\s*=/.test(open)) return;
                if(/\btype\s*=\s*\"?(application\/(ld\+json|json)|importmap|text\/template)/i.test(open)) return;
                const c=s.replace(/<script(?:\s[^>]*)?>/,'').replace(/<\/script>/,'');
                if(c.trim()) combined+=c+'\n';
              });
              fs.writeFileSync('/tmp/check_apex_chat.js',combined);
            "
            node --check /tmp/check_apex_chat.js
            echo "OK: Apex Chat JS syntax"
          fi
          # Workers Cloudflare
          for w in messaging-app/workers/*.js messaging-app/workers/durable-objects/*.js messaging-app/crypto.js; do
            if [ -f "$w" ]; then
              node --check "$w" || (echo "ERROR: $w syntax fail"; exit 1)
            fi
          done
          echo "OK: Workers JS syntax"

      - name: Validate no merge markers
        run: |
          set -e
          for f in index.html apex-ai/index.html sw.js apex-ai/sw.js; do
            if [ -f "$f" ]; then
              if grep -qE "^<<<<<<<|^=======$|^>>>>>>>" "$f"; then
                echo "ERROR: Merge markers in $f"
                exit 1
              fi
            fi
          done
          echo "OK: no merge markers"

      - name: Create & merge PR into main
        # FIX (GH013 2026-06) : la protection de branche main exige désormais que
        # TOUT passe par une Pull Request → le push direct était rejeté. On crée
        # donc une PR puis on la merge via l'API (gh), ce que la règle attend.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="${{ steps.src.outputs.branch }}"
          # Branche absente (déjà mergée/supprimée, réf proxy incohérente) → SKIP propre.
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::notice::Branche $BRANCH introuvable sur origin — rien à merger."
            exit 0
          fi
          git fetch origin main "$BRANCH"
          # Déjà intégrée dans main → rien à faire.
          if git merge-base --is-ancestor "origin/$BRANCH" "origin/main" 2>/dev/null; then
            echo "::notice::$BRANCH déjà intégrée dans main — rien à merger."
            exit 0
          fi
          # PR ouverte existante ? sinon la créer.
          PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "Auto-merge $BRANCH into main (claude-code automation)" \
              --body "Tests pre-commit + JS syntax + no markers OK. Trigger: ${{ github.actor }}. Voir CLAUDE.md erreur #33 (branch jamais mergée = deploiement fantome)." \
              || true
            PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi
          if [ -z "$PR" ]; then
            echo "::warning::Impossible de créer/trouver la PR pour $BRANCH — merger manuellement."
            exit 1
          fi
          # Merge via PR (admin override si dispo, sinon merge normal). Si la règle
          # exige une review → laisse la PR ouverte + warning pour merge manuel.
          if gh pr merge "$PR" --merge --admin --delete-branch=false 2>/dev/null \
             || gh pr merge "$PR" --merge --delete-branch=false 2>/dev/null; then
            echo "PR #$PR mergée → GitHub Pages déploiera dans 1-3 min"
          else
            echo "::warning::PR #$PR créée mais merge auto refusé (protection) — merger manuellement dans l'UI."
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Auto-merge ${{ steps.src.outputs.branch }} → main FAILED. Manual intervention needed."

  # v13.4.337 — Rattrapage cron (+ dispatch manuel) : merge les PR claude/* OUVERTES
  # et mergeables. Indépendant du webhook push (souvent non émis par le proxy git).
  # SÛR : seulement des PR déjà ouvertes (intention explicite), jamais un merge de
  # masse. Couvre automatiquement toute future branche dès qu'elle a une PR vers main.
  cron-merge-open-prs:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge open claude/* PRs (mergeables)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # PR ouvertes vers main dont la tête est une branche claude/* et non-draft.
          PRS=$(gh pr list --base main --state open --limit 50 \
                  --json number,headRefName,isDraft,mergeable \
                  --jq '.[] | select(.headRefName|startswith("claude/")) | select(.isDraft==false) | "\(.number)\t\(.mergeable)\t\(.headRefName)"' \
                  2>/dev/null || echo "")
          if [ -z "$PRS" ]; then echo "::notice::Aucune PR claude/* ouverte à merger."; exit 0; fi
          MERGED=0; SKIP=0
          while IFS=$'\t' read -r NUM MERGEABLE HEAD; do
            [ -z "${NUM:-}" ] && continue
            # CONFLICTING → on laisse pour résolution manuelle (jamais de merge forcé d'un conflit).
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "::warning::PR #$NUM ($HEAD) en conflit → laissée pour merge manuel."
              SKIP=$((SKIP+1)); continue
            fi
            # admin override si dispo (protection main = require PR), sinon merge normal.
            if gh pr merge "$NUM" --merge --admin --delete-branch=false 2>/dev/null \
               || gh pr merge "$NUM" --merge --delete-branch=false 2>/dev/null; then
              echo "✅ PR #$NUM ($HEAD) mergée → Pages déploiera."
              MERGED=$((MERGED+1))
            else
              echo "::warning::PR #$NUM ($HEAD) non mergée (checks/protection) — manuel."
              SKIP=$((SKIP+1))
            fi
          done <<< "$PRS"
          echo "Bilan rattrapage : $MERGED mergée(s), $SKIP laissée(s)."
