name: Claude Todo Watcher (escalade autonome)
on:
  schedule:
    - cron: '*/15 * * * *'  # Toutes les 15 minutes (temps reponse critique)
  workflow_dispatch:        # Declenchement manuel + par Apex via API
  repository_dispatch:      # Apex peut declencher via event apex_escalation
    types: [apex_escalation, critical_issue]

jobs:
  check-escalations:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Apex claude_todo queue
        id: fetch
        env:
          FB_URL: https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app
        run: |
          curl -s "${FB_URL}/apex/ax_claude_todo.json" -o todo.json || echo '[]' > todo.json
          curl -s "${FB_URL}/apex/ax_lessons_learned.json" -o lessons.json || echo '[]' > lessons.json
          curl -s "${FB_URL}/apex/ax_handoff_journal.json" -o journal.json || echo '[]' > journal.json
          echo "todo_size=$(wc -c < todo.json)" >> $GITHUB_OUTPUT
          echo "Total queue size: $(wc -c < todo.json) bytes"

      - name: Analyze pending items
        id: analyze
        run: |
          python3 << 'EOF'
          import json, os, time
          try:
              with open('todo.json') as f:
                  data = json.load(f)
              if not isinstance(data, list):
                  data = list(data.values()) if isinstance(data, dict) else []
          except:
              data = []

          now = int(time.time() * 1000)
          pending = [t for t in data if t.get('status') == 'pending']
          critical = [t for t in pending if (now - t.get('ts', 0)) > 7200000]  # >2h sans traitement
          recurrent = {}
          for t in pending:
              key = str(t.get('reason', ''))[:80]
              recurrent[key] = recurrent.get(key, 0) + 1
          top_recurrent = sorted(recurrent.items(), key=lambda x: -x[1])[:5]

          # Export results for next step
          with open('/tmp/report.json', 'w') as f:
              json.dump({
                  'pending_total': len(pending),
                  'critical_total': len(critical),
                  'top_recurrent': top_recurrent,
                  'critical_items': critical[:10]
              }, f, indent=2)

          # Set outputs
          with open(os.environ.get('GITHUB_OUTPUT', '/tmp/out'), 'a') as out:
              out.write(f"pending={len(pending)}\n")
              out.write(f"critical={len(critical)}\n")
              out.write(f"should_alert={'true' if len(critical) > 0 or len(pending) > 20 else 'false'}\n")

          print(f"Pending: {len(pending)}, Critical (>2h): {len(critical)}")
          EOF

      - name: Create GitHub Issue if critical
        if: steps.analyze.outputs.should_alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/report.json', 'utf8'));

            const title = `[AUTO] ${report.critical_total} escalades critiques + ${report.pending_total} pending`;
            const body = `## 🚨 Escalade auto depuis Apex AI

**Total pending** : ${report.pending_total}
**Critique (>2h non traité)** : ${report.critical_total}

### Top 5 récurrents
${report.top_recurrent.map(([r, c]) => `- (${c}x) ${r}`).join('\n')}

### Items critiques (top 10)
\`\`\`json
${JSON.stringify(report.critical_items, null, 2)}
\`\`\`

---
**Action requise** : Claude Code doit investiguer la prochaine session.
Source : Firebase \`/apex/ax_claude_todo\`
Généré automatiquement par \`.github/workflows/claude-todo-watcher.yml\`
            `;

            // Check if issue already open for this hour to avoid spam
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-escalation',
              state: 'open'
            });

            if (existing.data.length >= 3) {
              console.log('Already 3+ open auto-escalations, skip creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['auto-escalation', 'claude-code']
            });

      - name: Send Telegram alert (optional)
        if: steps.analyze.outputs.should_alert == 'true' && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚨 Apex AI: ${{ steps.analyze.outputs.critical }} escalades critiques. Issue GitHub créée."
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-todo-analysis-${{ github.run_number }}
          path: |
            todo.json
            lessons.json
            journal.json
            /tmp/report.json
          retention-days: 7
