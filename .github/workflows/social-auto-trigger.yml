name: Social — Auto First Run

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/social-auto-trigger.yml'
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write
  actions: write

jobs:
  trigger-social-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger social-publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'social-publish.yml',
              ref: 'main',
              inputs: {
                niche: 'betrayal-revenge',
                format: 'long',
                publish_platforms: 'youtube'
              }
            });
            console.log('✅ social-publish.yml triggered');
