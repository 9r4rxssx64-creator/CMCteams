name: Security Suite — arsenal hacker (audit autorisé kd-mc.com)

# Kevin 2026-07-07 (« récupère tous les outils des hackers et installe dans Apex »).
# Suite de sécurité offensive + défensive = l'arsenal OSS que les pentesters/hackers
# éthiques utilisent, appliqué UNIQUEMENT aux propres apps de Kevin (kd-mc.com / ce
# repo). C'est du pentest AUTORISÉ sur son domaine — jamais contre un tiers.
#
# Outils embarqués (tous gratuits, OSS, réputés — cf. recherche 2026) :
#  🔑 gitleaks + TruffleHog  → secrets exposés (clés Anthropic/Firebase/aisstream…)
#  📦 OSV-Scanner + Trivy    → failles des dépendances (npm workers/tests) + IaC/SBOM
#  🧬 Semgrep (règles OSS)   → SAST du JS/TS (XSS, injections) — complète esc()/CSP
#  ⚙️ zizmor                 → durcit les GitHub Actions (injection, secrets, pinning)
# (Strix = pentest IA offensif dynamique dans strix-scan.yml, séparé car coûteux.)
#
# Déclencheurs : workflow_dispatch (moi/Kevin) + repository_dispatch [security-suite]
# (Apex, commande /audit). Cron hebdo léger (dimanche 3h UTC) = veille sécurité auto
# (règle anti-spam : 1×/sem, aucun mail, résultat en artifact + Firebase).
#
# Résultat : artifact `security-report-*` + résumé Firebase /apex/ax_security_last
# (Apex lit → Kevin voit l'état sécu dans son chat). Non-bloquant (fail-open : un
# outil qui plante n'arrête pas les autres) — c'est un RAPPORT, pas un gate.
#
# Sécurité : permissions contents:read ; secrets Firebase QUE sur le step de push.

on:
  workflow_dispatch:
    inputs:
      exec_id:
        description: 'ID exécution (callback Apex, optionnel)'
        required: false
        default: ''
  repository_dispatch:
    types: [security-suite]
  schedule:
    - cron: '0 3 * * 0'   # dimanche 03:00 UTC — veille hebdo

concurrency:
  group: security-suite
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks/trufflehog scannent l'historique

      - name: Préparer la sortie
        run: mkdir -p /tmp/sec

      # ── 🔑 SECRETS ──────────────────────────────────────────────
      - name: gitleaks (secrets, historique git)
        continue-on-error: true
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz -o /tmp/gl.tgz
          tar xzf /tmp/gl.tgz -C /tmp gitleaks 2>/dev/null || tar xzf /tmp/gl.tgz -C /tmp
          chmod +x /tmp/gitleaks
          /tmp/gitleaks detect --source . --report-format json --report-path /tmp/sec/gitleaks.json --no-banner --exit-code 0 2>&1 | tail -20 | tee /tmp/sec/gitleaks.log

      - name: TruffleHog (secrets vérifiés = encore actifs)
        continue-on-error: true
        run: |
          curl -sSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /tmp 2>&1 | tail -3 || true
          /tmp/trufflehog filesystem . --json --no-update > /tmp/sec/trufflehog.jsonl 2>/tmp/sec/trufflehog.log || true
          echo "TruffleHog: $(wc -l < /tmp/sec/trufflehog.jsonl 2>/dev/null || echo 0) résultats"

      # ── 📦 DÉPENDANCES ──────────────────────────────────────────
      - name: OSV-Scanner (vulns dépendances)
        continue-on-error: true
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/download/v1.9.2/osv-scanner_linux_amd64 -o /tmp/osv
          chmod +x /tmp/osv
          /tmp/osv scan --recursive --format json --output /tmp/sec/osv.json . 2>&1 | tail -15 | tee /tmp/sec/osv.log || true

      - name: Trivy (filesystem + IaC + secrets)
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: '/tmp/sec/trivy.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # ── 🧬 CODE (SAST) ──────────────────────────────────────────
      - name: Semgrep (SAST JS/TS, règles OSS)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet semgrep 2>&1 | tail -2 || true
          semgrep scan --config p/default --config p/javascript --config p/xss --config p/secrets \
            --json --output /tmp/sec/semgrep.json --quiet --timeout 120 \
            --exclude node_modules --exclude '*.min.js' . 2>&1 | tail -15 | tee /tmp/sec/semgrep.log || true

      # ── ⚙️ GITHUB ACTIONS ───────────────────────────────────────
      - name: zizmor (durcissement des workflows)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet zizmor 2>&1 | tail -2 || true
          zizmor --format json .github/workflows/ > /tmp/sec/zizmor.json 2>/tmp/sec/zizmor.log || true
          echo "zizmor terminé"

      # ── SYNTHÈSE ────────────────────────────────────────────────
      - name: Synthèse (compte les findings par outil)
        id: sum
        run: |
          python3 - <<'PYEOF' | tee /tmp/sec/summary.txt
          import json, os
          def loadj(p):
              try: return json.load(open(p))
              except Exception: return None
          def countlines(p):
              try: return sum(1 for l in open(p) if l.strip())
              except Exception: return 0
          res = {}
          gl = loadj('/tmp/sec/gitleaks.json'); res['gitleaks (secrets)'] = len(gl) if isinstance(gl, list) else 0
          res['trufflehog (secrets vérifiés)'] = countlines('/tmp/sec/trufflehog.jsonl')
          osv = loadj('/tmp/sec/osv.json'); res['osv (deps)'] = sum(len(r.get('packages',[])) for r in (osv or {}).get('results',[])) if osv else 0
          tv = loadj('/tmp/sec/trivy.json')
          res['trivy (vulns/secrets)'] = sum(len(r.get('Vulnerabilities',[]))+len(r.get('Secrets',[])) for r in (tv or {}).get('Results',[])) if tv else 0
          sg = loadj('/tmp/sec/semgrep.json'); res['semgrep (SAST)'] = len((sg or {}).get('results',[])) if sg else 0
          zz = loadj('/tmp/sec/zizmor.json'); res['zizmor (workflows)'] = len(zz) if isinstance(zz, list) else (len((zz or {}).get('findings',[])) if zz else 0)
          total = sum(res.values())
          lines = [f"{k}: {v}" for k,v in res.items()]
          print("TOTAL findings: %d" % total)
          for l in lines: print("  "+l)
          open('/tmp/sec/summary.json','w').write(json.dumps({'total':total,'by_tool':res}, ensure_ascii=False))
          # exposer pour le step summary
          import os as _o
          with open(_o.environ['GITHUB_STEP_SUMMARY'],'a') as f:
              f.write("## 🛡️ Security Suite — arsenal\n**%d findings** (rapport = artifact, pas un blocage)\n\n" % total)
              for l in lines: f.write("- "+l+"\n")
          PYEOF
          echo "done"

      - name: Rapport en artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_id }}
          path: /tmp/sec/
          retention-days: 30

      - name: Résumé → Firebase (Apex lit ax_security_last)
        if: always()
        env:
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          RD_EXEC: ${{ github.event.client_payload.exec_id }}
          WD_EXEC: ${{ inputs.exec_id }}
        run: |
          FB_URL="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app"
          TOKEN=$(node tools/firebase/gauth.cjs 2>/dev/null); QS=""
          [ -n "$TOKEN" ] && QS="?access_token=${TOKEN}"
          python3 - <<'PYEOF'
          import json, os, time
          try: s = json.load(open('/tmp/sec/summary.json'))
          except Exception: s = {'total': None, 'by_tool': {}}
          body = {
            'exec_id': os.environ.get('WD_EXEC') or os.environ.get('RD_EXEC') or ('run_'+os.environ.get('GITHUB_RUN_ID','')),
            'total': s.get('total'), 'by_tool': s.get('by_tool', {}),
            'ts': int(time.time()*1000), 'run_id': os.environ.get('GITHUB_RUN_ID',''),
            'tools': ['gitleaks','trufflehog','osv-scanner','trivy','semgrep','zizmor'],
          }
          open('/tmp/sec_fb.json','w').write(json.dumps(body, ensure_ascii=False))
          PYEOF
          HTTP=$(curl -sS -o /tmp/r.txt -w "%{http_code}" -X PUT "${FB_URL}/apex/ax_security_last.json${QS}" \
            -H "Content-Type: application/json" --data-binary @/tmp/sec_fb.json || echo 000)
          echo "Firebase PUT ax_security_last → HTTP $HTTP $(head -c 150 /tmp/r.txt)"
