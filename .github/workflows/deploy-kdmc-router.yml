name: KDMC — Déploie le routeur de domaine kd-mc.com (autonome)

# Déploie le worker "kdmc-router" (reverse-proxy belles adresses + SSO + admin).
# Provisionne le KV ACCOUNTS (registre fiches clients) et injecte le secret SSO.
# 100% auto. Les routes custom_domain auto-provisionnent DNS + SSL sur kd-mc.com.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'services/kdmc-router/**'
      - '.github/workflows/deploy-kdmc-router.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install wrangler
        run: npm i -g wrangler@3

      - name: Provision KV ACCOUNTS (registre fiches) + bind (best-effort)
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          OUT=$(wrangler kv:namespace create ACCOUNTS 2>&1)
          echo "$OUT"
          ID=$(echo "$OUT" | grep -oE '[a-f0-9]{32}' | head -1)
          if [ -z "$ID" ]; then
            ID=$(wrangler kv:namespace list 2>/dev/null | tr -d '\n ' | grep -oE '\{[^}]*ACCOUNTS[^}]*\}' | grep -oE '"id":"[a-f0-9]{32}"' | grep -oE '[a-f0-9]{32}' | head -1)
          fi
          if [ -n "$ID" ]; then
            printf '\n[[kv_namespaces]]\nbinding = "ACCOUNTS"\nid = "%s"\n' "$ID" >> wrangler.toml
            echo "KV ACCOUNTS bind -> $ID"
          else
            echo "::warning::KV ACCOUNTS non provisionné -> registre fiches fail-open (vide)"
          fi

      - name: Déploiement du routeur (+ custom domains kd-mc.com)
        id: deploy
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Deploy kdmc-router…"
          wrangler deploy 2>&1 | tee deploy.log
          echo "----"
          echo "Si une route custom_domain échoue avec un message de permission,"
          echo "le token CLOUDFLARE_API_TOKEN doit inclure Zone:DNS:Edit +"
          echo "Workers Routes:Edit sur la zone kd-mc.com."

      - name: SSO — injecte le secret de signature (auto, fail-open si absent)
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SSO_SECRET: ${{ secrets.KDMC_SSO_SECRET != '' && secrets.KDMC_SSO_SECRET || secrets.JWT_SECRET }}
        run: |
          if [ -n "${SSO_SECRET:-}" ]; then
            printf '%s' "$SSO_SECRET" | wrangler secret put KDMC_SSO_SECRET 2>&1 | tail -3 \
              || echo "::warning::secret SSO non posé (SSO fail-open → les apps gardent leur login normal)"
          else
            echo "::warning::Ni KDMC_SSO_SECRET ni JWT_SECRET → SSO désactivé (fail-open)."
          fi

      - name: Health check des belles adresses
        run: |
          for H in kd-mc.com www.kd-mc.com cmcteams.kd-mc.com apex-ai.kd-mc.com \
                   apex-chat.kd-mc.com la-detente.kd-mc.com chez-lolo.kd-mc.com; do
            echo "== https://$H =="
            curl -fsS -o /dev/null -w "  status=%{http_code}\n" "https://$H/" \
              || echo "  (pas encore 200 — le certificat custom domain peut mettre 1-2 min)"
          done

      - name: Smoke test SSO live (issue → token → whoami Bearer, cross-PWA)
        run: |
          set -e
          BASE=https://kd-mc.com
          # Sur apex-chat.kd-mc.com pour prouver que /__sso/* marche aussi côté app
          APP=https://apex-chat.kd-mc.com
          echo "1) issue (uid de test, pas l'admin → pas de pollution) — avec retry"
          echo "   (la nouvelle version du worker peut mettre jusqu'à ~1 min à se propager au bord Cloudflare)"
          TOKEN=""; RESP=""
          for i in $(seq 1 12); do
            RESP=$(curl -fsS -X POST "$BASE/__sso/issue" -H 'content-type: application/json' \
                   -d '{"uid":"ci_smoke","name":"CI Smoke","cgu":true}' || true)
            TOKEN=$(printf '%s' "$RESP" | grep -oE '"token":"[^"]+"' | sed 's/.*:"//;s/"//')
            if [ -n "$TOKEN" ]; then echo "   ✅ token reçu (tentative $i) : $RESP"; break; fi
            echo "   tentative $i : pas encore de token (worker en propagation) → retry 5s…"
            sleep 5
          done
          if [ -z "$TOKEN" ]; then echo "::error::issue ne renvoie pas de token après ~60s — worker pas à jour"; echo "$RESP"; exit 1; fi
          echo "2) whoami via Bearer (SANS cookie) sur l'app — canal cross-PWA"
          WHO=$(curl -fsS "$APP/__sso/whoami" -H "Authorization: Bearer $TOKEN")
          echo "   $WHO"
          printf '%s' "$WHO" | grep -q '"ok":true'        || { echo "::error::whoami Bearer KO"; exit 1; }
          printf '%s' "$WHO" | grep -q '"uid":"ci_smoke"' || { echo "::error::identité Bearer KO"; exit 1; }
          echo "3) Bearer falsifié → doit être rejeté"
          BAD=$(curl -fsS "$APP/__sso/whoami" -H "Authorization: Bearer pas.un.vrai")
          printf '%s' "$BAD" | grep -q '"ok":false'       || { echo "::error::un token falsifié est accepté !"; exit 1; }
          echo "✅ SSO live OK : le pass signé marche en Bearer cross-sous-domaine, forge rejetée."
