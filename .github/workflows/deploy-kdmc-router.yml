name: KDMC — Déploie le routeur de domaine kd-mc.com (autonome)

# Déploie le worker "kdmc-router" (reverse-proxy belles adresses + SSO + admin).
# Provisionne le KV ACCOUNTS (registre fiches clients) et injecte le secret SSO.
# 100% auto. Les routes custom_domain auto-provisionnent DNS + SSL sur kd-mc.com.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'services/kdmc-router/**'
      - '.github/workflows/deploy-kdmc-router.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install wrangler
        run: npm i -g wrangler@3

      # KV ACCOUNTS : binding FIGÉ dans wrangler.toml (id du namespace existant).
      # Plus de provisioning dynamique (il cassait le déploiement quand le namespace
      # existait déjà — cf. wrangler.toml). Déploiement fiable.

      - name: Déploiement du routeur (+ custom domains kd-mc.com)
        id: deploy
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Deploy kdmc-router…"
          wrangler deploy 2>&1 | tee deploy.log
          echo "----"
          echo "Si une route custom_domain échoue avec un message de permission,"
          echo "le token CLOUDFLARE_API_TOKEN doit inclure Zone:DNS:Edit +"
          echo "Workers Routes:Edit sur la zone kd-mc.com."

      - name: SSO — injecte le secret de signature (auto, fail-open si absent)
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SSO_SECRET: ${{ secrets.KDMC_SSO_SECRET != '' && secrets.KDMC_SSO_SECRET || secrets.JWT_SECRET }}
        run: |
          if [ -n "${SSO_SECRET:-}" ]; then
            printf '%s' "$SSO_SECRET" | wrangler secret put KDMC_SSO_SECRET 2>&1 | tail -3 \
              || echo "::warning::secret SSO non posé (SSO fail-open → les apps gardent leur login normal)"
          else
            echo "::warning::Ni KDMC_SSO_SECRET ni JWT_SECRET → SSO désactivé (fail-open)."
          fi

      - name: Admin domaine — injecte le hash du PIN admin (ferme le trou nom auto-asserté)
        working-directory: services/kdmc-router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PIN_SHA256: ${{ secrets.APEX_ADMIN_PIN_SHA256 != '' && secrets.APEX_ADMIN_PIN_SHA256 || secrets.APEX_ADMIN_PIN_SHA }}
        run: |
          if [ -n "${ADMIN_PIN_SHA256:-}" ]; then
            printf '%s' "$ADMIN_PIN_SHA256" | wrangler secret put KDMC_ADMIN_PIN_SHA256 2>&1 | tail -3 \
              || echo "::warning::hash PIN admin non posé (/__admin reste sur contrôle par nom — rollout)"
          else
            echo "::warning::APEX_ADMIN_PIN_SHA256 absent → /__admin garde l'ancien contrôle par nom (fail-open)."
          fi

      - name: Health check des belles adresses
        run: |
          for H in kd-mc.com www.kd-mc.com cmcteams.kd-mc.com apex-ai.kd-mc.com \
                   apex-chat.kd-mc.com la-detente.kd-mc.com chez-lolo.kd-mc.com \
                   dashboard.kd-mc.com sourcing.kd-mc.com; do
            echo "== https://$H =="
            curl -fsS -o /dev/null -w "  status=%{http_code}\n" "https://$H/" \
              || echo "  (pas encore 200 — le certificat custom domain peut mettre 1-2 min)"
          done

      - name: Smoke test SSO live (issue → token → whoami Bearer + gate admin)
        # Best-effort : confirme la PROPAGATION live (timing-dépendant au bord Cloudflare,
        # peut dépasser 1 min). La preuve du CODE = tests unitaires (sso/admin) + harnais
        # Chromium. On ne rougit donc PAS un déploiement réussi pour un délai de propagation.
        continue-on-error: true
        run: |
          set +e
          BASE=https://kd-mc.com
          APP=https://apex-chat.kd-mc.com
          echo "1) issue (uid de test) — retry jusqu'à ~3 min (propagation bord Cloudflare)"
          TOKEN=""; RESP=""
          for i in $(seq 1 36); do
            RESP=$(curl -fsS -X POST "$BASE/__sso/issue" -H 'content-type: application/json' \
                   -d '{"uid":"ci_smoke","name":"CI Smoke","cgu":true}' || true)
            TOKEN=$(printf '%s' "$RESP" | grep -oE '"token":"[^"]+"' | sed 's/.*:"//;s/"//')
            if [ -n "$TOKEN" ]; then echo "   ✅ token reçu (tentative $i)"; break; fi
            [ $((i % 6)) -eq 0 ] && echo "   …tentative $i : pas encore propagé"
            sleep 5
          done
          if [ -z "$TOKEN" ]; then echo "::warning::issue sans token après ~3 min (propagation lente). Code prouvé par les tests. $RESP"; else
            echo "2) whoami via Bearer (SANS cookie) — canal cross-PWA"
            WHO=$(curl -fsS "$APP/__sso/whoami" -H "Authorization: Bearer $TOKEN")
            echo "   $WHO"
            printf '%s' "$WHO" | grep -q '"ok":true'        || echo "::warning::whoami Bearer pas encore OK (propagation)"
            printf '%s' "$WHO" | grep -q '"uid":"ci_smoke"' || echo "::warning::identité Bearer pas encore OK"
            BAD=$(curl -fsS "$APP/__sso/whoami" -H "Authorization: Bearer pas.un.vrai")
            printf '%s' "$BAD" | grep -q '"ok":false'       || echo "::warning::forge pas rejetée (à vérifier)"
          fi
          echo "3) SÉCU admin : /__admin/accounts SANS preuve → doit être 403 + reason need_admin_code (PROUVE que le hash PIN est déployé)"
          AC=$(curl -s -o /tmp/adm.json -w "%{http_code}" "$BASE/__admin/accounts")
          BODY=$(cat /tmp/adm.json 2>/dev/null)
          echo "   http=$AC body=$BODY"
          if [ "$AC" = "403" ] && printf '%s' "$BODY" | grep -q 'need_admin_code'; then \
            echo "   ✅ /__admin verrouillé PAR LE PIN (need_admin_code) — hash déployé, fiches inaccessibles"; \
          elif [ "$AC" = "403" ]; then \
            echo "::warning::/__admin = 403 mais reason ≠ need_admin_code → hash PIN PAS déployé (gate fail-closed = admin_only). Vérifier APEX_ADMIN_PIN_SHA256."; \
          else echo "::warning::/__admin a répondu $AC (gate peut-être pas encore propagé)"; fi
          echo "✅ Smoke terminé (best-effort, non bloquant)."
