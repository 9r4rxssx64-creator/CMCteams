name: Build iOS IPA on GitHub Actions macOS (sans Mac)

# Demande Kevin 2026-05-15 "Comment faire sans Mac ?" — réponse autonome :
# GitHub Actions exécute macOS runner (Xcode pré-installé), build l'app iOS
# Apex via Capacitor, signe avec certificat Apple Developer (Kevin colle 2 fois
# dans Secrets), produit un .ipa téléchargeable + upload TestFlight automatique.
#
# Kevin n'a JAMAIS besoin de Mac. Tout depuis son iPhone + GitHub web.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type de release'
        required: true
        type: choice
        default: 'testflight'
        options:
          - testflight
          - dry_run_build_only
  push:
    branches: [main]
    paths:
      - 'apex-ai/v13/capacitor.config.ts'
      - 'apex-ai/v13/services/apex-ios-native*.ts'
      - 'apex-ai/v13/IOS_NATIVE_PORT.md'

# Garde-fou : un seul build iOS à la fois (signing + TestFlight upload)
concurrency:
  group: build-ios
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-14  # Xcode 15 pré-installé, gratuit pour repos publics
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apex-ai/v13/package-lock.json

      - name: Install dependencies
        working-directory: apex-ai/v13
        run: npm ci --legacy-peer-deps

      - name: Build dist/ (Vite)
        working-directory: apex-ai/v13
        run: npm run build

      - name: Setup Cocoapods
        run: gem install cocoapods --no-document

      - name: Init Capacitor iOS (si ios/ absent)
        working-directory: apex-ai/v13
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Pod install
        working-directory: apex-ai/v13/ios/App
        run: pod install --repo-update

      # ─── DRY RUN : build only, pas de signing ──────────────────────────────
      - name: Build IPA dry-run (no signing)
        if: github.event.inputs.release_type == 'dry_run_build_only' || github.event_name == 'push'
        working-directory: apex-ai/v13/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive | xcpretty || true

      - name: Upload archive (dry-run)
        if: github.event.inputs.release_type == 'dry_run_build_only' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: apex-ios-xcarchive-${{ github.run_number }}
          path: apex-ai/v13/ios/App/build/App.xcarchive
          retention-days: 7

      # ─── TESTFLIGHT : signing + upload ─────────────────────────────────────
      - name: Setup Apple certificate
        if: github.event.inputs.release_type == 'testflight'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-keychain-pwd
        run: |
          # Décoder cert + import dans keychain temporaire
          echo "$CERT_P12_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Setup provisioning profile
        if: github.event.inputs.release_type == 'testflight'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/apex.mobileprovision

      - name: Build signed IPA
        if: github.event.inputs.release_type == 'testflight'
        working-directory: apex-ai/v13/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive | xcpretty
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ../../../.github/workflows/export-options.plist | xcpretty

      - name: Upload to TestFlight
        if: github.event.inputs.release_type == 'testflight'
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        working-directory: apex-ai/v13/ios/App
        run: |
          # Décoder clé App Store Connect API
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          # Upload IPA via altool (Xcode 15+)
          xcrun altool --upload-app \
            --type ios \
            --file build/App.ipa \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Upload IPA artifact (download depuis iPhone)
        if: github.event.inputs.release_type == 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: apex-ios-ipa-${{ github.run_number }}
          path: apex-ai/v13/ios/App/build/App.ipa
          retention-days: 14

      - name: Notify Kevin (Telegram)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          MSG="🍎 Apex iOS build #${{ github.run_number }} → $STATUS%0Atype=${{ github.event.inputs.release_type || 'auto-push' }}"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MSG" || true
