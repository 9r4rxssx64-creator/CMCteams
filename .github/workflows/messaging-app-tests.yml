name: Apex Chat — Tests + Coverage 100%

# CRITIQUE (CLAUDE.md règle 100/100 réel) :
# Sentinelle anti-régression — chaque push qui touche messaging-app DOIT garder
# 100% coverage v8 sur lib/ + workers/ (sauf api-worker.js Phase C en cours).
# Si la coverage descend, le check fail et bloque l'auto-merge.

on:
  push:
    branches:
      - 'claude/**'
      - 'main'
    paths:
      - 'messaging-app/**'
      - '.github/workflows/messaging-app-tests.yml'
  pull_request:
    paths:
      - 'messaging-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: messaging-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'messaging-app/package.json'

      - name: Install deps
        run: npm install

      - name: Syntax check (node --check)
        run: |
          node --check sw.js
          node --check crypto.js
          node --check lib/crypto-core.js
          node --check lib/sw-handlers.js
          node --check workers/api-worker.js
          node --check workers/ia-worker.js
          node --check workers/push-worker.js
          node --check workers/sms-worker.js
          node --check workers/durable-objects/ConversationDO.js

      - name: Tests + Coverage 100%
        run: npx vitest run --coverage

      # Politique réelle (= vitest.config.js) : 100 % PARTOUT, SAUF api-worker.js
      # (~5800 lignes, mesuré avec un plancher anti-régression dédié depuis
      # l'audit 2026-07-07, à remonter progressivement). Le check ci-dessous
      # reflète EXACTEMENT cette politique par fichier — l'ancien check exigeait
      # 100 % sur le TOTAL (donc incluait api-worker) et bloquait tout merge.
      - name: Verify coverage policy (lib 100% + plancher api-worker)
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "❌ coverage-summary.json missing"
            exit 1
          fi
          node -e "
            const cov = require('./coverage/coverage-summary.json');
            const FLOOR = { 'api-worker.js': { statements: 80, branches: 74, functions: 86, lines: 80 } };
            const KEYS = ['lines','statements','branches','functions'];
            let failed = false;
            for (const [path, s] of Object.entries(cov)) {
              if (path === 'total' || !s || !s.lines) continue;
              const base = path.split('/').pop();
              const floor = FLOOR[base];
              const bad = KEYS.filter(k => s[k].pct < (floor ? floor[k] : 100));
              if (bad.length) {
                failed = true;
                console.error('❌', base, bad.map(k => k+'='+s[k].pct+'% (min '+(floor?floor[k]:100)+')').join(', '));
              }
            }
            if (failed) process.exit(1);
            console.log('✅ Couverture conforme : 100 % partout, api-worker.js au-dessus du plancher.');
          "

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: messaging-app-coverage
          path: messaging-app/coverage/
          retention-days: 7

  e2e:
    needs: tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: messaging-app
    strategy:
      fail-fast: false
      matrix:
        project: [iphone-safari, iphone-se, chromium-desktop, pixel-android]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'messaging-app/package.json'

      - name: Install deps
        run: npm install

      - name: Install Playwright browsers (${{ matrix.project }})
        run: |
          if [ "${{ matrix.project }}" = "iphone-safari" ] || [ "${{ matrix.project }}" = "iphone-se" ]; then
            npx playwright install --with-deps webkit
          elif [ "${{ matrix.project }}" = "chromium-desktop" ] || [ "${{ matrix.project }}" = "pixel-android" ]; then
            npx playwright install --with-deps chromium
          fi

      - name: Run Playwright E2E (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: messaging-app/playwright-report/
          retention-days: 7
