name: Apex v13 CI

on:
  pull_request:
    paths:
      - 'apex-ai/v13/**'
      - '.github/workflows/apex-v13-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apex-ai/v13/**'

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apex-ai/v13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Vitest unit tests
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Build production bundle
        run: npx vite build

      - name: Bundle size budget (initial < 200 KB gzipped)
        run: |
          if [ -d dist ]; then
            total=$(find dist -name '*.js' -exec gzip -c {} \; | wc -c)
            echo "Bundle gzipped: $total bytes"
            if [ "$total" -gt 204800 ]; then
              echo "::warning::Bundle exceeds 200KB gzipped target"
            fi
          fi

  lighthouse:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI placeholder
        run: |
          echo "Lighthouse CI sera configuré Jet 2 (cible >95 perf/a11y/best-practices/seo)"
