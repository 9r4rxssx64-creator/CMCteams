name: La Détente — Déploie le Worker Gemini (autonome)

# Déploie le Worker proxy Gemini sur Cloudflare, injecte la clé depuis les secrets,
# capture l'URL réelle (workers.dev) et la commit dans proxy-config.json. 100% auto.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'shops/la-detente/worker/**'
      - '.github/workflows/la-detente-worker-deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }

      - uses: actions/setup-node@v6
        with: { node-version: 22 }

      - name: Install wrangler
        run: npm i -g wrangler@3

      - name: Déploiement + secret + capture URL
        id: deploy
        working-directory: shops/la-detente/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          echo "Deploy worker…"
          wrangler deploy 2>&1 | tee deploy.log
          echo "Set secret GEMINI_API_KEY…"
          printf '%s' "$GEMINI_API_KEY" | wrangler secret put GEMINI_API_KEY 2>&1 | tail -3 || true
          URL=$(grep -oE 'https://[a-z0-9._-]+\.workers\.dev' deploy.log | head -1)
          echo "URL=$URL"
          if [ -z "$URL" ]; then echo "::error::URL worker introuvable dans le log"; exit 1; fi
          echo "worker_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          echo "GET $URL"
          curl -fsS "$URL" | head -c 300 || echo "(health non-200, le worker peut mettre qq sec)"

      - name: Commit proxy-config.json
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          mkdir -p shops/la-detente
          printf '{\n  "worker_url": "%s",\n  "app_tag": "ld-studio-v1",\n  "updated_at": "%s"\n}\n' "$URL" "$(date -u +%FT%TZ)" > shops/la-detente/proxy-config.json
          cat shops/la-detente/proxy-config.json
          git config user.name "kdmc-bot"; git config user.email "bot@kdmc.local"
          BR="claude/worker-config-${{ github.run_id }}"
          git checkout -b "$BR"
          git add shops/la-detente/proxy-config.json
          if git diff --cached --quiet; then echo "config inchangée"; else
            git commit -m "La Détente — URL worker Gemini auto ($URL) [skip ci]"
            git push -u origin "$BR"
            echo "Poussé $BR (auto-merge)."
          fi
