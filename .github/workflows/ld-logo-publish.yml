name: LD Logo Publish (Firebase)

# Publie un PNG du repo comme LOGO/modèle dans la bibliothèque (Firebase
# shops_admin_v1/logos/<store>/<id>) → visible dans le Studio « Mes logos créés »
# et la boutique. Déclenché en poussant shops/la-detente/.logo-publish.json.

on:
  workflow_dispatch:
  push:
    paths:
      - 'shops/la-detente/.logo-publish.json'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publier le logo dans Firebase
        run: |
          set -e
          REQ=shops/la-detente/.logo-publish.json
          FB="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app/shops_admin_v1/logos"
          N=$(jq '.logos | length' "$REQ")
          echo "$N logo(s) à publier"
          for k in $(seq 0 $((N-1))); do
            STORE=$(jq -r ".logos[$k].store" "$REQ")
            FILE=$(jq -r ".logos[$k].file" "$REQ")
            NAME=$(jq -r ".logos[$k].name" "$REQ")
            ID=$(jq -r ".logos[$k].id" "$REQ")
            CAT=$(jq -r ".logos[$k].cat // \"Mes créations\"" "$REQ")
            if [ ! -f "$FILE" ]; then echo "  introuvable: $FILE"; continue; fi
            B64=$(base64 -w0 "$FILE")
            TS=$(date +%s000)
            jq -n --arg id "$ID" --arg name "$NAME" --arg img "data:image/png;base64,$B64" \
                  --arg cat "$CAT" --argjson ts "$TS" \
              '{id:$id, name:$name, img:$img, ts:$ts, cat:$cat, source:"studio"}' > /tmp/logo.json
            echo "  PUT $STORE/$ID  ($(wc -c < "$FILE") octets)"
            curl -sS -X PUT "$FB/$STORE/$ID.json" \
              -H "Content-Type: application/json" --data-binary @/tmp/logo.json -o /tmp/put.json
            echo "    réponse: $(jq -r '.id // .error // "?"' /tmp/put.json 2>/dev/null || head -c 120 /tmp/put.json)"
            # vérif
            GOT=$(curl -sS "$FB/$STORE/$ID.json" | jq -r '.name // "ABSENT"')
            echo "    vérif Firebase: name=$GOT"
          done
