name: Branch Guard — push non autorisé sur main

# Détecte tout push sur `main` par un acteur hors liste autorisée et lève
# une alerte (issue GitHub + échec rouge du run). Sert de garde quand la
# protection de branche du dépôt (Settings → Branches) n'est pas encore
# activée — ou en complément de celle-ci.
#
# Acteurs autorisés :
#   - 9r4rxssx64-creator : Kevin DESARZENS (propriétaire)
#   - github-actions[bot] : automatisation interne (Apex execute, auto-merge…)
#   - web-flow            : commits de merge via l'UI GitHub du propriétaire
#
# Le blocage RÉEL (refus du push) nécessite la protection de branche GitHub —
# voir FIREBASE_SECURITY.md / la section "Verrouillage dépôt" du rapport d'audit.

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier l'acteur du push
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = ['9r4rxssx64-creator', 'github-actions[bot]', 'web-flow'];
            const actor = context.actor;
            if (allowed.includes(actor)) {
              core.info(`Push sur main autorisé : ${actor}`);
              return;
            }
            const body = [
              `Un push sur \`main\` a été effectué par \`${actor}\`, **hors liste autorisée**.`,
              ``,
              `- Commit : ${context.sha}`,
              `- Run : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Vérifier ce changement. Si non légitime : révoquer l'accès du compte et révert le commit.`,
              `Pour empêcher techniquement ce type de push : activer la protection de branche`,
              `(Settings → Branches → main → Restrict who can push).`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Branch Guard] Push non autorisé sur main par ${actor}`,
              body,
              labels: ['security', 'branch-guard'],
            });
            core.setFailed(`Push NON AUTORISÉ sur main par "${actor}" — issue ouverte.`);
