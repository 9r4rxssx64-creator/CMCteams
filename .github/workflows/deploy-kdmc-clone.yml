# Déploie le worker kdmc-clone (lecture / clone de sites — Kevin + Apex).
# Secrets requis : CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Optionnel : CLONE_TOKEN (active l'usage serveur sans navigateur ; sinon browser-only).
# Anti-spam : pas de cron — dispatch manuel + push sur le dossier du worker.
name: Deploy KDMC Clone Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/cloudflare/kdmc-clone/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: tools/cloudflare/kdmc-clone
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier les secrets Cloudflare (erreur exacte, pas silencieuse)
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$MISSING" ]; then echo "::error::Secrets manquants :$MISSING"; exit 1; fi
          echo "Secrets Cloudflare OK"

      - name: Installer wrangler
        run: npm i -g wrangler && wrangler --version

      - name: Déployer le worker
        run: |
          set -e
          wrangler deploy 2>&1 | tee /tmp/deploy.log
          grep -Eo 'https://[a-z0-9.-]+workers.dev' /tmp/deploy.log | head -1 > /tmp/url.txt
          echo "URL déployée : $(cat /tmp/url.txt)"

      - name: Pousser CLONE_TOKEN si présent (usage serveur optionnel)
        env:
          CT: ${{ secrets.CLONE_TOKEN }}
        run: |
          if [ -n "$CT" ]; then printf '%s' "$CT" | wrangler secret put CLONE_TOKEN; echo "CLONE_TOKEN posé"; else echo "Pas de CLONE_TOKEN → mode navigateur uniquement (OK)"; fi

      - name: Smoke test réel (leçon 95 — un deploy vert sans test live ne prouve rien)
        run: |
          URL=$(cat /tmp/url.txt); [ -z "$URL" ] && URL="https://kdmc-clone.9r4rxssx64.workers.dev"
          sleep 8
          echo "--- /health ---"
          curl -sS "$URL/health" | tee /tmp/h.json; echo
          grep -q '"ok":true' /tmp/h.json || { echo "::error::/health invalide : $(cat /tmp/h.json)"; exit 1; }
          echo "--- /meta (avec Origin autorisée) ---"
          curl -sS -H "Origin: https://kd-mc.com" "$URL/meta?url=https://example.com" | tee /tmp/m.json; echo
          grep -q '"title"' /tmp/m.json || { echo "::error::/meta invalide : $(cat /tmp/m.json)"; exit 1; }
          echo "--- open-proxy bloqué sans Origin ni token (doit être 403) ---"
          code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/meta?url=https://example.com")
          [ "$code" = "403" ] || { echo "::error::Attendu 403 sans Origin, reçu $code"; exit 1; }
          echo "✅ kdmc-clone live, lecture OK, anti open-proxy OK"
