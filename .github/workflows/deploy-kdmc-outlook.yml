name: KDMC — Déploie le worker Outlook (récup auto des factures)

# Déploie le worker "kdmc-outlook" : connecté à Outlook (Microsoft Graph, OAuth
# lecture seule), il récupère AUTOMATIQUEMENT les factures/devis (anciennes via
# backfill + nouvelles via cron 2 h) et les dépose dans le KV partagé (ACCOUNTS,
# mail:p:<id>). L'app Finances les récupère via le routeur (/__mail/*).
#
# Actions Kevin (une fois) : enregistrer une app Microsoft gratuite (aka.ms/appregistrations,
# redirect https://kdmc-outlook.9r4rxssx64.workers.dev/auth/callback), puis ouvrir
# https://kdmc-outlook.9r4rxssx64.workers.dev/setup → code admin + client_id → « Connecter Outlook ».
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'services/kdmc-outlook/**'
      - '.github/workflows/deploy-kdmc-outlook.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Tests unitaires (logique pure)
        run: node --test services/kdmc-outlook/worker.test.mjs

      - name: Install wrangler
        run: npm i -g wrangler@3

      - name: Injecte le secret code admin (protège /setup, /config, /connect, /sync)
        working-directory: services/kdmc-outlook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          printf '%s' "${{ secrets.APEX_ADMIN_PIN_SHA256 }}" | wrangler secret put KDMC_ADMIN_PIN_SHA256 2>&1 | tail -2 || echo "::warning::secret put a échoué (déjà présent ?)"

      - name: Déploiement du worker Outlook
        working-directory: services/kdmc-outlook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          wrangler deploy 2>&1 | tee deploy.log

      - name: Smoke /health
        run: |
          sleep 4
          URL="https://kdmc-outlook.9r4rxssx64.workers.dev/health"
          echo "GET $URL"
          curl -fsS "$URL" && echo "  ✅ kdmc-outlook vivant" || echo "::warning::/health non joignable (workers_dev peut être désactivé)"
