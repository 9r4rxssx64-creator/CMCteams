name: Ultra Audit Crew (5 expert agents in parallel)

# Crew externe expert — 5 jobs parallèles indépendants. Chaque agent ne fail
# JAMAIS le job (continue-on-error global) — les findings sont uniquement
# dans le summary markdown.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # Lundi 03:00 UTC

permissions:
  contents: read
  issues: write

concurrency:
  group: ultra-audit-crew
  cancel-in-progress: false

jobs:

  security:
    name: 🛡 Security Auditor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Audit security
        shell: bash {0}
        run: |
          echo "## 🛡 Security findings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          LEAKS=$(grep -rEn "sk-(ant|proj)-[A-Za-z0-9_-]{40,}|AIza[A-Za-z0-9_-]{33}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}" \
            --include="*.ts" --include="*.js" --include="*.html" --include="*.yml" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist --exclude-dir=tests . 2>/dev/null || true)
          LEAK_COUNT=$(echo "$LEAKS" | grep -c . 2>/dev/null || echo 0)
          echo "### Secrets en clair (hors tests/dist/node_modules): $LEAK_COUNT" >> $GITHUB_STEP_SUMMARY
          if [ "$LEAK_COUNT" -gt 0 ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$LEAKS" | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "❌ P0 — révoquer + rotation" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Aucun secret détecté" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          XSS=$(grep -rE "innerHTML\s*=" --include="*.ts" --include="*.js" --include="*.html" \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null | \
            grep -v "esc\(" 2>/dev/null | grep -v "DOMPurify" 2>/dev/null | wc -l || echo 0)
          echo "### XSS potentiel — innerHTML sans esc(): $XSS occurrences" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CSP=$(grep -c "Content-Security-Policy" apex-ai/v13/index.html 2>/dev/null || echo 0)
          echo "### CSP meta apex-ai/v13/index.html: $CSP" >> $GITHUB_STEP_SUMMARY

  architecture:
    name: 🏗 Architecture Auditor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Audit architecture
        shell: bash {0}
        run: |
          echo "## 🏗 Architecture findings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FEATURES=$(find apex-ai/v13/features -name "index.ts" 2>/dev/null | wc -l || echo 0)
          SERVICES=$(find apex-ai/v13/services -name "*.ts" -not -name "*.test.ts" 2>/dev/null | wc -l || echo 0)
          ROUTES=$(grep -rhE "router\.register\(['\"]([a-z0-9-]+)['\"]" apex-ai/v13 2>/dev/null | wc -l || echo 0)
          DOUB=$(grep -rhoE "router\.register\(['\"]([a-z0-9-]+)['\"]" apex-ai/v13 2>/dev/null | \
            sort | uniq -d | wc -l || echo 0)

          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Features index.ts | $FEATURES |" >> $GITHUB_STEP_SUMMARY
          echo "| Services .ts | $SERVICES |" >> $GITHUB_STEP_SUMMARY
          echo "| router.register calls | $ROUTES |" >> $GITHUB_STEP_SUMMARY
          echo "| Routes en doublon | $DOUB $([ "$DOUB" -gt 0 ] && echo '❌ P0' || echo '✅') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Firebase project URLs utilisées" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -rhoE "[a-z0-9-]+-default-rtdb" apex-ai/v13/services services 2>/dev/null | sort -u >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  code-quality:
    name: 🔬 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install deps
        working-directory: apex-ai/v13
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund --no-save

      - name: TypeScript strict
        shell: bash {0}
        working-directory: apex-ai/v13
        run: |
          echo "## 🔬 Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npx tsc --noEmit 2>&1 | tee /tmp/tsc.log
          ERR=$(grep -c "error TS" /tmp/tsc.log 2>/dev/null || echo 0)
          echo "### TypeScript strict errors: $ERR" >> $GITHUB_STEP_SUMMARY
          if [ "$ERR" != "0" ]; then
            tail -20 /tmp/tsc.log >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: ESLint
        shell: bash {0}
        working-directory: apex-ai/v13
        run: |
          npx eslint . -f json -o /tmp/eslint.json 2>/dev/null || true
          W=$(jq '[.[] | .warningCount] | add // 0' /tmp/eslint.json 2>/dev/null || echo 0)
          E=$(jq '[.[] | .errorCount] | add // 0' /tmp/eslint.json 2>/dev/null || echo 0)
          echo "### ESLint: $E errors, $W warnings" >> $GITHUB_STEP_SUMMARY

  performance:
    name: ⚡ Performance Auditor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install + build
        working-directory: apex-ai/v13
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund --no-save
          npx vite build 2>&1 | tail -30

      - name: Bundle analysis
        shell: bash {0}
        working-directory: apex-ai/v13
        run: |
          echo "## ⚡ Performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle sizes (top 10)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/*.js dist/*.html 2>/dev/null | sort -h | tail -10 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          NONCE=$(grep -c "APEX_BOOT_NONCE" dist/index.html 2>/dev/null || echo 0)
          echo "### APEX_BOOT_NONCE placeholders dans dist: $NONCE" >> $GITHUB_STEP_SUMMARY
          if [ "$NONCE" != "0" ]; then
            echo "❌ P0 (CLAUDE.md erreur #54 — nonce non remplacé = app cassée)" >> $GITHUB_STEP_SUMMARY
          fi

  tests:
    name: 🧪 Tests Auditor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install
        working-directory: apex-ai/v13
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund --no-save

      - name: Vitest unit
        shell: bash {0}
        working-directory: apex-ai/v13
        run: |
          echo "## 🧪 Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npx vitest run --reporter=default 2>&1 | tee /tmp/vitest.log | tail -50
          PASS=$(grep -oE "[0-9]+ passed" /tmp/vitest.log | tail -1 | awk '{print $1}' || echo 0)
          FAIL=$(grep -oE "[0-9]+ failed" /tmp/vitest.log | tail -1 | awk '{print $1}' || echo 0)
          echo "### Vitest: $PASS passed, $FAIL failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/vitest.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  synthesis:
    name: 📊 Crew Synthesis
    needs: [security, architecture, code-quality, performance, tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate
        run: |
          {
            echo "# 🎯 Ultra Audit Crew — Synthèse"
            echo ""
            echo "| Agent | Conclusion |"
            echo "|-------|------------|"
            echo "| 🛡 Security | ${{ needs.security.result }} |"
            echo "| 🏗 Architecture | ${{ needs.architecture.result }} |"
            echo "| 🔬 Code Quality | ${{ needs.code-quality.result }} |"
            echo "| ⚡ Performance | ${{ needs.performance.result }} |"
            echo "| 🧪 Tests | ${{ needs.tests.result }} |"
            echo ""
            echo "Détails dans les jobs individuels."
          } >> $GITHUB_STEP_SUMMARY
