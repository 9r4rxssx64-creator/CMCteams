name: Configure Cloudflare Worker Secrets (Apex)

# Workflow Apex auto-config des secrets Cloudflare Workers (Firebase keys, AI provider keys, etc.)
# via wrangler secret put. Lis les GitHub Secrets et les pousse côté Cloudflare.
# Apex IA peut déclencher ce workflow via API GitHub.

on:
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker (apex-auth-worker | chat-svc | vault-svc | sentinels-svc)"
        required: true

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    name: Set Cloudflare Worker Secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler
        run: npm install -g wrangler@^3.80.0

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler whoami

      - name: Push secrets to apex-auth-worker
        if: ${{ github.event.inputs.worker == 'apex-auth-worker' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        working-directory: services/apex-auth-worker
        run: |
          echo "$FIREBASE_PRIVATE_KEY" | wrangler secret put FIREBASE_PRIVATE_KEY || echo "::warning::FIREBASE_PRIVATE_KEY not set in GitHub secrets"
          echo "$FIREBASE_CLIENT_EMAIL" | wrangler secret put FIREBASE_CLIENT_EMAIL || echo "::warning::FIREBASE_CLIENT_EMAIL not set"

      - name: Push secrets to chat-svc
        if: ${{ github.event.inputs.worker == 'chat-svc' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: services/chat-svc
        run: |
          echo "$ANTHROPIC_API_KEY" | wrangler secret put ANTHROPIC_API_KEY || echo "::warning::ANTHROPIC_API_KEY missing"
          [ -n "$OPENROUTER_API_KEY" ] && echo "$OPENROUTER_API_KEY" | wrangler secret put OPENROUTER_API_KEY || true
          [ -n "$GROQ_API_KEY" ] && echo "$GROQ_API_KEY" | wrangler secret put GROQ_API_KEY || true
          [ -n "$GEMINI_API_KEY" ] && echo "$GEMINI_API_KEY" | wrangler secret put GEMINI_API_KEY || true

      - name: Push secrets to vault-svc
        if: ${{ github.event.inputs.worker == 'vault-svc' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
        working-directory: services/vault-svc
        run: |
          if [ -z "$VAULT_MASTER_KEY" ]; then
            echo "Generating new VAULT_MASTER_KEY (random 32 bytes base64)"
            VAULT_MASTER_KEY=$(openssl rand -base64 32)
            echo "::notice::Generated key - save it as GitHub Secret VAULT_MASTER_KEY for future deploys"
            echo "$VAULT_MASTER_KEY"
          fi
          echo "$VAULT_MASTER_KEY" | wrangler secret put VAULT_MASTER_KEY

      - name: Push secrets to sentinels-svc
        if: ${{ github.event.inputs.worker == 'sentinels-svc' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_PAT: ${{ secrets.APEX_GITHUB_PAT }}
        working-directory: services/sentinels-svc
        run: |
          [ -n "$GITHUB_PAT" ] && echo "$GITHUB_PAT" | wrangler secret put GITHUB_PAT || echo "::warning::APEX_GITHUB_PAT missing in GitHub secrets"
