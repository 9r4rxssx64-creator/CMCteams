name: Social — Generate & Publish Daily Video

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Format (short, long)"
        required: false
        default: "long"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install espeak-ng + ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install deps
        working-directory: tools/social
        run: npm install --no-audit --no-fund

      - name: Generate video
        working-directory: tools/social
        timeout-minutes: 60
        run: |
          FORMAT="${{ github.event.inputs.format || 'long' }}"
          node --input-type=module -e "
          import fs from 'fs';
          import { execSync } from 'child_process';

          const lib = JSON.parse(fs.readFileSync('config/content-library.json','utf8'));
          const cats = Object.keys(lib).filter(k=>!k.startsWith('_'));
          let story = null;
          for (const cat of cats) {
            const unused = lib[cat].filter(s=>!s.used);
            if (unused.length > 0) { story = unused[Math.floor(Math.random()*unused.length)]; break; }
          }
          if (!story) { console.error('No unused stories'); process.exit(1); }

          const fmt = '${FORMAT}';
          const script = story.script;
          const words = script.split(/\s+/);
          console.log('Story: ' + story.id + ' (' + words.length + ' words, format: ' + fmt + ')');

          const id = story.id;
          const outDir = 'output/' + id;
          fs.mkdirSync(outDir, {recursive:true});
          const w = fmt==='short' ? 1080 : 1920;
          const h = fmt==='short' ? 1920 : 1080;
          const fps = 10; // 10fps render = 3x faster, upscale to 30 in ffmpeg

          // CHUNKED GENERATION: split script into chunks of max 60 words
          const chunkSize = 60;
          const chunks = [];
          for (let i = 0; i < words.length; i += chunkSize) {
            chunks.push(words.slice(i, i + chunkSize).join(' '));
          }
          console.log('Chunks: ' + chunks.length + ' (max ' + chunkSize + ' words each)');

          const chunkVideos = [];
          for (let c = 0; c < chunks.length; c++) {
            const chunk = chunks[c];
            const chunkDir = outDir + '/chunk_' + c;
            fs.mkdirSync(chunkDir, {recursive:true});
            const wavP = chunkDir + '/audio.wav';
            const mp3P = chunkDir + '/audio.mp3';
            const framesD = chunkDir + '/frames';
            const videoP = chunkDir + '/chunk.mp4';

            console.log('--- Chunk ' + (c+1) + '/' + chunks.length + ' (' + chunk.split(/\s+/).length + ' words) ---');

            // TTS
            const safeText = chunk.replace(/[\\\"]/g,'').slice(0,2000);
            execSync('espeak-ng -v en -s 150 -p 35 -w ' + wavP + ' \"' + safeText + '\"', {timeout:30000});
            execSync('ffmpeg -y -i ' + wavP + ' -codec:a libmp3lame -b:a 192k ' + mp3P, {stdio:'pipe', timeout:15000});
            try{fs.unlinkSync(wavP)}catch{}

            const audioSize = fs.statSync(mp3P).size;
            const durMs = Math.round(audioSize / 6000 * 1000);

            // Subtitles
            const { segmentScript, groupIntoSubtitles } = await import('./engine/subtitle-engine.js');
            const segs = segmentScript(chunk, durMs);
            const subs = groupIntoSubtitles(segs, {wordsPerLine:fmt==='short'?3:5, maxCharsPerLine:40, breakOnPunct:true});
            const subsR = subs.map(g=>({text:g.text,startMs:g.startMs,endMs:g.endMs,words:g.words.map(ww=>({word:ww.word,startMs:ww.startMs,endMs:ww.endMs}))}));

            // Frames
            const scene = {width:w,height:h,fps,durationMs:durMs+300,bg:{type:'cinematic'},style:fmt==='short'?'shorts':'narrative',subtitles:subsR,title:c===0?story.title:'',watermark:'',showProgress:c===chunks.length-1};
            const { generateFrames } = await import('./engine/frame-generator.js');
            await generateFrames(scene, framesD, {onProgress:(cur,tot)=>{if(cur%20===0)process.stdout.write('.')}});
            process.stdout.write(' OK\\n');

            // Compile chunk
            execSync('ffmpeg -y -framerate ' + fps + ' -i ' + framesD + '/frame_%06d.png -i ' + mp3P + ' -map 0:v -map 1:a -c:v libx264 -preset ultrafast -crf 25 -pix_fmt yuv420p -r 30 -c:a aac -b:a 128k -shortest -movflags +faststart ' + videoP, {stdio:'pipe', timeout:120000});
            console.log('Chunk ' + (c+1) + ': ' + (fs.statSync(videoP).size/1024/1024).toFixed(1) + ' MB');

            chunkVideos.push(videoP);

            // Cleanup frames immediately
            try{fs.readdirSync(framesD).forEach(f=>fs.unlinkSync(framesD+'/'+f));fs.rmdirSync(framesD)}catch{}
          }

          // CONCATENATE all chunks
          const finalVideo = outDir + '/' + id + '_' + fmt + '.mp4';
          if (chunkVideos.length === 1) {
            fs.renameSync(chunkVideos[0], finalVideo);
          } else {
            const concatFile = outDir + '/concat.txt';
            fs.writeFileSync(concatFile, chunkVideos.map(v=>\"file '\" + v + \"'\").join('\\n'));
            console.log('Concatenating ' + chunkVideos.length + ' chunks...');
            execSync('ffmpeg -y -f concat -safe 0 -i ' + concatFile + ' -c copy ' + finalVideo, {stdio:'pipe', timeout:60000});
            // Cleanup chunks
            for (const cv of chunkVideos) try{fs.unlinkSync(cv)}catch{}
            try{fs.unlinkSync(concatFile)}catch{}
          }

          const finalSize = fs.statSync(finalVideo).size;
          console.log('FINAL: ' + finalVideo + ' (' + (finalSize/1024/1024).toFixed(2) + ' MB)');

          // Metadata + mark used
          fs.writeFileSync(outDir+'/metadata.json', JSON.stringify({id,title:story.title,tags:story.tags||[],format:fmt,width:w,height:h,sizeBytes:finalSize},null,2));
          story.used = true;
          fs.writeFileSync('config/content-library.json', JSON.stringify(lib,null,2));

          // Cleanup chunk dirs
          for (let c = 0; c < chunks.length; c++) try{fs.rmdirSync(outDir+'/chunk_'+c,{recursive:true})}catch{}
          console.log('Done!');
          "

      - name: Publish to YouTube
        working-directory: tools/social
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          LATEST=$(ls -t output/*/*.mp4 2>/dev/null | head -1)
          if [ -n "$LATEST" ] && [ -n "$YOUTUBE_CLIENT_ID" ]; then
            node cli.js publish --platform youtube --video "$LATEST" --privacy private || echo "YouTube publish skipped"
          fi

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/social/config/content-library.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: video generated $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
