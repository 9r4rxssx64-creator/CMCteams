name: Social — Generate & Publish Daily Video

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche"
        required: false
        default: "betrayal-revenge"
      format:
        description: "Format (short, long)"
        required: false
        default: "long"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install espeak-ng
        run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng

      - name: Install deps
        working-directory: tools/social
        run: npm install --no-audit --no-fund

      - name: Generate video
        working-directory: tools/social
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          NICHE="${{ github.event.inputs.niche || 'betrayal-revenge' }}"
          FORMAT="${{ github.event.inputs.format || 'long' }}"

          # Use narrative-storytelling template directly (bypass cli.js templateName bug)
          node -e "
            import fs from 'fs';
            import path from 'path';
            const lib = JSON.parse(fs.readFileSync('config/content-library.json','utf8'));
            const cats = Object.keys(lib).filter(k=>!k.startsWith('_'));
            let story = null;
            for (const cat of cats) {
              const unused = lib[cat].filter(s=>!s.used);
              if (unused.length > 0) { story = unused[Math.floor(Math.random()*unused.length)]; break; }
            }
            if (!story) { console.error('No unused stories'); process.exit(1); }
            console.log('Story: ' + story.id + ' — ' + story.title);
            const { generateSpeech, VOICES } = await import('./engine/tts.js');
            const { segmentScript, groupIntoSubtitles } = await import('./engine/subtitle-engine.js');
            const { generateFrames } = await import('./engine/frame-generator.js');
            const { compileVideo } = await import('./engine/compiler.js');
            const id = story.id;
            const fmt = '${FORMAT}';
            const w = fmt==='short' ? 1080 : 1920;
            const h = fmt==='short' ? 1920 : 1080;
            const outDir = 'output/' + id;
            fs.mkdirSync(outDir, {recursive:true});
            const audioPath = outDir + '/narration.mp3';
            console.log('TTS...');
            const tts = await generateSpeech(story.script, {outputPath:audioPath, voice:VOICES.en_storytelling_male_dramatic, rate:-5, pitch:-3});
            console.log('TTS OK: ' + Math.round(tts.durationMs/1000) + 's');
            const segs = segmentScript(story.script, tts.durationMs);
            const subs = groupIntoSubtitles(segs, {wordsPerLine: fmt==='short'?3:6, maxCharsPerLine: fmt==='short'?22:50, breakOnPunct:true});
            const subsR = subs.map(g=>({text:g.text,startMs:g.startMs,endMs:g.endMs,words:g.words.map(w=>({word:w.word,startMs:w.startMs,endMs:w.endMs}))}));
            console.log(subs.length + ' subtitles');
            const scene = {width:w,height:h,fps:30,durationMs:tts.durationMs+800,bg:{type:'cinematic'},style:fmt==='short'?'shorts':'narrative',subtitles:subsR,title:story.title,watermark:'',showProgress:true};
            const framesDir = outDir + '/frames';
            console.log('Frames...');
            await generateFrames(scene, framesDir, {onProgress:(c,t)=>{if(c%30===0)process.stdout.write('.')}});
            console.log(' OK');
            const videoPath = outDir + '/' + id + '_' + fmt + '.mp4';
            console.log('Compile...');
            const result = await compileVideo({framesDir,fps:30,audioPath:tts.audioPath,outputPath:videoPath,width:w,height:h,crf:20,preset:'medium'});
            console.log('Video: ' + videoPath + ' (' + (result.sizeBytes/1024/1024).toFixed(2) + ' MB)');
            const meta = {id,title:story.title,tags:story.tags||[],format:fmt,width:w,height:h,fps:30,sizeBytes:result.sizeBytes};
            fs.writeFileSync(outDir+'/metadata.json', JSON.stringify(meta,null,2));
            // Mark story as used
            story.used = true;
            fs.writeFileSync('config/content-library.json', JSON.stringify(lib,null,2));
            // Cleanup frames
            try{fs.readdirSync(framesDir).forEach(f=>{if(f.startsWith('frame_'))fs.unlinkSync(framesDir+'/'+f)});fs.rmdirSync(framesDir)}catch{}
            console.log('Done!');
          "

      - name: Publish to YouTube
        working-directory: tools/social
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          LATEST=$(ls -t output/*/*.mp4 2>/dev/null | head -1)
          if [ -n "$LATEST" ] && [ -n "$YOUTUBE_CLIENT_ID" ]; then
            node cli.js publish --platform youtube --video "$LATEST" --privacy private || echo "YouTube publish skipped"
          fi

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/social/config/content-library.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: video generated $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
