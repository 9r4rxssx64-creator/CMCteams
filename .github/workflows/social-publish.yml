name: Social — Generate & Publish Daily Video

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche"
        required: false
        default: "betrayal"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg espeak-ng
      - run: pip install edge-tts gtts

      - name: "🎬 Generate Pro Video"
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python3 tools/social/generate_video.py \
            tools/social/config/content-library.json \
            tools/social/output \
            "${{ github.event.inputs.niche || 'betrayal' }}"

          # Export video path for upload step
          FINAL=$(ls -t tools/social/output/*/*.mp4 2>/dev/null | head -1)
          META=$(dirname "$FINAL")/metadata.json
          echo "FINAL=$FINAL" >> $GITHUB_ENV
          echo "TITLE=$(python3 -c "import json;print(json.load(open('$META')).get('title','Story'))")" >> $GITHUB_ENV
          echo "TAGS=$(python3 -c "import json;print(','.join(json.load(open('$META')).get('tags',[])))")" >> $GITHUB_ENV
          echo "STORY_ID=$(python3 -c "import json;print(json.load(open('$META')).get('id','unknown'))")" >> $GITHUB_ENV

      - name: "📤 Upload to YouTube"
        if: success()
        env:
          YT_CID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YT_CS: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_RT: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          FINAL="${{ env.FINAL }}"
          if [ -z "$FINAL" ] || [ ! -f "$FINAL" ]; then echo "No video"; exit 0; fi
          if [ -z "$YT_CID" ] || [ -z "$YT_RT" ]; then echo "No YT creds"; exit 0; fi

          AT=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=$(echo -n $YT_CID)" \
            -d "client_secret=$(echo -n $YT_CS)" \
            -d "refresh_token=$(echo -n $YT_RT)" \
            -d "grant_type=refresh_token" | jq -r '.access_token // empty')
          if [ -z "$AT" ]; then echo "Token failed"; exit 1; fi

          TITLE="${{ env.TITLE }}"
          TAGS="${{ env.TAGS }}"
          HASHTAGS=$(echo "$TAGS" | tr ',' '\n' | sed 's/^/#/' | tr '\n' ' ')

          echo "📤 Uploading: $TITLE"
          LOCATION=$(curl -s -D - -o /dev/null -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $AT" \
            -H "Content-Type: application/json" \
            -d "{\"snippet\":{\"title\":\"$(echo "$TITLE" | sed 's/"/\\"/g' | head -c 95)\",\"description\":\"${HASHTAGS}\n\nSubscribe for daily stories.\nGenerated by KDMC Studio\",\"categoryId\":\"24\",\"tags\":[$(echo "$TAGS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | tr '\n' ',' | sed 's/,$//')]},\"status\":{\"privacyStatus\":\"private\",\"selfDeclaredMadeForKids\":false}}" \
            2>/dev/null | grep -i "^location:" | tr -d '\r' | sed 's/^[Ll]ocation: //')

          if [ -n "$LOCATION" ]; then
            VID=$(curl -s -X PUT "$LOCATION" -H "Authorization: Bearer $AT" -H "Content-Type: video/mp4" --data-binary @"$FINAL" | jq -r '.id // empty')
            [ -n "$VID" ] && echo "✅ https://youtu.be/$VID" || echo "⚠️ Upload unclear"
          else echo "⚠️ No upload URL"; fi

      - name: "💾 Commit"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add tools/social/config/content-library.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "auto: video ${{ env.STORY_ID }} $(date -u +%Y-%m-%d) [skip ci]"
            git push || sleep 3 && git pull --rebase origin main && git push || true
          fi
