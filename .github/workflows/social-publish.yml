name: Social — Generate & Publish Daily Video

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Format (short, long)"
        required: false
        default: "long"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng ffmpeg
      - run: cd tools/social && npm install --no-audit --no-fund

      - name: Generate video (HD quality)
        working-directory: tools/social
        timeout-minutes: 70
        run: |
          FORMAT="${{ github.event.inputs.format || 'long' }}"
          node --input-type=module << 'ENDSCRIPT'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const lib = JSON.parse(fs.readFileSync('config/content-library.json','utf8'));
          const cats = Object.keys(lib).filter(k=>!k.startsWith('_'));
          let story = null;
          for (const cat of cats) {
            const unused = lib[cat].filter(s=>!s.used);
            if (unused.length > 0) { story = unused[Math.floor(Math.random()*unused.length)]; break; }
          }
          if (!story) { console.error('No unused stories'); process.exit(1); }
          const fmt = process.env.FORMAT || 'long';
          const words = story.script.split(/\s+/);
          console.log('Story: ' + story.id + ' (' + words.length + ' words)');
          const id = story.id;
          const outDir = 'output/' + id;
          fs.mkdirSync(outDir, {recursive:true});

          // === TRY EDGE TTS FIRST (neural voice) ===
          let ttsBackend = 'espeak';
          let ttsVoice = 'en';
          let ttsSpeed = '-s 160 -p 35';
          try {
            console.log('Testing Edge TTS...');
            const { MsEdgeTTS } = await import('msedge-tts');
            const tts = new MsEdgeTTS();
            await tts.setMetadata('en-US-GuyNeural', 'audio-24khz-96kbitrate-mono-mp3');
            const testPath = outDir + '/tts_test.mp3';
            await tts.toFile(testPath, 'Test.');
            if (fs.existsSync(testPath) && fs.statSync(testPath).size > 100) {
              ttsBackend = 'edge';
              console.log('Edge TTS OK - using neural voice');
              fs.unlinkSync(testPath);
            }
          } catch(e) {
            console.log('Edge TTS failed: ' + e.message + ' - using espeak');
          }

          // === DOWNLOAD BACKGROUND IMAGE FROM POLLINATIONS ===
          let bgPath = null;
          const nichePrompts = {
            betrayal: 'dark moody room dramatic shadows broken trust cinematic',
            revenge: 'dark justice courtroom dramatic lighting noir style',
            mystery: 'foggy dark forest path moonlight mysterious atmosphere',
            finance: 'luxury office gold coins stock market screens cinematic',
            true_crime: 'detective desk evidence dark room police noir',
            motivation: 'sunrise mountain peak golden light epic inspirational',
            psychology: 'brain neural network glowing dark scientific',
            tech: 'futuristic holographic interface neon circuits cyberpunk',
            history: 'ancient ruins sunset dramatic clouds historical epic',
          };
          const niche = (story.tags||[])[0] || 'betrayal';
          const prompt = nichePrompts[niche] || nichePrompts.betrayal;
          try {
            console.log('Downloading AI background...');
            const bgUrl = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt + ' 4k wallpaper') + '?width=1920&height=1080&nologo=true&seed=' + Date.now();
            execSync('curl -sL -o ' + outDir + '/bg.jpg "' + bgUrl + '"', {timeout:30000});
            if (fs.existsSync(outDir + '/bg.jpg') && fs.statSync(outDir + '/bg.jpg').size > 5000) {
              bgPath = outDir + '/bg.jpg';
              console.log('AI background downloaded (' + (fs.statSync(bgPath).size/1024).toFixed(0) + ' KB)');
            }
          } catch(e) { console.log('Background download failed, using cinematic gradient'); }

          const renderW = 960;
          const renderH = 540;
          const finalW = 1920;
          const finalH = 1080;
          const fps = 8;
          const chunkSize = 80;
          const chunks = [];
          for (let i = 0; i < words.length; i += chunkSize) chunks.push(words.slice(i, i + chunkSize).join(' '));
          console.log('Chunks: ' + chunks.length + ' | TTS: ' + ttsBackend + ' | BG: ' + (bgPath ? 'AI image' : 'gradient'));

          const chunkVideos = [];
          for (let c = 0; c < chunks.length; c++) {
            const chunk = chunks[c];
            const cd = outDir + '/c' + c;
            fs.mkdirSync(cd + '/f', {recursive:true});
            console.log('Chunk ' + (c+1) + '/' + chunks.length + ' (' + chunk.split(/\s+/).length + 'w)');

            // TTS
            const mp3P = cd + '/a.mp3';
            if (ttsBackend === 'edge') {
              try {
                const { MsEdgeTTS } = await import('msedge-tts');
                const tts = new MsEdgeTTS();
                await tts.setMetadata('en-US-GuyNeural', 'audio-24khz-96kbitrate-mono-mp3');
                await tts.toFile(mp3P, chunk);
              } catch(e) {
                console.log('Edge TTS chunk failed, fallback espeak');
                const safe = chunk.replace(/[\\"]/g, '').slice(0, 2500);
                execSync('espeak-ng -v en ' + ttsSpeed + ' -w ' + cd + '/a.wav "' + safe + '"', {timeout:30000});
                execSync('ffmpeg -y -i ' + cd + '/a.wav -codec:a libmp3lame -b:a 128k ' + mp3P, {stdio:'pipe', timeout:15000});
                try { fs.unlinkSync(cd + '/a.wav'); } catch {}
              }
            } else {
              const safe = chunk.replace(/[\\"]/g, '').slice(0, 2500);
              execSync('espeak-ng -v en ' + ttsSpeed + ' -w ' + cd + '/a.wav "' + safe + '"', {timeout:30000});
              execSync('ffmpeg -y -i ' + cd + '/a.wav -codec:a libmp3lame -b:a 128k ' + mp3P, {stdio:'pipe', timeout:15000});
              try { fs.unlinkSync(cd + '/a.wav'); } catch {}
            }

            const sz = fs.statSync(mp3P).size;
            const dur = ttsBackend === 'edge' ? Math.round(sz / 12000 * 1000) : Math.round(sz / 6000 * 1000);

            // Subtitles
            const { segmentScript, groupIntoSubtitles } = await import('./engine/subtitle-engine.js');
            const segs = segmentScript(chunk, dur);
            const subs = groupIntoSubtitles(segs, {wordsPerLine:4, maxCharsPerLine:35, breakOnPunct:true});
            const sr = subs.map(g=>({text:g.text,startMs:g.startMs,endMs:g.endMs,words:g.words.map(w=>({word:w.word,startMs:w.startMs,endMs:w.endMs}))}));

            // Frames with background image
            const bgConfig = bgPath
              ? {type:'image', imagePath:bgPath, options:{zoomStart:1.0+c*0.02, zoomEnd:1.05+c*0.02, panX:0.02}}
              : {type:'cinematic'};
            const scene = {width:renderW,height:renderH,fps,durationMs:dur+200,bg:bgConfig,style:'narrative',subtitles:sr,title:c===0?story.title:'',watermark:'KDMC Stories',showProgress:c===chunks.length-1};
            const { generateFrames } = await import('./engine/frame-generator.js');
            await generateFrames(scene, cd+'/f', {onProgress:(cur)=>{if(cur%10===0)process.stdout.write('.')}});

            const vp = cd + '/v.mp4';
            execSync('ffmpeg -y -framerate '+fps+' -i '+cd+'/f/frame_%06d.png -i '+mp3P+' -map 0:v -map 1:a -vf scale='+finalW+':'+finalH+':flags=lanczos -c:v libx264 -preset ultrafast -crf 26 -pix_fmt yuv420p -r 30 -c:a aac -b:a 128k -shortest -movflags +faststart '+vp, {stdio:'pipe', timeout:180000});
            console.log(' ' + (fs.statSync(vp).size/1024/1024).toFixed(1) + 'MB');
            chunkVideos.push(vp);
            try { fs.readdirSync(cd+'/f').forEach(f=>fs.unlinkSync(cd+'/f/'+f)); fs.rmdirSync(cd+'/f'); } catch {}
            try { fs.unlinkSync(mp3P); } catch {}
          }

          // Concatenate
          const finalVideo = outDir + '/' + id + '_' + fmt + '.mp4';
          if (chunkVideos.length === 1) {
            fs.renameSync(chunkVideos[0], finalVideo);
          } else {
            const concatFile = outDir + '/list.txt';
            const lines = chunkVideos.map(v => "file '" + v.replace(outDir + '/', '') + "'");
            fs.writeFileSync(concatFile, lines.join('\n'));
            execSync('cd ' + outDir + ' && ffmpeg -y -f concat -safe 0 -i list.txt -c copy ' + id + '_' + fmt + '.mp4', {stdio:'pipe', timeout:60000});
            for (const cv of chunkVideos) try { fs.unlinkSync(cv); } catch {}
            try { fs.unlinkSync(concatFile); } catch {}
          }

          console.log('FINAL: ' + (fs.statSync(finalVideo).size/1024/1024).toFixed(2) + ' MB');
          const desc = (story.tags||[]).map(t=>'#'+t).join(' ') + '\n\n' + story.script.split(/[.!?]/)[0] + '.\n\nGenerated by KDMC Studio';
          fs.writeFileSync(outDir+'/metadata.json', JSON.stringify({id,title:story.title,tags:story.tags||[],description:desc,format:fmt,width:finalW,height:finalH,sizeBytes:fs.statSync(finalVideo).size,tts:ttsBackend,hasBg:!!bgPath},null,2));
          story.used = true;
          fs.writeFileSync('config/content-library.json', JSON.stringify(lib,null,2));
          for (let c = 0; c < chunks.length; c++) try { fs.rmSync(outDir+'/c'+c, {recursive:true, force:true}); } catch {}
          if (bgPath) try { fs.unlinkSync(bgPath); } catch {}
          console.log('Done! TTS: ' + ttsBackend + ' | BG: ' + (bgPath ? 'AI' : 'gradient'));
          ENDSCRIPT

      - name: Upload to YouTube via curl
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        working-directory: tools/social
        run: |
          LATEST=$(ls -t output/*/*.mp4 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then echo "No video"; exit 0; fi
          if [ -z "$YT_CLIENT_ID" ]; then echo "No YT creds"; exit 0; fi
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=$(echo -n $YT_CLIENT_ID)" \
            -d "client_secret=$(echo -n $YT_CLIENT_SECRET)" \
            -d "refresh_token=$(echo -n $YT_REFRESH_TOKEN)" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo $RESPONSE | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).access_token||'')}catch{console.log('')}})")
          if [ -z "$ACCESS_TOKEN" ]; then echo "Token failed: $RESPONSE"; exit 1; fi
          META=$(dirname "$LATEST")/metadata.json
          TITLE=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$META','utf8')).title)}catch{console.log('Story Video')}")
          DESC=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$META','utf8')).description||'')}catch{console.log('')}")
          echo "Uploading: $TITLE"
          LOCATION=$(curl -s -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -D /tmp/yt_headers.txt \
            -d "{\"snippet\":{\"title\":\"$TITLE\",\"description\":\"$DESC\",\"categoryId\":\"22\"},\"status\":{\"privacyStatus\":\"private\",\"selfDeclaredMadeForKids\":false}}")
          UPLOAD_URL=$(grep -i "location:" /tmp/yt_headers.txt | tr -d '\r' | awk '{print $2}')
          if [ -z "$UPLOAD_URL" ]; then echo "No upload URL"; exit 1; fi
          RESULT=$(curl -s -X PUT "$UPLOAD_URL" -H "Authorization: Bearer $ACCESS_TOKEN" -H "Content-Type: video/mp4" --data-binary @"$LATEST")
          VID=$(echo $RESULT | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).id||'?')}catch{console.log('?')}})")
          echo "Uploaded! https://youtu.be/$VID"

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/social/config/content-library.json 2>/dev/null || true
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "auto: video generated $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
