name: Social — Generate & Publish Daily Video

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Format (short, long)"
        required: false
        default: "short"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install espeak-ng + ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install deps
        working-directory: tools/social
        run: npm install --no-audit --no-fund

      - name: Generate video
        working-directory: tools/social
        run: |
          FORMAT="${{ github.event.inputs.format || 'short' }}"
          node --input-type=module -e "
          import fs from 'fs';
          import { execSync } from 'child_process';

          // 1. Pick random unused SHORT story (under 120 words for short format)
          const lib = JSON.parse(fs.readFileSync('config/content-library.json','utf8'));
          const cats = Object.keys(lib).filter(k=>!k.startsWith('_'));
          let story = null;
          const fmt = '${FORMAT}';
          for (const cat of cats) {
            const unused = lib[cat].filter(s=>{
              if(s.used) return false;
              if(fmt==='short') return s.script.split(/\s+/).length <= 150;
              return true;
            });
            if (unused.length > 0) { story = unused[Math.floor(Math.random()*unused.length)]; break; }
          }
          // Fallback: any unused story, truncate script
          if (!story) {
            for (const cat of cats) {
              const unused = lib[cat].filter(s=>!s.used);
              if (unused.length > 0) { story = unused[0]; break; }
            }
          }
          if (!story) { console.error('No unused stories'); process.exit(1); }

          // Truncate script for short format (max 80 words = ~30s)
          let script = story.script;
          if (fmt==='short') {
            const words = script.split(/\s+/);
            if (words.length > 80) script = words.slice(0,80).join(' ') + '.';
          }

          console.log('Story: ' + story.id + ' — ' + story.title);
          console.log('Words: ' + script.split(/\s+/).length);

          const id = story.id;
          const outDir = 'output/' + id;
          fs.mkdirSync(outDir, {recursive:true});
          const wavPath = outDir + '/narration.wav';
          const mp3Path = outDir + '/narration.mp3';

          // 2. TTS espeak-ng
          console.log('TTS...');
          const safeScript = script.replace(/[\"\\\\]/g,'').slice(0,3000);
          execSync('espeak-ng -v en -s 150 -p 35 -w ' + wavPath + ' \"' + safeScript + '\"', {timeout:60000});
          execSync('ffmpeg -y -i ' + wavPath + ' -codec:a libmp3lame -b:a 192k ' + mp3Path, {stdio:'pipe', timeout:30000});
          try{fs.unlinkSync(wavPath)}catch{}

          const audioSize = fs.statSync(mp3Path).size;
          const durationMs = Math.round(audioSize / 6000 * 1000);
          console.log('Audio: ' + Math.round(durationMs/1000) + 's');

          // 3. Subtitles
          const { segmentScript, groupIntoSubtitles } = await import('./engine/subtitle-engine.js');
          const segs = segmentScript(script, durationMs);
          const wpl = fmt==='short' ? 3 : 6;
          const subs = groupIntoSubtitles(segs, {wordsPerLine:wpl, maxCharsPerLine:fmt==='short'?22:50, breakOnPunct:true});
          const subsR = subs.map(g=>({text:g.text,startMs:g.startMs,endMs:g.endMs,words:g.words.map(w=>({word:w.word,startMs:w.startMs,endMs:w.endMs}))}));
          console.log(subs.length + ' subtitles');

          // 4. Frames (15fps for speed, upscale to 30 in ffmpeg)
          const w = fmt==='short' ? 1080 : 1920;
          const h = fmt==='short' ? 1920 : 1080;
          const fps = 15;
          const scene = {width:w,height:h,fps:fps,durationMs:durationMs+500,bg:{type:'cinematic'},style:fmt==='short'?'shorts':'narrative',subtitles:subsR,title:story.title,watermark:'',showProgress:true};
          const framesDir = outDir + '/frames';
          console.log('Frames (' + Math.ceil((durationMs+500)/1000*fps) + ' at ' + fps + 'fps)...');
          const { generateFrames } = await import('./engine/frame-generator.js');
          await generateFrames(scene, framesDir, {onProgress:(c,t)=>{if(c%30===0)process.stdout.write('.')}});
          console.log(' OK');

          // 5. Compile (input 15fps, output 30fps for smooth playback)
          const videoPath = outDir + '/' + id + '_' + fmt + '.mp4';
          console.log('Compile...');
          execSync('ffmpeg -y -framerate ' + fps + ' -i ' + framesDir + '/frame_%06d.png -i ' + mp3Path + ' -map 0:v -map 1:a -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -r 30 -c:a aac -b:a 128k -shortest -movflags +faststart ' + videoPath, {stdio:'pipe', timeout:300000});
          const videoSize = fs.statSync(videoPath).size;
          console.log('Video: ' + (videoSize/1024/1024).toFixed(2) + ' MB');

          // 6. Save metadata + mark used
          fs.writeFileSync(outDir+'/metadata.json', JSON.stringify({id,title:story.title,tags:story.tags||[],format:fmt,width:w,height:h,sizeBytes:videoSize},null,2));
          story.used = true;
          fs.writeFileSync('config/content-library.json', JSON.stringify(lib,null,2));

          // 7. Cleanup frames
          try{fs.readdirSync(framesDir).forEach(f=>{if(f.startsWith('frame_'))fs.unlinkSync(framesDir+'/'+f)});fs.rmdirSync(framesDir)}catch{}
          console.log('Done!');
          "

      - name: Publish to YouTube
        working-directory: tools/social
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          LATEST=$(ls -t output/*/*.mp4 2>/dev/null | head -1)
          if [ -n "$LATEST" ] && [ -n "$YOUTUBE_CLIENT_ID" ]; then
            node cli.js publish --platform youtube --video "$LATEST" --privacy private || echo "YouTube publish skipped"
          fi

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/social/config/content-library.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: video generated $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
