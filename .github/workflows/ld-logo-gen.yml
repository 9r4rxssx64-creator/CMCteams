name: LD Logo Gen (Replicate FLUX)

# Génère un OU plusieurs visuels La Détente via Replicate (clé AX_REPLICATE_KEY).
# Déclenché en poussant le marqueur shops/la-detente/.logo-request.json.
# - mode batch : { "jobs":[ {prompt, outfile}, ... ] }
# - mode simple : { prompt, outfile, aspect_ratio }
# Sortie sur fond blanc (la transparence est faite en local, plus fiable).
# Espacement + 1 retry entre les jobs pour éviter le rate-limit Replicate.

on:
  workflow_dispatch:
  push:
    paths:
      - 'shops/la-detente/.logo-request.json'

permissions:
  contents: write

concurrency:
  group: ld-logo-gen
  cancel-in-progress: true

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Générer via Replicate FLUX 1.1 pro
        env:
          REPLICATE_API_TOKEN: ${{ secrets.AX_REPLICATE_KEY }}
        run: |
          set -e
          REQ=shops/la-detente/.logo-request.json
          AR=$(jq -r '.aspect_ratio // "1:1"' "$REQ")

          call_replicate () {
            local PROMPT="$1" OUT="$2"
            local PAYLOAD RESP STATUS GETURL URL
            PAYLOAD=$(jq -n --arg p "$PROMPT" --arg ar "$AR" \
              '{input:{prompt:$p, aspect_ratio:$ar, output_format:"png", safety_tolerance:6, prompt_upsampling:true}}')
            RESP=$(curl -sS -X POST \
              https://api.replicate.com/v1/models/black-forest-labs/flux-1.1-pro/predictions \
              -H "Authorization: Bearer $REPLICATE_API_TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: wait" -d "$PAYLOAD")
            STATUS=$(echo "$RESP" | jq -r '.status // empty')
            if [ "$STATUS" != "succeeded" ] && [ -n "$STATUS" ]; then
              GETURL=$(echo "$RESP" | jq -r '.urls.get // empty')
              for i in $(seq 1 40); do
                sleep 3
                RESP=$(curl -sS -H "Authorization: Bearer $REPLICATE_API_TOKEN" "$GETURL")
                STATUS=$(echo "$RESP" | jq -r '.status // empty')
                [ "$STATUS" = "succeeded" ] && break
                if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then echo "  état=$STATUS"; return 1; fi
              done
            fi
            URL=$(echo "$RESP" | jq -r 'if (.output|type)=="array" then .output[0] else .output end')
            if [ -z "$URL" ] || [ "$URL" = "null" ]; then echo "  pas d'URL ($STATUS)"; return 1; fi
            mkdir -p "$(dirname "$OUT")"
            curl -sS -L "$URL" -o "$OUT"
            file "$OUT" | grep -qi png || return 1
            return 0
          }

          gen_one () {
            local PROMPT="$1" OUT="$2"
            echo "→ $OUT"
            if call_replicate "$PROMPT" "$OUT"; then echo "  ok"; return 0; fi
            echo "  retry dans 12s…"; sleep 12
            if call_replicate "$PROMPT" "$OUT"; then echo "  ok (retry)"; return 0; fi
            echo "  ÉCHEC (sauté)"; return 1
          }

          if [ "$(jq -r 'has("jobs")' "$REQ")" = "true" ]; then
            N=$(jq '.jobs | length' "$REQ")
            echo "Batch de $N visuels"
            for k in $(seq 0 $((N-1))); do
              P=$(jq -r ".jobs[$k].prompt" "$REQ")
              O=$(jq -r ".jobs[$k].outfile" "$REQ")
              gen_one "$P" "$O" || true
              sleep 6
            done
          else
            P=$(jq -r '.prompt' "$REQ")
            O=$(jq -r '.outfile // "shops/la-detente/img/designs/logo_ai.png"' "$REQ")
            gen_one "$P" "$O"
          fi

      - name: Committer les visuels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "La Détente — visuels générés via Replicate FLUX [skip ci]" || { echo "aucun changement"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
