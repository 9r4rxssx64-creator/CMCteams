name: LD Logo Gen (Replicate FLUX)

# Génère un visuel pour La Détente via Replicate (clé AX_REPLICATE_KEY).
# Déclenché soit manuellement (workflow_dispatch), soit en poussant le marqueur
# shops/la-detente/.logo-request.json (prompt + nom de fichier de sortie).
# Le runner GitHub a un vrai accès réseau (≠ sandbox) → Replicate joignable.

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt image
        required: false
      outfile:
        description: Fichier de sortie
        required: false
        default: shops/la-detente/img/designs/logo_ai.png
      aspect_ratio:
        description: Ratio (1:1, 4:5, 3:2…)
        required: false
        default: "1:1"
  push:
    paths:
      - 'shops/la-detente/.logo-request.json'

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Générer via Replicate FLUX 1.1 pro
        env:
          REPLICATE_API_TOKEN: ${{ secrets.AX_REPLICATE_KEY }}
        run: |
          set -e
          REQ=shops/la-detente/.logo-request.json
          IN_PROMPT="${{ github.event.inputs.prompt }}"
          if [ -n "$IN_PROMPT" ]; then
            PROMPT="$IN_PROMPT"
            OUT="${{ github.event.inputs.outfile }}"
            AR="${{ github.event.inputs.aspect_ratio }}"
          else
            PROMPT=$(jq -r '.prompt' "$REQ")
            OUT=$(jq -r '.outfile // empty' "$REQ")
            AR=$(jq -r '.aspect_ratio // empty' "$REQ")
          fi
          [ -z "$OUT" ] && OUT=shops/la-detente/img/designs/logo_ai.png
          [ -z "$AR" ] && AR="1:1"
          echo "Sortie : $OUT  (ratio $AR)"
          echo "Prompt : $PROMPT"
          PAYLOAD=$(jq -n --arg p "$PROMPT" --arg ar "$AR" \
            '{input:{prompt:$p, aspect_ratio:$ar, output_format:"png", safety_tolerance:6, prompt_upsampling:true}}')
          RESP=$(curl -sS -X POST \
            https://api.replicate.com/v1/models/black-forest-labs/flux-1.1-pro/predictions \
            -H "Authorization: Bearer $REPLICATE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Prefer: wait" \
            -d "$PAYLOAD")
          echo "Réponse (résumé) :"; echo "$RESP" | jq '{status, error, detail}' 2>/dev/null || echo "$RESP"
          STATUS=$(echo "$RESP" | jq -r '.status // empty')
          # si pas terminé en mode wait, on poll l'URL get
          if [ "$STATUS" != "succeeded" ] && [ -n "$STATUS" ]; then
            GETURL=$(echo "$RESP" | jq -r '.urls.get // empty')
            for i in $(seq 1 40); do
              sleep 3
              RESP=$(curl -sS -H "Authorization: Bearer $REPLICATE_API_TOKEN" "$GETURL")
              STATUS=$(echo "$RESP" | jq -r '.status // empty')
              echo "  poll $i : $STATUS"
              [ "$STATUS" = "succeeded" ] && break
              [ "$STATUS" = "failed" ] && { echo "$RESP"; exit 1; }
              [ "$STATUS" = "canceled" ] && { echo "$RESP"; exit 1; }
            done
          fi
          URL=$(echo "$RESP" | jq -r 'if (.output|type)=="array" then .output[0] else .output end')
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then echo "Pas d'URL de sortie"; echo "$RESP"; exit 1; fi
          echo "Image : $URL"
          mkdir -p "$(dirname "$OUT")"
          curl -sS -L "$URL" -o "$OUT"
          file "$OUT"
          ls -la "$OUT"

      - name: Committer le visuel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "La Détente — visuel généré via Replicate FLUX [skip ci]" || { echo "aucun changement"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
