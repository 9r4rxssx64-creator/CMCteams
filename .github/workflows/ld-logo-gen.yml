name: LD Logo Gen (Replicate FLUX)
on:
  push:
    paths: ['shops/la-detente/.logo-request.json']
permissions:
  contents: write
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.ref_name }}' }
      - name: Gen
        env: { REPLICATE_API_TOKEN: '${{ secrets.AX_REPLICATE_KEY }}' }
        run: |
          REQ=shops/la-detente/.logo-request.json
          LOG=shops/la-detente/.gen-log.txt; echo "start $(date -u +%FT%TZ)" > "$LOG"
          N=$(jq '.jobs|length' "$REQ" 2>>"$LOG"); echo "N=[$N] req=$(wc -c <"$REQ")o jq=$(jq --version 2>&1) tok=$([ -n "$REPLICATE_API_TOKEN" ] && echo SET || echo EMPTY)" >>"$LOG"
          for k in $(seq 0 $((N-1))); do
            P=$(jq -r ".jobs[$k].prompt" "$REQ"); O=$(jq -r ".jobs[$k].outfile" "$REQ")
            PL=$(jq -n --arg p "$P" '{input:{prompt:$p,aspect_ratio:"1:1",output_format:"png",safety_tolerance:6,prompt_upsampling:true}}')
            R=$(curl -sS -X POST https://api.replicate.com/v1/models/black-forest-labs/flux-1.1-pro/predictions -H "Authorization: Bearer $REPLICATE_API_TOKEN" -H "Content-Type: application/json" -H "Prefer: wait" -d "$PL")
            S=$(echo "$R"|jq -r '.status//empty'); G=$(echo "$R"|jq -r '.urls.get//empty')
            for i in $(seq 1 40); do [ "$S" = succeeded ] && break; [ "$S" = failed ] && break; sleep 3; R=$(curl -sS -H "Authorization: Bearer $REPLICATE_API_TOKEN" "$G"); S=$(echo "$R"|jq -r '.status//empty'); done
            U=$(echo "$R"|jq -r 'if (.output|type)=="array" then .output[0] else .output end')
            if [ -n "$U" ] && [ "$U" != null ]; then mkdir -p "$(dirname "$O")"; curl -sS -L "$U" -o "$O"; echo "$O OK" >>"$LOG"; else echo "$O FAIL $S $(echo "$R"|jq -r '.error//empty')" >>"$LOG"; fi
            sleep 5
          done
          cat "$LOG"
      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"; git config user.email "bot@users.noreply.github.com"
          git add -A; git commit -m "logos + log [skip ci]" || exit 0
          git push origin HEAD:'${{ github.ref_name }}' || echo pushfail
