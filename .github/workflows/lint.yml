name: Lint & Format Check

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "apex-ai/index.html"
      - "index.html"
      - ".eslintrc.json"
      - ".prettierrc"
      - "tests/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint + Prettier
        run: |
          npm install --no-save eslint@8 prettier@3 || true

      - name: Extract JS from CMCteams index.html
        run: |
          node -e "
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const s=html.lastIndexOf('<script>');
          const e=html.lastIndexOf('</script>');
          if(s<0||e<0){console.error('No script found in index.html');process.exit(0);}
          fs.writeFileSync('/tmp/cmc.js',html.slice(s+8,e));
          console.log('Extracted CMC JS:', fs.statSync('/tmp/cmc.js').size,'bytes');
          "

      - name: Extract JS from Apex index.html
        run: |
          node -e "
          const fs=require('fs');
          if(!fs.existsSync('apex-ai/index.html')){console.log('No apex-ai/index.html, skip');process.exit(0);}
          const html=fs.readFileSync('apex-ai/index.html','utf8');
          const s=html.lastIndexOf('<script>');
          const e=html.lastIndexOf('</script>');
          if(s<0||e<0){console.error('No script found in apex-ai/index.html');process.exit(0);}
          fs.writeFileSync('/tmp/apex.js',html.slice(s+8,e));
          console.log('Extracted Apex JS:', fs.statSync('/tmp/apex.js').size,'bytes');
          "

      - name: Node syntax check (CMC)
        run: |
          if [ -f /tmp/cmc.js ]; then
            node --check /tmp/cmc.js && echo "CMC syntax OK" || echo "CMC syntax warnings"
          fi

      - name: Node syntax check (Apex)
        run: |
          if [ -f /tmp/apex.js ]; then
            node --check /tmp/apex.js && echo "Apex syntax OK" || echo "Apex syntax warnings"
          fi

      - name: ESLint extracted JS (warning-only)
        continue-on-error: true
        run: |
          npx eslint --no-eslintrc -c .eslintrc.json /tmp/cmc.js /tmp/apex.js 2>&1 | tail -50 || echo "ESLint warnings only"

      - name: ESLint tests directory
        continue-on-error: true
        run: |
          if [ -d tests ]; then
            npx eslint --no-eslintrc -c .eslintrc.json tests/ 2>&1 | tail -30 || echo "ESLint warnings only"
          fi

      - name: Prettier check (warning-only)
        continue-on-error: true
        run: |
          npx prettier --check ".eslintrc.json" ".prettierrc" "tests/**/*.js" 2>&1 | tail -30 || echo "Prettier warnings only"

  apex-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Apex modules tests
        run: |
          if [ -f tests/apex-modules.test.js ]; then
            node tests/apex-modules.test.js
          else
            echo "No tests file yet"
          fi
