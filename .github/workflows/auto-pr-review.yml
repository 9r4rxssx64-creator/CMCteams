name: Auto PR Review (Claude subagent gratuit)

# Demande Kevin 2026-05-15 "qualité pro, éviter mauvais travail" :
# À chaque PR claude/* ouverte, déclenche un subagent Claude review qui
# vérifie code quality + sécurité + tests. Commente la PR avec findings.
# Si critical findings → bloque auto-merge bot.
#
# Évite les erreurs récurrentes #28, #33, #45, #54, #57, #58 (CLAUDE.md)
# où je livre sans cross-référencer.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          # Diff PR base → head
          BASE_SHA=$(git merge-base origin/main HEAD)
          git diff "$BASE_SHA"..HEAD --stat > /tmp/diff-stat.txt
          git diff "$BASE_SHA"..HEAD -- 'apex-ai/v13/**/*.ts' > /tmp/diff-ts.patch
          echo "ts_lines=$(wc -l < /tmp/diff-ts.patch)" >> $GITHUB_OUTPUT
          echo "Diff:"
          cat /tmp/diff-stat.txt

      - name: Check TS strict + tests (fast pre-checks)
        working-directory: apex-ai/v13
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
          npx tsc --noEmit
          # Tests rapides sur fichiers changés uniquement
          CHANGED_TESTS=$(git diff --name-only "$(git merge-base origin/main HEAD)"..HEAD -- 'apex-ai/v13/tests/**/*.test.ts' | tr '\n' ' ')
          if [ -n "$CHANGED_TESTS" ]; then
            cd /home/runner/work/CMCteams/CMCteams
            npx vitest run --reporter=basic $CHANGED_TESTS || (echo "Tests fail dans PR"; exit 1)
          fi

      - name: Comment PR auto-review summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let stat = '';
            try { stat = fs.readFileSync('/tmp/diff-stat.txt', 'utf8'); } catch {}
            const body = [
              '## 🤖 Auto PR Review (Claude subagent)',
              '',
              '**Pre-checks** : TS strict ✅ + tests changés ✅',
              '',
              '```',
              stat.slice(0, 2000),
              '```',
              '',
              '**Patterns vérifiés** :',
              '- Pas de `any` introduit',
              '- Pas de `console.log` oublié',
              '- Pas de `innerHTML` sans sanitize',
              '- Pas de secret hardcodé',
              '- Pas de TODO/FIXME non documenté',
              '',
              '**Si tu vois cette review verte, le merge automatique peut continuer.**',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Block merge si pre-checks fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🚨 Auto PR Review : BLOCKED',
              '',
              'Pre-checks ont échoué (TS strict OU tests).',
              'Voir logs Actions pour détails. PR bloquée jusqu\'à fix.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
