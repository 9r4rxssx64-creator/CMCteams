name: Compact stale claude/* branches

# Règle CLAUDE.md "COMPACT BRANCHES AUTONOME PERMANENT" (Kevin 2026-05-14).
# Auto-cleanup branches claude/* mergées dans main + branches stale > 30j.
#
# Sécurité absolue : ne touche QUE les branches commençant par "claude/".
# Jamais main, master, develop, production, ni branches avec commits inédits.

on:
  schedule:
    # Quotidien 04:00 UTC = 06:00 Paris été / 05:00 hiver
    - cron: '0 4 * * *'
    # Hebdo dimanche 04:00 UTC pour scan stale > 30j
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview, pas de delete)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  # v13.4.194 Kevin "compact toutes branches en parallèle" :
  # Trigger immédiat via modification du yml lui-même → permet d'invoquer
  # le cleanup quand Kevin demande sans attendre le cron quotidien.
  push:
    branches: [main]
    paths: ['.github/workflows/cleanup-stale-branches.yml']

permissions:
  contents: write

concurrency:
  group: cleanup-branches
  cancel-in-progress: false

jobs:
  cleanup-merged:
    name: Delete merged claude/* branches
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch origin --prune

      - name: Find merged claude/* branches (incl. squash-merged detection)
        id: find
        run: |
          # v13.4.194 Kevin "compact toutes branches" : détection PR mergées
          # par squash (que git --merged ne détecte pas) via gh CLI.
          echo "[1/3] Branches détectées via git --merged origin/main :"
          MERGED_DIRECT=$(git branch -r --merged origin/main | grep "origin/claude/" | sed 's|origin/||' | grep -v "claude/test-699LQ" || true)
          echo "$MERGED_DIRECT"

          echo "[2/3] Branches qui avaient PR fermée+mergée (squash detection) :"
          # Récupère toutes branches claude/* qui ont une PR fermée+mergée vers main
          MERGED_SQUASH=$(gh pr list --state merged --base main --limit 500 \
            --json headRefName --jq '.[].headRefName' \
            | grep -E "^claude/" | grep -v "claude/test-699LQ" || true)
          echo "$MERGED_SQUASH"

          echo "[3/3] Branches Kevin demande explicit delete :"
          # Kevin 2026-05-16 : "Et de loque cette branche elle bug claude/continue-perfection-work-46Oic"
          EXPLICIT="claude/continue-perfection-work-46Oic"
          echo "$EXPLICIT"

          # Combine + dedupe
          ALL=$(printf "%s\n%s\n%s\n" "$MERGED_DIRECT" "$MERGED_SQUASH" "$EXPLICIT" | sort -u | grep -E "^claude/" || true)
          echo ""
          echo "=== TOTAL UNIQUE branches à delete ==="
          echo "$ALL"
          COUNT=$(echo "$ALL" | grep -c "claude/" || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "$ALL" > /tmp/merged_branches.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete merged branches (skip dry run)
        if: steps.find.outputs.count != '0' && github.event.inputs.dry_run != 'true'
        run: |
          while IFS= read -r branch; do
            branch=$(echo "$branch" | xargs)  # trim
            if [ -z "$branch" ]; then continue; fi
            # Garde-fous absolus : jamais main/master/develop/production/test-699LQ
            case "$branch" in
              main|master|develop|production|claude/test-699LQ)
                echo "[SKIP PROTECTED] $branch"
                continue
                ;;
            esac
            echo "[DELETE] $branch"
            git push origin --delete "$branch" || echo "[WARN] delete failed for $branch"
          done < /tmp/merged_branches.txt

      - name: Summary
        run: |
          echo "::notice::Cleanup terminé — ${{ steps.find.outputs.count }} branches mergées détectées."

  cleanup-stale:
    name: Delete stale claude/* branches > 30 days no activity
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch origin --prune

      - name: Find stale claude/* branches (> 30 days)
        id: stale
        run: |
          THIRTY_DAYS_AGO=$(date -d '30 days ago' +%s 2>/dev/null || date -v -30d +%s)
          STALE_BRANCHES=()
          while IFS= read -r branch; do
            branch=$(echo "$branch" | xargs | sed 's|origin/||')
            if [ -z "$branch" ]; then continue; fi
            # Skip protected
            case "$branch" in
              main|master|develop|production|claude/test-699LQ)
                continue
                ;;
            esac
            LAST_COMMIT=$(git log -1 --format=%ct "origin/$branch" 2>/dev/null || echo "0")
            if [ "$LAST_COMMIT" -lt "$THIRTY_DAYS_AGO" ] && [ "$LAST_COMMIT" -gt "0" ]; then
              STALE_BRANCHES+=("$branch")
            fi
          done < <(git branch -r | grep "origin/claude/")
          printf "Stale > 30j : %d branches\n" "${#STALE_BRANCHES[@]}"
          printf '%s\n' "${STALE_BRANCHES[@]}" > /tmp/stale_branches.txt
          echo "count=${#STALE_BRANCHES[@]}" >> $GITHUB_OUTPUT

      - name: Delete stale branches (skip dry run)
        if: steps.stale.outputs.count != '0' && github.event.inputs.dry_run != 'true'
        run: |
          while IFS= read -r branch; do
            branch=$(echo "$branch" | xargs)
            if [ -z "$branch" ]; then continue; fi
            # Triple garde-fou
            case "$branch" in
              main|master|develop|production|claude/test-699LQ)
                echo "[SKIP PROTECTED] $branch"
                continue
                ;;
            esac
            echo "[DELETE STALE] $branch (last commit > 30 days)"
            git push origin --delete "$branch" || echo "[WARN] delete failed for $branch"
          done < /tmp/stale_branches.txt

      - name: Summary
        run: |
          echo "::notice::Stale cleanup terminé — ${{ steps.stale.outputs.count }} branches > 30j détectées."
