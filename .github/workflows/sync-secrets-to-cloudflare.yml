name: Sync Secrets to Cloudflare Workers

# Synchronise TOUS les secrets GitHub vers les workers Cloudflare déployés
# (Apex Chat + Apex Push existant)
#
# Déclenchement :
# - Manuel via GitHub Actions UI (workflow_dispatch)
# - Auto après ajout/modification d'un secret (via re-run manuel)
#
# Ce workflow N'EST PAS un déploiement — il met juste à jour les secrets
# des workers existants (pas de redéploiement code = rapide ~30s)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Worker cible (all / apex-chat / apex-push)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - apex-chat
          - apex-push

jobs:
  sync:
    name: Sync secrets vers workers Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + Wrangler
        run: |
          curl -fsSL https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz | tar -xJ -C /tmp || true
          npm install -g wrangler@latest 2>&1 | tail -2
          wrangler --version

      - name: Verify CF token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN manquant dans GitHub Secrets"
            echo "Ajoute-le sur https://github.com/9r4rxssx64-creator/CMCteams/settings/secrets/actions"
            exit 1
          fi
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | tee /tmp/verify.json
          grep -q '"success":true' /tmp/verify.json || (echo "::error::Token invalide"; exit 1)
          echo "::notice::✅ Token Cloudflare valide"

      # ============================================================
      #  Apex Chat API worker
      # ============================================================
      - name: Push secrets to apex-chat-api
        if: github.event.inputs.target != 'apex-push'
        working-directory: messaging-app/workers
        run: |
          echo "::group::Apex Chat API"

          # Helper : push secret seulement si défini en GitHub Secrets
          push_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "  ⚪ $name : non configuré (skip)"
              return
            fi
            echo "$value" | wrangler secret put "$name" 2>&1 | tail -1
            echo "  ✅ $name"
          }

          # === IA ===
          push_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          push_secret "OPENROUTER_API_KEY" "${{ secrets.OPENROUTER_API_KEY }}"
          push_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          push_secret "GROQ_API_KEY" "${{ secrets.GROQ_API_KEY }}"
          push_secret "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"

          # === Communications ===
          push_secret "VONAGE_API_KEY" "${{ secrets.VONAGE_API_KEY }}"
          push_secret "VONAGE_API_SECRET" "${{ secrets.VONAGE_API_SECRET }}"
          push_secret "VAPID_PRIVATE_KEY" "${{ secrets.VAPID_PRIVATE_KEY }}"
          push_secret "TELEGRAM_BOT_TOKEN" "${{ secrets.TELEGRAM_BOT_TOKEN }}"

          # === Auth ===
          push_secret "FIREBASE_API_KEY" "${{ secrets.FIREBASE_API_KEY }}"
          push_secret "FIREBASE_PROJECT_ID" "cmcteams-c16ab"

          # === Apple Push (optionnel) ===
          push_secret "APNS_KEY_ID" "${{ secrets.APNS_KEY_ID }}"
          push_secret "APNS_TEAM_ID" "${{ secrets.APNS_TEAM_ID }}"
          push_secret "APNS_PRIVATE_KEY" "${{ secrets.APNS_PRIVATE_KEY }}"

          # === FCM Android (optionnel) ===
          push_secret "FCM_SERVER_KEY" "${{ secrets.FCM_SERVER_KEY }}"

          # === Paiements ===
          push_secret "STRIPE_SECRET_KEY" "${{ secrets.STRIPE_SECRET_KEY }}"
          push_secret "STRIPE_WEBHOOK_SECRET" "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          push_secret "PAYPAL_ME_USERNAME" "${{ secrets.PAYPAL_ME_USERNAME }}"
          push_secret "REVOLUT_TAG" "${{ secrets.REVOLUT_TAG }}"
          push_secret "IBAN_KEVIN" "${{ secrets.IBAN_KEVIN }}"

          # === Monitoring ===
          push_secret "SENTRY_DSN" "${{ secrets.SENTRY_DSN }}"
          push_secret "FINNHUB_API_KEY" "${{ secrets.FINNHUB_API_KEY }}"

          # === Domotique ===
          push_secret "HOME_ASSISTANT_URL" "${{ secrets.HOME_ASSISTANT_URL }}"
          push_secret "HOME_ASSISTANT_TOKEN" "${{ secrets.HOME_ASSISTANT_TOKEN }}"
          push_secret "BROADLINK_API_KEY" "${{ secrets.BROADLINK_API_KEY }}"

          echo "::endgroup::"

      # ============================================================
      #  Apex Push worker (existant)
      # ============================================================
      - name: Push secrets to apex-push-worker
        if: github.event.inputs.target != 'apex-chat'
        working-directory: tools/cloudflare
        run: |
          echo "::group::Apex Push Worker"

          # Si wrangler.toml existe dans tools/cloudflare
          if [ ! -f wrangler.toml ]; then
            echo "  ℹ️ tools/cloudflare/wrangler.toml manquant (skip apex-push)"
            exit 0
          fi

          push_push() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then return; fi
            echo "$value" | wrangler secret put "$name" 2>&1 | tail -1
            echo "  ✅ $name"
          }

          push_push "VAPID_PRIVATE_KEY" "${{ secrets.VAPID_PRIVATE_KEY }}"
          push_push "APEX_PUSH_ADMIN_TOKEN" "${{ secrets.APEX_PUSH_ADMIN_TOKEN }}"
          push_push "APNS_KEY_ID" "${{ secrets.APNS_KEY_ID }}"
          push_push "APNS_TEAM_ID" "${{ secrets.APNS_TEAM_ID }}"
          push_push "APNS_PRIVATE_KEY" "${{ secrets.APNS_PRIVATE_KEY }}"
          push_push "FCM_SERVER_KEY" "${{ secrets.FCM_SERVER_KEY }}"

          echo "::endgroup::"

      # ============================================================
      #  Summary
      # ============================================================
      - name: Summary
        run: |
          echo "## 🔐 Synchronisation secrets terminée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cibles :** ${{ github.event.inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Les secrets configurés dans GitHub Secrets ont été propagés vers les workers Cloudflare." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Prochaines étapes :**" >> $GITHUB_STEP_SUMMARY
          echo "- Ajouter les secrets manquants : voir [SECRETS_TODO.md](../messaging-app/SECRETS_TODO.md)" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run ce workflow après chaque ajout de secret" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow auto-déploiement : \`deploy-apex-chat.yml\`" >> $GITHUB_STEP_SUMMARY
