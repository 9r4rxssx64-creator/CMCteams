name: Apex Autonomous Watcher

# v13.4.5 (Kevin 2026-05-10) — Garde-fou côté serveur pour le mode autonome Apex.
#
# Logique :
#   - App fermée (iPhone PWA backgroundée, Mac en veille) → tick local ne tourne pas
#   - Ce workflow cron 5 min poll Firebase REST `apex/autonomous_sessions`
#   - Si une session active a lastActivityAt > 5 min ET status === 'running' →
#     emit repository_dispatch event 'apex-autonomous-stale' (consumable par autre workflow Claude Code)
#     + dépose une issue light si plus de 30 min stale.
#   - Idempotent : ne fait que LIRE Firebase + créer issue, jamais write Firebase
#     (la session sera relancée par l'app au prochain reopen).
#
# Anti-pattern évité :
#   - Pas de "tick distant" qui appellerait Anthropic API (coût + sécu)
#   - Reste un MONITOR pas un EXECUTOR (l'app fait le boulot quand elle revient online)

on:
  schedule:
    - cron: '0 */6 * * *'  # v13.4.184 Kevin "mails saturent boite" : 6h (was 5min)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: apex-autonomous-watcher
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Poll Firebase autonomous sessions
        id: poll
        env:
          FIREBASE_URL: ${{ secrets.APEX_FIREBASE_URL || 'https://apex-ai-2026-default-rtdb.europe-west1.firebasedatabase.app' }}
        run: |
          set -e
          # Try fetch — gracefully skip if endpoint not reachable / not configured
          URL="${FIREBASE_URL}/apex/autonomous_sessions.json?shallow=false"
          echo "Polling $URL"
          HTTP_CODE=$(curl -s -o /tmp/sessions.json -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Skip — Firebase non joignable (code=$HTTP_CODE). Pas critique."
            echo "stale_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Compte sessions running avec lastActivityAt > 5 min
          node -e "
            const fs = require('fs');
            let data = {};
            try { data = JSON.parse(fs.readFileSync('/tmp/sessions.json', 'utf8') || '{}'); } catch(e) {}
            if (!data || typeof data !== 'object') { console.log('stale_count=0'); process.exit(0); }
            const now = Date.now();
            let staleCount = 0;
            let veryStaleCount = 0;
            const stales = [];
            for (const uid of Object.keys(data)) {
              const sessions = data[uid] || {};
              for (const sid of Object.keys(sessions)) {
                const s = sessions[sid];
                if (!s || typeof s !== 'object') continue;
                if (s.status !== 'running') continue;
                const last = s.lastActivityAt || s.ts || 0;
                const ageMin = (now - last) / 60000;
                if (ageMin > 5) {
                  staleCount++;
                  stales.push({ uid, sid, ageMin: Math.round(ageMin), objective: (s.objective || '').slice(0, 100) });
                  if (ageMin > 30) veryStaleCount++;
                }
              }
            }
            console.log('stale_count=' + staleCount);
            console.log('very_stale_count=' + veryStaleCount);
            fs.writeFileSync('/tmp/stales.json', JSON.stringify(stales));
          " | tee -a $GITHUB_OUTPUT

      - name: Emit repository_dispatch if stale
        if: steps.poll.outputs.stale_count != '0' && steps.poll.outputs.stale_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh api repos/${{ github.repository }}/dispatches \
            -F event_type='apex-autonomous-stale' \
            -F client_payload[stale_count]="${{ steps.poll.outputs.stale_count }}" \
            -F client_payload[very_stale_count]="${{ steps.poll.outputs.very_stale_count || '0' }}" \
            || echo "Dispatch failed — not critical"

      - name: Open issue if very stale (>30 min)
        if: steps.poll.outputs.very_stale_count != '0' && steps.poll.outputs.very_stale_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -f /tmp/stales.json ]; then
            STALES_SUMMARY=$(node -e "const s = JSON.parse(require('fs').readFileSync('/tmp/stales.json','utf8') || '[]'); console.log(s.slice(0,5).map(x => '- uid=' + x.uid + ' age=' + x.ageMin + 'min — ' + x.objective).join('\n'))")
          else
            STALES_SUMMARY="(détails non disponibles)"
          fi
          TITLE="🤖 Apex autonomous : ${{ steps.poll.outputs.very_stale_count }} session(s) stale >30min"
          BODY=$(cat <<EOF
          ## Sessions autonomes inactives détectées

          Le watcher cron 5min a détecté **${{ steps.poll.outputs.very_stale_count }}** session(s) en statut \`running\` avec \`lastActivityAt > 30 min\` dans Firebase.

          ### Détails (top 5)
          $STALES_SUMMARY

          ### Action attendue
          - Soit l'app va se reconnecter et reprendre (rien à faire)
          - Soit problème quota / réseau / bug — investiguer
          - Pour stopper côté serveur : pas possible (le watcher est read-only)

          _Auto-généré par .github/workflows/apex-autonomous-watcher.yml_
          EOF
          )
          # Cherche issue existante du même type pour éviter spam
          EXISTING=$(gh issue list --label "apex-autonomous-stale" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" || echo "Comment failed"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "apex-autonomous-stale" || echo "Create failed"
          fi
