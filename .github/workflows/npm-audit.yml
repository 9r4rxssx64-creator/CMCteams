name: npm audit (vulnérabilités deps)

# Demande Kevin 2026-05-15 "qualité pro sans gros coûts" :
# Détecte CVE dans dépendances npm. Bloquant sur PR si severity high/critical.
# Gratuit illimité (npm intégré).

on:
  pull_request:
    branches: [main]
    paths:
      - 'apex-ai/v13/package.json'
      - 'apex-ai/v13/package-lock.json'
  push:
    branches: [main]
    paths:
      - 'apex-ai/v13/package.json'
  schedule:
    - cron: '0 5 * * 1'  # Hebdo lundi 05h UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apex-ai/v13/package-lock.json

      - name: npm audit (high+critical only)
        working-directory: apex-ai/v13
        run: |
          # Échoue uniquement si severity ≥ high (pas low/moderate qui sont fréquents)
          npm audit --audit-level=high --omit=dev || (
            echo "🚨 npm audit a trouvé vulnérabilités ≥ high"
            echo "Fix : cd apex-ai/v13 && npm audit fix"
            exit 1
          )

      - name: Génère rapport JSON (audit log)
        if: always()
        working-directory: apex-ai/v13
        run: npm audit --json > /tmp/audit.json || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ github.run_number }}
          path: /tmp/audit.json
          retention-days: 30
