name: La Détente — Designs IA (modèles Kevin → bibliothèque)

# Génère les designs premium (pistolet+rose, fusils+cœurs, Perazzi+plateaux, crest…)
# via GEMINI_API_KEY, fond rendu transparent, et pousse sur une branche claude/* (auto-merge).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'shops/la-detente/scripts/ld-ai-designs.mjs'
      - '.github/workflows/la-detente-ai-designs.yml'

permissions:
  contents: write

jobs:
  ai-designs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install sharp
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i sharp@0.33.5

      - name: Génération designs IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Clé présente : $([ -n "$GEMINI_API_KEY" ] && echo oui || echo NON)"
          node shops/la-detente/scripts/ld-ai-designs.mjs

      - name: Commit designs sur une branche claude/*
        run: |
          git config user.name "kdmc-bot"
          git config user.email "bot@kdmc.local"
          BR="claude/ai-designs-${{ github.run_id }}"
          git checkout -b "$BR"
          git add shops/la-detente/img/designs
          if git diff --cached --quiet; then
            echo "Aucune image — rien à committer."
          else
            git commit -m "La Détente — designs IA (modèles Kevin) [skip ci]"
            git push -u origin "$BR"
            echo "Poussé sur $BR (auto-merge)."
          fi
