# Déploie le worker kdmc-live (foudre Blitzortung + cyclones NHC + feux NASA FIRMS pour World Monitor).
# Secrets requis : CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID. Optionnel : FIRMS_MAP_KEY (clé NASA FIRMS gratuite).
# Dispatch manuel uniquement (pas d'auto-deploy sur push) — pattern kdmc-ais (leçon #130).
name: Deploy KDMC Live

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: services/kdmc-live
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier les secrets (erreur exacte, pas silencieuse)
        env:
          FIRMSK: ${{ secrets.FIRMS_MAP_KEY }}
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$MISSING" ]; then echo "::error::Secrets Cloudflare manquants :$MISSING"; exit 1; fi
          [ -z "$FIRMSK" ] && echo "::warning::FIRMS_MAP_KEY absent → le worker se déploie mais /fires restera vide (fail-open). Foudre + cyclones marchent SANS clé. Clé gratuite : https://firms.modaps.eosdis.nasa.gov/api/map_key/"
          echo "Secrets Cloudflare OK"

      - name: Syntax check worker
        run: node --check worker.js

      - name: Installer wrangler
        run: npm i -g wrangler && wrangler --version

      - name: Déployer le worker
        run: |
          set -e
          wrangler deploy 2>&1 | tee /tmp/deploy.log
          grep -Eo 'https://[a-z0-9.-]+workers.dev' /tmp/deploy.log | head -1 > /tmp/url.txt
          echo "URL déployée : $(cat /tmp/url.txt)"

      - name: Pousser FIRMS_MAP_KEY (secret serveur, jamais exposé au client — best-effort)
        env:
          FIRMSK: ${{ secrets.FIRMS_MAP_KEY }}
        run: |
          if [ -n "$FIRMSK" ]; then
            printf '%s' "$FIRMSK" | wrangler secret put FIRMS_MAP_KEY
            echo "FIRMS_MAP_KEY posé"
          else
            echo "Pas de clé FIRMS → /fires en fail-open (FeatureCollection vide). Skip propre."
          fi

      - name: Smoke test réel (leçon #95 — un deploy vert sans test live ne prouve rien)
        run: |
          URL=$(cat /tmp/url.txt); [ -z "$URL" ] && URL="https://kdmc-live.9r4rxssx64.workers.dev"
          sleep 8

          echo "--- /health ---"
          curl -sS "$URL/health" | tee /tmp/h.json; echo
          grep -q '"ok":true' /tmp/h.json || { echo "::error::/health invalide : $(cat /tmp/h.json)"; exit 1; }

          echo "--- /cyclones (relais NHC CurrentStorms.json, Origin autorisée) ---"
          curl -sS -H "Origin: https://kd-mc.com" "$URL/cyclones" | tee /tmp/c.json; echo
          # NHC renvoie {"activeStorms":[...]} (parfois vide hors saison) — on exige le champ, pas des tempêtes.
          grep -q 'activeStorms' /tmp/c.json || { echo "::error::/cyclones invalide (champ activeStorms absent) : $(head -c 500 /tmp/c.json)"; exit 1; }

          echo "--- /lightning (WS courte Blitzortung — tolérant : le protocole peut avoir changé) ---"
          curl -sS -H "Origin: https://kd-mc.com" --max-time 30 "$URL/lightning?secs=5" | tee /tmp/l.json; echo
          grep -q '"strikes"' /tmp/l.json || { echo "::error::/lightning invalide (pas de champ strikes) : $(head -c 500 /tmp/l.json)"; exit 1; }
          if grep -Eq '"(msgs|parsed)":[1-9]' /tmp/l.json; then
            echo "✅ /lightning : messages reçus du serveur Blitzortung"
          else
            echo "::warning::/lightning : 0 message reçu — protocole Blitzortung à confirmer, voir debug.attempts ci-dessus (cause exacte : firstRaw/closeCode)"
          fi

          echo "--- /fires (FeatureCollection — vide si pas de clé, fail-open) ---"
          curl -sS -H "Origin: https://kd-mc.com" "$URL/fires?bbox=-10,35,15,55" | head -c 1200 | tee /tmp/f.json; echo
          grep -q '"FeatureCollection"' /tmp/f.json || { echo "::error::/fires invalide : $(head -c 500 /tmp/f.json)"; exit 1; }
          if grep -q '"noKey":true' /tmp/f.json; then
            echo "::warning::/fires vide (pas de FIRMS_MAP_KEY) — fail-open OK. Ajoute la clé pour les feux officiels."
          fi

          echo "✅ kdmc-live live : /health + /cyclones + /lightning + /fires OK"
