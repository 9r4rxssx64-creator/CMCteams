name: apex-ai-ts type check + tests

on:
  push:
    branches: [main, claude/**]
    paths:
      - "apex-ai-ts/**"
      - ".github/workflows/apex-ai-ts.yml"
  pull_request:
    paths:
      - "apex-ai-ts/**"

jobs:
  type-check:
    runs-on: ubuntu-latest
    name: TypeScript strict + Vitest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "apex-ai-ts/package.json"

      - name: Install deps
        working-directory: apex-ai-ts
        run: npm install --no-audit --no-fund

      - name: TypeScript strict check
        working-directory: apex-ai-ts
        run: npm run type-check

      - name: Vitest run
        working-directory: apex-ai-ts
        run: npm test
