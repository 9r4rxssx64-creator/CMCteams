name: Deploy Apex Push Worker

on:
  # Auto-deploy quand le fichier change
  push:
    branches: [main]
    paths:
      - 'tools/cloudflare/apex-push-worker.js'
      - '.github/workflows/deploy-push-worker.yml'
  # Trigger manuel depuis l'onglet Actions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Manque CLOUDFLARE_API_TOKEN ou CLOUDFLARE_ACCOUNT_ID dans Secrets"
            exit 1
          fi

          echo "→ Déploiement apex-push-worker..."

          # Métadonnées du module ES
          cat > /tmp/metadata.json << EOF
          {
            "main_module": "worker.js",
            "compatibility_date": "$(date -u +%Y-%m-%d)"
          }
          EOF

          # PUT vers Cloudflare API
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/apex-push-worker" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "worker.js=@tools/cloudflare/apex-push-worker.js;type=application/javascript+module")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1 | sed 's/HTTP_STATUS://')

          echo "Status: $STATUS"
          echo "Body: $BODY"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "::notice::✅ Déploiement réussi !"
            echo ""
            echo "Test rapide :"
            sleep 3
            curl -s "https://apex-push-worker.desarzens-kevin.workers.dev/health" || echo "Test fail (CORS depuis runner OK)"
          else
            echo "::error::❌ Déploiement échoué (HTTP $STATUS)"
            echo "$BODY"
            exit 1
          fi
