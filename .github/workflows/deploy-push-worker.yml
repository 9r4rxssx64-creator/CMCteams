name: Deploy Apex Push Worker

on:
  push:
    branches: [main]
    paths:
      - 'tools/cloudflare/apex-push-worker.js'
      - 'tools/cloudflare/wrangler.toml'
      - '.github/workflows/deploy-push-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Vérifier secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Manque CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Manque CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          echo "✅ Secrets OK"

      - name: Préparer répertoire wrangler
        run: |
          mkdir -p /tmp/wrangler-deploy
          cp tools/cloudflare/apex-push-worker.js /tmp/wrangler-deploy/index.js
          cat > /tmp/wrangler-deploy/wrangler.toml << 'EOF'
          name = "apex-push-worker"
          main = "index.js"
          compatibility_date = "2024-12-01"
          EOF
          echo "Fichiers prêts :"
          ls -la /tmp/wrangler-deploy/

      - name: Déployer via Wrangler officiel
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: /tmp/wrangler-deploy
          command: deploy


      - name: Re-pusher les secrets Cloudflare (preserve variables)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_VAPID_PUBLIC_KEY: ${{ secrets.CF_VAPID_PUBLIC_KEY }}
          CF_VAPID_PRIVATE_KEY: ${{ secrets.CF_VAPID_PRIVATE_KEY }}
          CF_VAPID_EMAIL: ${{ secrets.CF_VAPID_EMAIL }}
          CF_FIREBASE_URL: ${{ secrets.CF_FIREBASE_URL }}
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        working-directory: /tmp/wrangler-deploy
        run: |
          if [ -n "$CF_VAPID_PUBLIC_KEY" ]; then
            echo "$CF_VAPID_PUBLIC_KEY" | npx wrangler secret put VAPID_PUBLIC_KEY 2>&1 || echo "skip VAPID_PUBLIC_KEY"
          fi
          if [ -n "$CF_VAPID_PRIVATE_KEY" ]; then
            echo "$CF_VAPID_PRIVATE_KEY" | npx wrangler secret put VAPID_PRIVATE_KEY 2>&1 || echo "skip"
          fi
          if [ -n "$CF_VAPID_EMAIL" ]; then
            echo "$CF_VAPID_EMAIL" | npx wrangler secret put VAPID_EMAIL 2>&1 || echo "skip"
          fi
          if [ -n "$CF_FIREBASE_URL" ]; then
            echo "$CF_FIREBASE_URL" | npx wrangler secret put FIREBASE_URL 2>&1 || echo "skip"
          fi
          if [ -n "$CF_ADMIN_TOKEN" ]; then
            echo "$CF_ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN 2>&1 || echo "skip"
          fi
          echo "✅ Secrets re-pushes (si fournis dans GitHub Secrets)"

      - name: Test /health après déploiement
        run: |
          sleep 5
          echo "→ Test /health :"
          curl -s "https://apex-push-worker.desarzens-kevin.workers.dev/health" | jq '.' || \
          curl -s "https://apex-push-worker.desarzens-kevin.workers.dev/health"
