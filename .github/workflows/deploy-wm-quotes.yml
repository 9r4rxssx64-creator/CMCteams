# Déploie le worker wm-quotes (panneau Bourse de World Monitor).
# Secrets requis (déjà présents, noms EXACTS vérifiés — règle CLAUDE.md secrets) :
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, FINNHUB_API_KEY
# Anti-spam : pas de cron — uniquement dispatch manuel + push sur le dossier du worker.
name: Deploy WM Quotes Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/cloudflare/wm-quotes/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: tools/cloudflare/wm-quotes
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier les secrets requis (erreur exacte, pas silencieuse)
        env:
          FK: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          [ -z "$FK" ] && MISSING="$MISSING FINNHUB_API_KEY"
          if [ -n "$MISSING" ]; then echo "::error::Secrets manquants :$MISSING"; exit 1; fi
          echo "Secrets OK"

      - name: Installer wrangler
        run: npm i -g wrangler && wrangler --version

      - name: Déployer le worker
        run: |
          set -e
          wrangler deploy 2>&1 | tee /tmp/deploy.log
          grep -Eo 'https://[a-z0-9.-]+workers.dev' /tmp/deploy.log | head -1 > /tmp/url.txt
          echo "URL déployée : $(cat /tmp/url.txt)"

      - name: Pousser la clé Finnhub (secret worker, jamais dans le code)
        env:
          FK: ${{ secrets.FINNHUB_API_KEY }}
        run: printf '%s' "$FK" | wrangler secret put FINNHUB_API_KEY

      - name: Smoke test réel (leçon 95 — un deploy vert sans test live ne prouve rien)
        run: |
          URL=$(cat /tmp/url.txt); [ -z "$URL" ] && URL="https://wm-quotes.9r4rxssx64.workers.dev"
          sleep 8
          echo "--- /health ---"
          curl -sS "$URL/health" | tee /tmp/h.json; echo
          grep -q '"hasKey":true' /tmp/h.json || { echo "::error::La clé FINNHUB_API_KEY n'est PAS visible par le worker"; exit 1; }
          echo "--- /quotes ---"
          curl -sS "$URL/quotes" | tee /tmp/q.json; echo
          grep -q '"quotes"' /tmp/q.json || { echo "::error::Réponse /quotes invalide : $(cat /tmp/q.json)"; exit 1; }
          grep -q 'SPY' /tmp/q.json || echo "::warning::Aucune cotation SPY (marché fermé ou quota) — worker OK mais données vides"
          echo "✅ wm-quotes live et authentifié"
