name: 'Lighthouse CI Apex v13'

# Audit cascade v13.3.82 — validation MESURABLE de la perf 100/100.
# Trigger : push sur main qui touche apex-ai/v13/**.
# Job : build + serve preview + lighthouse autorun + assert seuils config.

on:
  # v13.4.126 (Kevin "qualité pro App Store-ready") :
  # Ajout pull_request → Lighthouse bloque merge si score < seuils config.
  # Avant : seulement push main (détecte trop tard).
  pull_request:
    branches: [main]
    paths:
      - 'apex-ai/v13/**'
      - '.github/workflows/lighthouse-apex-v13.yml'
  push:
    branches: [main]
    paths:
      - 'apex-ai/v13/**'
      - '.github/workflows/lighthouse-apex-v13.yml'
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apex-ai/v13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apex-ai/v13/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.sha }}
          path: |
            apex-ai/v13/.lighthouseci/
            apex-ai/v13/lighthouse-*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## 🚦 Lighthouse CI Apex v13" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Seuils requis (lighthouse.config.json) :" >> $GITHUB_STEP_SUMMARY
          echo "- Performance ≥ 90" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility ≥ 95" >> $GITHUB_STEP_SUMMARY
          echo "- Best Practices ≥ 95" >> $GITHUB_STEP_SUMMARY
          echo "- SEO ≥ 90" >> $GITHUB_STEP_SUMMARY
          echo "- PWA ≥ 90 (warn)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapports JSON archivés dans artifacts (retention 30j)." >> $GITHUB_STEP_SUMMARY
