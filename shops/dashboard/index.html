<style>
:root{
  --p:#e8b830;--p2:#d9b15c;
  --bg:#0a0a0b;--bg2:#101013;--card:#141418;--card-h:#1a1a20;
  --border:#23232a;--border-h:#36363f;
  --text:#f4f4f5;--muted:#a4a4ad;--faint:#6c6c75;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;--info:#3b82f6;
  --r:14px;--r-sm:10px;--r-pill:100px;
  --ease:cubic-bezier(.22,.78,.32,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Inter",-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:"Instrument Serif",Georgia,serif;font-weight:400}
input,select,textarea,button{font:inherit;font-size:16px}
button{cursor:pointer;border:none;background:none;color:inherit}

/* AUTH SCREEN */
.auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,184,48,.08),transparent 60%),var(--bg);z-index:200}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:40px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 22px 60px rgba(0,0,0,.5)}
.auth-logo{font-size:32px;margin-bottom:8px}
.auth-box h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:34px;letter-spacing:-.01em;margin-bottom:6px}
.auth-box h1 em{font-style:italic;color:var(--p)}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
.auth-pin{width:100%;padding:16px 18px;font-size:22px;letter-spacing:8px;text-align:center;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;font-variant-numeric:tabular-nums}
.auth-pin:focus{border-color:var(--p)}
.auth-btn{margin-top:16px;width:100%;padding:14px;border-radius:12px;background:var(--p);color:#000;font-weight:700;font-size:15px;letter-spacing:.3px;transition:transform .2s,opacity .2s}
.auth-btn:hover{opacity:.92}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{margin-top:12px;color:var(--err);font-size:13px;min-height:18px}
.auth-foot{margin-top:24px;font-size:12px;color:var(--faint)}

/* APP */
.app{display:none}
.app.on{display:block}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;z-index:50;overflow-y:auto}
.sb-logo{font-family:"Instrument Serif",serif;font-size:24px;font-weight:400;color:var(--text);margin:6px 6px 4px;letter-spacing:-.01em}
.sb-logo em{font-style:italic;color:var(--p)}
.sb-sub{font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;margin:0 6px 22px}
.sb-section{font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;margin:18px 6px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;cursor:pointer;color:var(--muted);transition:all .2s var(--ease);margin-bottom:2px;min-height:38px;text-decoration:none}
.nav-item:hover{background:rgba(232,184,48,.06);color:var(--text)}
.nav-item.active{background:rgba(232,184,48,.12);color:var(--p);font-weight:600}
.nav-item .ico{font-size:16px;width:20px;text-align:center}
.sb-foot{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--faint)}
.sb-foot button{font-size:13px;color:var(--muted);padding:8px 12px;border-radius:8px;width:100%;text-align:left;display:flex;align-items:center;gap:10px;min-height:40px}
.sb-foot button:hover{background:rgba(239,68,68,.08);color:var(--err)}

/* MAIN */
.main{margin-left:240px;padding:28px 32px calc(40px + env(safe-area-inset-bottom));max-width:1400px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.topbar h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:34px;letter-spacing:-.01em}
.topbar-r{display:flex;gap:12px;align-items:center;color:var(--muted);font-size:13px}
.conn-pill{padding:5px 12px;border-radius:var(--r-pill);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
.conn-pill.live{background:rgba(34,197,94,.12);color:var(--ok)}
.conn-pill.off{background:rgba(239,68,68,.12);color:var(--err)}
.conn-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);transition:border-color .25s}
.kpi:hover{border-color:var(--border-h)}
.kpi-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.kpi-val{font-family:"Instrument Serif",serif;font-weight:400;font-size:36px;color:var(--p);line-height:1.05}
.kpi-sub{font-size:12px;color:var(--faint);margin-top:6px}

.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:22px;margin-bottom:16px}
.card h3{font-family:"Instrument Serif",serif;font-weight:400;font-size:22px;margin-bottom:14px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}

.table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.table th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--border);font-weight:600;letter-spacing:.5px}
.table td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--border)}
.table tr:hover td{background:rgba(255,255,255,.018)}
.table .right{text-align:right}
.amt{color:var(--p);font-weight:700}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-ok{background:rgba(34,197,94,.14);color:var(--ok)}
.badge-warn{background:rgba(245,158,11,.14);color:var(--warn)}
.badge-err{background:rgba(239,68,68,.14);color:var(--err)}
.badge-info{background:rgba(59,130,246,.14);color:var(--info)}
.badge-muted{background:rgba(164,164,173,.10);color:var(--muted)}

.empty{text-align:center;padding:48px 16px;color:var(--muted)}
.empty .em-ico{font-size:42px;margin-bottom:12px;opacity:.6}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.input,.select{padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;outline:none;min-height:46px;caret-color:var(--p)}
.input:focus,.select:focus{border-color:var(--p)}
#ordQ{flex:1 1 100%;min-width:240px;width:100%}
.btn{padding:10px 18px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13.5px;font-weight:600;transition:all .2s;min-height:40px}
.btn:hover{background:var(--card-h);border-color:var(--border-h)}
.btn-primary{background:var(--p);color:#000;border-color:var(--p)}
.btn-primary:hover{opacity:.9;background:var(--p)}

.bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--p),var(--p2));transition:width .6s var(--ease)}

.toast{position:fixed;bottom:-80px;left:50%;transform:translateX(-50%);z-index:300;padding:12px 22px;border-radius:12px;background:var(--card);color:var(--text);box-shadow:0 12px 40px rgba(0,0,0,.4);font-size:14px;transition:bottom .3s;border:1px solid var(--border);max-width:90vw}
.toast.show{bottom:24px}

a{color:inherit;text-decoration:none}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--p);outline-offset:2px;border-radius:8px}

@media(max-width:840px){
  .sidebar{position:relative;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:12px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border)}
  .sb-logo,.sb-sub,.sb-section,.sb-foot{display:none}
  .nav-item{padding:8px 12px;min-height:36px;white-space:nowrap;font-size:12.5px}
  .main{margin-left:0;padding:18px}
  .kpi-val{font-size:30px}
  .topbar h1{font-size:26px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<body>

<!-- AUTH SCREEN -->
<div class="auth" id="auth">
  <div class="auth-box">
    <div class="auth-logo">🔒</div>
    <h1 class="serif">KDMC <em>Dashboard</em></h1>

    <input type="password" inputmode="numeric" autocomplete="off" maxlength="12" class="auth-pin" id="pin2" placeholder="Confirme ton code" style="display:none;margin-top:10px">
    <button class="auth-btn" id="loginBtn">Se connecter</button>
    <div class="auth-err" id="authErr"></div>

  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   KDMC Dashboard v2 — connecté Firebase, auth PIN, live SSE
   Isolation : path 'shops_admin_v1/*' strict.
   ============================================================ */

var FB_URL="https://cmcteams-c16ab-default-rtdb.europe-west1.firebasedatabase.app";
var FB_BASE="shops_admin_v1";
var SHOPS=[
  {id:"tech-hub",name:"Tech Hub",icon:"💻",color:"#3b82f6"},
  {id:"chez-lolo",name:"CHEZ LOLO",icon:"🫒",color:"#7c8c3c"},
  {id:"la-detente",name:"La Détente",icon:"🎯",color:"#dc2626"},
  {id:"ecocraft",name:"EcoCraft",icon:"🌿",color:"#16a34a"},
  {id:"digital-vault",name:"Digital Vault",icon:"🔐",color:"#d4af37"},
  {id:"pawsome",name:"Pawsome",icon:"🐾",color:"#f97316"}
];
var SESSION_TTL=8*3600*1000; // 8 h
var SK={ // localStorage keys (scopées)
  pinHash:"shops_admin_pin_hash",
  pinSalt:"shops_admin_pin_salt",
  lastact:"shops_admin_lastact",
  fails:"shops_admin_fails",
  view:"shops_admin_view"
};

/* --- utils --- */
function esc(s){return s==null?"":String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtP(n){n=Number(n)||0;return n.toFixed(2).replace(".",",")+" €"}
function fmtN(n){return new Intl.NumberFormat("fr-FR").format(Number(n)||0)}
function fmtD(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}
function toast(m,d){var e=document.getElementById("toast");e.textContent=m;e.className="toast show";clearTimeout(toast._t);toast._t=setTimeout(function(){e.className="toast"},d||3200)}
function lg(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v)}catch(_){return d}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}
function rm(k){try{localStorage.removeItem(k)}catch(_){}}
function shopFromId(id){for(var i=0;i<SHOPS.length;i++)if(SHOPS[i].id===id)return SHOPS[i];return{id:id,name:id,icon:"🏪",color:"#888"}}

/* --- crypto PIN (PBKDF2 200k) --- */
async function hashPin(pin,salt){
  var enc=new TextEncoder();
  var key=await crypto.subtle.importKey("raw",enc.encode(String(pin)),{name:"PBKDF2"},false,["deriveBits"]);
  var bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:enc.encode(salt),iterations:200000,hash:"SHA-256"},key,256);
  return Array.from(new Uint8Array(bits)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}
function randSalt(){var a=new Uint8Array(16);crypto.getRandomValues(a);return Array.from(a).map(function(b){return b.toString(16).padStart(2,"0")}).join("")}

/* --- auth --- */
var _authMode="login"; // "create" au 1er lancement (aucun code par défaut)
async function initAuth(){
  // session encore valide ?
  var last=lg(SK.lastact,0);
  if(last && (Date.now()-last)<SESSION_TTL){enterApp();return}
  // Compte unique kd-mc.com : déverrouillage AUTO si le domaine PROUVE l'identité par
  // Face ID (whoami.verified===true) ET autorisé : admin (Kevin) OU Laurence (nom).
  // Placé AVANT le PIN local pour que Laurence entre par Face ID sans créer de code.
  // Un inconnu qui tape "Laurence" SANS Face ID n'est PAS verified → exclu (leçon #99).
  // Additif + fail-open : SSO injoignable (servi hors *.kd-mc.com) → on retombe sur le PIN.
  try{
    var hsh=location.hash||"";var mm=hsh.match(/[#&]kdmc_sso=([^&]+)/);
    if(mm){try{localStorage.setItem("kdmc_sso_token",decodeURIComponent(mm[1]));}catch(_){}
           try{history.replaceState(null,"",location.pathname+location.search);}catch(_){}}
    var tok="";try{tok=localStorage.getItem("kdmc_sso_token")||"";}catch(_){}
    var hdr={};if(tok)hdr.Authorization="Bearer "+tok;
    var rs=await fetch("/__sso/whoami",{credentials:"include",cache:"no-store",headers:hdr});
    var j=rs&&rs.ok?await rs.json():null;
    var allowed=j&&(j.admin===true||/laurence|lolo|saint.?polit|kevin|desarzens/i.test(j.name||""));
    if(j&&j.ok&&j.verified===true&&allowed){enterApp();return}
  }catch(_){/* fail-open → PIN */}
  // Anti-lockout : un code local DÉJÀ défini (appareil déjà configuré par une identité
  // prouvée) reste accepté même si le SSO est momentanément injoignable.
  if(lg(SK.pinHash)){showAuth();return}
  // Sinon : aucune identité prouvée + aucun code local → VERROUILLÉ. La 1ʳᵉ entrée se
  // fait TOUJOURS via le portail (prénom+nom+code OU Face ID). Jamais de code sans nom.
  showLocked();
}
function showLocked(){
  _authMode="locked";
  document.getElementById("authSub").textContent="Connecte-toi sur le portail kd-mc.com (prénom + nom + code, ou Face ID).";
  document.getElementById("pin").style.display="none";
  document.getElementById("pin2").style.display="none";
  document.getElementById("loginBtn").textContent="Aller au portail kd-mc.com";
  document.getElementById("forgotLink").style.display="none";
  document.getElementById("authErr").textContent="";
  document.getElementById("auth").style.display="flex";document.getElementById("app").classList.remove("on");
}
function showAuth(){
  _authMode="login";
  document.getElementById("authSub").textContent="Accès administrateur";
  document.getElementById("pin").style.display="";
  document.getElementById("pin").placeholder="Ton code";document.getElementById("pin").value="";
  document.getElementById("pin2").style.display="none";document.getElementById("pin2").value="";
  document.getElementById("loginBtn").textContent="Se connecter";
  document.getElementById("authErr").textContent="";
  document.getElementById("forgotLink").style.display="";
  document.getElementById("auth").style.display="flex";document.getElementById("app").classList.remove("on");
  setTimeout(function(){document.getElementById("pin").focus()},50);
}
function showCreate(){
  _authMode="create";
  document.getElementById("authSub").textContent="Choisis ton code (4 à 12 chiffres)";
  document.getElementById("pin").placeholder="Nouveau code";document.getElementById("pin").value="";
  document.getElementById("pin2").placeholder="Confirme ton code";document.getElementById("pin2").style.display="";document.getElementById("pin2").value="";
  document.getElementById("loginBtn").textContent="Valider mon code";
  document.getElementById("authErr").textContent="";
  document.getElementById("forgotLink").style.display="none";
  document.getElementById("auth").style.display="flex";document.getElementById("app").classList.remove("on");
  setTimeout(function(){document.getElementById("pin").focus()},50);
}
function enterApp(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").classList.add("on");
  ls(SK.lastact,Date.now());
  D.view=lg(SK.view,"home");
  renderSidebar();
  dc();
  startFbListener();
}
function logout(){
  rm(SK.lastact);
  if(_es){try{_es.close()}catch(_){}_es=null;_connected=false}
  showAuth();
  document.getElementById("pin").value="";
}
async function doLogin(){
  // Mode verrouillé : aucune identité prouvée → on renvoie au portail (jamais d'entrée
  // par code sans nom). Le portail prouve l'identité (prénom+nom+code OU Face ID).
  if(_authMode==="locked"){location.href="https://kd-mc.com/?return="+encodeURIComponent(location.href);return;}
  var btn=document.getElementById("loginBtn"),err=document.getElementById("authErr"),pin=document.getElementById("pin").value.trim();
  err.textContent="";
  // 1er lancement / réinit : Kevin définit SON code
  if(_authMode==="create"){
    var pin2=document.getElementById("pin2").value.trim();
    if(!/^\d{4,12}$/.test(pin)){err.textContent="Code : 4 à 12 chiffres.";return}
    if(pin!==pin2){err.textContent="Les deux codes ne sont pas identiques.";return}
    btn.disabled=true;btn.textContent="…";
    try{await changePin(pin);ls(SK.fails,{n:0,until:0});enterApp();}
    catch(e){err.textContent=e.message||"Erreur.";}
    btn.disabled=false;btn.textContent="Valider mon code";
    return;
  }
  if(!pin){err.textContent="Saisis ton code.";return}
  // rate-limit
  var fails=lg(SK.fails,{n:0,until:0});
  if(fails.until && Date.now()<fails.until){
    var remain=Math.ceil((fails.until-Date.now())/1000);
    err.textContent="Trop d'essais. Réessaie dans "+remain+" s.";return;
  }
  btn.disabled=true;btn.textContent="Vérification…";
  var salt=lg(SK.pinSalt),expected=lg(SK.pinHash);
  var h=await hashPin(pin,salt);
  btn.disabled=false;btn.textContent="Se connecter";
  if(h===expected){
    ls(SK.fails,{n:0,until:0});
    enterApp();
  }else{
    fails.n=(fails.n||0)+1;
    var wait=fails.n>=8?86400:fails.n>=7?3600:fails.n>=6?600:fails.n>=5?120:fails.n>=4?30:0;
    fails.until=wait?Date.now()+wait*1000:0;
    ls(SK.fails,fails);
    err.textContent="PIN incorrect"+(wait?" — bloqué "+wait+" s.":".");
  }
}
async function changePin(newPin){
  if(!/^\d{4,12}$/.test(newPin))throw new Error("PIN : 4 à 12 chiffres");
  var salt=randSalt();ls(SK.pinSalt,salt);
  var h=await hashPin(newPin,salt);ls(SK.pinHash,h);
}

/* --- Firebase REST + SSE --- */
var _es=null,_connected=false,_orders={},_lastEvt=0;

function fbGetAll(){
  return fetch(FB_URL+"/"+FB_BASE+"/orders.json").then(function(r){return r.ok?r.json():null}).catch(function(){return null});
}
function startFbListener(){
  fbGetAll().then(function(d){if(d){applyAllOrders(d)}});
  if(_es)try{_es.close()}catch(_){}
  try{
    _es=new EventSource(FB_URL+"/"+FB_BASE+"/orders.json?",{withCredentials:false});
    _es.addEventListener("put",function(e){onFbEvent(e)});
    _es.addEventListener("patch",function(e){onFbEvent(e)});
    _es.addEventListener("keep-alive",function(){_connected=true;updateConn()});
    _es.addEventListener("auth_revoked",function(){_connected=false;updateConn()});
    _es.onopen=function(){_connected=true;updateConn()};
    _es.onerror=function(){_connected=false;updateConn();setTimeout(function(){if(!_connected)startFbListener()},10000)};
  }catch(_){}
}
function onFbEvent(e){
  try{
    var d=JSON.parse(e.data);
    if(!d)return;
    var path=d.path||"/",data=d.data;
    if(path==="/"){applyAllOrders(data||{})}
    else{
      // path = /<shop> ou /<shop>/<orderId>
      var parts=path.split("/").filter(Boolean);
      if(parts.length===1){_orders[parts[0]]=data||{}}
      else if(parts.length===2){_orders[parts[0]]=_orders[parts[0]]||{};if(data==null)delete _orders[parts[0]][parts[1]];else _orders[parts[0]][parts[1]]=data;
        if(D.view==="home"||D.view==="orders")toast("Nouvelle commande : "+esc(parts[0])+" / "+esc(parts[1]));
      }
    }
    _connected=true;_lastEvt=Date.now();updateConn();
    if(D.view==="home"||D.view==="orders"||D.view==="boutiques")dc();
  }catch(err){}
}
function applyAllOrders(d){_orders=d||{};_connected=true;updateConn();if(D.view==="home"||D.view==="orders"||D.view==="boutiques")dc()}
function updateConn(){var el=document.getElementById("conn");if(!el)return;el.className="conn-pill "+(_connected?"live":"off");el.textContent=_connected?"Live":"Hors-ligne"}

/* --- agrégation orders --- */
function allOrdersFlat(){
  var arr=[];
  Object.keys(_orders||{}).forEach(function(shop){
    var ords=_orders[shop]||{};
    Object.keys(ords).forEach(function(id){
      var o=ords[id]||{};
      arr.push({orderId:o.orderId||id,shop:shop,total:Number(o.total)||0,method:o.method||"",items_count:Number(o.items_count)||0,items_summary:o.items_summary||"",status:o.status||"new",ts:Number(o.ts)||0,ts_iso:o.ts_iso||""});
    });
  });
  return arr;
}
function statsAll(){
  var f=allOrdersFlat(),tot=0,n=f.length;
  f.forEach(function(o){tot+=o.total});
  return {total:tot,count:n,avg:n?tot/n:0,byShop:groupByShop(f)};
}
function groupByShop(f){
  var g={};SHOPS.forEach(function(s){g[s.id]={shop:s,total:0,count:0,items:0}});
  f.forEach(function(o){if(!g[o.shop])g[o.shop]={shop:shopFromId(o.shop),total:0,count:0,items:0};g[o.shop].total+=o.total;g[o.shop].count++;g[o.shop].items+=o.items_count});
  return g;
}

/* --- export CSV --- */
function exportCSV(){
  var rows=[["Date","ID","Boutique","Total (€)","Méthode","Articles","Détail","Statut"]];
  allOrdersFlat().sort(function(a,b){return b.ts-a.ts}).forEach(function(o){
    rows.push([new Date(o.ts||0).toISOString(),o.orderId,o.shop,String(o.total).replace(".",","),o.method,o.items_count,o.items_summary.replace(/"/g,"'"),o.status]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"'}).join(",")}).join("\n");
  var blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="kdmc-commandes-"+new Date().toISOString().slice(0,10)+".csv";a.click();
  URL.revokeObjectURL(url);
  toast("Export CSV téléchargé ✅");
}

    '<div class="kpi"><div class="kpi-label">Panier moyen</div><div class="kpi-val">'+fmtP(s.avg)+'</div><div class="kpi-sub">par commande</div></div>'+
    '<div class="kpi"><div class="kpi-label">Boutiques actives</div><div class="kpi-val">'+SHOPS.length+'</div><div class="kpi-sub">5 e-shops</div></div>'+
    '</div>'+

      var g=s.byShop[sh.id]||{total:0,count:0,items:0};
      var pct=max?Math.round(g.total/max*100):0;
      return '<div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)">'+
        '<span style="font-size:22px;width:32px;text-align:center">'+sh.icon+'</span>'+
        '<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px;margin-bottom:4px">'+esc(sh.name)+'</div><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+sh.color+'"></div></div></div>'+
        '<div style="text-align:right;min-width:140px"><div class="amt">'+fmtP(g.total)+'</div><div style="font-size:12px;color:var(--muted)">'+g.count+' cmd · '+g.items+' articles</div></div>'+

    }).join("")+

      '</tbody></table>':
      '<div class="empty"><div class="em-ico">📭</div><div>Aucune commande pour le moment.</div><div style="font-size:13px;margin-top:8px;color:var(--faint)">Les ventes apparaîtront ici en temps réel dès qu\'un client passe commande.</div></div>'
    )+
    '</div>';
}

function vOrders(){

    if(D.searchQ){var q=D.searchQ.toLowerCase();if((o.orderId+" "+o.shop+" "+o.method+" "+o.items_summary).toLowerCase().indexOf(q)<0)return false}

      f.map(function(o){var sh=shopFromId(o.shop);return '<tr><td style="color:var(--muted);white-space:nowrap">'+fmtD(o.ts)+'</td><td style="font-weight:600">'+esc(o.orderId)+'</td><td>'+sh.icon+' '+esc(sh.name)+'</td><td>'+o.items_count+'</td><td class="right amt">'+fmtP(o.total)+'</td><td><span class="badge badge-info">'+esc(o.method||"—")+'</span></td><td style="font-size:12px;color:var(--muted);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(o.items_summary)+'">'+esc(o.items_summary||"—")+'</td></tr>'}).join("")+

function vAnalytics(){
  var f=allOrdersFlat();
  // par jour sur 30 derniers jours
  var today=new Date();today.setHours(0,0,0,0);
  var days=[];
  for(var i=29;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);days.push({k:d.toISOString().slice(0,10),lbl:d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}),total:0,count:0})}
  var idx={};days.forEach(function(d,i){idx[d.k]=i});
  f.forEach(function(o){var k=new Date(o.ts||0).toISOString().slice(0,10);if(idx[k]!=null){days[idx[k]].total+=o.total;days[idx[k]].count++}});
  var max=Math.max.apply(null,days.map(function(d){return d.total}))||1;
  return topbar("Analytiques")+
    '<div class="card"><h3>📈 Revenu — 30 derniers jours</h3>'+
    '<div style="display:flex;gap:3px;align-items:flex-end;height:160px;padding:8px 0 16px">'+
    days.map(function(d){var pct=Math.max(2,Math.round(d.total/max*100));return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div title="'+d.lbl+' : '+fmtP(d.total)+' ('+d.count+' cmd)" style="width:100%;height:'+pct+'%;background:linear-gradient(180deg,var(--p),var(--p2));border-radius:3px 3px 0 0;min-height:2px"></div></div>'}).join("")+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--faint)"><span>'+days[0].lbl+'</span><span>'+days[Math.floor(days.length/2)].lbl+'</span><span>'+days[days.length-1].lbl+'</span></div>'+
    '</div>'+
    '<div class="card"><h3>🏪 Part de marché</h3>'+
    (function(){var g=statsAll().byShop,tot=0;Object.keys(g).forEach(function(k){tot+=g[k].total});
    return SHOPS.map(function(sh){var v=g[sh.id]||{total:0};var pct=tot?Math.round(v.total/tot*100):0;
      return '<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="width:160px;font-size:14px">'+sh.icon+' '+esc(sh.name)+'</span><div style="flex:1"><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+sh.color+'"></div></div></div><span style="width:80px;text-align:right;font-weight:700;color:'+sh.color+'">'+pct+'%</span></div>'}).join("")})()+
    '</div>';
}

async function doChangePin(){
  var cur=document.getElementById("pinCur").value.trim(),nw=document.getElementById("pinNew").value.trim();
  var salt=lg(SK.pinSalt),h=await hashPin(cur,salt);
  if(h!==lg(SK.pinHash))return toast("PIN actuel incorrect ❌");
  try{await changePin(nw);toast("PIN mis à jour ✅");document.getElementById("pinCur").value="";document.getElementById("pinNew").value=""}
  catch(e){toast(e.message)}
}
