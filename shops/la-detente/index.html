.toast{position:fixed;bottom:-80px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);left:50%;transform:translateX(-50%);z-index:10000;padding:12px 24px;border-radius:var(--r);background:var(--card);color:var(--text);box-shadow:0 12px 40px rgba(0,0,0,0.12);display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;transition:bottom .3s;border:1px solid var(--border)}

.btt{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 12px 40px rgba(0,0,0,0.12);z-index:998;opacity:0;pointer-events:none;transition:all .25s;cursor:pointer}
